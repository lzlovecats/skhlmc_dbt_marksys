<!doctype html><html lang="zh-HK"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0e1117"><title>遲到罰款基金</title><link rel="stylesheet" href="/shared/vote-ui.css"><link rel="stylesheet" href="/shared/app-shell.css"><style>
main{max-width:84rem;margin:auto}.head{margin-bottom:1rem}h1{margin:.15rem 0;font-size:2rem}.tabs{display:flex;gap:.5rem;flex-wrap:wrap;margin:1rem 0}.tabs button.active{background:var(--accent);border-color:var(--accent);font-weight:700}.pane{display:none}.pane.active{display:block}.grid{display:grid;gap:1rem}.metrics{grid-template-columns:repeat(4,minmax(0,1fr))}.metric{padding:1rem}.metric b{display:block;font-size:1.4rem;margin-top:.25rem}.split{grid-template-columns:1fr 1fr}.actions{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1rem}.actions button{width:auto}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.8rem}.form-grid .wide{grid-column:1/-1}table{width:100%;border-collapse:collapse;font-size:.9rem}th,td{border:1px solid var(--border);padding:.55rem;text-align:left;vertical-align:top}th{color:var(--muted)}.table-wrap{overflow:auto}.danger{border-color:var(--against);color:var(--against)}.success{color:var(--ok)}@media(max-width:720px){.metrics,.split,.form-grid{grid-template-columns:1fr}.metric b{font-size:1.2rem}}
</style></head><body><main><a class="back" href="/">← 返回主頁</a><header class="head"><h1>遲到罰款基金</h1><p class="caption">計算罰款公式：該成員於本年度第 N 次遲到 × 遲到分鐘。基金以每年 9 月至翌年 8 月劃分。</p></header><section id="login" class="card hidden"><h2>內部委員會成員登入</h2><form class="login" id="loginForm"><label>用戶名稱<input id="loginUser" required></label><label>密碼<input id="loginPassword" type="password" required></label><button class="primary">登入</button></form></section><section id="app" class="hidden"><div class="card"><label>選擇年度<select id="year"></select></label><p id="range" class="caption"></p></div><nav class="tabs"><button class="active" data-pane="overview">總覽</button><button data-pane="input">新增紀錄</button><button data-pane="history">紀錄管理</button></nav><section id="overview" class="pane active"><div id="metrics" class="grid metrics"></div><div class="card"><h2>年度結餘設定</h2><p class="caption">Bal c/d = Bal b/d + 本年度已收罰款 − 本年度支出。</p><div class="form-grid"><label>Bal b/d（HKD）<input id="opening" type="number" step=".01"></label><div class="actions"><button id="saveOpening" class="primary">儲存 Bal b/d</button><button id="carry">沿用上一年度結餘</button></div></div></div><div class="card"><h2>成員統計</h2><div id="summary"></div></div><div class="card"><h2>基金支出</h2><div id="expensesOverview"></div></div></section><section id="input" class="pane"><div class="grid split"><form id="recordForm" class="card"><h2>新增遲到紀錄</h2><div class="form-grid"><label>日期<input id="lateDate" type="date" required></label><label>帳戶<select id="member" required></select></label><label>遲到分鐘<input id="minutes" type="number" min="1" value="1" required></label><label>已繳金額（HKD）<input id="paid" type="number" min="0" step=".01" value="0"></label><label class="wide">備註<input id="lateNote"></label></div><p id="preview" class="caption"></p><button class="primary">新增遲到紀錄</button></form><form id="expenseForm" class="card"><h2>新增基金支出</h2><label>支出日期<input id="expenseDate" type="date" required></label><label>支出金額（HKD）<input id="expenseAmount" type="number" min=".01" step=".01" required></label><label>支出用途 / 備註<input id="expenseNote"></label><button class="primary">新增支出紀錄</button></form></div></section><section id="history" class="pane"><div class="card"><h2>遲到紀錄</h2><div id="records"></div></div><div class="card"><h2>支出紀錄</h2><div id="expenses"></div></div></section></section></main><div id="toast" class="toast"></div><div id="busy" class="busy"><div class="busy-pill"><i class="spinner"></i>處理中…</div></div><script src="/shared/vote-ui.js"></script><script>
(()=>{const $=id=>document.getElementById(id),money=n=>'HKD '+Number(n||0).toLocaleString('en-HK',{minimumFractionDigits:2,maximumFractionDigits:2}),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),today=new Date().toISOString().slice(0,10);let data;
async function api(url,opt={}){const r=await fetch('/api'+url,{credentials:'same-origin',headers:{'Content-Type':'application/json',...(opt.headers||{})},...opt});if(r.status===401){$('app').classList.add('hidden');$('login').classList.remove('hidden');throw Error('請先登入。')}const d=await r.json().catch(()=>({}));if(!r.ok)throw Error(d.detail||'操作失敗。');return d}async function load(){VoteUI.setBusy($('busy'),true);try{data=await api('/lateness-fund/data'+($('year').value?'?year='+encodeURIComponent($('year').value):''));render()}catch(e){if(e.message!=='請先登入。')VoteUI.toast($('toast'),'⚠️ '+e.message)}finally{VoteUI.setBusy($('busy'),false)}}function table(rows,cols,actions=''){if(!rows.length)return '<p class="caption">暫無紀錄。</p>';return '<div class="table-wrap"><table><thead><tr>'+cols.map(c=>'<th>'+c[0]+'</th>').join('')+(actions?'<th>操作</th>':'')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+cols.map(c=>'<td>'+esc(c[1](r))+'</td>').join('')+(actions?'<td>'+actions(r)+'</td>':'')+'</tr>').join('')+'</tbody></table></div>'}function render(){ $('login').classList.add('hidden');$('app').classList.remove('hidden');$('year').innerHTML=data.years.map(y=>`<option value="${y}" ${y===data.year?'selected':''}>${y}-${String((y+1)%100).padStart(2,'0')}</option>`).join('');$('range').textContent=`目前年度：${data.label}（${data.range[0]} 至 ${data.range[1]}）`;$('opening').value=data.metrics.opening;$('metrics').innerHTML=[['Bal b/d',data.metrics.opening],['本年度已收罰款',data.metrics.received],['本年度支出',data.metrics.expenses],['Bal c/d',data.metrics.closing],['本年度應收罰款',data.metrics.penalties],['本年度未收罰款',data.metrics.outstanding],['本年度罰款次數',data.metrics.count]].map(x=>`<div class="card metric"><span class="caption">${x[0]}</span><b>${typeof x[1]==='number'&&x[0]!=='本年度罰款次數'?money(x[1]):x[1]}</b></div>`).join('');$('summary').innerHTML=table(data.summary,[['排名',r=>r.late_rank],['帳戶',r=>r.member_user_id],['遲到次數',r=>r.late_count],['累計遲到分鐘',r=>r.total_late_minutes],['應繳罰款',r=>money(r.penalty_amount)],['已繳金額',r=>money(r.paid_amount)],['結餘',r=>money(r.balance)]]);const ecols=[['日期',r=>r.expense_date?.slice(0,10)],['金額',r=>money(r.amount_hkd)],['備註',r=>r.note],['記錄人',r=>r.created_by]];$('expensesOverview').innerHTML=table(data.expenses,ecols);$('records').innerHTML=table(data.records,[['日期',r=>r.late_date?.slice(0,10)],['帳戶',r=>r.member_user_id],['分鐘',r=>r.late_minutes],['第幾次',r=>r.late_no],['應繳',r=>money(r.penalty_amount)],['已繳',r=>money(r.paid_amount)],['備註',r=>r.note]],r=>`<button data-paid="${r.id}">更新已繳</button> <button class="danger" data-delete-record="${r.id}">刪除</button>`);$('expenses').innerHTML=table(data.expenses,ecols,r=>`<button class="danger" data-delete-expense="${r.id}">刪除</button>`);$('member').innerHTML=data.members.map(x=>`<option>${esc(x)}</option>`).join('');preview();}
function preview(){if(!data)return;let count=data.records.filter(r=>r.member_user_id===$('member').value).length+1;$('preview').textContent=`按現有紀錄計算，今次是該帳戶於 ${data.label} 年度第 ${count} 次遲到，應繳 ${money(count*Number($('minutes').value||0))}。`}$('lateDate').value=$('expenseDate').value=today;$('year').onchange=load;$('member').onchange=preview;$('minutes').oninput=preview;document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tabs button,.pane').forEach(x=>x.classList.remove('active'));b.classList.add('active');$(b.dataset.pane).classList.add('active')});async function mutate(url,opt,msg){VoteUI.setBusy($('busy'),true);try{await api(url,opt);VoteUI.toast($('toast'),'✅ '+msg);await load()}catch(e){VoteUI.toast($('toast'),'⚠️ '+e.message)}finally{VoteUI.setBusy($('busy'),false)}}$('saveOpening').onclick=()=>mutate('/lateness-fund/opening/'+data.year,{method:'POST',body:JSON.stringify({amount:+$('opening').value})},'已更新 Bal b/d。');$('carry').onclick=()=>mutate('/lateness-fund/carry/'+data.year,{method:'POST'},'已沿用上一年度結餘。');$('recordForm').onsubmit=e=>{e.preventDefault();mutate('/lateness-fund/records',{method:'POST',body:JSON.stringify({late_date:$('lateDate').value,member_user_id:$('member').value,late_minutes:+$('minutes').value,paid_amount:+$('paid').value,note:$('lateNote').value})},'已新增遲到紀錄。')};$('expenseForm').onsubmit=e=>{e.preventDefault();mutate('/lateness-fund/expenses',{method:'POST',body:JSON.stringify({expense_date:$('expenseDate').value,amount:+$('expenseAmount').value,note:$('expenseNote').value})},'已新增支出紀錄。')};document.body.onclick=e=>{let b=e.target;if(b.dataset.paid){let r=data.records.find(x=>x.id==b.dataset.paid),amount=prompt('更新已繳金額（HKD）',r.paid_amount);if(amount!==null)mutate('/lateness-fund/records/'+b.dataset.paid,{method:'PATCH',body:JSON.stringify({amount:+amount})},'已更新已繳金額。')}if(b.dataset.deleteRecord&&confirm('確定永久刪除此遲到紀錄？'))mutate('/lateness-fund/records/'+b.dataset.deleteRecord,{method:'DELETE'},'已刪除遲到紀錄。');if(b.dataset.deleteExpense&&confirm('確定永久刪除這筆支出？'))mutate('/lateness-fund/expenses/'+b.dataset.deleteExpense,{method:'DELETE'},'已刪除支出紀錄。')};$('loginForm').onsubmit=async e=>{e.preventDefault();try{await api('/committee/login',{method:'POST',body:JSON.stringify({user_id:$('loginUser').value,password:$('loginPassword').value})});load()}catch(x){VoteUI.toast($('toast'),'⚠️ '+x.message)}};load()})();
</script><script src="/shared/server-tables.js"></script></body></html>
