<!doctype html>
<html lang="zh-HK">
<head>
    <meta charset="utf-8">
    <title>查閱比賽結果</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#111827">
    <link rel="stylesheet" href="/shared/vote-ui.css">
    <link rel="stylesheet" href="/shared/app-shell.css"><style>
        main { width: min(100%, 84rem); margin: 0 auto; } h1 { margin: 0 0 .45rem; font-size: 2rem; } h2 { margin: 0 0 .7rem; font-size: 1.25rem; }
        .intro, .caption { color: var(--muted); } .card { margin-bottom: 1rem; } .notice { margin: .8rem 0; } .notice.warn { border-color: #927126; color: var(--warn); } .notice.ok { border-color: #357a52; color: var(--ok); }
        .login { width: min(100%, 48rem); margin: 3rem auto; } .login form { display:grid; gap:.85rem; } .login label { margin:0; } .login button { width:100%; margin-top:.25rem; }
        .field { margin-bottom: .75rem; } .field label { margin-bottom:.3rem; } .metrics { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:1rem; }
        .metric { border:1px solid var(--border); border-radius:8px; background:var(--surface); padding:.85rem; } .metric .label { color:var(--muted); font-size:.85rem; } .metric .value { font-size:1.6rem; font-weight:700; margin-top:.2rem; }
        .winner { border-left:4px solid var(--accent); padding:.75rem .9rem; background:var(--surface); } .winner.draw { border-color:#b98a2e; }
        .table-wrap { overflow-x:auto; } table { width:100%; min-width:540px; border-collapse:collapse; } th,td { border:1px solid var(--border); padding:.55rem .65rem; text-align:left; } th { color:var(--muted); background:var(--surface); white-space:nowrap; }
        .hidden { display:none!important; } @media(max-width:640px) { h1 { font-size:1.65rem; } .metrics { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<main>
    <a class="back-link" href="/">← 返回主頁</a>
    <h1>查閱比賽結果</h1>
    <p class="intro">查看已正式提交的評分紀錄、勝負判定、最佳辯論員及評分異常提示。</p>
    <details class="guide"><summary>ℹ️ 首次使用指南</summary><ul><li>選擇場次即可查看各評判提交的票數結果。</li><li>如票數相同，可按賽規考慮加設自由辯論環節。</li><li>只有三位或以上評判提交分數時，才會顯示異常偵測。</li></ul></details>
    <div id="loading" class="notice">載入中…</div>
    <section id="login" class="card login hidden"><h2>賽會人員登入</h2><p class="intro">請輸入賽會人員密碼以查看結果。</p><form id="loginForm"><label for="password">請輸入賽會人員密碼</label><input id="password" type="password" autocomplete="current-password"><div id="loginMsg"></div><button class="primary" type="submit">登入</button></form></section>
    <section id="app" class="hidden"><div id="empty" class="notice hidden">目前未有正式評分紀錄。請先確認評判已在「電子分紙」完成提交。</div><section id="results" class="hidden"><section class="card"><div class="field"><label for="match">請選擇要查看的場次</label><select id="match"></select></div></section><section class="card"><h2 id="statusTitle"></h2><p id="judgeCount" class="caption"></p></section><section class="card"><h2>勝負判定</h2><p id="topic"></p><div id="metrics" class="metrics"></div><div id="winner" class="winner"></div></section><section class="card"><h2>最佳辯論員</h2><div id="best"></div></section><section id="anomalySection" class="card hidden"><h2>評分異常偵測</h2><div id="anomalies"></div></section></section></section>
</main>
<div id="toast" class="toast"></div><div id="busy" class="busy-overlay"><div class="busy-pill"><span class="spinner"></span>處理中…</div></div>
<script src="/shared/vote-ui.js"></script>
<script>
(() => {
    const $ = id => document.getElementById(id); let state = null;
    const esc = value => String(value ?? "").replace(/[&<>"']/g, char => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[char])); const busy = on => VoteUI.setBusy($("busy"), on); const notice = (id,text,kind="warn") => { $(id).innerHTML = text ? `<div class="notice ${kind}">${esc(text)}</div>` : ""; };
    async function load(matchId = "") { const response = await fetch(`/api/management/data${matchId ? `?match_id=${encodeURIComponent(matchId)}` : ""}`, {credentials:"same-origin"}); if (response.status === 401) { $("loading").classList.add("hidden"); $("login").classList.remove("hidden"); return; } const data = await response.json(); if (!response.ok) throw new Error(data.detail || "載入失敗。"); state = data; render(); }
    function render() { $("loading").classList.add("hidden"); $("login").classList.add("hidden"); $("app").classList.remove("hidden"); $("empty").classList.toggle("hidden", state.has_scores); $("results").classList.toggle("hidden", !state.has_scores); if (!state.has_scores) return; $("match").innerHTML = state.matches.map(id => `<option value="${esc(id)}" ${id === state.selected_match_id ? "selected" : ""}>${esc(id)}</option>`).join(""); $("statusTitle").textContent = `場次 ${state.selected_match_id} 評分狀況`; $("judgeCount").textContent = `目前已有 ${state.judge_count} 位評判提交分數。`; $("topic").innerHTML = `<strong>辯題：</strong> ${esc(state.topic)}`; $("metrics").innerHTML = [[`正方（${state.pro_team}）得票`,`${state.pro_votes} 票`],[`反方（${state.con_team}）得票`,`${state.con_votes} 票`],["平票",`${state.draws} 票`]].map(([label,value]) => `<div class="metric"><div class="label">${esc(label)}</div><div class="value">${esc(value)}</div></div>`).join(""); const winner = $("winner"); if (state.winner === "pro") { winner.classList.remove("draw"); winner.textContent = `🏆 勝方：正方（${state.pro_team}）`; } else if (state.winner === "con") { winner.classList.remove("draw"); winner.textContent = `🏆 勝方：反方（${state.con_team}）`; } else { winner.classList.add("draw"); winner.textContent = "票數相同，可按賽規加設自由辯論環節重新評分。"; } if (state.best_debaters) { $("best").innerHTML = `<div class="table-wrap"><table><thead><tr><th>辯位</th><th>名次總和</th><th>平均得分</th></tr></thead><tbody>${state.best_debaters.map(row => `<tr><td>${esc(row.role)}</td><td>${row.rank_sum}</td><td>${row.average_score}</td></tr>`).join("")}</tbody></table></div><p class="notice ok">本場最佳辯論員：<strong>${esc(state.best_debater.role)}</strong>（名次總和：${state.best_debater.rank_sum} ｜ 平均分：${state.best_debater.average_score}）</p>`; } else { $("best").innerHTML = '<div class="notice warn">最佳辯論員資料暫時不可用。</div>'; } const section = $("anomalySection"); section.classList.toggle("hidden", state.judge_count < 3); if (state.judge_count >= 3) $("anomalies").innerHTML = state.anomalies.length ? state.anomalies.map(item => `<div class="notice warn">⚠️ ${esc(item.judge_name)} 的${esc(item.side)}評分（${item.score}）偏離其他評判（平均：${item.mean}，標準差：${item.std}）。</div>`).join("") : '<div class="notice ok">所有評判評分無明顯異常。</div>'; }
    $("match").addEventListener("change", () => { busy(true); load($("match").value).catch(error => VoteUI.toast($("toast"), error.message)).finally(() => busy(false)); });
    $("loginForm").addEventListener("submit", event => { event.preventDefault(); busy(true); fetch("/api/registration-admin/login", {method:"POST",credentials:"same-origin",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:$("password").value})}).then(async response => { const data=await response.json(); if (!response.ok) throw new Error(data.detail || "登入失敗。"); return load(); }).catch(error => notice("loginMsg", error.message)).finally(() => busy(false)); });
    load().catch(error => { $("loading").textContent = error.message; });
})();
</script>
</body>
</html>
