<!doctype html><html lang="zh-HK"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0e1117"><title>AI基金</title><link rel="stylesheet" href="/shared/vote-ui.css"><link rel="stylesheet" href="/shared/app-shell.css"><style>
main{max-width:84rem;margin:auto}h1{margin:.15rem 0;font-size:2rem}.tabs{display:flex;gap:.5rem;flex-wrap:wrap;margin:1rem 0}.tabs button.active{background:var(--accent);border-color:var(--accent);font-weight:700}.pane{display:none}.pane.active{display:block}.grid{display:grid;gap:1rem}.metrics{grid-template-columns:repeat(3,minmax(0,1fr))}.split{grid-template-columns:1fr 1fr}.metric b{display:block;font-size:1.45rem;margin-top:.25rem}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.85rem}.wide{grid-column:1/-1}form button{margin-top:1rem}table{width:100%;border-collapse:collapse;font-size:.9rem}th,td{border:1px solid var(--border);padding:.55rem;text-align:left;vertical-align:top}th{color:var(--muted)}.table-wrap{overflow:auto}.warning{border-color:#927126;color:var(--warn)}.actions{display:flex;gap:.5rem;flex-wrap:wrap}.actions button{width:auto}.danger{color:var(--against);border-color:var(--against)}@media(max-width:720px){.metrics,.split,.form-grid{grid-template-columns:1fr}}
</style></head><body><main><a class="back" href="/">← 返回主頁</a><h1>💲AI基金</h1><p class="caption">正式現金帳以 AI基金管理員確認的入數及 AI provider 付款紀錄為準；AI 用量成本只作估算。</p><section id="login" class="card hidden"><h2>內部委員會成員登入</h2><form class="login" id="loginForm"><label>用戶名稱<input id="loginUser" required></label><label>密碼<input id="loginPassword" type="password" required></label><button class="primary">登入</button></form></section><section id="app" class="hidden"><div id="notice"></div><nav id="tabs" class="tabs"><button class="active" data-pane="overview">總覽</button><button data-pane="deposit">入數 / 交易</button><button data-pane="usage">AI 用量</button><button id="adminTab" data-pane="admin" class="hidden">管理員</button></nav><section id="overview" class="pane active"><div id="metrics" class="grid metrics"></div><div class="card"><h2>Provider 餘額</h2><div id="providers" class="grid split"></div></div><div class="card"><h2>付款指示</h2><p id="instruction" style="white-space:pre-wrap"></p></div></section><section id="deposit" class="pane"><div class="grid split"><form id="depositForm" class="card"><h2>成員入數</h2><label>入數金額（HKD）<input id="depositAmount" type="number" min=".01" step=".01" required></label><label>付款方式<select id="depositMethod"><option>FPS</option><option>現金</option><option>Alipay</option><option>PayMe</option><option>其他</option></select></label><label>Reference / 交易編號（如有）<input id="depositReference"></label><label>備註（如有）<textarea id="depositNote"></textarea></label><button class="primary">提交入數紀錄</button></form><div class="card"><h2 id="transactionTitle">我的入數紀錄</h2><div id="transactions"></div></div></div></section><section id="usage" class="pane"><div class="card"><h2>AI 用量估算</h2><p class="caption">只作參考，實際成本以 provider 帳單為準。</p><div id="usageTable"></div></div></section><section id="admin" class="pane"><div class="card"><h2>待確認入數</h2><div id="pending"></div></div><div class="grid split"><form id="adminTxForm" class="card"><h2>記錄 provider 支出 / 退款 / 調整</h2><label>交易類型<select id="adminType"><option value="provider_topup">Provider 充值 / 支出</option><option value="refund">退款</option><option value="adjustment">手動調整</option></select></label><label>Provider / 分類<select id="adminProvider"><option value="gemini">Google Gemini</option><option value="openrouter">OpenRouter</option><option value="other">其他</option></select></label><label>金額（HKD）<input id="adminAmount" type="number" step=".01" required></label><label>付款方式 / Provider<input id="adminMethod"></label><label>Reference / 帳單編號<input id="adminReference"></label><label>原因 / 備註<textarea id="adminNote" required></textarea></label><button class="primary">新增已確認交易</button></form><div class="card"><h2>Google AI Studio 餘額</h2><p class="caption">由 AI基金管理員從 AI Studio Billing 手動更新，並非 Google API 即時回傳。</p><form id="googleForm"><label>Google AI Studio 餘額（USD）<input id="googleBalance" type="number" min="0" step=".0001"></label><button>更新餘額</button></form><hr><h2>AI基金設定</h2><form id="settingsForm"><label>目標金額（HKD）<input id="target" type="number" min="0" step=".01"></label><label>低餘額警戒線（HKD）<input id="low" type="number" min="0" step=".01"></label><label>付款指示<textarea id="settingsInstruction"></textarea></label><button class="primary">更新設定</button></form><hr><button id="resetUsage" class="danger">重置所有 AI 用量紀錄</button></div></div></section></section></main><div id="toast" class="toast"></div><div id="busy" class="busy"><div class="busy-pill"><i class="spinner"></i>處理中…</div></div><script src="/shared/vote-ui.js"></script><script>
(()=>{const $=id=>document.getElementById(id),money=n=>'HKD '+Number(n||0).toLocaleString('en-HK',{minimumFractionDigits:2,maximumFractionDigits:2}),usd=n=>'US$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:4}),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));let data;async function api(url,opt={}){let r=await fetch('/api'+url,{credentials:'same-origin',headers:{'Content-Type':'application/json',...(opt.headers||{})},...opt});if(r.status===401){$('app').classList.add('hidden');$('login').classList.remove('hidden');throw Error('請先登入。')}let d=await r.json().catch(()=>({}));if(!r.ok)throw Error(d.detail||'操作失敗。');return d}async function load(){VoteUI.setBusy($('busy'),true);try{data=await api('/ai-fund/data');data.openrouter=await api('/ai-fund/openrouter-credit').catch(e=>({ok:false,message:e.message}));render()}catch(e){if(e.message!=='請先登入。')VoteUI.toast($('toast'),'⚠️ '+e.message)}finally{VoteUI.setBusy($('busy'),false)}}function table(rows,cols,act=''){if(!rows.length)return '<p class="caption">暫無紀錄。</p>';return '<div class="table-wrap"><table><thead><tr>'+cols.map(c=>'<th>'+c[0]+'</th>').join('')+(act?'<th>操作</th>':'')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+cols.map(c=>'<td>'+esc(c[1](r))+'</td>').join('')+(act?'<td>'+act(r)+'</td>':'')+'</tr>').join('')+'</tbody></table></div>'}function render(){let s=data.summary,st=data.settings,or=data.openrouter;$('login').classList.add('hidden');$('app').classList.remove('hidden');$('adminTab').classList.toggle('hidden',!data.is_treasurer);$('notice').innerHTML=!st.treasurers.length?'<div class="card warning">尚未設定 AI基金管理員。請先到開發者設定指定 AI基金管理員。</div>':data.is_treasurer?'<div class="card">你是 AI基金管理員，可確認入數、記錄支出及更新基金設定。</div>':'';$('metrics').innerHTML=[['已確認現金餘額',money(s.balance_hkd)],['待確認入數',money(s.pending_deposits_hkd)],['最近 30 日 AI 用量（估算）',money(s.recent_usage_hkd)]].map(x=>`<div class="card metric"><span class="caption">${x[0]}</span><b>${x[1]}</b></div>`).join('')+(s.balance_hkd<st.low_balance_hkd?'<div class="card warning">餘額低於警戒線，建議補充資金。</div>':'');$('providers').innerHTML=`<div><b>OpenRouter 剩餘 credits</b><p id="openrouterCredit">載入中…</p></div><div><b>Google AI Studio 手動餘額</b><p>${data.google_balance.balance_usd===null?'未設定':usd(data.google_balance.balance_usd)+'（約 '+money(data.google_balance.balance_usd*7.8)+'）'}</p><p class="caption">更新：${esc(data.google_balance.updated_at||'—')}｜${esc(data.google_balance.updated_by||'—')}</p></div>`;$('openrouterCredit').textContent=or.ok ? usd(or.remaining_credits_usd)+"（Purchased："+usd(or.total_credits_usd)+"｜Used："+usd(or.total_usage_usd)+"）" : (or.message||"OpenRouter credits 讀取失敗。");$('instruction').textContent=st.payment_instruction;$('transactionTitle').textContent=data.is_treasurer?'交易紀錄':'我的入數紀錄';$('transactions').innerHTML=table(data.transactions,[['編號',r=>r.id],['類型',r=>({member_deposit:'成員入數',provider_topup:'Provider充值 / 支出',refund:'退款',adjustment:'手動調整'}[r.transaction_type]||r.transaction_type)],['狀態',r=>({pending:'待確認',confirmed:'已確認',rejected:'已拒絕'}[r.status]||r.status)],['Provider',r=>r.provider],['金額',r=>money(r.amount_hkd)],['提交者',r=>r.created_by],['時間',r=>r.created_at]]);$('usageTable').innerHTML=table(data.usage,[['時間',r=>r.created_at],['用戶',r=>r.user_id],['功能',r=>r.feature],['模型',r=>r.model_label],['Provider',r=>r.provider],['估算成本',r=>money(r.estimated_cost_hkd)],['狀態',r=>r.status]]);let pending=data.transactions.filter(r=>r.status==='pending'&&r.transaction_type==='member_deposit');$('pending').innerHTML=table(pending,[['編號',r=>r.id],['提交者',r=>r.created_by],['金額',r=>money(r.amount_hkd)],['付款方式',r=>r.payment_method],['Reference',r=>r.reference_no],['備註',r=>r.note]],r=>`<button data-confirm="${r.id}">確認</button> <button class="danger" data-reject="${r.id}">拒絕</button>`);$('googleBalance').value=data.google_balance.balance_usd??0;$('target').value=st.target_hkd;$('low').value=st.low_balance_hkd;$('settingsInstruction').value=st.payment_instruction}document.querySelectorAll('#tabs button').forEach(b=>b.onclick=()=>{if(b.classList.contains('hidden'))return;document.querySelectorAll('#tabs button,.pane').forEach(x=>x.classList.remove('active'));b.classList.add('active');$(b.dataset.pane).classList.add('active')});async function mutate(url,opt,msg){VoteUI.setBusy($('busy'),true);try{await api(url,opt);VoteUI.toast($('toast'),'✅ '+msg);await load()}catch(e){VoteUI.toast($('toast'),'⚠️ '+e.message)}finally{VoteUI.setBusy($('busy'),false)}}$('depositForm').onsubmit=e=>{e.preventDefault();mutate('/ai-fund/deposits',{method:'POST',body:JSON.stringify({amount:+$('depositAmount').value,payment_method:$('depositMethod').value,reference_no:$('depositReference').value,note:$('depositNote').value})},'入數紀錄已提交，待 AI基金管理員確認。')};$('adminTxForm').onsubmit=e=>{e.preventDefault();mutate('/ai-fund/admin/transactions',{method:'POST',body:JSON.stringify({transaction_type:$('adminType').value,provider:$('adminProvider').value,amount:+$('adminAmount').value,payment_method:$('adminMethod').value,reference_no:$('adminReference').value,note:$('adminNote').value})},'已新增交易紀錄。')};$('googleForm').onsubmit=e=>{e.preventDefault();mutate('/ai-fund/admin/settings',{method:'POST',body:JSON.stringify({kind:'google_balance',balance_usd:+$('googleBalance').value})},'Google AI Studio 餘額已更新。')};$('settingsForm').onsubmit=e=>{e.preventDefault();mutate('/ai-fund/admin/settings',{method:'POST',body:JSON.stringify({kind:'settings',target_hkd:+$('target').value,low_balance_hkd:+$('low').value,payment_instruction:$('settingsInstruction').value})},'AI基金設定已更新。')};$('resetUsage').onclick=()=>{if(confirm('確定刪除所有 AI 用量估算紀錄？此操作不可復原。'))mutate('/ai-fund/admin/settings',{method:'POST',body:JSON.stringify({kind:'reset_usage'})},'已重置 AI 用量紀錄。')};document.body.onclick=e=>{let b=e.target,id=b.dataset.confirm||b.dataset.reject;if(id){let status=b.dataset.confirm?'confirmed':'rejected',note=prompt('確認 / 拒絕備註（可留空）','');if(note!==null)mutate('/ai-fund/admin/transactions/'+id+'/status',{method:'POST',body:JSON.stringify({status,note})},status==='confirmed'?'已確認入數。':'已拒絕入數。')}};$('loginForm').onsubmit=async e=>{e.preventDefault();try{await api('/committee/login',{method:'POST',body:JSON.stringify({user_id:$('loginUser').value,password:$('loginPassword').value})});load()}catch(x){VoteUI.toast($('toast'),'⚠️ '+x.message)}};load()})();
</script><script src="/shared/server-tables.js"></script></body></html>
