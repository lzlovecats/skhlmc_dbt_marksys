<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="utf-8" />
    <title>老鬼專區</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/shared/app-shell.css?v=__APP_VERSION__" />
    <style>
      .toolbar, .actions { display:flex; gap:.6rem; align-items:center; flex-wrap:wrap; }
      .toolbar { margin-bottom:1rem; }
      .toolbar input { flex:1 1 16rem; }
      .toolbar select { width:auto; }
      .thread-list { display:grid; gap:.75rem; }
      .thread { display:block; color:var(--text); text-decoration:none; margin:0; }
      .thread:hover { border-color:var(--accent); }
      .thread-head { display:flex; justify-content:space-between; gap:.7rem; flex-wrap:wrap; }
      .thread h2 { margin:0; }
      .excerpt, .post-body { white-space:pre-wrap; overflow-wrap:anywhere; }
      .posts { display:grid; gap:.85rem; }
      .post { margin:0; }
      .post .actions { margin-top:.75rem; }
      .post-meta { display:flex; justify-content:space-between; gap:.6rem; flex-wrap:wrap; color:var(--muted); font-size:.88rem; margin-bottom:.6rem; }
      .quote { display:block; width:100%; border-left:3px solid var(--accent); background:var(--surface); padding:.55rem .7rem; margin:.55rem 0; color:var(--muted); white-space:pre-wrap; text-align:left; }
      .deleted { color:var(--muted); font-style:italic; }
      .linked { display:grid; grid-template-columns:repeat(auto-fit,minmax(13rem,1fr)); gap:.6rem; margin:.7rem 0; }
      .resource { display:block; color:var(--text); text-decoration:none; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:.65rem; }
      .resource img { width:100%; max-height:9rem; object-fit:cover; border-radius:6px; display:block; margin-bottom:.4rem; }
      .selector-results, .selected { display:grid; gap:.4rem; margin:.6rem 0; }
      .selector-results button, .selected button { width:100%; justify-content:flex-start; text-align:left; }
      .selected button { border-color:#357a52; }
      .pager { display:flex; justify-content:center; align-items:center; gap:.7rem; margin:1rem 0; }
      .pager button { width:auto; }
      .resource-tabs { margin:.65rem 0; }
      .thread-navigation { margin-bottom:1rem; }
      .refresh-replies { display:flex; justify-content:center; margin:1rem 0; }
      .refresh-replies button { width:auto; }
      .unread-badge { display:inline-flex; align-items:center; border-radius:999px; background:var(--accent-fill); color:#fff; padding:.12rem .5rem; font-size:.8rem; font-weight:700; }
      .thread.unread { border-color:var(--accent); }
      .post.target { border-color:var(--accent); box-shadow:0 0 0 2px rgb(76 155 255 / .25); }
      .post-edit textarea { min-height:9rem; }
      .char-count { margin-left:auto; color:var(--muted); font-size:.85rem; }
      .retry-notice .actions { margin-top:.65rem; }
      .thread-tools { display:flex; gap:.55rem; flex-wrap:wrap; margin-top:.8rem; }
    </style>
  </head>
  <body>
    <main>
      <a class="back-link" href="/">← 返回主頁</a>
      <h1>👻 老鬼專區</h1>
      <p class="intro">老鬼專屬區域 :>。</p>
      <section id="login" class="card hidden"><h2>內部委員會成員登入</h2><form id="loginForm"><label>用戶名稱<input id="loginUser" autocomplete="username" required /></label><label>密碼<input id="loginPassword" type="password" autocomplete="current-password" required /></label><button class="primary" type="submit">登入</button></form><p id="loginMessage" class="error"></p></section>
      <section id="denied" class="notice warn hidden"><p id="deniedMessage"></p><button id="deniedLogout" type="button">登出並轉換帳戶</button></section>
      <section id="app" class="hidden">
        <section id="indexPane">
          <section id="retryNotifications" class="notice warn retry-notice hidden" aria-live="polite"></section>
          <div class="toolbar"><input id="search" type="search" maxlength="100" placeholder="搜尋標題及留言" aria-label="搜尋標題及留言" /><select id="sort" aria-label="帖文排序"><option value="activity">最近活躍</option><option value="newest">最新帖文</option></select><button id="searchButton" type="button">搜尋</button><button id="newThread" class="primary" type="button">發表帖文</button></div>
          <section id="composer" class="card hidden"><h2 id="composerTitle">發表帖文</h2><form id="threadForm"><input id="editingThreadId" type="hidden" /><input id="editingThreadRevision" type="hidden" /><label>標題<input id="threadTitle" maxlength="300" required /></label><div id="threadTitleCount" class="char-count">0 / 300</div><label id="threadBodyWrap">帖文<textarea id="threadBody" rows="7" maxlength="8000" required></textarea></label><div id="threadBodyCount" class="char-count">0 / 8000</div><details><summary>連結現有影片／圖片／隊史事件</summary><div class="grid2"><label>搜尋<input id="resourceSearch" maxlength="100" /></label><button id="resourceButton" type="button">搜尋資源</button></div><nav id="resourceTabs" class="tabs resource-tabs"><button class="active" data-resource-kind="videos" type="button">影片</button><button data-resource-kind="photos" type="button">圖片</button><button data-resource-kind="history_events" type="button">隊史事件</button></nav><div id="resourceResults" class="selector-results"></div><nav id="resourcePager" class="pager" aria-label="資源分頁"></nav><h3>已選擇</h3><div id="selectedResources" class="selected"></div></details><div class="actions"><button id="threadSave" class="primary" type="submit">發表帖文</button><button id="cancelComposer" type="button">取消</button></div></form></section>
          <div id="threads" class="thread-list"></div>
          <nav id="threadPager" class="pager" aria-label="帖文分頁"></nav>
        </section>
        <section id="threadPane" class="hidden"><button id="backToIndex" class="thread-navigation" type="button">← 返回帖文列表</button><section id="threadHeader" class="card"></section><div id="posts" class="posts"></div><nav id="postPager" class="pager" aria-label="留言分頁"></nav><div class="refresh-replies"><button id="refreshReplies" type="button">🔄 重整新留言</button></div><section class="card"><h2>回覆</h2><div id="quoteTarget" class="quote hidden"></div><form id="replyForm"><input id="quotedPostId" type="hidden" /><label>留言<textarea id="replyBody" rows="5" maxlength="8000" required></textarea></label><div class="actions"><button class="primary" type="submit">發表回覆</button><button id="clearQuote" class="hidden" type="button">取消引用</button><span id="replyBodyCount" class="char-count">0 / 8000</span></div></form></section></section>
      </section>
    </main>
    <div id="busy" class="busy" role="status" aria-live="polite" aria-hidden="true"><div class="busy-pill"><span class="spinner"></span>處理中…</div></div><div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/shared/vote-ui.js?v=__APP_VERSION__"></script>
    <script>
      (() => {
        "use strict";
        const $ = (id) => document.getElementById(id);
        const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);
        let context=null,threadRows={},activeThread=null,postRows={},postPage=1,threadPage=1,resources={videos:[],photos:[],history_events:[]};
        let resourceKind="videos",resourceRequest=0,threadRequest=0,openRequest=0,busyCount=0,lastThreadFocusId=null,restoringDraft=false;
        let selectedVideos=new Map(),selectedPhotos=new Map(),selectedHistoryEvents=new Map();

        async function api(path,options={}){const response=await fetch(path.startsWith("/api/")?path:`/api/community${path}`,{credentials:"same-origin",headers:{"Content-Type":"application/json"},...options});const data=await response.json().catch(()=>({}));if(!response.ok){const error=new Error(data.detail||`HTTP ${response.status}`);error.status=response.status;throw error;}return data;}
        function setBusy(active){busyCount=Math.max(0,busyCount+(active?1:-1));const showing=busyCount>0;VoteUI.setBusy($("busy"),showing);$("busy").setAttribute("aria-hidden",showing?"false":"true");}
        function toast(message){VoteUI.toast($("toast"),message);}
        function storageGet(key){try{const value=sessionStorage.getItem(key);return value?JSON.parse(value):null;}catch(_error){return null;}}
        function storageSet(key,value){try{sessionStorage.setItem(key,JSON.stringify(value));}catch(_error){}}
        function storageRemove(key){try{sessionStorage.removeItem(key);}catch(_error){}}
        function draftKey(kind,id="new"){return `ghostForum:${context?.user_id||"unknown"}:${kind}:${id}`;}
        function videoLabel(row){return `${row.video_title||row.match_display||`影片 #${row.id}`}｜${row.match_display||"獨立影片"}${row.pro_team||row.con_team?`｜${row.pro_team||"正方未定"} vs ${row.con_team||"反方未定"}`:""}`;}
        function photoLabel(row){return `圖片 #${row.id}｜${row.album_label||"未命名相簿"}｜${row.photo_title||"未命名"}`;}
        function historyEventLabel(row){return `${row.academic_year_label||`${row.academic_year_start}/${Number(row.academic_year_start)+1}`}｜${String(row.event_date||"未定日期").slice(0,10)}｜${row.title}`;}
        function mediaHref(path,returnTo){const url=new URL(path,location.origin);url.searchParams.set("return_to",returnTo);return `${url.pathname}?${url.searchParams}`;}
        function linkedVideoHtml(row,returnTo){return `<a class="resource" href="${esc(mediaHref(`/video-replay?video_id=${encodeURIComponent(row.id)}`,returnTo))}"><b>🎬 ${esc(row.video_title||row.match_display||`影片 #${row.id}`)}</b><div class="caption">${esc(row.match_display||"獨立影片")}</div><div>${esc(row.topic_text||"未有辯題")}</div></a>`;}
        function linkedHistoryEventHtml(row){const excerpt=String(row.description||"").slice(0,240);return `<a class="resource" href="/team-history?event_id=${encodeURIComponent(row.id)}"><b>📜 ${esc(row.title)}</b><div class="caption">${esc(row.academic_year_label||`${row.academic_year_start}/${Number(row.academic_year_start)+1}`)}${row.event_date?`・${esc(String(row.event_date).slice(0,10))}`:""}</div>${excerpt?`<div>${esc(excerpt)}${String(row.description||"").length>240?"…":""}</div>`:""}</a>`;}
        function linkHtml(links,returnTo){return `<div class="linked">${(links.videos||[]).map((row)=>linkedVideoHtml(row,returnTo)).join("")}${(links.photos||[]).map((row)=>`<a class="resource" href="${esc(mediaHref(`/match-photos?photo_id=${encodeURIComponent(row.id)}`,returnTo))}"><img loading="lazy" src="/api/match-photos/image/${row.id}?thumbnail=true" alt="${esc(row.photo_title||row.album_label)}" /><b>🖼️ ${esc(row.photo_title||row.album_label)}</b></a>`).join("")}${(links.history_events||[]).map(linkedHistoryEventHtml).join("")}</div>`;}
        function updateCount(input,count,max){$(count).textContent=`${input.value.length} / ${max}`;}
        function listUrl(page=threadPage){const params=new URLSearchParams();const search=$("search").value.trim(),sort=$("sort").value;if(search)params.set("search",search);if(sort!=="activity")params.set("sort",sort);if(page>1)params.set("page",String(page));return `${location.pathname}${params.size?`?${params}`:""}`;}
        function threadUrl(id,{page=1,postId=null}={}){const params=new URLSearchParams({thread:String(id)});if(postId)params.set("post",String(postId));else if(page>1)params.set("page",String(page));return `${location.pathname}?${params}`;}
        function setHistory(mode,url,state){if(mode==="push")history.pushState(state,"",url);else if(mode==="replace")history.replaceState(state,"",url);}

        function renderRetryNotifications(items=context?.retryable_notifications||[]){context.retryable_notifications=items;const root=$("retryNotifications");if(!items.length){root.classList.add("hidden");root.innerHTML="";return;}root.innerHTML=`<b>有 ${items.length} 則通知未成功送達。</b><div class="caption">只有原作者可以重試；帖文內容已經安全保存。</div><div class="actions">${items.map((item)=>`<button type="button" data-retry-notification="${item.notification_id}">重試「${esc(item.title)}」通知</button>`).join("")}</div>`;root.classList.remove("hidden");}
        function renderThreads(items){threadRows=Object.fromEntries(items.map((row)=>[String(row.id),row]));if(!items.length)return '<section class="card"><p class="caption">未有符合條件的帖文。</p></section>';return items.map((row)=>{const postId=row.matched_post_id?Number(row.matched_post_id):null;const href=threadUrl(row.id,{postId});const unread=Number(row.unread_count||0);const excerpt=row.matched_excerpt||row.excerpt||"";return `<a class="card thread ${unread?"unread":""}" href="${href}" data-thread="${row.id}" ${postId?`data-post-target="${postId}"`:""}><div class="thread-head"><h2>${esc(row.title)}</h2><span class="caption">${Number(row.post_count)} 篇留言 ${unread?`<span class="unread-badge">${unread} 則未讀</span>`:""}</span></div><p class="excerpt">${esc(excerpt)}</p>${postId?'<div class="caption">搜尋結果來自留言；開啟後會跳到相關位置。</div>':""}<div class="caption">由 ${esc(row.author_user_id)} 發表・最近活躍 ${esc(String(row.last_activity_at||"").replace("T"," ").slice(0,16))}${row.muted?"・已靜音":""}</div></a>`;}).join("");}
        function renderThreadPager(data){$("threadPager").innerHTML=(data.total_pages||1)>1?`<button data-thread-page="${data.page-1}" ${data.page<=1?"disabled":""}>上一頁</button><span>第 ${data.page} / ${data.total_pages} 頁（共 ${data.total} 篇）</span><button data-thread-page="${data.page+1}" ${data.page>=data.total_pages?"disabled":""}>下一頁</button>`:"";}
        async function loadThreads(page=1,{historyMode="replace",focusId=null}={}){const request=++threadRequest;openRequest+=1;setBusy(true);try{const params=new URLSearchParams({search:$("search").value,sort:$("sort").value,page:String(page)});const data=await api(`/forum/threads?${params}`);if(request!==threadRequest)return false;threadPage=data.page;$("threads").innerHTML=renderThreads(data.items||[]);renderThreadPager(data);$("threadPane").classList.add("hidden");$("indexPane").classList.remove("hidden");activeThread=null;setHistory(historyMode,listUrl(threadPage),{ghostView:"list",page:threadPage});const target=focusId?$("threads").querySelector(`[data-thread="${CSS.escape(String(focusId))}"]`):null;(target||$("search")).focus({preventScroll:Boolean(target)});if(target)target.scrollIntoView({block:"nearest"});return true;}catch(error){if(request===threadRequest)toast(`⚠️ ${error.message}`);return false;}finally{setBusy(false);}}

        function renderPost(row){const deleted=Boolean(row.deleted_at);const quote=row.quoted_post_id?`<button class="quote" type="button" data-go-post="${row.quoted_post_id}"><b>${esc(row.quoted_author||"已刪除")}</b>：${esc(row.quoted_body||"引用內容已刪除")}<span class="caption">　跳到原留言</span></button>`:"";const actions=deleted?"":`<div class="actions" data-post-actions="${row.id}"><button data-like="${row.id}" type="button" aria-pressed="${row.viewer_liked?"true":"false"}" aria-label="${row.viewer_liked?"取消喜歡":"喜歡"}，目前 ${Number(row.like_count)} 個喜歡">${row.viewer_liked?"💙":"♡"} ${Number(row.like_count)}</button><button data-quote="${row.id}" type="button">引用</button>${row.can_edit?`<button data-edit-post="${row.id}" type="button">編輯</button>${row.is_first_post?"":`<button class="danger" data-delete-post="${row.id}" type="button">刪除</button>`}`:""}</div>`;const edit=row.can_edit&&!deleted?`<form class="post-edit hidden" data-post-edit-form="${row.id}"><label>編輯留言<textarea maxlength="8000" required>${esc(row.body)}</textarea></label><div class="actions"><button class="primary" type="submit">儲存修改</button><button data-cancel-post-edit="${row.id}" type="button">取消</button><span class="char-count" data-edit-count="${row.id}">${String(row.body||"").length} / 8000</span></div></form>`:"";return `<article id="post-${row.id}" class="card post" tabindex="-1" data-post-id="${row.id}"><div class="post-meta"><span><b>${esc(row.author_user_id)}</b>${row.is_first_post?"・樓主":""}</span><span>${esc(String(row.created_at||"").replace("T"," ").slice(0,16))}${row.revision>1?"・已編輯":""}</span></div>${quote}<div class="post-body ${deleted?"deleted":""}" data-post-body="${row.id}">${deleted?"此留言已由作者刪除。":esc(row.body)}</div>${actions}${edit}</article>`;}
        function renderPostPager(data){$("postPager").innerHTML=(data.total_pages||1)>1?`<button data-post-page="${data.page-1}" ${data.page<=1?"disabled":""}>上一頁</button><span>第 ${data.page} / ${data.total_pages} 頁</span><button data-post-page="${data.page+1}" ${data.page>=data.total_pages?"disabled":""}>下一頁</button>`:"";}
        async function markVisibleRead(items){const last=items[items.length-1];if(!activeThread||!last)return;try{await api(`/forum/threads/${activeThread.id}/read`,{method:"POST",body:JSON.stringify({post_id:Number(last.id)})});const row=threadRows[String(activeThread.id)];if(row)row.unread_count=0;}catch(error){toast(`⚠️ 未能更新已讀狀態：${error.message}`);}}
        function restoreReplyDraft(){const saved=storageGet(draftKey("reply",activeThread.id));$("replyBody").value=saved?.body||"";$("quotedPostId").value=saved?.quoted_post_id||"";if(saved?.quoted_post_id){$("quoteTarget").dataset.author=saved.quoted_author||"";$("quoteTarget").dataset.body=saved.quoted_body||"";$("quoteTarget").innerHTML=`<b>引用 ${esc(saved.quoted_author||"留言")}</b>：${esc(saved.quoted_body||"")}`;$("quoteTarget").classList.remove("hidden");$("clearQuote").classList.remove("hidden");}else clearQuote({save:false});updateCount($("replyBody"),"replyBodyCount",8000);}
        async function openThread(id,{page=1,latest=false,postId=null,historyMode="push",preserveScroll=false,fromList=null}={}){const request=++openRequest,oldScroll=window.scrollY;threadRequest+=1;setBusy(true);try{const params=new URLSearchParams();if(postId)params.set("post",String(postId));else if(latest)params.set("latest","true");else params.set("page",String(page));const data=await api(`/forum/threads/${id}?${params}`);if(request!==openRequest)return false;activeThread=data.thread;postPage=data.posts.page;postRows=Object.fromEntries(data.posts.items.map((row)=>[String(row.id),row]));const targetPost=Number(data.target_post_id||postId||0)||null,returnTo=threadUrl(id,{page:postPage,postId:targetPost});$("indexPane").classList.add("hidden");$("threadPane").classList.remove("hidden");$("threadHeader").innerHTML=`<div class="thread-head"><div><h2 id="threadTitleHeading" tabindex="-1">${esc(activeThread.title)}</h2><div class="caption">由 ${esc(activeThread.author_user_id)} 發表</div></div>${activeThread.can_edit?`<div class="actions"><button data-edit-thread type="button">編輯標題及連結</button><button data-delete-thread class="danger" type="button">刪除帖文</button></div>`:""}</div>${linkHtml(activeThread.links,returnTo)}<div class="thread-tools"><button data-thread-mute type="button">${activeThread.muted?"🔔 取消靜音":"🔕 靜音此帖"}</button><button data-mark-all-read type="button">全部標為已讀</button></div>`;$("posts").innerHTML=data.posts.items.map(renderPost).join("");renderPostPager(data.posts);restoreReplyDraft();const wasList=fromList===null?history.state?.ghostView==="list":fromList;setHistory(historyMode,returnTo,{ghostView:"thread",threadId:Number(id),page:postPage,postId:targetPost,fromList:Boolean(wasList)});if(targetPost){requestAnimationFrame(()=>{const target=$("post-"+targetPost);if(target){target.classList.add("target");target.scrollIntoView({block:"center"});target.focus({preventScroll:true});}});}else if(preserveScroll){requestAnimationFrame(()=>window.scrollTo({top:oldScroll}));}else if(latest){$("refreshReplies").scrollIntoView({block:"end"});}else{window.scrollTo({top:0});$("threadTitleHeading").focus({preventScroll:true});}markVisibleRead(data.posts.items||[]);return true;}catch(error){if(request===openRequest)toast(`⚠️ ${error.message}`);return false;}finally{setBusy(false);}}
        function closeThread(){clearQuote({save:true});if(history.state?.fromList){history.back();return;}$("search").value="";$("sort").value="activity";loadThreads(1,{historyMode:"push",focusId:lastThreadFocusId});}
        function renderResourceResults(){$("resourceResults").innerHTML=resources.videos.map((row)=>`<button type="button" data-add-video="${row.id}">🎬 ${esc(videoLabel(row))}</button>`).join("")+resources.photos.map((row)=>`<button type="button" data-add-photo="${row.id}">🖼️ ${esc(photoLabel(row))}</button>`).join("")+resources.history_events.map((row)=>`<button type="button" data-add-history-event="${row.id}">📜 ${esc(historyEventLabel(row))}</button>`).join("")||'<p class="caption">找不到資源。</p>';}
        function renderResourcePager(data){$("resourcePager").innerHTML=data.total_pages>1?`<button type="button" data-resource-page="${data.page-1}" ${data.page<=1?"disabled":""}>上一頁</button><span>第 ${data.page} / ${data.total_pages} 頁（每頁 ${data.page_size} 項）</span><button type="button" data-resource-page="${data.page+1}" ${data.page>=data.total_pages?"disabled":""}>下一頁</button>`:`<span class="caption">共 ${data.total} 項（每頁最多 ${data.page_size} 項）</span>`;}
        function currentThreadDraftKey(){return draftKey("thread",$("editingThreadId").value||"new");}
        function saveThreadDraft(){if(restoringDraft||$("composer").classList.contains("hidden"))return;storageSet(currentThreadDraftKey(),{title:$("threadTitle").value,body:$("threadBody").value,videos:[...selectedVideos.values()],photos:[...selectedPhotos.values()],history_events:[...selectedHistoryEvents.values()]});}
        function renderSelected(){$("selectedResources").innerHTML=[...selectedVideos.values()].map((row)=>`<button type="button" data-remove-video="${row.id}">✓ 🎬 ${esc(videoLabel(row))}（移除）</button>`).join("")+[...selectedPhotos.values()].map((row)=>`<button type="button" data-remove-photo="${row.id}">✓ 🖼️ ${esc(photoLabel(row))}（移除）</button>`).join("")+[...selectedHistoryEvents.values()].map((row)=>`<button type="button" data-remove-history-event="${row.id}">✓ 📜 ${esc(historyEventLabel(row))}（移除）</button>`).join("")||'<p class="caption">未選擇資源。</p>';saveThreadDraft();}
        async function searchResources(page=1){const request=++resourceRequest,kind=resourceKind;const data=await api(`/forum/resources?search=${encodeURIComponent($("resourceSearch").value)}&kind=${kind}&page=${page}`);if(request!==resourceRequest||kind!==resourceKind)return;resources={videos:kind==="videos"?data.items:[],photos:kind==="photos"?data.items:[],history_events:kind==="history_events"?data.items:[]};renderResourceResults();renderResourcePager(data);}
        function selectResourceKind(kind){resourceKind=kind;document.querySelectorAll("#resourceTabs button").forEach((button)=>button.classList.toggle("active",button.dataset.resourceKind===kind));searchResources(1).catch((error)=>VoteUI.toast($("toast"),`⚠️ ${error.message}`));}
        function resetResourcePicker(){resourceRequest+=1;resourceKind="videos";resources={videos:[],photos:[],history_events:[]};document.querySelectorAll("#resourceTabs button").forEach((button)=>button.classList.toggle("active",button.dataset.resourceKind==="videos"));$("resourceResults").innerHTML="";$("resourcePager").innerHTML="";}
        function restoreThreadDraft(key){const saved=storageGet(key);if(!saved)return false;restoringDraft=true;$("threadTitle").value=saved.title||"";$("threadBody").value=saved.body||"";selectedVideos=new Map((saved.videos||[]).map((item)=>[String(item.id),item]));selectedPhotos=new Map((saved.photos||[]).map((item)=>[String(item.id),item]));selectedHistoryEvents=new Map((saved.history_events||[]).map((item)=>[String(item.id),item]));renderSelected();restoringDraft=false;updateCount($("threadTitle"),"threadTitleCount",300);updateCount($("threadBody"),"threadBodyCount",8000);return Boolean(saved.title||saved.body||(saved.videos||[]).length||(saved.photos||[]).length||(saved.history_events||[]).length);}
        function resetComposer({clearDraft=false}={}){if(clearDraft)storageRemove(currentThreadDraftKey());restoringDraft=true;$("threadForm").reset();$("editingThreadId").value="";$("editingThreadRevision").value="";$("composerTitle").textContent="發表帖文";$("threadSave").textContent="發表帖文";$("threadBodyWrap").classList.remove("hidden");$("threadBody").required=true;selectedVideos.clear();selectedPhotos.clear();selectedHistoryEvents.clear();resetResourcePicker();renderSelected();restoringDraft=false;updateCount($("threadTitle"),"threadTitleCount",300);updateCount($("threadBody"),"threadBodyCount",8000);$("composer").classList.add("hidden");}
        function showNewThreadComposer(){resetComposer();$("composer").classList.remove("hidden");restoreThreadDraft(draftKey("thread","new"));$("threadTitle").focus();}
        async function showEventDiscussionComposer(eventId){showNewThreadComposer();const data=await api(`/forum/resources?kind=history_events&event_id=${encodeURIComponent(eventId)}`);const row=(data.items||[])[0];if(!row)throw new Error("找不到指定隊史事件。");selectedHistoryEvents.set(String(row.id),row);renderSelected();}
        function startThreadEdit(){const row=activeThread;restoringDraft=true;$("editingThreadId").value=row.id;$("editingThreadRevision").value=row.revision;$("threadTitle").value=row.title;$("threadBody").value="";$("threadBodyWrap").classList.add("hidden");$("threadBody").required=false;selectedVideos=new Map((row.links.videos||[]).map((item)=>[String(item.id),item]));selectedPhotos=new Map((row.links.photos||[]).map((item)=>[String(item.id),item]));selectedHistoryEvents=new Map((row.links.history_events||[]).map((item)=>[String(item.id),item]));resetResourcePicker();renderSelected();restoringDraft=false;restoreThreadDraft(draftKey("thread",row.id));$("composerTitle").textContent="編輯標題及連結";$("threadSave").textContent="儲存修改";$("composer").classList.remove("hidden");$("indexPane").classList.remove("hidden");$("threadPane").classList.add("hidden");updateCount($("threadTitle"),"threadTitleCount",300);$("composer").scrollIntoView({behavior:"smooth"});$("threadTitle").focus();}
        function saveReplyDraft(){if(!activeThread)return;storageSet(draftKey("reply",activeThread.id),{body:$("replyBody").value,quoted_post_id:$("quotedPostId").value?Number($("quotedPostId").value):null,quoted_author:$("quoteTarget").dataset.author||"",quoted_body:$("quoteTarget").dataset.body||""});}
        function setQuote(row){$("quotedPostId").value=row.id;$("quoteTarget").dataset.author=row.author_user_id;$("quoteTarget").dataset.body=row.body||"已刪除";$("quoteTarget").innerHTML=`<b>引用 ${esc(row.author_user_id)}</b>：${esc(row.body||"已刪除")}`;$("quoteTarget").classList.remove("hidden");$("clearQuote").classList.remove("hidden");saveReplyDraft();$("replyBody").focus();}
        function clearQuote({save=true}={}){$("quotedPostId").value="";$("quoteTarget").dataset.author="";$("quoteTarget").dataset.body="";$("quoteTarget").classList.add("hidden");$("clearQuote").classList.add("hidden");if(save)saveReplyDraft();}
        function startPostEdit(id){const row=postRows[String(id)],article=$("post-"+id),form=article?.querySelector(`[data-post-edit-form="${CSS.escape(String(id))}"]`);if(!row||!form)return;article.querySelector(`[data-post-body="${CSS.escape(String(id))}"]`)?.classList.add("hidden");article.querySelector(`[data-post-actions="${CSS.escape(String(id))}"]`)?.classList.add("hidden");form.classList.remove("hidden");const textarea=form.querySelector("textarea"),saved=storageGet(draftKey("edit",id));textarea.value=saved?.body??row.body;form.querySelector(`[data-edit-count="${CSS.escape(String(id))}"]`).textContent=`${textarea.value.length} / 8000`;textarea.focus();}
        function cancelPostEdit(id){const row=postRows[String(id)],article=$("post-"+id),form=article?.querySelector(`[data-post-edit-form="${CSS.escape(String(id))}"]`);if(!row||!form)return;const textarea=form.querySelector("textarea");if(textarea.value!==row.body&&!confirm("放棄未儲存的留言修改？"))return;storageRemove(draftKey("edit",id));form.classList.add("hidden");article.querySelector(`[data-post-body="${CSS.escape(String(id))}"]`)?.classList.remove("hidden");article.querySelector(`[data-post-actions="${CSS.escape(String(id))}"]`)?.classList.remove("hidden");article.querySelector(`[data-edit-post="${CSS.escape(String(id))}"]`)?.focus();}
        async function mutate(path,options,message){setBusy(true);try{const data=await api(path,options);const pushFailed=data.notification?.state==="retryable"||data.notification&&Number(data.notification.sent_count)<1;toast(pushFailed?`✅ ${message}；⚠️ 通知未送達，可於帖文列表重試。`:`✅ ${message}`);return data;}catch(error){toast(`⚠️ ${error.message}`);return null;}finally{setBusy(false);}}
        async function load(){setBusy(true);try{context=await api("/forum/session",{method:"POST",body:"{}"});renderRetryNotifications();$("login").classList.add("hidden");$("denied").classList.add("hidden");$("app").classList.remove("hidden");const params=new URLSearchParams(location.search),id=Number(params.get("thread")),postId=Number(params.get("post"))||null,page=Math.max(1,Number(params.get("page"))||1),compose=params.get("compose")==="1",historyEventId=Number(params.get("history_event"))||null;if(id)await openThread(id,{page,postId,historyMode:"replace",fromList:false});else{$("search").value=params.get("search")||"";$("sort").value=["activity","newest"].includes(params.get("sort"))?params.get("sort"):"activity";await loadThreads(page,{historyMode:"replace"});if(compose&&historyEventId){await showEventDiscussionComposer(historyEventId);}else if(restoreThreadDraft(draftKey("thread","new"))){$("composer").classList.remove("hidden");$("threadTitle").focus();}}}catch(error){$("app").classList.add("hidden");if(error.status===401){$("login").classList.remove("hidden");}else{$("deniedMessage").textContent=error.message;$("denied").classList.remove("hidden");}}finally{setBusy(false);}}

        $("loginForm").addEventListener("submit",async(event)=>{event.preventDefault();try{await api("/api/committee/login",{method:"POST",body:JSON.stringify({user_id:$("loginUser").value,password:$("loginPassword").value})});$("loginPassword").value="";await load();}catch(error){$("loginMessage").textContent=error.message;}});
        $("deniedLogout").addEventListener("click",async()=>{try{await api("/api/committee/logout",{method:"POST",body:"{}"});$("denied").classList.add("hidden");$("login").classList.remove("hidden");}catch(error){VoteUI.toast($("toast"),`⚠️ ${error.message}`);}});
        $("searchButton").addEventListener("click",()=>loadThreads(1));$("sort").addEventListener("change",()=>loadThreads(1));$("search").addEventListener("keydown",(event)=>{if(event.key==="Enter")loadThreads(1);});$("newThread").addEventListener("click",showNewThreadComposer);$("cancelComposer").addEventListener("click",()=>{const dirty=Boolean(storageGet(currentThreadDraftKey()));if(dirty&&!confirm("放棄這份草稿？"))return;const editing=Boolean($("editingThreadId").value);resetComposer({clearDraft:true});if(editing&&activeThread){$("indexPane").classList.add("hidden");$("threadPane").classList.remove("hidden");$("threadTitleHeading").focus();}});
        $("threadTitle").addEventListener("input",()=>{updateCount($("threadTitle"),"threadTitleCount",300);saveThreadDraft();});$("threadBody").addEventListener("input",()=>{updateCount($("threadBody"),"threadBodyCount",8000);saveThreadDraft();});$("replyBody").addEventListener("input",()=>{updateCount($("replyBody"),"replyBodyCount",8000);saveReplyDraft();});
        $("resourceButton").addEventListener("click",()=>searchResources(1).catch((e)=>VoteUI.toast($("toast"),`⚠️ ${e.message}`)));$("resourceSearch").addEventListener("keydown",(event)=>{if(event.key==="Enter"){event.preventDefault();searchResources(1).catch((e)=>VoteUI.toast($("toast"),`⚠️ ${e.message}`));}});$("resourceTabs").addEventListener("click",(event)=>{const kind=event.target.closest("[data-resource-kind]")?.dataset.resourceKind;if(kind)selectResourceKind(kind);});$("resourcePager").addEventListener("click",(event)=>{const page=Number(event.target.closest("[data-resource-page]")?.dataset.resourcePage);if(page>0)searchResources(page).catch((e)=>VoteUI.toast($("toast"),`⚠️ ${e.message}`));});$("resourceResults").addEventListener("click",(event)=>{const v=event.target.closest("[data-add-video]")?.dataset.addVideo,p=event.target.closest("[data-add-photo]")?.dataset.addPhoto,h=event.target.closest("[data-add-history-event]")?.dataset.addHistoryEvent;if(v)selectedVideos.set(v,resources.videos.find((row)=>String(row.id)===v));if(p)selectedPhotos.set(p,resources.photos.find((row)=>String(row.id)===p));if(h)selectedHistoryEvents.set(h,resources.history_events.find((row)=>String(row.id)===h));renderSelected();});$("selectedResources").addEventListener("click",(event)=>{const v=event.target.closest("[data-remove-video]")?.dataset.removeVideo,p=event.target.closest("[data-remove-photo]")?.dataset.removePhoto,h=event.target.closest("[data-remove-history-event]")?.dataset.removeHistoryEvent;if(v)selectedVideos.delete(v);if(p)selectedPhotos.delete(p);if(h)selectedHistoryEvents.delete(h);renderSelected();});
        $("threadForm").addEventListener("submit",async(event)=>{event.preventDefault();const id=$("editingThreadId").value,key=currentThreadDraftKey();const body={title:$("threadTitle").value,video_ids:[...selectedVideos.keys()].map(Number),photo_ids:[...selectedPhotos.keys()].map(Number),history_event_ids:[...selectedHistoryEvents.keys()].map(Number)};if(id)body.revision=Number($("editingThreadRevision").value);else body.body=$("threadBody").value;const data=await mutate(`/forum/threads${id?`/${id}`:""}`,{method:id?"PATCH":"POST",body:JSON.stringify(body)},id?"標題及連結已更新。":"帖文已發表。");if(data){storageRemove(key);resetComposer();await openThread(id||data.id,{postId:data.post_id||null,historyMode:id?"replace":"push",fromList:!id});if(data.notification?.state==="retryable"){renderRetryNotifications([...(context.retryable_notifications||[]),{notification_id:data.notification.id,title:body.title,thread_id:Number(id||data.id)}]);}}});
        $("threads").addEventListener("click",(event)=>{const link=event.target.closest("[data-thread]");if(link){event.preventDefault();lastThreadFocusId=link.dataset.thread;openThread(link.dataset.thread,{postId:Number(link.dataset.postTarget)||null,historyMode:"push",fromList:true});}});$("threadPager").addEventListener("click",(event)=>{const page=Number(event.target.closest("[data-thread-page]")?.dataset.threadPage);if(page>0)loadThreads(page,{historyMode:"push"});});$("backToIndex").addEventListener("click",closeThread);$("postPager").addEventListener("click",(event)=>{const page=Number(event.target.closest("[data-post-page]")?.dataset.postPage);if(page>0)openThread(activeThread.id,{page,historyMode:"push"});});
        $("threadHeader").addEventListener("click",async(event)=>{if(event.target.closest("[data-edit-thread]"))startThreadEdit();if(event.target.closest("[data-delete-thread]")&&confirm("確定刪除整篇帖文？")){const data=await mutate(`/forum/threads/${activeThread.id}?revision=${activeThread.revision}`,{method:"DELETE"},"帖文已刪除。");if(data)closeThread();}if(event.target.closest("[data-thread-mute]")){const data=await mutate(`/forum/threads/${activeThread.id}/state`,{method:"PATCH",body:JSON.stringify({muted:!activeThread.muted})},activeThread.muted?"已取消靜音。":"已靜音此帖。");if(data){activeThread.muted=data.muted;event.target.closest("[data-thread-mute]").textContent=data.muted?"🔔 取消靜音":"🔕 靜音此帖";}}if(event.target.closest("[data-mark-all-read]")){const data=await mutate(`/forum/threads/${activeThread.id}/read`,{method:"POST",body:JSON.stringify({post_id:null})},"已將整篇帖文標為已讀。");if(data){const row=threadRows[String(activeThread.id)];if(row)row.unread_count=0;}}});
        $("refreshReplies").addEventListener("click",async()=>{if(activeThread&&await openThread(activeThread.id,{latest:true,historyMode:"replace"}))toast("✅ 已重整至最新留言。");});
        $("replyForm").addEventListener("submit",async(event)=>{event.preventDefault();const data=await mutate(`/forum/threads/${activeThread.id}/posts`,{method:"POST",body:JSON.stringify({body:$("replyBody").value,quoted_post_id:$("quotedPostId").value?Number($("quotedPostId").value):null})},"回覆已發表。");if(data){storageRemove(draftKey("reply",activeThread.id));$("replyBody").value="";clearQuote({save:false});updateCount($("replyBody"),"replyBodyCount",8000);await openThread(activeThread.id,{postId:data.id,historyMode:"replace"});if(data.notification?.state==="retryable"){renderRetryNotifications([...(context.retryable_notifications||[]),{notification_id:data.notification.id,title:activeThread.title,thread_id:activeThread.id}]);}}});$("clearQuote").addEventListener("click",()=>clearQuote());
        $("posts").addEventListener("input",(event)=>{const form=event.target.closest("[data-post-edit-form]");if(!form)return;const id=form.dataset.postEditForm;form.querySelector(`[data-edit-count="${CSS.escape(id)}"]`).textContent=`${event.target.value.length} / 8000`;storageSet(draftKey("edit",id),{body:event.target.value});});
        $("posts").addEventListener("submit",async(event)=>{const form=event.target.closest("[data-post-edit-form]");if(!form)return;event.preventDefault();const id=form.dataset.postEditForm,row=postRows[id],body=form.querySelector("textarea").value;const data=await mutate(`/forum/posts/${id}`,{method:"PATCH",body:JSON.stringify({body,revision:row.revision})},"留言已更新。");if(data){row.body=body;row.revision=data.revision;storageRemove(draftKey("edit",id));$("post-"+id).outerHTML=renderPost(row);$("post-"+id).querySelector(`[data-edit-post="${CSS.escape(id)}"]`)?.focus();}});
        $("posts").addEventListener("click",async(event)=>{const like=event.target.closest("[data-like]")?.dataset.like,quote=event.target.closest("[data-quote]")?.dataset.quote,edit=event.target.closest("[data-edit-post]")?.dataset.editPost,del=event.target.closest("[data-delete-post]")?.dataset.deletePost,cancel=event.target.closest("[data-cancel-post-edit]")?.dataset.cancelPostEdit,target=event.target.closest("[data-go-post]")?.dataset.goPost;if(quote)setQuote(postRows[quote]);if(edit)startPostEdit(edit);if(cancel)cancelPostEdit(cancel);if(target)openThread(activeThread.id,{postId:Number(target),historyMode:"push"});if(like){const row=postRows[like],button=event.target.closest("[data-like]"),data=await mutate(`/forum/posts/${like}/like`,{method:"POST",body:"{}"},"反應已更新。");if(data){row.viewer_liked=Boolean(data.liked);row.like_count=Math.max(0,Number(row.like_count)+(data.liked?1:-1));button.textContent=`${data.liked?"💙":"♡"} ${row.like_count}`;button.setAttribute("aria-pressed",data.liked?"true":"false");button.setAttribute("aria-label",`${data.liked?"取消喜歡":"喜歡"}，目前 ${row.like_count} 個喜歡`);}}if(del&&confirm("確定刪除此留言？刪除後會保留「已刪除」位置以維持討論脈絡。")){const data=await mutate(`/forum/posts/${del}?revision=${postRows[del].revision}`,{method:"DELETE"},"留言已刪除。");if(data)await openThread(activeThread.id,{page:postPage,historyMode:"replace",preserveScroll:true});}});
        $("retryNotifications").addEventListener("click",async(event)=>{const id=Number(event.target.closest("[data-retry-notification]")?.dataset.retryNotification);if(!id)return;const data=await mutate(`/forum/notifications/${id}/retry`,{method:"POST",body:"{}"},"通知已重試。");if(data?.state==="sent"){renderRetryNotifications((context.retryable_notifications||[]).filter((item)=>Number(item.notification_id)!==id));}});
        window.addEventListener("popstate",()=>{const params=new URLSearchParams(location.search),id=Number(params.get("thread")),postId=Number(params.get("post"))||null,page=Math.max(1,Number(params.get("page"))||1);if(id)openThread(id,{page,postId,historyMode:"none",fromList:false});else{$("search").value=params.get("search")||"";$("sort").value=["activity","newest"].includes(params.get("sort"))?params.get("sort"):"activity";loadThreads(page,{historyMode:"none",focusId:lastThreadFocusId});}});
        window.addEventListener("beforeunload",(event)=>{const hasDraft=Boolean(storageGet(currentThreadDraftKey()))||$("replyBody").value||document.querySelector('.post-edit:not(.hidden) textarea')?.value;if(hasDraft){event.preventDefault();event.returnValue="";}});
        renderSelected();load();
      })();
    </script>
