<!doctype html><html lang="zh-HK"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>開發者設定</title><link rel="stylesheet" href="/shared/app-shell.css"><style>.pane{display:none}.pane.active{display:block}.split{align-items:start}.actions{display:flex;gap:.6rem;flex-wrap:wrap}.actions button{width:auto}.report{margin:.7rem 0}.danger-zone{border-color:var(--against)}</style></head><body><main><a class="back" href="/">← 返回主頁</a><h1>🔧 開發者設定</h1><p class="caption">開發者專用控制台。</p><section id="login" class="card"><h2>開發者登入</h2><form id="loginForm"><label>開發者密碼<input id="password" type="password" required></label><button class="primary">登入</button></form></section><section id="app" class="hidden"><div class="actions"><span id="version" class="caption"></span><button id="logout">登出</button></div><nav class="tabs"><button class="active" data-pane="bugs">Bug 回報</button><button data-pane="accounts">帳戶管理</button><button data-pane="training">AI 訓練 / 基金</button><button data-pane="system">系統設定</button><button data-pane="passwords">密碼管理</button></nav><section id="bugs" class="pane active"><div id="bugsList"></div></section><section id="accounts" class="pane"><div class="split"><form id="createAccount" class="card"><h2>建立新帳戶</h2><label>用戶名稱<input id="newUid" required></label><label>初始密碼<input id="newPassword" type="password" required></label><button class="primary">建立帳戶</button></form><section class="card"><h2>帳戶清單</h2><div id="accountsTable"></div></section></div></section><section id="training" class="pane"><div class="split"><form id="trainingForm" class="card"><h2>AI 訓練設定</h2><label>TTS 錄音委員（每行一個帳戶）<textarea id="ttsAllowed"></textarea></label><label>AI 訓練管理員（每行一個帳戶）<textarea id="ttsReviewers"></textarea></label><label>AI基金管理員（每行一個帳戶）<textarea id="treasurers"></textarea></label><button class="primary">更新名單</button></form><form id="modelsForm" class="card"><h2>AI Provider / Model 設定</h2><label>啟用 Provider（每行一個，例如 gemini）<textarea id="providers"></textarea></label><label>預設模型<input id="defaultModel"></label><button class="primary">更新 AI 設定</button></form></div></section><section id="system" class="pane"><section class="card"><h2>維護模式</h2><p id="maintState"></p><button id="toggleMaint" class="primary"></button></section><section class="card"><h2>臨時開放提案</h2><p class="caption">以 JSON 形式維護 `user_id: YYYY-MM-DD HH:MM`；只供開發者按現行 Streamlit 規則處理例外。</p><label>設定<textarea id="bypass"></textarea></label><button id="saveBypass" class="primary">儲存臨時權限</button></section><section class="card"><h2>Push 訂閱狀態</h2><div id="subscriptions"></div></section></section><section id="passwords" class="pane"><div class="split"><form class="card passwordForm" data-key="admin_password"><h2>更改賽會人員密碼</h2><label>新密碼<input class="new" type="password" required></label><button class="primary">更新</button></form><form class="card passwordForm" data-key="developer_password"><h2>更改開發者密碼</h2><label>目前密碼<input class="current" type="password" required></label><label>新密碼<input class="new" type="password" required></label><button class="primary">更新</button></form><form class="card passwordForm" data-key="sql_password"><h2>更改 SQL 存取密碼</h2><label>目前密碼<input class="current" type="password" required></label><label>新密碼<input class="new" type="password" required></label><button class="primary">更新</button></form></div></section></section></main><div id="toast" class="toast"></div><div id="busy" class="busy"><div class="busy-pill"><i class="spinner"></i>處理中…</div></div><script src="/shared/vote-ui.js"></script><script>
(()=>{const $=x=>document.getElementById(x),toast=x=>VoteUI.toast($('toast'),x),busy=x=>VoteUI.setBusy($('busy'),x),esc=x=>String(x??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));let data;const api=async(u,o={})=>{let r=await fetch(u,{credentials:'same-origin',headers:{'Content-Type':'application/json'},...o}),d=await r.json().catch(()=>({}));if(!r.ok)throw Error(d.detail||'操作失敗');return d};const lines=x=>String(x||'').split('\n').map(x=>x.trim()).filter(Boolean),jsonList=x=>{try{let v=JSON.parse(x||'[]');return Array.isArray(v)?v:[]}catch{return[]}};function tab(id){document.querySelectorAll('.pane,.tabs button').forEach(x=>x.classList.remove('active'));$(id).classList.add('active');document.querySelector('[data-pane="'+id+'"]').classList.add('active')}function table(rows,cols,action){if(!rows?.length)return '<p class="caption">暫無紀錄。</p>';return '<div class="table-wrap"><table><thead><tr>'+cols.map(c=>'<th>'+c[0]+'</th>').join('')+(action?'<th>操作</th>':'')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+cols.map(c=>'<td>'+esc(c[1](r))+'</td>').join('')+(action?'<td>'+action(r)+'</td>':'')+'</tr>').join('')+'</tbody></table></div>'}function render(){ $('login').classList.add('hidden');$('app').classList.remove('hidden');$('version').textContent='目前系統版本：'+data.version;$('bugsList').innerHTML=data.bugs.map(r=>'<details class="card report" '+(['open','investigating'].includes(r.status)?'open':'')+'><summary>#'+r.id+' '+esc(r.affected_page)+'｜'+esc(r.status)+'｜'+esc(r.reporter_user_id||'未知委員')+'</summary><p><b>重現步驟：</b><br>'+esc(r.reproduction_steps)+'</p><p><b>預期：</b><br>'+esc(r.expected_result||'未提供')+'</p><p><b>實際：</b><br>'+esc(r.actual_result)+'</p><label>狀態<select data-field="status"><option '+(r.status==='open'?'selected':'')+'>open</option><option '+(r.status==='investigating'?'selected':'')+'>investigating</option><option '+(r.status==='fixed'?'selected':'')+'>fixed</option><option '+(r.status==='not_reproducible'?'selected':'')+'>not_reproducible</option><option '+(r.status==='duplicate'?'selected':'')+'>duplicate</option><option '+(r.status==='closed'?'selected':'')+'>closed</option></select></label><label>修正版本<input data-field="version" value="'+esc(r.fixed_version||data.version)+'"></label><label>回覆委員<textarea data-field="reply">'+esc(r.developer_reply||'')+'</textarea></label><button data-bug="'+r.id+'" class="primary">更新回覆</button></details>').join('')||'<section class="card">暫時未有 Bug 回報。</section>';$('accountsTable').innerHTML=table(data.accounts,[['帳戶',r=>r.user_id],['狀態',r=>r.account_status],['最後登入',r=>r.last_login_at||'—'],['停用',r=>r.account_disabled]],r=>'<button data-reset="'+esc(r.user_id)+'">重設密碼</button> <button data-delete="'+esc(r.user_id)+'" class="danger">刪除</button>');let c=data.configs;$('ttsAllowed').value=lines(jsonList(c.tts_recording_allowed_users)).join('\n');$('ttsReviewers').value=lines(jsonList(c.tts_recording_reviewers)).join('\n');$('treasurers').value=lines(jsonList(c.ai_fund_treasurers)).join('\n');$('providers').value=lines(jsonList(c.ai_enabled_providers)).join('\n');$('defaultModel').value=c.ai_default_model||'';let on=['true','1','yes','on'].includes(String(c.maintenance_mode).toLowerCase());$('maintState').textContent='目前維護模式：'+(on?'開啟':'關閉');$('toggleMaint').textContent=on?'關閉維護模式':'開啟維護模式';$('bypass').value=c.bypass_active_check_until||'{}';$('subscriptions').innerHTML=table(data.subscriptions,[['委員',r=>r.user_id],['已訂閱裝置',r=>r.device_count]])}async function load(){busy(true);try{data=await api('/api/developer/data');render()}catch(e){$('login').classList.remove('hidden')}finally{busy(false)}}async function mutate(u,o,msg){busy(true);try{await api(u,o);toast('✅ '+msg);await load()}catch(e){toast('⚠️ '+e.message)}finally{busy(false)}}$('loginForm').onsubmit=e=>{e.preventDefault();mutate('/api/developer/login',{method:'POST',body:JSON.stringify({password:$('password').value})},'已登入。')};$('logout').onclick=()=>mutate('/api/developer/logout',{method:'POST'},'已登出。');document.querySelectorAll('[data-pane]').forEach(b=>b.onclick=()=>tab(b.dataset.pane));$('createAccount').onsubmit=e=>{e.preventDefault();mutate('/api/developer/accounts',{method:'POST',body:JSON.stringify({user_id:$('newUid').value,password:$('newPassword').value})},'帳戶已建立。')};$('trainingForm').onsubmit=e=>{e.preventDefault();mutate('/api/developer/settings',{method:'POST',body:JSON.stringify({values:{tts_recording_allowed_users:lines($('ttsAllowed').value),tts_recording_reviewers:lines($('ttsReviewers').value),ai_fund_treasurers:lines($('treasurers').value)}})},'AI 訓練與基金管理員設定已更新。')};$('modelsForm').onsubmit=e=>{e.preventDefault();mutate('/api/developer/settings',{method:'POST',body:JSON.stringify({values:{ai_enabled_providers:lines($('providers').value),ai_default_model:$('defaultModel').value}})},'AI Provider 設定已更新。')};$('toggleMaint').onclick=()=>mutate('/api/developer/settings',{method:'POST',body:JSON.stringify({values:{maintenance_mode:$('toggleMaint').textContent.startsWith('開啟')?'true':'false'}})},'維護模式已更新。');$('saveBypass').onclick=()=>{try{JSON.parse($('bypass').value)}catch(e){return toast('⚠️ 必須是有效 JSON。')}mutate('/api/developer/settings',{method:'POST',body:JSON.stringify({values:{bypass_active_check_until:$('bypass').value}})},'臨時提案權限已更新。')};document.querySelectorAll('.passwordForm').forEach(f=>f.onsubmit=e=>{e.preventDefault();mutate('/api/developer/password/'+f.dataset.key,{method:'POST',body:JSON.stringify({current_password:f.querySelector('.current')?.value||'',new_password:f.querySelector('.new').value})},'密碼已更新。')});document.body.onclick=e=>{let b=e.target;if(b.dataset.bug){let d=b.closest('details');mutate('/api/developer/bugs/'+b.dataset.bug,{method:'POST',body:JSON.stringify({status:d.querySelector('[data-field=status]').value,fixed_version:d.querySelector('[data-field=version]').value,reply:d.querySelector('[data-field=reply]').value})},'Bug 回覆已更新。')}if(b.dataset.reset){let password=prompt('輸入新密碼');if(password)mutate('/api/developer/accounts/'+encodeURIComponent(b.dataset.reset)+'/password',{method:'POST',body:JSON.stringify({user_id:b.dataset.reset,password})},'密碼已重設。')}if(b.dataset.delete&&confirm('確定刪除此帳戶？'))mutate('/api/developer/accounts/'+encodeURIComponent(b.dataset.delete),{method:'DELETE'},'帳戶已刪除。')};load()})();
</script><script src="/dev-settings/lateness-managers.js?v=4.0.14"></script><script src="/shared/server-tables.js"></script></body></html>
