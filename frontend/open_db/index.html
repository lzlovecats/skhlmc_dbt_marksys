<!doctype html>
<html lang="zh-HK">
<head>
    <meta charset="utf-8">
    <title>查閱辯題庫</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#0e1117">
    <style>
        :root {
            color-scheme: dark;
            --bg: #0e1117; --surface: #262730; --surface-2: #171923;
            --text: #fafafa; --muted: #a3a8b5; --border: #3a3d46; --accent: #ff4b4b;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: max(1rem, env(safe-area-inset-top)) 1rem calc(2rem + env(safe-area-inset-bottom));
            background: var(--bg); color: var(--text);
            font-family: system-ui, -apple-system, "PingFang HK", "Noto Sans CJK HK", sans-serif;
            font-size: 16px; line-height: 1.5;
        }
        main { width: 100%; margin: 0 auto; }
        h1 { font-size: 2rem; line-height: 1.25; margin: 0 0 1.2rem; }
        h2 { font-size: 1.3rem; line-height: 1.3; margin: 0 0 .55rem; }
        .field-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 1rem; margin: 1rem 0; }
        .field { min-width: 0; }
        label { display: block; font-size: .9rem; font-weight: 600; margin-bottom: .35rem; }
        input, select {
            appearance: none; width: 100%; min-height: 2.45rem; border: 1px solid var(--border); border-radius: 6px;
            background: var(--surface-2); color: var(--text); padding: .5rem .7rem; font: inherit;
        }
        input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
        .caption { color: var(--muted); font-size: .9rem; margin: .45rem 0 .7rem; }
        .notice { color: var(--muted); background: var(--surface); border-radius: 8px; padding: 1rem; }
        .error { color: #ffb4b4; border: 1px solid var(--accent); }
        .divider { border: 0; border-top: 1px solid var(--border); margin: 2rem 0 1.4rem; }
        .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 6px; }
        table { width: 100%; min-width: 620px; border-collapse: collapse; font-size: .93rem; }
        th, td { border-bottom: 1px solid var(--border); padding: .58rem .7rem; text-align: left; vertical-align: top; }
        th { background: var(--surface-2); color: var(--muted); font-weight: 600; }
        tr:last-child td { border-bottom: 0; }
        /* Horizontal bars (matching the vote page), blue fill. */
        .chart { margin: .3rem 0 1rem; }
        .chart-row { display: grid; grid-template-columns: minmax(7rem, 14rem) 1fr 4rem; gap: .6rem; align-items: center; margin: .4rem 0; font-size: .9rem; }
        .chart-label { overflow-wrap: anywhere; color: var(--text); }
        .chart-track { height: 1rem; background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px; overflow: hidden; }
        .chart-fill { height: 100%; background: #4c9bff; border-radius: 999px; }
        .chart-num { text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
        .section { margin-top: 0; }
        .hidden { display: none !important; }
        .back-link { display: inline-flex; align-items: center; gap: .3rem; color: #4c9bff; text-decoration: none; font-size: .95rem; margin-bottom: .6rem; }
        .back-link:hover { text-decoration: underline; }
        .pager { display: flex; align-items: center; justify-content: center; gap: 1rem; margin: 1rem 0 .5rem; }
        .pager button { min-height: 2.35rem; }
        .pager-info { color: var(--muted); font-size: .9rem; font-variant-numeric: tabular-nums; }
        @media (max-width: 700px) {
            h1 { font-size: 1.65rem; }
            .field-grid { grid-template-columns: 1fr; gap: .7rem; }
            .chart { gap: .45rem; }
        }
    </style>
</head>
<body>
<main>
    <a class="back-link" href="/">← 返回主頁</a>
    <h1>查閱辯題庫</h1>
    <div id="loading" class="notice">載入中…</div>
    <div id="error" class="notice error hidden"></div>
    <div id="empty" class="notice hidden">辯題庫目前為空。</div>
    <section id="app" class="hidden">
        <div class="field">
            <label for="search">🔍 搜尋辯題</label>
            <input id="search" type="search" placeholder="輸入關鍵字搜尋..." autocomplete="off">
        </div>
        <div class="field-grid">
            <div class="field"><label for="author">👤 作者篩選</label><select id="author"></select></div>
            <div class="field"><label for="category">🏷️ 類別篩選</label><select id="category"></select></div>
            <div class="field"><label for="difficulty">⭐ 難度篩選</label><select id="difficulty"></select></div>
        </div>

        <div id="resultCount" class="caption"></div>
        <div id="noResults" class="notice hidden">沒有符合條件的辯題。請調整搜尋關鍵字或篩選條件後再試。</div>
        <div id="results" class="table-wrap"></div>
        <div id="pager" class="pager"></div>

        <section id="categorySection" class="section">
            <hr class="divider">
            <h2>📊 類別分佈 (所有辯題)</h2>
            <div id="categoryChart" class="chart"></div>
            <div id="categoryTable" class="table-wrap"></div>
        </section>

        <section id="difficultySection" class="section">
            <hr class="divider">
            <h2>📈 難度分佈 (所有辯題)</h2>
            <div id="difficultyChart" class="chart"></div>
            <div id="difficultyTable" class="table-wrap"></div>
        </section>

        <section id="passSection" class="section">
            <hr class="divider">
            <h2>🗳️ 類別投票通過率</h2>
            <div class="caption">只計已完成表決的辯題動議（已通過 + 已否決）。</div>
            <div id="passChart" class="chart"></div>
            <div id="passTable" class="table-wrap"></div>
        </section>
    </section>
</main>
<script>
(function () {
    "use strict";
    const state = { topics: [], filters: {} };
    const app = document.getElementById("app");
    const loading = document.getElementById("loading");
    const error = document.getElementById("error");
    const empty = document.getElementById("empty");
    const search = document.getElementById("search");
    const author = document.getElementById("author");
    const category = document.getElementById("category");
    const difficulty = document.getElementById("difficulty");

    function esc(value) {
        return String(value == null ? "" : value).replace(/[&<>"']/g, char =>
            ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char])
        );
    }
    function renderSelect(select, values) {
        select.innerHTML = (values || []).map(value => `<option value="${esc(value)}">${esc(value)}</option>`).join("");
    }
    function table(target, rows, columns) {
        const header = columns.map(column => `<th>${esc(column)}</th>`).join("");
        const body = rows.map(row => `<tr>${columns.map(column => `<td>${esc(row[column])}</td>`).join("")}</tr>`).join("");
        target.innerHTML = `<table><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table>`;
    }
    function chart(target, rows, labelKey, valueKey, isPercent) {
        const values = rows.map(row => Number(row[valueKey]) || 0);
        // Percentage charts use a fixed 0-100 scale so the bar reflects the actual
        // percentage; count charts normalise to the group max.
        const max = isPercent ? 100 : Math.max(...values, 1);
        target.innerHTML = rows.map(row => {
            const value = Number(row[valueKey]) || 0;
            const width = value === 0 ? 0 : Math.min(100, Math.max(2, value / max * 100));
            const shown = isPercent ? `${value.toFixed(1)}%` : value;
            return `<div class="chart-row"><div class="chart-label">${esc(row[labelKey])}</div><div class="chart-track"><div class="chart-fill" style="width:${width}%"></div></div><div class="chart-num">${esc(shown)}</div></div>`;
        }).join("");
    }
    function currentTopics() {
        const term = search.value.trim().toLocaleLowerCase();
        return state.topics.filter(topic => {
            const matchesSearch = !term || String(topic.topic_text || "").toLocaleLowerCase().includes(term);
            return matchesSearch &&
                (author.value === "全部" || topic.author === author.value) &&
                (category.value === "全部" || topic.category === category.value) &&
                (difficulty.value === "全部" || topic.difficulty_label === difficulty.value);
        });
    }
    const PAGE_SIZE = 20;
    let page = 1;
    function renderResults() {
        const rows = currentTopics().map(topic => ({
            "辯題": topic.topic_text, "作者": topic.author, "類別": topic.category, "難度": topic.difficulty_label,
        }));
        const total = rows.length;
        const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
        page = Math.min(Math.max(1, page), pages);
        document.getElementById("resultCount").textContent = total
            ? `共找到 ${total} 條符合條件的辯題（第 ${page} / ${pages} 頁）`
            : "共找到 0 條符合條件的辯題";
        document.getElementById("noResults").classList.toggle("hidden", total !== 0);
        document.getElementById("results").classList.toggle("hidden", total === 0);
        const pager = document.getElementById("pager");
        if (!total) { pager.innerHTML = ""; return; }
        const start = (page - 1) * PAGE_SIZE;
        table(document.getElementById("results"), rows.slice(start, start + PAGE_SIZE), ["辯題", "作者", "類別", "難度"]);
        pager.innerHTML = pages <= 1 ? "" :
            `<button type="button" data-page="prev" ${page === 1 ? "disabled" : ""}>← 上一頁</button>`
            + `<span class="pager-info">第 ${page} / ${pages} 頁</span>`
            + `<button type="button" data-page="next" ${page === pages ? "disabled" : ""}>下一頁 →</button>`;
    }
    function renderStats(data) {
        const categories = data.category_distribution || [];
        if (categories.length) {
            chart(document.getElementById("categoryChart"), categories, "類別", "辯題數量", false);
            table(document.getElementById("categoryTable"), categories, ["類別", "辯題數量", "佔比"]);
        } else document.getElementById("categorySection").classList.add("hidden");

        const difficulties = data.difficulty_distribution || [];
        if (difficulties.length) {
            chart(document.getElementById("difficultyChart"), difficulties, "難度", "辯題數量", false);
            table(document.getElementById("difficultyTable"), difficulties, ["難度", "辯題數量", "佔比"]);
        } else document.getElementById("difficultySection").classList.add("hidden");

        const rates = (data.category_vote_pass_rate || []).map(row => Object.assign({}, row, {
            rate_value: Number(String(row["投票通過率"] || "0").replace("%", "")),
        }));
        if (rates.length) {
            chart(document.getElementById("passChart"), rates, "類別", "rate_value", true);
            table(document.getElementById("passTable"), data.category_vote_pass_rate, ["類別", "動議數量", "通過數", "投票通過率"]);
        } else document.getElementById("passSection").classList.add("hidden");
    }
    async function load() {
        try {
            const response = await fetch("/api/open-db/data", { headers: { Accept: "application/json" } });
            const data = await response.json().catch(() => ({}));
            if (!response.ok) throw new Error(data.detail || `HTTP ${response.status}`);
            loading.classList.add("hidden");
            state.topics = data.topics || [];
            state.filters = data.filters || {};
            if (!state.topics.length) { empty.classList.remove("hidden"); return; }
            renderSelect(author, state.filters.authors);
            renderSelect(category, state.filters.categories);
            renderSelect(difficulty, state.filters.difficulties);
            app.classList.remove("hidden");
            renderResults();
            renderStats(data);
        } catch (err) {
            loading.classList.add("hidden");
            error.textContent = `連線錯誤: ${err.message}`;
            error.classList.remove("hidden");
        }
    }
    function onFilterChange() { page = 1; renderResults(); }
    [search, author, category, difficulty].forEach(element => element.addEventListener("input", onFilterChange));
    [author, category, difficulty].forEach(element => element.addEventListener("change", onFilterChange));
    document.getElementById("pager").addEventListener("click", event => {
        const button = event.target.closest("button[data-page]");
        if (!button) return;
        page += button.dataset.page === "next" ? 1 : -1;
        renderResults();
        document.getElementById("results").scrollIntoView({ behavior: "smooth", block: "start" });
    });
    load();
})();
</script>
</body>
</html>
