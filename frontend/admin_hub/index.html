<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>賽務管理易</title>
    <link rel="stylesheet" href="/shared/vote-ui.css" />
    <link rel="stylesheet" href="/shared/app-shell.css" />
    <style>
      main {
        max-width: 84rem;
        margin: auto;
      }
      h1 {
        margin: 0.1rem 0;
        font-size: 2rem;
      }
      .intro {
        color: var(--muted);
        margin: 0.3rem 0 1rem;
      }
      .login {
        max-width: 42rem;
        margin: 3rem auto;
      }
      .login form {
        display: grid;
        gap: 0.8rem;
      }
      .admin-links {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }
      .admin-links .button {
        min-height: 5rem;
        font-size: 1.05rem;
        font-weight: 700;
      }
      @media (max-width: 600px) {
        h1 {
          font-size: 1.65rem;
        }
        .admin-links {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>賽務管理易</h1>
      <p class="intro">整合報名、場次、片段及賽程管理。</p>
      <details class="guide">
        <summary>ℹ️ 首次使用指南</summary>
        <div class="sub">
          • 此頁面整合報名管理、場次管理、片段管理及抽取賽程四項功能。<br />•
          使用賽會人員密碼登入後，選擇所需功能進入完整管理頁。
        </div>
      </details>
      <div id="loading" class="notice">載入中…</div>
      <section id="login" class="card login hidden">
        <h2>賽會人員登入</h2>
        <form id="form">
          <label for="password">請輸入賽會人員密碼</label
          ><input
            id="password"
            type="password"
            autocomplete="current-password"
            required
          />
          <div id="msg"></div>
          <button class="primary" type="submit">登入</button>
        </form>
      </section>
      <section id="app" class="hidden">
        <nav class="admin-links">
          <a class="button" href="/registration-admin">報名管理</a
          ><a class="button primary" href="/match-info">場次管理</a
          ><a class="button" href="/video-admin">片段管理</a
          ><a class="button" href="/draw-match-schedule">抽取賽程</a>
        </nav>
      </section>
    </main>
    <div id="busy" class="busy">
      <div class="busy-pill"><i class="spinner"></i>處理中…</div>
    </div>
    <script src="/shared/vote-ui.js"></script>
    <script>
      (() => {
        const $ = (x) => document.getElementById(x),
          busy = (v) => VoteUI.setBusy($("busy"), v);
        async function check() {
          try {
            const r = await fetch("/api/registration-admin/data", {
              credentials: "same-origin",
            });
            if (r.status === 401) {
              $("loading").classList.add("hidden");
              $("login").classList.remove("hidden");
              return;
            }
            $("loading").classList.add("hidden");
            $("app").classList.remove("hidden");
          } catch (e) {
            $("loading").textContent = "連線錯誤：" + e.message;
          }
        }
        $("form").onsubmit = async (e) => {
          e.preventDefault();
          busy(true);
          try {
            const r = await fetch("/api/registration-admin/login", {
                method: "POST",
                credentials: "same-origin",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password: $("password").value }),
              }),
              d = await r.json();
            if (!r.ok) throw Error(d.detail || "登入失敗");
            await check();
          } catch (x) {
            $("msg").innerHTML = `<div class="notice">${x.message}</div>`;
          } finally {
            busy(false);
          }
        };
        check();
      })();
    </script>
  </body>
</html>
