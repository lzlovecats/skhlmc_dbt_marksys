<!doctype html>
<html lang="zh-HK">
<head>
    <meta charset="utf-8">
    <title>比賽報名</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0e1117">
    <link rel="manifest" href="/manifest.json"><link rel="apple-touch-icon" href="/app-icon-180.png">
    <link rel="stylesheet" href="/shared/app-shell.css"><style>
        :root { color-scheme:dark; --bg:#0e1117; --card:#262730; --surface:#171923; --text:#fafafa; --muted:#9aa0ab; --border:#3a3d46; --accent:#4c9bff; --success:#8ee6b4; --warning:#ffd27d; --error:#ffb4b4; }
        * { box-sizing:border-box; } body { margin:0; padding:max(1rem, env(safe-area-inset-top)) 1rem calc(2rem + env(safe-area-inset-bottom)); background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,"PingFang HK","Noto Sans CJK HK",sans-serif; font-size:16px; line-height:1.5; } main { width:min(100%, 84rem); margin:0 auto; } h1 { margin:0 0 .7rem; font-size:2rem; line-height:1.25; } h2 { margin:0 0 .55rem; font-size:1.25rem; line-height:1.3; } p { margin:.35rem 0 .85rem; } .caption { color:var(--muted); font-size:.9rem; } .back-link { display:inline-flex; color:#4c9bff; text-decoration:none; margin-bottom:.6rem; } .back-link:hover { text-decoration:underline; }
        details, .card { border:1px solid var(--border); border-radius:8px; background:var(--card); padding:1rem; margin:1rem 0; } summary { cursor:pointer; font-weight:600; } ul { margin:.65rem 0 0; padding-left:1.35rem; } li { margin:.25rem 0; } label { display:block; margin:.9rem 0 .3rem; font-weight:600; } input { width:100%; min-height:2.45rem; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--text); padding:.55rem .7rem; font:inherit; } input:focus { outline:2px solid var(--accent); outline-offset:1px; } button { width:100%; min-height:2.65rem; border:1px solid var(--accent); border-radius:8px; padding:.5rem .85rem; background:var(--accent); color:#fff; font:inherit; font-weight:700; cursor:pointer; margin-top:1rem; } button.secondary { background:var(--surface); border-color:var(--border); color:var(--text); } button:disabled { opacity:.6; cursor:not-allowed; } .notice { border:1px solid var(--border); border-radius:8px; background:var(--surface); padding:.75rem .9rem; margin:1rem 0; } .warn { color:var(--warning); border-color:#927126; } .error { color:var(--error); border-color:#a14646; } .success { color:var(--success); border-color:#357a52; } .grid2 { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:1rem; } .grid3 { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:1rem; } .hidden { display:none !important; } @media (max-width:640px) { h1 { font-size:1.65rem; } .grid2, .grid3 { grid-template-columns:1fr; gap:0; } }
    </style>
</head>
<body>
<main>
    <a class="back-link" href="/">← 返回主頁</a>
    <h1>比賽報名</h1>
    <details class="guide"><summary>ℹ️ 首次使用指南</summary><ul><li>請於報名時間內填寫隊伍資料及聯絡人資料。</li><li>每隊只需提交一次報名，同一屆不可使用相同隊名重覆報名。</li><li>提交後如需更改資料，請直接聯絡賽會人員。</li></ul></details>
    <div id="loading" class="notice">載入中…</div>
    <section id="closed" class="hidden"><div id="closedMessage" class="notice warn"></div><div id="schedule" class="caption"></div></section>
    <section id="open" class="hidden">
        <div class="card"><h2 id="editionTitle"></h2><p>報名流程：填寫隊伍資料 → 確認聯絡方法 → 提交報名</p><p>如有疑問，請 <a href="https://wa.me/85252698715" target="_blank" rel="noopener noreferrer">WhatsApp 52698715</a>。</p><details><summary>📋 查看參賽隊伍賽規</summary><div id="rulesContent">載入中…</div></details><div id="timeRange" class="caption"></div></div>
        <form id="registrationForm">
            <h2>隊伍資訊</h2>
            <label for="teamName">隊名</label><input id="teamName" required autocomplete="organization">
            <div class="grid2"><div><label for="mainDebater">主辯姓名</label><input id="mainDebater" required autocomplete="name"><label for="firstDeputy">一副姓名</label><input id="firstDeputy" required autocomplete="name"></div><div><label for="secondDeputy">二副姓名</label><input id="secondDeputy" required autocomplete="name"><label for="closingDebater">結辯姓名</label><input id="closingDebater" required autocomplete="name"></div></div>
            <h2 style="margin-top:1.3rem">聯絡人資料</h2>
            <p class="caption">姓名、班別及電話只供賽會處理本次報名、聯絡及跟進用途。</p>
            <div class="grid3"><div><label for="contactName">聯絡人姓名</label><input id="contactName" required autocomplete="name"></div><div><label for="contactClass">聯絡人班別</label><input id="contactClass" required autocomplete="organization-title"></div><div><label for="contactPhone">聯絡電話號碼</label><input id="contactPhone" type="tel" inputmode="numeric" pattern="[0-9]{8}" minlength="8" maxlength="8" required autocomplete="tel" aria-describedby="phoneHelp"><div id="phoneHelp" class="caption">請輸入 8 位香港電話號碼。</div></div></div>
            <div id="formMessage"></div><button id="submitButton" type="submit">提交報名</button>
        </form>
    </section>
    <section id="success" class="hidden"><div id="successMessage" class="notice success"></div><button id="anotherTeam" class="secondary" type="button">提交另一隊報名</button></section>
</main>
<script src="/shared/vote-ui.js"></script><script src="/shared/markdown.js"></script>
<script>
(() => { "use strict";
    const $ = id => document.getElementById(id); let payload = null;
    const esc = value => String(value == null ? "" : value).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;","\"":"&quot;","'":"&#39;"}[c]));
    const displayTime = value => String(value || "").replace("T", " ").slice(0, 16);
    function message(kind, text) { $("formMessage").innerHTML = text ? `<div class="notice ${kind}">${esc(text)}</div>` : ""; }
    function render(data) {
        payload = data; $("loading").classList.add("hidden");
        if (!data.is_open) { $("closedMessage").textContent = data.message; const settings = data.settings; if (settings) $("schedule").innerHTML = `第 <strong>${esc(settings.competition_edition)}</strong> 屆比賽報名時間：<br>開始：${esc(displayTime(settings.registration_start))}<br>截止：${esc(displayTime(settings.registration_end))}`; $("closed").classList.remove("hidden"); return; }
        const settings = data.settings; $("editionTitle").textContent = `第 ${settings.competition_edition} 屆比賽報名`; $("timeRange").textContent = `報名時間（香港時間／HKT）：${displayTime(settings.registration_start)} 至 ${displayTime(settings.registration_end)}`; $("open").classList.remove("hidden");
    }
    async function load() { try { const response = await fetch("/api/registration/data"); const data = await response.json(); if (!response.ok) throw new Error(data.detail || `HTTP ${response.status}`); render(data); } catch (error) { $("loading").textContent = `連線錯誤: ${error.message}`; } }
    async function loadRules() { try { const response = await fetch("/api/home/rules?role=" + encodeURIComponent("參賽隊伍")); const data = await response.json(); if (!response.ok) throw new Error(data.detail || `HTTP ${response.status}`); $("rulesContent").innerHTML = SafeMarkdown.render(data.markdown || "暫未有賽規內容。"); } catch (error) { $("rulesContent").textContent = "賽規暫時未能載入，請返回主頁查看。"; } }
    $("registrationForm").addEventListener("submit", async event => { event.preventDefault(); const button = $("submitButton"); button.disabled = true; message("", ""); const data = { competition_edition:payload.settings.competition_edition, team_name:$("teamName").value, main_debater_name:$("mainDebater").value, first_deputy_name:$("firstDeputy").value, second_deputy_name:$("secondDeputy").value, closing_debater_name:$("closingDebater").value, contact_name:$("contactName").value, contact_class:$("contactClass").value, contact_phone:$("contactPhone").value }; try { const response = await fetch("/api/registration/submit", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data) }); const result = await response.json(); if (!response.ok) throw new Error(result.detail || `HTTP ${response.status}`); if (!result.ok) { message("error", result.message); return; } $("open").classList.add("hidden"); $("successMessage").textContent = `已收到「${result.team_name}」的報名。賽會人員稍後會按聯絡資料跟進。`; $("success").classList.remove("hidden"); } catch (error) { message("error", error.message); } finally { button.disabled = false; } });
    $("anotherTeam").addEventListener("click", () => { $("registrationForm").reset(); $("success").classList.add("hidden"); $("open").classList.remove("hidden"); message("", ""); }); load(); loadRules();
})();
</script>
</body>
</html>
