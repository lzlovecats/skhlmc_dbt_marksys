<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="utf-8" />
    <title>辯題徵集、投票及罷免</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111827" />
    <link rel="stylesheet" href="/shared/app-shell.css?v=__APP_VERSION__" />
    <style>
      /* Established dark product palette. Agree stays green, against stays red,
         and the blue accent cannot be mistaken for an against action. */
      :root {
        color-scheme: dark;
        --bg: #0e1117;
        --card: #262730;
        --text: #fafafa;
        --muted: #9aa0ab;
        --border: #3a3d46;
        --agree: #29b46b;
        --against: #ff5c5c;
        --accent: #4c9bff;
        --chip: #2b2f3a;
        --chip-text: #cdd3e0;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          "PingFang HK",
          "Noto Sans CJK HK",
          sans-serif;
        font-size: 16px;
        line-height: 1.5;
        padding: max(1rem, env(safe-area-inset-top)) 1rem
          calc(2rem + env(safe-area-inset-bottom));
      }
      .wrap {
        width: min(100%, 84rem);
        margin: 0 auto;
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      h1 {
        font-size: 2rem;
        line-height: 1.25;
        margin: 0 0 0.55rem;
      }
      .sub {
        color: var(--muted);
        font-size: 0.9rem;
      }
      .badge {
        background: var(--chip);
        color: var(--chip-text);
        border-radius: 999px;
        padding: 0.15rem 0.6rem;
        font-size: 0.8rem;
        font-weight: 600;
      }
      .login-state {
        border-radius: 8px;
        padding: 0.65rem 0.8rem;
        margin: 0.45rem 0;
        background: #1b2a3d;
        color: var(--text);
      }
      .member-state {
        margin: 0.45rem 0 0.8rem;
        padding: 0.55rem 0.8rem;
        border-radius: 8px;
      }
      .member-state.active {
        background: #123524;
        color: #8ee6b4;
      }
      .member-state.bypass {
        background: #1b2a3d;
        color: #b9d8ff;
      }
      .member-state.inactive {
        background: #3b2d13;
        color: #ffd27d;
      }
      .tabs {
        display: grid;
        grid-template-columns: repeat(6, minmax(max-content, 1fr));
        gap: 0.35rem;
        margin: 0.9rem 0 1rem;
        overflow-x: auto;
      }
      .tab {
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text);
        border-radius: 999px;
        padding: 0.4rem 0.9rem;
        cursor: pointer;
        font: inherit;
      }
      .tab.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .toolbar {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin: 0.3rem 0 1rem;
        flex-wrap: wrap;
      }
      button {
        font: inherit;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text);
        border-radius: 8px;
        padding: 0.5rem 0.9rem;
        cursor: pointer;
      }
      button:active {
        transform: translateY(1px);
      }
      button:disabled {
        opacity: 0.55;
        cursor: default;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem;
        margin-bottom: 0.85rem;
      }
      .vote-card {
        margin-bottom: 0.75rem;
      }
      .topic {
        font-weight: 600;
        font-size: 1.08rem;
        line-height: 1.35;
        margin-bottom: 0.4rem;
      }
      .vote-card .topic {
        font-size: 1.22rem;
        font-weight: 700;
      }
      .meta {
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem 0.75rem;
      }
      .chip {
        background: var(--chip);
        color: var(--chip-text);
        border-radius: 6px;
        padding: 0.05rem 0.45rem;
        font-size: 0.78rem;
      }
      .tallies {
        display: flex;
        gap: 1.2rem;
        font-size: 0.95rem;
        margin-top: 0.9rem;
      }
      .agree b {
        color: var(--agree);
      }
      .against b {
        color: var(--against);
      }
      .progress-label {
        margin-top: 0.9rem;
        font-weight: 600;
      }
      .progress {
        height: 0.72rem;
        border: 0;
        border-radius: 999px;
        overflow: hidden;
        background: #2d2f3a;
        margin-top: 0.35rem;
        position: relative;
      }
      .progress > span {
        display: block;
        height: 100%;
        min-width: 0;
      }
      .progress.agree-bar > span {
        background: var(--agree);
      }
      .progress.against-bar > span {
        background: #ff4b4b;
      }
      .deadline-past {
        color: var(--against);
        font-weight: 600;
      }
      .state {
        text-align: center;
        color: var(--muted);
        padding: 2.5rem 1rem;
      }
      .err {
        border-color: var(--against);
      }
      .warn {
        border-color: #b98a2e;
        background: #3b2d13;
      }
      .busy-overlay {
        position: fixed;
        inset: 0;
        z-index: 40;
        background: rgba(0, 0, 0, 0.35);
        display: none;
        place-items: center;
      }
      .busy-overlay.show {
        display: grid;
      }
      .busy-pill {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        background: var(--card);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 0.6rem 1.15rem;
        font-size: 0.92rem;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
      }
      .spinner {
        width: 1.05rem;
        height: 1.05rem;
        border: 2px solid var(--muted);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .section-title {
        margin: 1.5rem 0 0.5rem;
        font-size: 1rem;
        color: var(--muted);
      }
      .pill-list {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
      }
      .pill {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 0.1rem 0.6rem;
        font-size: 0.82rem;
        color: var(--muted);
      }
      a {
        color: var(--accent);
      }
      .actions {
        display: flex;
        gap: 0.5rem;
        margin-top: 1.1rem;
        flex-wrap: wrap;
      }
      .actions button {
        flex: 1 1 auto;
        min-width: 8rem;
      }
      .btn-agree {
        border-color: var(--agree);
        color: var(--agree);
      }
      .btn-against {
        border-color: var(--against);
        color: var(--against);
      }
      .btn-on-agree {
        background: var(--agree);
        color: #07111f;
        border-color: var(--agree);
        font-weight: 700;
      }
      .btn-on-against {
        background: var(--against);
        color: #07111f;
        border-color: var(--against);
        font-weight: 700;
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .reasons {
        margin-top: 0.75rem;
        padding-top: 0.75rem;
        border-top: 1px dashed var(--border);
      }
      .reasons .pill-list {
        margin-bottom: 0.5rem;
      }
      .reason-opts {
        row-gap: 0.55rem;
        margin-top: 0.45rem;
      }
      .reason-opt {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 0.15rem 0.7rem;
        font-size: 0.82rem;
        cursor: pointer;
        user-select: none;
      }
      .reason-opt.sel {
        background: var(--chip);
        color: var(--chip-text);
        border-color: var(--chip-text);
      }
      textarea,
      input[type="text"],
      input[type="password"],
      select {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg);
        color: var(--text);
        padding: 0.55rem;
        font: inherit;
      }
      .field {
        margin-bottom: 0.7rem;
      }
      .field label {
        display: block;
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 0.25rem;
      }
      .row {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.5rem;
      }
      .metric-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.6rem;
        margin-top: 0.6rem;
      }
      .metric {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.65rem;
        background: var(--bg);
      }
      .metric .label {
        color: var(--muted);
        font-size: 0.8rem;
      }
      .metric .value {
        font-weight: 700;
        margin-top: 0.15rem;
      }
      .table-wrap {
        overflow-x: auto;
        margin-top: 0.75rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
        font-size: 0.9rem;
      }
      th,
      td {
        text-align: left;
        padding: 0.5rem 0.55rem;
        border: 1px solid var(--border);
        white-space: nowrap;
      }
      th {
        color: var(--muted);
        font-weight: 600;
        background: var(--bg);
      }
      details {
        border-top: 1px dashed var(--border);
        margin-top: 1rem;
        padding-top: 0.75rem;
      }
      details .sub {
        line-height: 1.75;
      }
      details .sub + .sub {
        margin-top: 0.35rem;
      }
      .motion-extra {
        margin: 0.75rem 0 1.6rem;
      }
      .discussion {
        margin-bottom: 1.8rem;
      }
      .discussion .row {
        margin-top: 0.85rem;
        margin-bottom: 0.65rem;
      }
      .discussion textarea {
        margin-top: 0.75rem;
      }
      summary {
        cursor: pointer;
        color: var(--muted);
      }
      .guide {
        background: var(--card);
        border: 1px solid var(--border);
        border-top: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.85rem 1rem;
        margin: 0 0 1rem;
      }
      .guide > summary {
        color: var(--text);
        font-weight: 600;
      }
      .guide .sub {
        line-height: 1.95;
        margin-top: 0.55rem;
      }
      .comment {
        border-top: 1px solid var(--border);
        padding: 0.5rem 0;
      }
      .comment:first-child {
        border-top: 0;
      }
      .comment .by {
        color: var(--muted);
        font-size: 0.8rem;
        margin-bottom: 0.15rem;
      }
      .ai-box {
        line-height: 1.6;
      }
      .ai-box p {
        margin: 0.45rem 0;
      }
      .ai-box h1,
      .ai-box h2,
      .ai-box h3,
      .ai-box h4 {
        margin: 0.8rem 0 0.4rem;
        line-height: 1.3;
      }
      .ai-box h1 {
        font-size: 1.35rem;
      }
      .ai-box h2 {
        font-size: 1.2rem;
      }
      .ai-box h3,
      .ai-box h4 {
        font-size: 1.05rem;
      }
      .ai-box ul,
      .ai-box ol {
        margin: 0.45rem 0 0.45rem 1.25rem;
        padding: 0;
      }
      .ai-box li {
        margin: 0.18rem 0;
      }
      .analysis-tabs {
        display: flex;
        gap: 0.35rem;
        margin: 0.7rem 0 1rem;
        flex-wrap: wrap;
      }
      .mini-tab {
        border-radius: 999px;
        padding: 0.35rem 0.8rem;
      }
      .mini-tab.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      .chart {
        margin-top: 0.55rem;
      }
      .chart-row {
        display: grid;
        grid-template-columns: minmax(7rem, 12rem) 1fr 3.5rem;
        gap: 0.5rem;
        align-items: center;
        margin: 0.28rem 0;
        font-size: 0.86rem;
      }
      .chart-track {
        height: 0.9rem;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 999px;
        overflow: hidden;
      }
      .chart-fill {
        height: 100%;
        background: var(--accent);
      }
      .multi-select {
        display: grid;
        gap: 0.35rem;
        max-height: 16rem;
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.45rem;
        background: var(--bg);
      }
      .multi-opt {
        display: flex;
        gap: 0.5rem;
        align-items: flex-start;
        padding: 0.35rem 0.45rem;
        border-radius: 6px;
        cursor: pointer;
      }
      .multi-opt:hover {
        background: var(--chip);
      }
      .multi-opt input {
        margin-top: 0.2rem;
      }
      .multi-copy {
        min-width: 0;
      }
      .multi-title {
        display: block;
        color: var(--text);
        line-height: 1.4;
      }
      .multi-meta {
        display: block;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 600;
        line-height: 1.45;
        margin-top: 0.15rem;
      }
      .depose-filter-grid {
        display: grid;
        grid-template-columns: minmax(0, 2fr) minmax(10rem, 1fr);
        gap: 0.55rem;
        margin-bottom: 0.55rem;
      }
      .selection-summary {
        margin: 0.1rem 0 0.45rem;
        color: var(--chip-text);
        font-size: 0.9rem;
        font-weight: 600;
      }
      .filter-empty {
        color: var(--muted);
        text-align: center;
        padding: 0.8rem;
      }
      .toast {
        position: fixed;
        right: max(1rem, env(safe-area-inset-right));
        top: max(1rem, env(safe-area-inset-top));
        background: #000;
        color: #fff;
        border: 1px solid #333;
        padding: 1rem 1.25rem;
        border-radius: 12px;
        font-size: 1.05rem;
        line-height: 1.5;
        font-weight: 600;
        opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
        max-width: min(32rem, 92vw);
        text-align: left;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.6);
        z-index: 20;
      }
      .toast.show {
        opacity: 1;
      }
      .notice-backdrop {
        position: fixed;
        inset: 0;
        z-index: 30;
        background: rgba(0, 0, 0, 0.72);
        display: grid;
        place-items: center;
        padding: 1rem;
      }
      .notice-dialog {
        width: min(36rem, 100%);
        max-height: calc(100vh - 2rem);
        overflow: auto;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      }
      .notice-dialog .topic {
        font-size: 1.2rem;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        color: var(--accent);
        text-decoration: none;
        font-size: 0.95rem;
        margin-bottom: 0.6rem;
      }
      .back-link:hover {
        text-decoration: underline;
      }
      @media (max-width: 520px) {
        h1 {
          font-size: 1.65rem;
        }
        .metric-grid {
          grid-template-columns: 1fr;
        }
        .depose-filter-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <a class="back-link" href="/">← 返回主頁</a>
          <h1>辯題徵集、投票及罷免</h1>
          <div class="sub">
            活躍成員標準：整體投票率達 40%，且最近十次投票至少參與三次。
          </div>
          <div id="who"></div>
        </div>
      </header>

      <div class="tabs" id="tabs">
        <button class="tab active" data-tab="propose">📝 提案</button>
        <button class="tab" data-tab="vote">📊 辯題投票</button>
        <button class="tab" data-tab="depose">✂️ 罷免投票</button>
        <button class="tab" data-tab="bank_analysis">📈 AI分析</button>
        <button class="tab" data-tab="member_stats">👥 參與率</button>
        <button class="tab" data-tab="account">🔐 帳戶</button>
      </div>

      <details class="guide">
        <summary>ℹ️ 首次使用指南</summary>
        <div class="sub">
          •
          請先使用內部委員會成員帳戶登入，再按需要切換至提出辯題、辯題投票、罷免投票或帳戶管理分頁。<br />
          • 活躍成員可提出新辯題或罷免動議；所有成員均可參與投票。<br />
          • 每項動議均設 7 日截止日期，達門檻且票數過半時會自動更新狀態。<br />
          • 可在「🔐
          帳戶」分頁啟用背景通知，新辯題及投票結果會推送到你的裝置（iPhone /
          iPad 需先加入主畫面）。
        </div>
      </details>

      <div id="content"><div class="state">載入中…</div></div>
    </div>
    <div class="toast" id="toast"></div>
    <div class="busy-overlay" id="busy">
      <div class="busy-pill"><span class="spinner"></span>處理中…</div>
    </div>
    <div id="noticeRoot"></div>
    <div id="confirmRoot"></div>

    <script src="/shared/vote-ui.js?v=__APP_VERSION__"></script>
    <script src="/shared/markdown.js?v=__APP_VERSION__"></script>
    <script>
      (function () {
        "use strict";
        const content = document.getElementById("content");
        const who = document.getElementById("who");
        const toastEl = document.getElementById("toast");
        const busyEl = document.getElementById("busy");
        const noticeRoot = document.getElementById("noticeRoot");
        const confirmRoot = document.getElementById("confirmRoot");
        const tabsEl = document.getElementById("tabs");

        // Client-side input limits mirror the server contract.
        const AI_COMMENT_USER = "Gemini"; // AI_COMMENT_USER_ID — replies rendered as markdown
        const REJECTION_REASONS = [
          "表述或界定不清",
          "正反責任失衡",
          "與現有題目重複或相似",
          "討論價值不足",
          "題目表述可再修訂",
          "類別分類不當",
          "難度分類不當",
        ];
        const DEPOSE_REASONS = [
          "題目已過時",
          "表述或界定不清",
          "正反責任失衡",
          "與現有題目重複或相似",
          "討論價值不足",
          "已有更佳版本可取代",
          "類別分類不當",
          "難度分類不當",
        ];
        const CATEGORIES = [
          "國際與時事",
          "科技與未來",
          "文化與生活",
          "香港社會政策",
          "青少年與教育",
          "哲理／價值觀",
        ];
        const DIFFICULTIES = [
          { v: 1, label: "Lv1 — 概念日常" },
          { v: 2, label: "Lv2 — 一般議題" },
          { v: 3, label: "Lv3 — 進階專業" },
        ];

        let ME = "";
        let ACTIVITY = null;
        let NOTI_CHECKED = false;
        let PUSH_SYNC_USER = "";
        let PUSH_SYNC_PROMISE = null;
        let PUSH_LAST_STATUS = "";
        const PUSH_OPT_OUT_KEY = "committeePushOptOut";
        let BUSY = 0;
        // Central busy state → shows the "處理中…" overlay so every action button
        // click gives clear loading feedback and double-submits are blocked.
        function setBusy(v) {
          BUSY = v;
          busyEl.classList.toggle("show", !!v);
        }
        let TAB = "propose";
        let ANALYSIS_TAB = "bank";
        let openReasonFor = null; // topic_text with an open against-reason panel (topic vote)
        const CACHE_TTL = 20000;
        const CACHE = Object.create(null);

        function esc(s) {
          return String(s == null ? "" : s).replace(
            /[&<>"']/g,
            (c) =>
              ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#39;",
              })[c],
          );
        }
        function cssEsc(s) {
          return String(s).replace(/["\\]/g, "\\$&");
        }
        function diffLabel(v) {
          const d = DIFFICULTIES.find((x) => String(x.v) === String(v));
          return d ? d.label : v || "";
        }
        function progressBar(kind, label, count, threshold) {
          const pct = threshold
            ? Math.min(100, Math.max(0, (count / threshold) * 100))
            : 0;
          return `<div class="progress-label">${esc(label)}：${esc(count)} / ${esc(threshold || "—")}</div><div class="progress ${kind}-bar"><span style="width:${pct}%"></span></div>`;
        }
        function md(s) {
          return SafeMarkdown.render(s || "");
        }
        function invalidateCache() {
          Object.keys(CACHE).forEach((k) => delete CACHE[k]);
        }

        let toastTimer = null;
        function toast(msg) {
          toastEl.textContent = msg;
          toastEl.classList.add("show");
          clearTimeout(toastTimer);
          toastTimer = setTimeout(() => toastEl.classList.remove("show"), 4000);
        }
        function askConfirm(message, confirmLabel) {
          return new Promise((resolve) => {
            confirmRoot.innerHTML = `<div class="notice-backdrop"><div class="notice-dialog" role="dialog" aria-modal="true" aria-label="確認操作">
                <div class="topic">確認操作</div>
                <div class="sub" style="color:var(--text)">${esc(message)}</div>
                <div class="actions">
                    <button class="btn-primary" data-confirm="yes">${esc(confirmLabel)}</button>
                    <button data-confirm="no">❌ 取消</button>
                </div>
            </div></div>`;
            confirmRoot.onclick = (ev) => {
              const btn = ev.target.closest("button[data-confirm]");
              if (!btn) return;
              const accepted = btn.dataset.confirm === "yes";
              confirmRoot.innerHTML = "";
              confirmRoot.onclick = null;
              resolve(accepted);
            };
          });
        }
        function toastFor(t, action, mode, mine) {
          if (action === "withdraw") {
            return mine === "agree"
              ? "↩️ 已撤回同意票！"
              : "↩️ 已撤回不同意票！";
          }
          if (action === "agree") {
            if (mine === "against")
              return mode === "depose"
                ? "↪️ 已轉投同意罷免票！"
                : "↪️ 已轉投同意票！";
            return "☑️ 已投下同意票！";
          }
          if (action === "against") {
            if (mine === "agree") return "↪️ 已轉投不同意票！";
            return "☑️ 已投下不同意票！";
          }
          return "☑️ 投票已更新";
        }

        function myState(t) {
          if ((t.agree_users || []).indexOf(ME) !== -1) return "agree";
          if ((t.against_users || []).indexOf(ME) !== -1) return "against";
          return null;
        }

        function notLoggedIn() {
          who.innerHTML = "";
          ME = "";
          ACTIVITY = null;
          NOTI_CHECKED = false;
          PUSH_SYNC_USER = "";
          PUSH_SYNC_PROMISE = null;
          PUSH_LAST_STATUS = "";
          noticeRoot.innerHTML = "";
          confirmRoot.innerHTML = "";
          tabsEl.style.display = "none";
          content.innerHTML = `
            <div class="card">
                <div class="sub">請先使用內部委員會成員帳戶登入，再按需要切換至提出辯題、辯題投票、罷免投票或帳戶管理分頁。</div>
                <div class="sub">活躍成員可提出新辯題或罷免動議；所有成員均可參與投票。</div>
                <div class="sub">每項動議均設 7 日截止日期，達門檻且票數過半時會自動更新狀態。</div>
                <div class="sub">可在「帳戶管理」分頁啟用背景通知，新辯題及投票結果會推送到你的裝置（iPhone / iPad 需先加入主畫面）。</div>
            </div>
            <div class="card" style="max-width:380px;margin:1.5rem auto">
                <div class="topic" style="margin-bottom:.75rem">內部委員會成員登入</div>
                <div class="field"><label>用戶名稱</label>
                    <input type="text" id="loginUser" autocomplete="username"></div>
                <div class="field"><label>密碼</label>
                    <input type="password" id="loginPass" autocomplete="current-password"></div>
                <button class="btn-primary" data-act="login" style="width:100%">登入</button>
                <div class="sub" id="loginMsg" style="margin-top:.5rem;color:var(--against)"></div>
            </div>`;
          const pass = document.getElementById("loginPass");
          if (pass)
            pass.addEventListener("keydown", (e) => {
              if (e.key === "Enter") doLogin();
            });
        }

        async function doLogin() {
          const u = (document.getElementById("loginUser").value || "").trim();
          const p = document.getElementById("loginPass").value || "";
          const msg = document.getElementById("loginMsg");
          if (!u || !p) {
            msg.textContent = "請輸入帳號及密碼";
            return;
          }
          if (BUSY) return;
          setBusy(true);
          try {
            const { res, data } = await postJSON("/api/committee/login", {
              user_id: u,
              password: p,
            });
            if (!res.ok) {
              msg.textContent = data.detail || "登入失敗 " + res.status;
              return;
            }
            tabsEl.style.display = "";
            invalidateCache();
            await load();
            prefetchLikelyTabs();
          } catch (e) {
            msg.textContent = "登入失敗：" + e.message;
          } finally {
            setBusy(false);
          }
        }

        async function doLogout() {
          try {
            await postJSON("/api/committee/logout", {});
          } catch (e) {
            /* ignore */
          }
          invalidateCache();
          notLoggedIn();
        }

        async function checkNotification() {
          if (NOTI_CHECKED || !ME) return;
          NOTI_CHECKED = true;
          try {
            const data = await getJSON("/api/committee/notification");
            const n = data && data.notification;
            if (!n) return;
            noticeRoot.innerHTML = `<div class="notice-backdrop"><div class="notice-dialog" role="dialog" aria-modal="true" aria-label="${esc(n.title)}">
                <div class="topic">${esc(n.title)}</div>
                <div class="ai-box">${md(n.content)}</div>
                <button class="btn-primary" data-notice-id="${esc(n.id)}" data-notice-title="${esc(n.title)}" style="width:100%;margin-top:.8rem">我已閱讀 ✓</button>
            </div></div>`;
          } catch (e) {
            /* a notice failure must not block the vote page */
          }
        }

          if (data && typeof data.is_active === "boolean") ACTIVITY = data;

          who.innerHTML = `<div class="login-state">已登入帳戶：<strong>${esc(ME)}</strong></div>${status}`;

        // ── generic vote buttons (shared by topic + depose) ───────────────────────
        function agreeButton(t, mine, mode) {
          const label = mode === "depose" ? "同意罷免" : "同意";
          if (mine === "agree")
            return `<button class="btn-on-agree" data-act="withdraw" data-mode="${mode}" data-topic="${esc(t.topic_text)}" data-toast="${esc(toastFor(t, "withdraw", mode, mine))}">已同意 (點擊撤回)</button>`;
          if (mine === "against")
            return `<button class="btn-agree" data-act="agree" data-mode="${mode}" data-topic="${esc(t.topic_text)}" data-toast="${esc(toastFor(t, "agree", mode, mine))}">轉投同意</button>`;
          return `<button class="btn-agree" data-act="agree" data-mode="${mode}" data-topic="${esc(t.topic_text)}" data-toast="${esc(toastFor(t, "agree", mode, mine))}">✅ ${label}</button>`;
        }
        function againstButton(t, mine, mode) {
          const label = mode === "depose" ? "不同意罷免" : "不同意";
          if (mine === "against")
            return `<button class="btn-on-against" data-act="withdraw" data-mode="${mode}" data-topic="${esc(t.topic_text)}" data-toast="${esc(toastFor(t, "withdraw", mode, mine))}">已反對 (點擊撤回)</button>`;
          // topic against needs reasons (opens a panel); depose against is direct.
          const act = mode === "depose" ? "against" : "against-open";
          const text = mine === "agree" ? "轉投反對" : `❌ ${label}`;
          return `<button class="btn-against" data-act="${act}" data-mode="${mode}" data-topic="${esc(t.topic_text)}" data-toast="${esc(toastFor(t, "against", mode, mine))}">${text}</button>`;
        }
        function reasonPanel(t, mine) {
          const opts = REJECTION_REASONS.map(
            (r) =>
              `<span class="reason-opt" data-reason="${esc(r)}">${esc(r)}</span>`,
          ).join("");
          return `
            <div class="reasons" data-panel="${esc(t.topic_text)}">
                <div class="sub">請選擇不同意原因（至少一項）：</div>
                <div class="pill-list reason-opts">${opts}</div>
                <textarea rows="2" placeholder="其他原因（如有）"></textarea>
                <div class="row">
                    <button class="btn-against" data-act="against-submit" data-topic="${esc(t.topic_text)}" data-toast="${esc(toastFor(t, "against", "topic", mine))}">確認不同意</button>
                    <button data-act="against-cancel" data-topic="${esc(t.topic_text)}">取消</button>
                </div>
            </div>`;
        }

        function metaBits(t) {
          const bits = [
            `🏷️ ${esc(t.category || "—")}`,
            esc(diffLabel(t.difficulty) || "—"),
          ];
          if (t.deadline) {
            bits.push(
              t.deadline_passed
                ? `<span class="deadline-past">截止：${esc(t.deadline)} 23:59（已過期）</span>`
                : `截止：${esc(t.deadline)} 23:59`,
            );
          }
          return bits.join(" ｜ ");
        }

        function discussionBlock(motionType, topic, count) {
          const key = esc(topic);
          const label = count ? `💬 討論區 (${count})` : "💬 討論區";
          return `
            <details class="discussion" data-motion-type="${motionType}" data-motion-key="${key}">
                <summary>${esc(label)}</summary>
                <div class="comments"><div class="sub" style="padding:.55rem 0">尚未載入。</div></div>
                <textarea rows="2" placeholder="就此議案發表意見。如要問 AI，可加「@Gemini 你的問題」，或按 Tag Gemini 取得中立分析。"></textarea>
                <div class="row">
                    <button data-act="comment-post">發表</button>
                    <button data-act="comment-ai">Tag Gemini</button>
                </div>
            </details>`;
        }

        async function loadComments(box) {
          const motionType = box.dataset.motionType;
          const motionKey = box.dataset.motionKey;
          const target = box.querySelector(".comments");
          target.innerHTML =
            '<div class="sub" style="padding:.55rem 0">載入中…</div>';
          try {
            const d = await getJSON(
              `/api/vote/comments?motion_type=${encodeURIComponent(motionType)}&motion_key=${encodeURIComponent(motionKey)}`,
            );
            if (!d) return;
            const rows = d.comments || [];
            target.innerHTML = rows.length
              ? rows
                  .map(
                    (c) => `
                <div class="comment">
                    <div class="by"><b>${esc(c.user_id)}</b>　${esc(c.created_at)}</div>
                    ${c.user_id === AI_COMMENT_USER ? `<div class="ai-box">${md(c.comment_text)}</div>` : `<div>${esc(c.comment_text)}</div>`}
                </div>`,
                  )
                  .join("")
              : '<div class="sub" style="padding:.55rem 0">暫時未有討論。</div>';
          } catch (e) {
            target.innerHTML = `<div class="sub" style="color:var(--against);padding:.55rem 0">載入留言失敗：${esc(e.message)}</div>`;
          }
        }

        // Warning banner for motions auto-rejected on this load (deadline passed).
        function expiredBanner(expired, kind) {
          if (!expired || !expired.length) return "";
          return expired
            .map((e) => {
              const msg =
                kind === "depose"
                  ? `罷免動議「${esc(e.topic)}」投票期限（${esc(e.deadline)} 23:59）已過，未達罷免標準，動議自動取消。`
                  : `辯題「${esc(e.topic)}」投票期限（${esc(e.deadline)} 23:59）已過，未達入庫標準，系統自動否決。`;
              return `<div class="card warn"><div class="sub" style="color:#ffd27d">⚠️ ${msg}</div></div>`;
            })
            .join("");
        }

        // ── topic vote tab ────────────────────────────────────────────────────────
        function renderVote(data) {
          const list = data.pending || [];
          let html =
            '<div class="card"><div class="topic">待表決辯題</div><div class="sub">當同意票數達入庫門檻，且同意票多於不同意票時，系統會自動將辯題寫入辯題庫。</div><div class="sub">當不同意票數達入庫門檻，且不同意票多於同意票時，系統會自動否決該辯題。</div><div class="actions"><button data-act="refresh">🔄 重新整理</button></div></div>';
          html += expiredBanner(data.expired, "topic");
          if (!list.length) {
            html += '<div class="state">目前沒有待表決的辯題。</div>';
          } else {
            html += list
              .map((t) => {
                const mine = myState(t);
                const thr = t.approval_threshold || 0;
                const panel =
                  openReasonFor === t.topic_text ? reasonPanel(t, mine) : "";
                return `
                    <div class="card vote-card">
                        <div class="topic">${esc(t.topic_text)}</div>
                        <div class="meta">${metaBits(t)}</div>
                        <div class="sub">提出者：${esc(t.proposer_user_id) || "—"} ｜ 入庫門檻：${esc(thr)} 票</div>

                    </div>
                    <div class="motion-extra">
                        ${renderAgainstReasons(t)}
                        ${discussionBlock("topic_vote", t.topic_text, t.comment_count || 0)}
                    </div>`;
              })
              .join("");
          }
          html += renderHistory(data.history || []);
          content.innerHTML = html;
        }
        function renderAgainstReasons(t) {
          const reasonMap = t.against_reasons || {};
          const all = [];
          Object.keys(reasonMap).forEach((uid) =>
            (reasonMap[uid] || []).forEach((r) => all.push(r)),
          );
          if (!all.length) return "";
          const counts = {};
          all.forEach((r) => {
            counts[r] = (counts[r] || 0) + 1;
          });
          const lines = Object.keys(counts)
            .sort((a, b) => counts[b] - counts[a])
            .map(
              (r) =>
                `<div class="sub">• ${esc(r)}${counts[r] > 1 ? `（${counts[r]} 人）` : ""}</div>`,
            )
            .join("");
          return `<details><summary>查看「${esc(t.topic_text)}」不同意理由</summary>${lines}</details>`;
        }
        function renderHistory(rows) {
          const body = rows.length
            ? rows
                .map((h) => {
                  const icon = h.status === "passed" ? "✅" : "❌";
                  return `<div class="sub">${icon} ${esc(h.topic_text)}　｜　${esc(h.category || "")}　｜　同意：${esc(h.agree)} ／ 不同意：${esc(h.against)} ／ 門檻：${esc(h.approval_threshold)}　｜　${esc(h.created_at)}</div>`;
                })
                .join("")
            : '<div class="sub">暫無記錄</div>';
          return `<details><summary>📜 投票歷史記錄（最近二十個）</summary><div style="padding-top:.45rem">${body}</div></details>`;
        }

        // ── depose tab ────────────────────────────────────────────────────────────
        function renderDepose(data) {
          const list = data.pending || [];
          let html =
            '<div class="card"><div class="topic">罷免投票</div><div class="sub">當同意罷免票數達罷免門檻，且同意票多於不同意票時，系統會自動刪除辯題。</div><div class="sub">當不同意票數達罷免門檻，且不同意票多於同意票時，系統會自動否決罷免動議。</div><div class="actions"><button data-act="refresh">🔄 重新整理</button></div></div>';

        function deposeProposeForm(bankTopics, deposeInfo, canPropose) {

                <div class="field"><label>其他補充原因（如有）</label><textarea id="deposeOther" rows="2" placeholder="例如：題目最近已在其他比賽打過。"></textarea></div>

        // ── propose tab ───────────────────────────────────────────────────────────

          const cats = CATEGORIES.map(
            (c) => `<option value="${esc(c)}">${esc(c)}</option>`,
          ).join("");
          const diffs = DIFFICULTIES.map(
            (d) => `<option value="${d.v}">${esc(d.label)}</option>`,
          ).join("");

            data && data.entry_threshold != null
              ? `目前活躍成員：${data.active_count} 人 ｜ 入庫門檻：${data.entry_threshold} 票`
              : "";
          const deposeInfo =
            data && data.depose_threshold != null
              ? `目前活躍成員：${data.active_count} 人 ｜ 罷免門檻：${data.depose_threshold} 票`
              : "";
          const inactiveTopic = canPropose
            ? ""
            : '<div class="member-state bypass">非活躍成員不能提出新辯題。</div>';
          const inactiveDepose = canPropose
            ? ""
            : '<div class="member-state bypass">非活躍成員不能提出罷免動議。</div>';
          const pendingWarning = pendingFull
            ? `<div class="member-state inactive">目前已有 ${esc(data.pending_vote_count)} 個待表決辯題。請先到「📊 辯題投票」完成投票，直到待表決辯題數量少於10個後再提交新辯題。</div>`
            : "";
          const deposeWarning = deposeFull
            ? '<div class="member-state inactive">目前已有10個辯題罷免動議。請先到「✂️ 罷免投票」完成投票，直到辯題罷免動議數量少於10個後再提交新動議。</div>'
            : "";
          content.innerHTML = `
            <div class="card">
                <div class="topic">提出新辯題</div>

        function filterDeposeTopics() {
          const form = document.getElementById("deposeForm");
          if (!form) return;
          const query = (form.querySelector("#deposeSearch")?.value || "")
            .trim()
            .toLocaleLowerCase("zh-HK");
          const category = form.querySelector("#deposeCategory")?.value || "";
          const options = Array.from(
            form.querySelectorAll("#deposeTopic .multi-opt"),
          );
          let visible = 0;
          options.forEach((opt) => {
            const topic = (opt.textContent || "").toLocaleLowerCase("zh-HK");
            const show =
              (!query || topic.includes(query)) &&
              (!category || opt.dataset.category === category);

          const selected = options.filter((opt) =>
            opt.querySelector("input:checked"),
          ).length;

          if (summary)
            summary.textContent = `已選 ${selected} 條 ｜ 顯示 ${visible} / ${options.length} 條`;

          if (empty) empty.hidden = visible !== 0;

        function chart(title, rows, suffix) {
          rows = rows || [];
          // Percentage charts (suffix "%") map value→width directly (0-100), so the
          // bar reflects the real percentage. Count charts normalise to the group max.
          const isPct = suffix === "%";
          const max = isPct
            ? 100
            : rows.reduce((m, r) => Math.max(m, Number(r.value) || 0), 0) || 1;
          const body = rows.length
            ? rows
                .map((r) => {
                  const val = Number(r.value) || 0;
                  const width =
                    val <= 0
                      ? 0
                      : Math.min(100, Math.max(2, (val / max) * 100));
                  return `<div class="chart-row"><div>${esc(r.label)}</div><div class="chart-track"><div class="chart-fill" style="width:${width}%"></div></div><div>${esc(Math.round(val * 10) / 10)}${suffix || ""}</div></div>`;
                })
                .join("")
            : '<div class="sub">暫時未有數據。</div>';
          return `<div class="card"><div class="topic">${esc(title)}</div><div class="chart">${body}</div></div>`;
        }

        // ── data loading ──────────────────────────────────────────────────────────
        async function getJSON(url) {
          const res = await fetch(url, {
            credentials: "same-origin",
            headers: { Accept: "application/json" },
          });
          if (res.status === 401) {
            notLoggedIn();
            return null;
          }
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.json();
        }
        async function getJSONCached(url) {
          const now = Date.now();
          const hit = CACHE[url];
          if (hit && hit.data && now - hit.time < CACHE_TTL) return hit.data;
          if (hit && hit.promise) return hit.promise;
          const promise = getJSON(url)
            .then((data) => {
              CACHE[url] = { data, time: Date.now() };
              return data;
            })
            .finally(() => {
              if (CACHE[url]) delete CACHE[url].promise;
            });
          CACHE[url] = { promise, time: now };
          return promise;
        }
        function prefetchLikelyTabs() {
          [
            "/api/vote/data",
            "/api/vote/depose-data",
            "/api/vote/member-stats",
            "/api/vote/analysis",
          ].forEach((url) => getJSONCached(url).catch(() => {}));
        }

        async function load() {
          content.innerHTML = '<div class="state">載入中…</div>';
          try {
            if (TAB === "depose") {
              const d = await getJSONCached("/api/vote/depose-data");
              if (!d) return;
              ME = d.user_id || "";
              setMemberState(d);
              tabsEl.style.display = "";
              updateTabCounts(null, d.pending_depose_count);
              renderDepose(d);
            } else if (TAB === "member_stats") {

              if (!d) return;
              ME = d.user_id || "";
              setMemberState(d);
              tabsEl.style.display = "";
              renderMemberStats(d);
            } else if (TAB === "bank_analysis") {
              const d = await getJSONCached("/api/vote/analysis");
              if (!d) return;
              ME = d.user_id || "";
              setMemberState(d);
              tabsEl.style.display = "";
              renderAnalysis(d);
            } else if (TAB === "account") {

              if (!d) return;
              ME = d.user_id || "";
              setMemberState(d);
              tabsEl.style.display = "";

        // ── POST helpers ──────────────────────────────────────────────────────────
        async function postJSON(url, payload) {
          const res = await fetch(url, {
            method: "POST",
            credentials: "same-origin",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json",
            },
            body: JSON.stringify(payload),
          });
          const data = await res.json().catch(() => ({}));
          return { res, data };
        }

        async function cast(payload, toastMessage) {
          if (BUSY) return;
          setBusy(true);
          try {
            const { res, data } = await postJSON("/api/vote/cast", payload);
            if (res.status === 401) {
              toast("⚠️ 登入已失效，請重新登入。");
              return;
            }
            if (res.status === 200 && data.status === "confirm_category") {
              const pct = (data.ratio * 100).toFixed(1);
              // The confirmation dialog has a lower z-index than the busy
              // overlay. Clear the in-flight state before awaiting input.
              setBusy(false);
              if (
                !(await askConfirm(
                  `若此辯題通過，類別「${data.category}」將佔辯題庫 ${pct}%（現有 ${data.total} 題中已有 ${data.cat_count} 題同類）。仍要投同意票嗎？`,
                  "✅ 確認投同意票",
                ))
              )
                return;
              return cast(
                Object.assign({}, payload, { confirm_category: true }),
              );
            }
            if (!res.ok) {
              toast("⚠️ " + (data.detail || "錯誤 " + res.status));
              return;
            }
            if (data.resolved === "passed") {
              toast(
                payload.mode === "depose"
                  ? "🗑️ 罷免動議已通過，辯題已從辯題庫移除。"
                  : "🎉 辯題已獲得足夠票數，已寫入辯題庫！",
              );
            } else if (data.resolved === "rejected") {
              toast(
                payload.mode === "depose"
                  ? "🛡️ 罷免動議已被否決。"
                  : "❌ 辯題不同意票達門檻，已被否決。",
              );
            } else {
              toast(toastMessage || "☑️ 投票已更新");
            }
            openReasonFor = null;
            invalidateCache();
            await load();
          } catch (e) {
            toast("⚠️ 提交失敗：" + e.message);
          } finally {
            setBusy(false);
          }
        }

        async function submitDepose() {
          if (BUSY) return;
          const form = document.getElementById("deposeForm");
          if (!form) return;
          const topics = Array.from(
            form.querySelectorAll("#deposeTopic input:checked"),
          ).map((o) => o.value);
          const picked = Array.from(
            form.querySelectorAll(".reason-opt.sel"),
          ).map((e) => e.dataset.reason);
          const other = form.querySelector("#deposeOther").value.trim();
          if (other) picked.push("其他：" + other);
          if (!topics.length) {
            toast("⚠️ 請至少選擇一條辯題。");
            return;
          }
          if (!picked.length) {
            toast("⚠️ 請至少選擇一個罷免原因。");
            return;
          }
          setBusy(true);
          try {
            const { res, data } = await postJSON("/api/vote/depose", {
              topics,
              reasons: picked,
            });
            if (!res.ok) {
              toast("⚠️ " + (data.detail || "錯誤 " + res.status));
              return;
            }
            toast(
              (data.skipped || []).length
                ? "⚠️ 罷免動議已提出；部分重複辯題已略過。"
                : "☑️ 罷免動議已提出！",
            );
            invalidateCache();
            await load();
          } catch (e) {
            toast("⚠️ 提交失敗：" + e.message);
          } finally {
            setBusy(false);
          }
        }

          const category = document.getElementById("propCategory").value;

          try {
            const { res, data } = await postJSON("/api/vote/propose", {
              topic,
              category,
              difficulty,
              confirm_imbalance: !!confirmImbalance,

            if (res.status === 200 && data.status === "confirm_imbalance") {
              const pct = (data.ratio * 100).toFixed(1);

            toast(`☑️ 辯題已加入投票區（截止 ${data.deadline}）！`);

            toast("⚠️ 提交失敗：" + e.message);
          } finally {
            setBusy(false);
          }
        }

          const text = textEl.value.trim();
          if (!text && !tagAi) {
            toast("⚠️ 請輸入內容。");
            return;
          }
          setBusy(true);
          try {
            const { res, data } = await postJSON("/api/vote/comments", {
              motion_type: box.dataset.motionType,
              motion_key: box.dataset.motionKey,
              text,
              tag_ai: !!tagAi,
            });
            if (!res.ok) {
              toast("⚠️ " + (data.detail || "錯誤 " + res.status));
              return;
            }
            if (data.status === "ai_failed")
              toast("⚠️ 留言已儲存，但 AI 回應失敗。");
            else toast(data.ai_replied ? "☑️ AI 已回覆討論" : "☑️ 已成功留言");
            textEl.value = "";
            invalidateCache();
            await loadComments(box);
          } catch (e) {
            toast("⚠️ 留言失敗：" + e.message);
          } finally {
            setBusy(false);
          }
        }

        async function runAnalysis(kind) {
          if (BUSY) return;
          setBusy(true);
          toast("⏳ AI 正在分析，請稍候…");
          try {
            const { res, data } = await postJSON("/api/vote/analysis/ai", {
              kind,
            });
            if (!res.ok) {
              toast("⚠️ " + (data.detail || "AI 分析失敗"));
              return;
            }
            toast(
              kind === "bank"
                ? "☑️ 已更新辯題庫分析"
                : "☑️ 已更新過往投票紀錄分析",
            );
            invalidateCache();
            await load();
          } catch (e) {
            toast("⚠️ AI 分析失敗：" + e.message);
          } finally {
            setBusy(false);
          }
        }

        function setPushStatus(message) {
          PUSH_LAST_STATUS = message;
          const el = document.getElementById("pushHealth");
          if (el) el.textContent = message;
        }

        function urlBase64ToUint8Array(base64String) {
          const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
          const base64 = (base64String + padding)
            .replace(/-/g, "+")
            .replace(/_/g, "/");
          const rawData = window.atob(base64);
          return Uint8Array.from([...rawData].map((ch) => ch.charCodeAt(0)));
        }

        function sameApplicationServerKey(subscription, expectedKey) {
          const actual = subscription.options && subscription.options.applicationServerKey;
          if (!actual) return true;
          const bytes = new Uint8Array(actual);
          return (
            bytes.length === expectedKey.length &&
            bytes.every((value, index) => value === expectedKey[index])
          );
        }

        async function getPushRegistrationAndKey() {
          const registrationPromise = navigator.serviceWorker.register("/sw.js", {
            updateViaCache: "none",
          });
          const keyPromise = fetch("/sw.js", { cache: "no-store" })
            .then((response) => {
              if (!response.ok) throw new Error("未能讀取 Web Push 設定");
              return response.text();
            })
            .then((source) => {
              const match = source.match(/const VAPID_PUBLIC_KEY = "([^"]*)"/);
              if (!match || !match[1]) throw new Error("尚未設定 Web Push 金鑰");
              return urlBase64ToUint8Array(match[1]);
            });
          await registrationPromise;
          const registration = await navigator.serviceWorker.ready;
          return { registration, applicationServerKey: await keyPromise };
        }

        async function persistPushStorage() {
          if (navigator.storage && navigator.storage.persist) {
            try {
              await navigator.storage.persist();
            } catch (e) {
              console.warn("Persistent storage request failed", e);
            }
          }
        }

        async function reconcilePushSubscription({ interactive = false } = {}) {
          if (!ME) return false;
          if (!interactive && localStorage.getItem(PUSH_OPT_OUT_KEY) === "1") {
            setPushStatus("通知已在此裝置停用。");
            return false;
          }
          if (
            !("Notification" in window) ||
            !("serviceWorker" in navigator) ||
            !("PushManager" in window)
          ) {
            setPushStatus("此瀏覽器未支援背景通知。");
            return false;
          }
          if (!window.isSecureContext) {
            setPushStatus("背景通知需要 HTTPS 連線。");
            return false;
          }

          let permission = Notification.permission;
          if (interactive && permission !== "granted") {
            permission = await Notification.requestPermission();
          }
          if (permission !== "granted") {
            setPushStatus(
              permission === "denied"
                ? "通知權限已被封鎖，請到 Chrome／系統設定重新允許。"
                : "通知尚未啟用。",
            );
            return false;
          }

          setPushStatus("正在核對通知訂閱…");
          const { registration, applicationServerKey } =
            await getPushRegistrationAndKey();
          let subscription = await registration.pushManager.getSubscription();
          if (
            subscription &&
            !sameApplicationServerKey(subscription, applicationServerKey)
          ) {
            await subscription.unsubscribe();
            subscription = null;
          }
          if (!subscription) {
            subscription = await registration.pushManager.subscribe({
              userVisibleOnly: true,
              applicationServerKey,
            });
          }

          const { res, data } = await postJSON(
            "/api/push/subscribe",
            subscription.toJSON(),
          );
          if (!res.ok || !data.ok) {
            throw new Error(data.detail || "訂閱同步失敗");
          }
          await persistPushStorage();
          PUSH_SYNC_USER = ME;
          setPushStatus("通知已啟用，訂閱狀態正常。");
          return true;
        }

        function schedulePushReconcile() {
          if (!ME || PUSH_SYNC_USER === ME || PUSH_SYNC_PROMISE) return;
          PUSH_SYNC_PROMISE = reconcilePushSubscription()
            .catch((error) => {
              setPushStatus("通知訂閱暫時未能同步，請按「啟用通知」重試。");
              console.warn("Push subscription reconciliation failed", error);
            })
            .finally(() => {
              PUSH_SYNC_PROMISE = null;
            });
        }

        async function pushEnable() {
          try {
            localStorage.removeItem(PUSH_OPT_OUT_KEY);
            const ok = await reconcilePushSubscription({ interactive: true });
            toast(ok ? "☑️ 通知已啟用。" : "⚠️ 未能啟用通知。");
          } catch (e) {
            setPushStatus("通知啟用失敗，請稍後再試。");
            toast("⚠️ 通知啟用失敗：" + e.message);
          }
        }

        async function pushDisable() {
          localStorage.setItem(PUSH_OPT_OUT_KEY, "1");
          try {
            const reg = await navigator.serviceWorker.getRegistration();
            const sub = reg ? await reg.pushManager.getSubscription() : null;
            if (sub) {
              let serverResult = null;
              let serverError = null;
              try {
                serverResult = await postJSON("/api/push/unsubscribe", {
                  endpoint: sub.endpoint,
                });
              } catch (error) {
                serverError = error;
              }
              await sub.unsubscribe();
              if (
                serverError ||
                !serverResult ||
                !serverResult.res.ok ||
                !serverResult.data.ok
              ) {
                console.warn(
                  "Push endpoint was removed locally but server cleanup is pending",
                  serverError || (serverResult && serverResult.data),
                );
              }
            }
            PUSH_SYNC_USER = "";
            setPushStatus("通知已停用。");
            toast("☑️ 通知已停用。");
          } catch (e) {
            toast("⚠️ 通知停用失敗：" + e.message);
          }
        }

        async function changePassword() {
          if (BUSY) return;
          const current_password =
            document.getElementById("pwCurrent").value || "";
          const new_password = document.getElementById("pwNew").value || "";
          const confirm_password =
            document.getElementById("pwConfirm").value || "";
          if (!current_password) {
            toast("⚠️ 請輸入目前密碼。");
            return;
          }
          if (!new_password) {
            toast("⚠️ 請輸入新密碼。");
            return;
          }
          if (new_password !== confirm_password) {
            toast("⚠️ 兩次輸入的新密碼不一致。");
            return;
          }
          setBusy(true);
          try {
            const { res, data } = await postJSON("/api/committee/password", {
              current_password,
              new_password,
              confirm_password,
            });
            if (!res.ok) {
              toast("⚠️ " + (data.detail || "密碼更改失敗"));
              return;
            }
            document.getElementById("pwCurrent").value = "";
            document.getElementById("pwNew").value = "";
            document.getElementById("pwConfirm").value = "";
            toast("☑️ 帳戶密碼已更改！下次登入請使用新密碼！");
          } catch (e) {
            toast("⚠️ 密碼更改失敗：" + e.message);
          } finally {
            setBusy(false);
          }
        }

        // ── event delegation ──────────────────────────────────────────────────────
        content.addEventListener("input", function (ev) {
          if (ev.target.id === "deposeSearch") filterDeposeTopics();
        });

        content.addEventListener("change", function (ev) {
          if (
            ev.target.id === "deposeCategory" ||
            ev.target.closest("#deposeTopic")
          ) {
            filterDeposeTopics();
          }
        });

        content.addEventListener("click", function (ev) {
          const optEl = ev.target.closest(".reason-opt");
          if (optEl) {
            optEl.classList.toggle("sel");
            return;
          }

          const btn = ev.target.closest("button[data-act]");
          if (!btn) return;
          const act = btn.dataset.act;
          const topic = btn.dataset.topic;
          const mode = btn.dataset.mode || "topic";

          if (act === "login") {
            doLogin();
            return;
          }
          if (act === "agree") {
            cast({ mode, topic, action: "agree" }, btn.dataset.toast);
            return;
          }
          if (act === "withdraw") {
            cast({ mode, topic, action: "withdraw" }, btn.dataset.toast);
            return;
          }
          if (act === "against") {
            cast({ mode, topic, action: "against" }, btn.dataset.toast);
            return;
          } // depose: no reasons
          if (act === "against-open") {
            openReasonFor = topic;
            renderVoteReopen();
            return;
          }
          if (act === "against-cancel") {
            openReasonFor = null;
            renderVoteReopen();
            return;
          }
          if (act === "against-submit") {
            const panel = content.querySelector(
              `.reasons[data-panel="${cssEsc(topic)}"]`,
            );
            const picked = Array.from(
              panel.querySelectorAll(".reason-opt.sel"),
            ).map((e) => e.dataset.reason);
            const other = panel.querySelector("textarea").value.trim();
            if (other) picked.push("其他：" + other);
            if (!picked.length) {
              toast("⚠️ 請至少選擇一個不同意原因。");
              return;
            }
            cast(
              { mode: "topic", topic, action: "against", reasons: picked },
              btn.dataset.toast,
            );
            return;
          }
          if (act === "depose-submit") {
            submitDepose();
            return;
          }
          if (act === "propose-submit") {
            submitPropose(false);
            return;
          }
          if (act === "ai-review-topic") {
            aiReviewTopic();
            return;
          }
          if (act === "comment-post") {
            submitComment(btn, false);
            return;
          }
          if (act === "comment-ai") {
            submitComment(btn, true);
            return;
          }
          if (act === "analysis-tab") {
            ANALYSIS_TAB = btn.dataset.kind || "bank";
            load();
            return;
          }
          if (act === "ai-analysis") {
            runAnalysis(btn.dataset.kind);
            return;
          }
          if (act === "push-enable") {
            pushEnable();
            return;
          }
          if (act === "push-disable") {
            pushDisable();
            return;
          }
          if (act === "password-change") {
            changePassword();
            return;
          }
          if (act === "logout") {
            doLogout();
            return;
          }
          if (act === "refresh") {
            invalidateCache();
            load();
            return;
          }
        });

        content.addEventListener(
          "toggle",
          function (ev) {
            const box = ev.target.closest && ev.target.closest(".discussion");
            if (!box || !box.open || box.dataset.loaded === "1") return;
            box.dataset.loaded = "1";
            loadComments(box);
          },
          true,
        );

        noticeRoot.addEventListener("click", async function (ev) {
          const btn = ev.target.closest("button[data-notice-id]");
          if (!btn) return;
          const { res, data } = await postJSON(
            "/api/committee/notification/read",
            {
              notification_id: Number(btn.dataset.noticeId),
              notification_title: btn.dataset.noticeTitle || "",
            },
          );
          if (!res.ok) {
            toast("⚠️ " + (data.detail || "未能記錄通知狀態"));
            return;
          }
          noticeRoot.innerHTML = "";
        });

        // Re-render only the topic-vote tab (to open/close a reason panel) without refetch.
        let LAST_VOTE_DATA = null;
        function renderVoteReopen() {
          if (LAST_VOTE_DATA) renderVote(LAST_VOTE_DATA);
        }
        const _origRenderVote = renderVote;
        renderVote = function (data) {
          LAST_VOTE_DATA = data;
          _origRenderVote(data);
        };

        function syncTabs() {
          Array.from(tabsEl.querySelectorAll(".tab")).forEach((b) =>
            b.classList.toggle("active", b.dataset.tab === TAB),
          );
        }
        tabsEl.addEventListener("click", function (ev) {
          const b = ev.target.closest(".tab");
          if (!b) return;
          TAB = b.dataset.tab;
          openReasonFor = null;
          syncTabs();
          load();
        });

        load();
      })();
    </script>
  </body>
</html>
