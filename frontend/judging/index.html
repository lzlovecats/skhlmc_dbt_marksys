<!doctype html>
<html lang="zh-HK"><head><meta charset="utf-8"><title>電子分紙</title><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="theme-color" content="#111827"><link rel="stylesheet" href="/shared/vote-ui.css"><link rel="stylesheet" href="/shared/app-shell.css"><style>
main{width:min(100%,84rem);margin:auto}h1{font-size:2rem;margin:0 0 .45rem}h2{font-size:1.25rem;margin:0 0 .7rem}h3{font-size:1.05rem;margin:1rem 0 .5rem}.intro,.caption{color:var(--muted)}.card{margin-bottom:1rem}.notice{margin:.75rem 0}.notice.ok{border-color:#357a52;color:var(--ok)}.notice.warn{border-color:#927126;color:var(--warn)}.hidden{display:none!important}.login{max-width:48rem;margin:3rem auto}.login form,#loginForm{display:grid;gap:.8rem}.login label,#loginForm label{margin:0}.login button,#loginForm button{width:100%;margin-top:.25rem}.field{margin:.8rem 0}.field label{margin-bottom:.3rem}.summary{display:grid;grid-template-columns:1fr auto;gap:1rem}.panel{display:none}.panel.active{display:block}.score-table{width:100%;border-collapse:collapse;min-width:760px}.table-wrap{overflow-x:auto}th,td{border:1px solid var(--border);padding:.45rem;text-align:left}th{background:var(--surface);color:var(--muted);white-space:nowrap}.score-table input{min-height:2.25rem;padding:.35rem;width:5rem}.free-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:.7rem}.metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:.7rem}.metric{padding:.7rem;border:1px solid var(--border);background:var(--surface);border-radius:8px}.metric .label{font-size:.8rem;color:var(--muted)}.metric .value{font-size:1.2rem;font-weight:700}.actions{display:flex;gap:.65rem;flex-wrap:wrap;margin-top:1rem}.actions button{flex:1 1 12rem}.dialog{position:fixed;inset:0;z-index:50;display:none;place-items:center;padding:1rem;background:#0009}.dialog.show{display:grid}.dialog .card{width:min(36rem,100%);margin:0;box-shadow:0 20px 60px #000}.rank-grid{display:grid;grid-template-columns:1fr 7rem;gap:.6rem;align-items:center}.receipt{max-width:48rem;margin:2rem auto}.bottom-submit{width:100%;margin:0 0 1rem}@media(max-width:700px){h1{font-size:1.65rem}.summary,.metrics{grid-template-columns:1fr}.free-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
</style></head><body><main><a class="back-link" href="/">← 返回主頁</a><h1>電子分紙</h1><p class="intro">完成正反方評分後暫存，最後正式提交。提交後不能修改。</p><details class="guide"><summary>ℹ️ 首次使用指南</summary><ul><li>選擇場次並輸入評判入場密碼。</li><li>輸入評判姓名後，完成正反方評分並分別暫存。</li><li>系統每 120 秒自動暫存；正式提交後可選擇填寫最佳辯論員排名。</li></ul></details><div id="loading" class="notice">載入中…</div><section id="choose" class="card hidden"><h2>選擇比賽場次</h2><div class="field"><label for="match">請選擇比賽場次</label><select id="match"></select></div><div id="closed" class="notice warn hidden"></div><form id="loginForm"><label for="password">評判入場密碼</label><input id="password" type="password" autocomplete="current-password"><div id="loginMsg"></div><button id="loginSubmit" class="primary" type="submit">驗證入場</button></form></section><section id="app" class="hidden"><section class="card"><div class="summary"><div><h2 id="matchTitle"></h2><p id="topic"></p><p id="teams" class="caption"></p></div><div class="actions"><button id="switchMatch" type="button">切換場次</button><button id="logout" type="button">登出評判帳戶</button></div></div><div class="field"><label for="judge">評判姓名</label><input id="judge" autocomplete="name"><div class="caption">請輸入中文全名。系統會統一空格及英文大小寫，以避免重複身份。</div><div class="caption">手機建議橫向使用，以便輸入台上發言及自由辯論表格。</div></div></section><section id="scoreApp" class="hidden"><section class="card"><h2>評分總覽</h2><div id="status" class="metrics"></div><div id="completionHint" class="caption"></div><div id="submitMsg"></div><div class="actions"><button id="submit" class="primary" type="button">正式提交評分</button></div></section><div class="tabs"><button class="tab active" data-side="正方" type="button" id="tabPro"></button><button class="tab" data-side="反方" type="button" id="tabCon"></button></div><section id="panelPro" class="panel active"></section><section id="panelCon" class="panel"></section><button id="submitBottom" class="primary bottom-submit" type="button">正式提交評分</button></section></section><section id="receipt" class="card receipt hidden"></section></main><div id="toast" class="toast"></div><div id="busy" class="busy-overlay"><div class="busy-pill"><span class="spinner"></span>處理中…</div></div><div id="confirm" class="dialog"><section class="card"><h2>最後確認</h2><div id="confirmText"></div><p class="notice warn">請仔細檢查分數，最後確定後將無法修改。</p><div class="actions"><button id="confirmSubmit" class="primary" type="button">最後確定</button><button id="cancelSubmit" type="button">取消</button></div></section></div><div id="ranking" class="dialog"><section class="card"><h2>最佳辯論員排名</h2><p class="caption">請為 8 位辯員排出名次（1 = 最佳，8 = 最低）；可略過。</p><button id="autoRank" type="button">📊 自動根據發言分數填入排名</button><div id="rankRows" class="rank-grid"></div><div id="rankMsg"></div><div class="actions"><button id="saveRank" class="primary" type="button">提交排名</button><button id="skipRank" type="button">略過</button></div></section></div><div id="leaveConfirm" class="dialog"><section class="card"><h2 id="leaveTitle">確認離開</h2><p id="leaveText" class="notice warn"></p><div class="actions"><button id="leaveYes" class="primary" type="button">確認</button><button id="leaveNo" type="button">取消</button></div></section></div><script src="/shared/vote-ui.js"></script><script>
(()=>{"use strict";const $=id=>document.getElementById(id),S={matches:[],match:null,judge:"",drafts:{正方:null,反方:null},saved:{正方:false,反方:false},savedAt:{正方:"",反方:""},config:null,final:null};let speech=[],free=[];const roles=['主辯','一副','二副','結辯'];const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const busy=v=>VoteUI.setBusy($('busy'),v),toast=t=>VoteUI.toast($('toast'),t),msg=(id,t,k='warn')=>$(id).innerHTML=t?`<div class="notice ${k}">${esc(t)}</div>`:'';async function api(url,body,method='POST'){const r=await fetch(url,{method,credentials:'same-origin',headers:body?{'Content-Type':'application/json'}:{},body:body?JSON.stringify(body):undefined}),d=await r.json();if(!r.ok)throw Error(d.detail||d.message||'操作失敗。');return d}function sideKey(side){return side==='正方'?'pro':'con'}function hhmmss(value){if(!value)return'';const d=new Date(value);return Number.isNaN(d.getTime())?String(value).slice(11,19):d.toLocaleTimeString('zh-HK',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'})}function zeroWarnings(side=''){const root=side?$(side==='正方'?'panelPro':'panelCon'):$('scoreApp');return [...root.querySelectorAll('input[type=number]')].filter(x=>!x.id.endsWith('-deduct')&&Number(x.value)===0)}function blank(side){const key=sideKey(side);return{team_name:S.match[key+'_team']||side,raw_df_a:roles.map((role,i)=>Object.fromEntries([['辯位',role],['姓名',S.match[key+'_'+(i+1)]||''],...speech.map(([n])=>[n,0])])),raw_df_b:[Object.fromEntries(free.map(([n])=>[n,0]))],deduction:0,coherence:0}}function val(id){return Math.max(0,Number($(id)?.value)||0)}function data(side){const key=sideKey(side),a=roles.map((role,i)=>Object.fromEntries([['辯位',role],['姓名',S.match[key+'_'+(i+1)]||''],...speech.map(([n,,w])=>[n,val(`${key}-s-${i}-${n}`)])])),b=Object.fromEntries(free.map(([n])=>[n,val(`${key}-f-${n}`)]));return{team_name:S.match[key+'_team']||side,raw_df_a:a,raw_df_b:[b],deduction:val(`${key}-deduct`),coherence:val(`${key}-cohere`)}}function totalsData(d){const ind=d.raw_df_a.map(row=>speech.reduce((x,[n,,w])=>x+(Number(row[n])||0)*w,0)),a=ind.reduce((x,y)=>x+y,0),b=free.reduce((x,[n])=>x+(Number(d.raw_df_b[0][n])||0),0),f=a+b-(Number(d.deduction)||0)+(Number(d.coherence)||0);return{a,b,f,ind}}function totals(side){return totalsData(data(side))}function renderSide(side){const key=sideKey(side),d=S.drafts[side]||blank(side),total=totalsData(d);const rows=d.raw_df_a.map((row,i)=>`<tr><td>${roles[i]}</td><td>${esc(row['姓名'])}</td>${speech.map(([n,max])=>`<td><input id="${key}-s-${i}-${n}" type="number" min="0" max="${max}" value="${row[n]??0}"></td>`).join('')}</tr>`).join('');const fields=free.map(([n,max])=>`<div><label>${n}</label><input id="${key}-f-${n}" type="number" min="0" max="${max}" value="${d.raw_df_b[0][n]??0}"></div>`).join('');$(`panel${side==='正方'?'Pro':'Con'}`).innerHTML=`<section class="card"><h2>（甲）台上發言 - ${side}</h2><div class="table-wrap"><table class="score-table"><thead><tr><th>辯位</th><th>姓名</th>${speech.map(([n])=>`<th>${n}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div><p class="caption">總分：<span id="${key}-speech">${total.a}</span> / ${S.config.speech_total_max}</p><h3>（乙）自由辯論</h3><div class="free-grid">${fields}</div><p class="caption">總分：<span id="${key}-free">${total.b}</span> / ${S.config.free_debate_max}</p><h3>（丙）扣分及內容連貫</h3><div class="free-grid"><div><label>扣分總和</label><input id="${key}-deduct" type="number" min="0" value="${d.deduction??0}"></div><div><label>內容連貫 (${S.config.coherence_max})</label><input id="${key}-cohere" type="number" min="0" max="${S.config.coherence_max}" value="${d.coherence??0}"></div></div><div class="actions"><div class="metric"><div class="label">目前總分</div><div class="value" id="${key}-total">${total.f} / ${S.config.grand_total}</div></div><button data-save="${side}" class="primary" type="button">暫存${side}評分</button></div><p class="caption" id="${key}-saved">上次儲存：${esc(hhmmss(d.last_saved)||"尚未儲存")}</p></section>`;document.querySelectorAll(`#panel${side==='正方'?'Pro':'Con'} input`).forEach(i=>i.oninput=()=>refresh(side))}function refresh(side){const t=totals(side),key=sideKey(side);$(`${key}-speech`).textContent=t.a;$(`${key}-free`).textContent=t.b;$(`${key}-total`).textContent=`${t.f} / ${S.config.grand_total}`;S.saved[side]=false;renderStatus()}function renderStatus(){const p=totals('正方'),c=totals('反方'),ok=S.saved.正方&&S.saved.反方&&S.judge;$('status').innerHTML=[[`正方（${S.match.pro_team||'未填寫'}）`,S.saved.正方?'已暫存':'未暫存'],[`反方（${S.match.con_team||'未填寫'}）`,S.saved.反方?'已暫存':'未暫存'],['提交狀態',ok?'可提交':'未完成']].map(x=>`<div class="metric"><div class="label">${esc(x[0])}</div><div class="value">${esc(x[1])}</div></div>`).join('');$('submit').disabled=!ok}async function save(side,silent=false){if(!S.judge)throw Error('請輸入評判姓名！');const out=await api('/api/judging/draft',{judge_name:S.judge,side,score_data:data(side)});S.drafts[side]=out.score_data;S.saved[side]=true;S.savedAt[side]=out.score_data.last_saved||'';const cap=$(sideKey(side)+'-saved');if(cap)cap.textContent='上次儲存：'+hhmmss(S.savedAt[side]);renderStatus();if(!silent){const zeros=zeroWarnings(side);toast(zeros.length?`⚠️ 已暫存${side}；仍有 ${zeros.length} 個評分項目為 0 分。`:`✅ 已暫存${side}評分`)}}async function state(){const d=await api('/api/judging/state?judge_name='+encodeURIComponent(S.judge),null,'GET');S.match=d.match;S.drafts=d.drafts;S.saved={正方:!!d.drafts.正方,反方:!!d.drafts.反方};S.savedAt={正方:d.drafts.正方?.last_saved||'',反方:d.drafts.反方?.last_saved||''};if(d.submitted)throw Error('你已提交過評分！無法修改評分！');render()}function render(){ $('matchTitle').textContent=`已進入場次：${S.match.match_id}`;$('topic').innerHTML=`<strong>辯題：</strong> ${esc(S.match.topic_text||'（未輸入辯題）')}`;$('teams').textContent=`正方：${S.match.pro_team||'未填寫'} ｜ 反方：${S.match.con_team||'未填寫'}`;$('choose').classList.add('hidden');$('app').classList.remove('hidden');$('scoreApp').classList.toggle('hidden',!S.judge);$('judge').value=S.judge;renderSide('正方');renderSide('反方');$('tabPro').textContent=`正方：${S.match.pro_team||'未填寫'}`;$('tabCon').textContent=`反方：${S.match.con_team||'未填寫'}`;renderStatus()}function receipt(){const p=S.final.pro,c=S.final.con;$('ranking').classList.remove('show');$('receipt').innerHTML=`<h2>評分已成功上傳至雲端。</h2><p>場次：${esc(S.match.match_id)}</p><p>評判：${esc(S.judge)}</p><div class="metrics"><div class="metric"><div class="label">正方總分</div><div class="value">${p.final_total} / ${S.config.grand_total}</div></div><div class="metric"><div class="label">反方總分</div><div class="value">${c.final_total} / ${S.config.grand_total}</div></div></div><button id="backLogin" class="primary" type="button">返回評判登入</button>`;$('receipt').classList.remove('hidden');$('app').classList.add('hidden');$('backLogin').onclick=()=>location.reload()}function ranks(){const slots=[['pro',1,'正方主辯'],['pro',2,'正方一副'],['pro',3,'正方二副'],['pro',4,'正方結辯'],['con',1,'反方主辯'],['con',2,'反方一副'],['con',3,'反方二副'],['con',4,'反方結辯']];$('rankRows').innerHTML=slots.map(([s,p,r])=>`<label>${r}（${esc(S.match[`${s}_${p}`]||'')}）</label><select data-rank="${s}-${p}">${[1,2,3,4,5,6,7,8].map(n=>`<option value="${n}">${n}</option>`).join('')}</select>`).join('');$('ranking').classList.add('show');$('autoRank').onclick=()=>{const all=[...totals('正方').ind,...totals('反方').ind].map((score,i)=>({score,i})).sort((a,b)=>b.score-a.score);all.forEach((x,i)=>document.querySelector(`[data-rank="${x.i<4?'pro':'con'}-${x.i%4+1}"]`).value=i+1)}}async function init(){try{const [d,cfg]=await Promise.all([api('/api/judging/matches',null,'GET'),api('/api/judging/config',null,'GET')]);S.config=cfg;speech=cfg.speech.map(x=>[x.column,x.max,x.weight]);free=cfg.free_debate.map(x=>[x.column,x.max]);S.matches=d.matches;$('match').innerHTML=S.matches.map(m=>`<option value="${esc(m.match_id)}" ${m.is_open?'':'disabled'}>${esc(m.match_id)}${m.is_open?'':'（未開放）'}</option>`).join('');$('loading').classList.add('hidden');$('choose').classList.remove('hidden')}catch(e){$('loading').textContent=e.message}}$('loginForm').onsubmit=async e=>{e.preventDefault();busy(true);try{await api('/api/judging/login',{match_id:$('match').value,password:$('password').value});S.match=S.matches.find(m=>m.match_id===$('match').value);$('choose').classList.add('hidden');render();toast('✅ 已驗證入場')}catch(x){msg('loginMsg',x.message)}finally{busy(false)}};$('judge').onchange=async()=>{S.judge=$('judge').value.trim();if(!S.judge){render();return}busy(true);try{await state();toast('☁️ 已檢查雲端暫存')}catch(e){msg('submitMsg',e.message)}finally{busy(false)}};document.addEventListener('click',e=>{const b=e.target.closest('[data-save]');if(b){busy(true);save(b.dataset.save).catch(x=>msg('submitMsg',x.message)).finally(()=>busy(false))}});document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b));$('panelPro').classList.toggle('active',b.dataset.side==='正方');$('panelCon').classList.toggle('active',b.dataset.side==='反方')});$('submit').onclick=()=>{const p=totals('正方').f,c=totals('反方').f,winner=p>c?'正方勝出':c>p?'反方勝出':'雙方同分',zeros=zeroWarnings();$('confirmText').innerHTML=`正方：${p} / ${S.config.grand_total}<br>反方：${c} / ${S.config.grand_total}<p><strong>預計結果：${winner}</strong></p>${zeros.length?'<div class="notice warn">尚有 '+zeros.length+' 個評分項目為 0 分，請確認並非漏填。</div>':''}`;$('confirm').classList.add('show')};$('cancelSubmit').onclick=()=>$('confirm').classList.remove('show');$('confirmSubmit').onclick=async()=>{busy(true);try{S.final=await api('/api/judging/submit',{judge_name:S.judge,pro_data:data('正方'),con_data:data('反方')});$('confirm').classList.remove('show');ranks()}catch(e){msg('submitMsg',e.message)}finally{busy(false)}};$('saveRank').onclick=async()=>{const rankings=[...document.querySelectorAll('[data-rank]')].map(el=>{const [side,position]=el.dataset.rank.split('-');return{side,position:Number(position),rank:Number(el.value)}});busy(true);try{await api('/api/judging/rankings',{judge_name:S.judge,rankings});receipt()}catch(e){msg('rankMsg',e.message)}finally{busy(false)}};$('skipRank').onclick=receipt;$('switchMatch').onclick=async()=>{if(S.judge&&(!S.saved.正方||!S.saved.反方)&&!confirm('切換場次前，請確認評分已暫存。確定離開？'))return;await api('/api/judging/logout',{});location.reload()};$('logout').onclick=async()=>{await api('/api/judging/logout',{});location.reload()};setInterval(()=>{if(S.judge&&S.match&&!S.final){save('正方',true).catch(()=>{});save('反方',true).catch(()=>{})}},120000);init()})();
</script><script src="/shared/judging-ux.js?v=4.0.3-judging"></script></body></html>
