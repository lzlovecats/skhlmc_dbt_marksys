<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: transparent;
        color: #e5e7eb;
      }
      .rec-wrap {
        border: 1px solid #2f3b52;
        border-radius: 8px;
        background: #111827;
        padding: 14px;
      }
      .rec-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .status {
        font-size: 14px;
        color: #cbd5e1;
      }
      .badge {
        display: inline-block;
        margin-right: 8px;
        padding: 3px 8px;
        border-radius: 999px;
        background: #374151;
        color: #e5e7eb;
        font-size: 12px;
        font-weight: 700;
      }
      .badge.recording {
        background: #dc2626;
        color: white;
      }
      .badge.ready {
        background: #047857;
        color: white;
      }
      .talk-btn {
        width: 100%;
        min-height: 72px;
        margin-top: 12px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        font-size: 22px;
        font-weight: 800;
        cursor: pointer;
      }
      .talk-btn:hover {
        background: #1d4ed8;
      }
      .talk-btn.recording {
        background: #dc2626;
      }
      .talk-btn.recording:hover {
        background: #b91c1c;
      }
      .talk-btn:disabled {
        background: #4b5563;
        cursor: not-allowed;
      }
      .hint {
        margin-top: 8px;
        color: #94a3b8;
        font-size: 13px;
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .secondary {
        flex: 1;
        border: 1px solid #475569;
        border-radius: 8px;
        background: #1f2937;
        color: #e5e7eb;
        padding: 9px 10px;
        cursor: pointer;
      }
      .secondary:hover {
        background: #273449;
      }
      @media (max-width: 560px) {
        .rec-top {
          align-items: stretch;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="rec-wrap">
      <div class="rec-top">
        <div class="status">
          <span class="badge" id="badge">未錄音</span
          ><span id="status">按「開始錄音」後發言。</span>
        </div>
        <div class="status" id="timer">00:00</div>
      </div>
      <button class="talk-btn" id="recordBtn">開始錄音</button>
      <div class="hint" id="hint">
        完成發言後按「完成並送出」，錄音會送到上方表單等候分析。
      </div>
      <div class="actions">
        <button class="secondary" id="clearBtn">清除錄音</button>
      </div>
    </div>
    <script>
      let args = {};
      let stream = null;
      let recorder = null;
      let chunks = [];
      let startedAt = 0;
      let timerHandle = null;
      let firedBells = new Set();
      let bellBuffer = null;
      let bellLoading = null;
      let bellCtx = null;
      let wavCtx = null;
      let wavSource = null;
      let wavProcessor = null;
      let wavChunks = [];
      let wavSampleRate = 44100;

      const badgeEl = document.getElementById("badge");
      const statusEl = document.getElementById("status");
      const timerEl = document.getElementById("timer");
      const hintEl = document.getElementById("hint");
      const recordBtn = document.getElementById("recordBtn");
      const clearBtn = document.getElementById("clearBtn");

      function sendValue(value) {
        window.parent.postMessage(
          {
            isStreamlitMessage: true,
            type: "streamlit:setComponentValue",
            value: value,
          },
          "*",
        );
      }

      function setFrameHeight() {
        window.parent.postMessage(
          {
            isStreamlitMessage: true,
            type: "streamlit:setFrameHeight",
            height: document.body.scrollHeight,
          },
          "*",
        );
      }

      function sendReady() {
        window.parent.postMessage(
          {
            isStreamlitMessage: true,
            type: "streamlit:componentReady",
            apiVersion: 1,
          },
          "*",
        );
      }

      function formatTime(seconds) {
        const mins = Math.max(0, Math.floor(seconds / 60));
        const secs = Math.max(0, seconds % 60);
        return (
          String(mins).padStart(2, "0") + ":" + String(secs).padStart(2, "0")
        );
      }

      function getBellSchedule() {
        return Array.isArray(args.bell_schedule) ? args.bell_schedule : [];
      }

      function getBellSrc() {
        return args.bell_src || "";
      }

      function getOutputFormat() {
        return String(args.output_format || "").toLowerCase();
      }

      function getBellCtx() {
        if (!bellCtx)
          bellCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (bellCtx.state === "suspended") bellCtx.resume();
        return bellCtx;
      }

      async function loadBell() {
        const bellSrc = getBellSrc();
        if (!bellSrc) return null;
        if (!bellLoading) {
          bellLoading = fetch(bellSrc)
            .then((resp) => resp.arrayBuffer())
            .then((arr) => getBellCtx().decodeAudioData(arr))
            .then((buffer) => {
              bellBuffer = buffer;
              return buffer;
            })
            .catch(() => null);
        }
        return bellLoading;
      }

      function playTone(count) {
        const ctx = getBellCtx();
        for (let i = 0; i < count; i++) {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.frequency.value = 880;
          gain.gain.setValueAtTime(0.0001, ctx.currentTime + i * 0.8);
          gain.gain.exponentialRampToValueAtTime(
            0.4,
            ctx.currentTime + i * 0.8 + 0.02,
          );
          gain.gain.exponentialRampToValueAtTime(
            0.0001,
            ctx.currentTime + i * 0.8 + 0.28,
          );
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(ctx.currentTime + i * 0.8);
          osc.stop(ctx.currentTime + i * 0.8 + 0.3);
        }
      }

      async function playBell(count) {
        const ctx = getBellCtx();
        if (ctx.state === "suspended") await ctx.resume();
        if (!bellBuffer) await loadBell();
        if (!bellBuffer) {
          playTone(count);
          return;
        }
        for (let i = 0; i < count; i++) {
          const src = ctx.createBufferSource();
          const gain = ctx.createGain();
          src.buffer = bellBuffer;
          gain.gain.value = 5.0;
          src.connect(gain);
          gain.connect(ctx.destination);
          src.start(ctx.currentTime + i * 0.8);
        }
      }

      function fireBellOnce(key, rings) {
        if (firedBells.has(key)) return;
        firedBells.add(key);
        playBell(rings);
      }

      function updateTimer() {
        const seconds = Math.floor((Date.now() - startedAt) / 1000);
        timerEl.textContent = formatTime(seconds);
        getBellSchedule().forEach((bell, index) => {
          if (seconds >= Number(bell.t || 0)) {
            fireBellOnce("bell-" + index, Number(bell.rings || 1));
          }
        });
      }

      function setIdle() {
        badgeEl.textContent = "未錄音";
        badgeEl.className = "badge";
        statusEl.textContent = "按「開始錄音」後發言。";
        recordBtn.textContent = "開始錄音";
        recordBtn.className = "talk-btn";
        recordBtn.disabled = false;
      }

      function setRecording() {
        badgeEl.textContent = "錄音中";
        badgeEl.className = "badge recording";
        statusEl.textContent = "正在收音，完成後按送出。";
        recordBtn.textContent = "完成並送出";
        recordBtn.className = "talk-btn recording";
      }

      function setReady(size) {
        badgeEl.textContent = "已錄音";
        badgeEl.className = "badge ready";
        statusEl.textContent = "錄音已準備好。";
        hintEl.textContent =
          "錄音大小：約 " +
          Math.round(size / 1024) +
          " KB。可按下方「分析發言」。";
        recordBtn.textContent = "重新錄音";
        recordBtn.className = "talk-btn";
        recordBtn.disabled = false;
      }

      function floatTo16BitPCM(float32) {
        const pcm = new Int16Array(float32.length);
        for (let i = 0; i < float32.length; i++) {
          const s = Math.max(-1, Math.min(1, float32[i]));
          pcm[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
        }
        return pcm;
      }

      function encodeWav(buffers, sampleRate) {
        let length = 0;
        buffers.forEach((buf) => {
          length += buf.length;
        });
        const samples = new Float32Array(length);
        let offset = 0;
        buffers.forEach((buf) => {
          samples.set(buf, offset);
          offset += buf.length;
        });
        const pcm = floatTo16BitPCM(samples);
        const wav = new ArrayBuffer(44 + pcm.byteLength);
        const view = new DataView(wav);
        function writeString(pos, str) {
          for (let i = 0; i < str.length; i++)
            view.setUint8(pos + i, str.charCodeAt(i));
        }
        writeString(0, "RIFF");
        view.setUint32(4, 36 + pcm.byteLength, true);
        writeString(8, "WAVE");
        writeString(12, "fmt ");
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(36, "data");
        view.setUint32(40, pcm.byteLength, true);
        const bytes = new Uint8Array(wav, 44);
        bytes.set(new Uint8Array(pcm.buffer));
        return new Blob([wav], { type: "audio/wav" });
      }

      async function stopWavNodes() {
        try {
          if (wavProcessor) wavProcessor.disconnect();
        } catch (e) {}
        try {
          if (wavSource) wavSource.disconnect();
        } catch (e) {}
        try {
          if (wavCtx) await wavCtx.close();
        } catch (e) {}
        wavProcessor = null;
        wavSource = null;
        wavCtx = null;
      }

      async function startRecording() {
        try {
          // For WAV (TTS training) we want the rawest possible mic signal, so we
          // disable the browser DSP that would otherwise colour the recording.
          const audioConstraints =
            getOutputFormat() === "wav"
              ? {
                  echoCancellation: false,
                  noiseSuppression: false,
                  autoGainControl: false,
                  channelCount: 1,
                }
              : true;
          stream = await navigator.mediaDevices.getUserMedia({
            audio: audioConstraints,
          });
          chunks = [];
          wavChunks = [];
          if (getOutputFormat() === "wav") {
            wavCtx = new (window.AudioContext || window.webkitAudioContext)();
            await wavCtx.resume();
            wavSampleRate = wavCtx.sampleRate;
            wavSource = wavCtx.createMediaStreamSource(stream);
            wavProcessor = wavCtx.createScriptProcessor(4096, 1, 1);
            wavProcessor.onaudioprocess = (event) => {
              const raw = event.inputBuffer.getChannelData(0);
              wavChunks.push(new Float32Array(raw));
            };
            wavSource.connect(wavProcessor);
            wavProcessor.connect(wavCtx.destination);
            recorder = { state: "recording", stop: stopWavRecording };
          } else {
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = (ev) => {
              if (ev.data && ev.data.size) chunks.push(ev.data);
            };
            recorder.onstop = async () => {
              if (timerHandle) clearInterval(timerHandle);
              timerHandle = null;
              if (stream) stream.getTracks().forEach((track) => track.stop());
              const mimeType = recorder.mimeType || "audio/webm";
              const blob = new Blob(chunks, { type: mimeType });
              const reader = new FileReader();
              reader.onloadend = () => {
                const result = String(reader.result || "");
                const base64 = result.includes(",")
                  ? result.split(",")[1]
                  : result;
                setReady(blob.size);
                sendValue({
                  audio_base64: base64,
                  mime_type: mimeType,
                  size: blob.size,
                  duration_seconds: Math.max(
                    0,
                    Math.round((Date.now() - startedAt) / 1000),
                  ),
                  recorded_at: Date.now(),
                });
                setFrameHeight();
              };
              reader.readAsDataURL(blob);
            };
            recorder.start();
          }
          startedAt = Date.now();
          firedBells.clear();
          setRecording();
          updateTimer();
          timerHandle = setInterval(updateTimer, 250);
        } catch (e) {
          badgeEl.textContent = "錯誤";
          badgeEl.className = "badge recording";
          statusEl.textContent = "未能使用麥克風：" + e.message;
        }
      }

      async function stopWavRecording() {
        if (!recorder || recorder.state !== "recording") return;
        recorder.state = "inactive";
        if (timerHandle) clearInterval(timerHandle);
        timerHandle = null;
        if (stream) stream.getTracks().forEach((track) => track.stop());
        await stopWavNodes();
        const blob = encodeWav(wavChunks, wavSampleRate);
        const reader = new FileReader();
        reader.onloadend = () => {
          const result = String(reader.result || "");
          const base64 = result.includes(",") ? result.split(",")[1] : result;
          setReady(blob.size);
          sendValue({
            audio_base64: base64,
            mime_type: "audio/wav",
            size: blob.size,
            duration_seconds: Math.max(
              0,
              Math.round((Date.now() - startedAt) / 1000),
            ),
            recorded_at: Date.now(),
          });
          setFrameHeight();
        };
        reader.readAsDataURL(blob);
      }

      function stopRecording() {
        if (recorder && recorder.state !== "inactive") {
          recorder.stop();
        }
      }

      recordBtn.addEventListener("click", () => {
        if (recorder && recorder.state === "recording") {
          stopRecording();
        } else {
          startRecording();
        }
      });

      clearBtn.addEventListener("click", () => {
        if (recorder && recorder.state === "recording") stopRecording();
        if (timerHandle) clearInterval(timerHandle);
        timerHandle = null;
        chunks = [];
        wavChunks = [];
        firedBells.clear();
        timerEl.textContent = "00:00";
        hintEl.textContent =
          "完成發言後按「完成並送出」，錄音會送到上方表單等候分析。";
        setIdle();
        sendValue(null);
      });

      window.addEventListener("message", (event) => {
        const data = event.data || {};
        if (data.type === "streamlit:render") {
          args = data.args || {};
          setFrameHeight();
        }
      });

      setIdle();
      sendReady();
      setFrameHeight();
    </script>
  </body>
</html>
