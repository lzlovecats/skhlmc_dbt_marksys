        if (!overallStartedAt) return;
        const startEpoch = ++sessionEpoch;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        setTalkEnabled(false);
        showRetry(false);
        setState("連線中", "正在連接 Gemini Live...", "wait", true);
        setSubstatus("連線完成後會要求麥克風權限。");
        const nextOutputCtx = new (
          window.AudioContext || window.webkitAudioContext
        )();
        outputCtx = nextOutputCtx;
        try {
          await nextOutputCtx.resume();
          if (liveRunIsStale(startEpoch)) return;
          await prepareBell();
          if (liveRunIsStale(startEpoch)) return;
          const token = await getLiveSessionToken(0, startEpoch);
          if (!token || liveRunIsStale(startEpoch)) return;
        } catch (e) {
          if (liveRunIsStale(startEpoch)) return;
          throw e;
        }
        if (liveRunIsStale(startEpoch)) return;
        currentSessionIdx = 0;
        openSessionWs();
      }

      function currentToken() {
        return liveSessionTokens[currentSessionIdx] || "";
      }

      function googleDurationMs(value) {
        if (typeof value === "number" && Number.isFinite(value))
          return Math.max(0, value * 1000);
        if (typeof value === "string") {
          const match = value.trim().match(/^([0-9]+(?:\.[0-9]+)?)s$/);
          return match ? Number(match[1]) * 1000 : 0;
        }
        if (value && typeof value === "object") {
          const seconds = Number(value.seconds || 0);
          const nanos = Number(value.nanos || 0);
          return Math.max(0, seconds * 1000 + nanos / 1e6);
        }
        return 0;
      }

      function currentResumptionHandle() {
        return sessionResumptionHandles[currentSessionIdx] || "";
      }

      function clearSetupWatchdog(expectedSessionEpoch) {
        if (
          expectedSessionEpoch !== undefined &&
          expectedSessionEpoch !== sessionEpoch
        )
          return;
        if (setupWatchdogTimer) clearTimeout(setupWatchdogTimer);
        setupWatchdogTimer = null;
      }

      function startSetupWatchdog(expectedSessionEpoch) {
        clearSetupWatchdog();
        setupWatchdogTimer = setTimeout(() => {
          setupWatchdogTimer = null;
          if (
            expectedSessionEpoch !== sessionEpoch ||
            manualStopping ||
            hardDeadlineReached
          )
            return;
          const message =
            "Gemini Live 連線設定逾時，未收到 Google 完成設定確認。";
          if (pendingSessionHandoff || !currentResumptionHandle()) {
            failLiveConnection(message + " 請返回重新建立練習。");
            return;
          }
          reconnectingSession = true;
          setState("設定逾時", message + " 正在保留狀態並重新連線…", "wait", true);
          setSubstatus("發言預算、鈴聲、逐字稿及章節進度不會重設。");
          try {
            if (
              ws &&
              (ws.readyState === WebSocket.OPEN ||
                ws.readyState === WebSocket.CONNECTING)
            ) {
              ws.close(4000, "setup timeout");
              return;
            }
          } catch (error) {}
          scheduleSessionReconnect("Live 設定逾時，正在自動恢復…", 0);
        }, SETUP_COMPLETE_TIMEOUT_MS);
      }

      function failLiveConnection(message) {
        setState("錯誤", message, "error", false);
        setSubstatus("本節狀態未能再恢復，請重新建立練習。");
        setTalkEnabled(false);
        showRetry(false);
        startBtn.disabled = false;
        startBtn.textContent = MOCK_MODE ? "重新建立Mock" : "重新建立自由辯論";
        stopBtn.disabled = true;
        cleanupMedia(true);
      }

      function scheduleSessionReconnect(reason, delayMs) {
        if (manualStopping || hardDeadlineReached || pendingSessionHandoff)
          return;
        if (!currentResumptionHandle()) {
          failLiveConnection(
            "Gemini 連線中斷，而且未收到可恢復連線憑證；請重新建立練習。",
          );
          return;
        }
        if (reconnectTimer) return;
        reconnectingSession = true;
        talkBtn.disabled = true;
        setState(
          "重新連線",
          reason || "正在恢復 Gemini Live 連線…",
          "wait",
          true,
        );
        setSubstatus("發言時間、鈴聲、逐字稿及目前 Mock 章節會全部保留。");
        const reconnectSessionIdx = currentSessionIdx;
        reconnectTimer = setTimeout(() => {
          reconnectTimer = null;
          if (
            manualStopping ||
            reconnectSessionIdx !== currentSessionIdx ||
            pendingSessionHandoff
          )
            return;
          reconnectAttempts += 1;
          if (reconnectAttempts > 4) {
            failLiveConnection("Gemini Live 多次重新連線失敗，請檢查網絡後重新建立練習。");
            return;
          }
          openSessionWs();
        }, Math.max(0, Number(delayMs || 0)));
      }

      function clearGoAwayReconnectTimer() {
        if (goAwayReconnectTimer) clearTimeout(goAwayReconnectTimer);
        goAwayReconnectTimer = null;
      }

      function scheduleGoAwayReconnect(timeLeft) {
        if (manualStopping || pendingSessionHandoff) return;
        clearGoAwayReconnectTimer();
        const goAwaySessionEpoch = sessionEpoch;
        const timeLeftMs = googleDurationMs(timeLeft);
        const delay = Math.max(0, Math.min(5000, timeLeftMs - 1500));
        setState(
          "保持連線",
          "Google 即將更新連線，系統會自動接力。",
          "wait",
          true,
        );
        setSubstatus("目前時間、鈴聲、逐字稿及發言預算不會重設。");
        const scheduledTimer = setTimeout(() => {
          // A cleared timer can already be queued in the browser event loop.
          // Never let that stale callback clear or close a newer session.
          if (goAwayReconnectTimer !== scheduledTimer) return;
          goAwayReconnectTimer = null;
          if (
            goAwaySessionEpoch !== sessionEpoch ||
            manualStopping ||
            pendingSessionHandoff
          )
            return;
          if (!currentResumptionHandle()) {
            failLiveConnection(
              "Google 要求更新連線，但未提供可恢復憑證；請重新建立練習。",
            );
            return;
          }
          reconnectingSession = true;
          try {
            if (
              ws &&
              (ws.readyState === WebSocket.OPEN ||
                ws.readyState === WebSocket.CONNECTING)
            ) {
              ws.close(1000, "session resumption");
              return;
            }
          } catch (error) {}
          scheduleSessionReconnect("正在按 Google 指示恢復連線…", 0);
        }, delay);
        goAwayReconnectTimer = scheduledTimer;
      }

      function onConnectionResumed() {
        clearGoAwayReconnectTimer();
        reconnectingSession = false;
        reconnectAttempts = 0;
        if (reconnectTimer) clearTimeout(reconnectTimer);
        reconnectTimer = null;
        if (pendingTokenHandoffRecovery) {
          recoverMockAfterAbortedHandoff(
            pendingTokenHandoffRecovery.generation,
            pendingTokenHandoffRecovery.resumeTimer,
          );
        }
        addLine("系統", "Gemini Live 連線已恢復，所有計時及進度已保留。", false);
        if (feedbackPromptShown || finalFeedbackRequested) {
          setTalkEnabled(false);
          showFeedbackButton(feedbackPromptShown && !finalFeedbackRequested);
          setState(
            finalFeedbackRequested ? "總結評價" : "等待評價",
            finalFeedbackRequested
              ? "連線已恢復，正在等待 AI 總結評價。"
              : "連線已恢復，請按「要求 AI 評價」。",
            "wait",
            Boolean(finalFeedbackRequested),
          );
          return;
        }
        if (isRecording) {
          if (!MOCK_MODE) userSpeechStartedAt = Date.now();
          try {
            ws.send(JSON.stringify({ realtimeInput: { activityStart: {} } }));
          } catch (error) {}
          talkBtn.disabled = false;
          setState("正在聽", "連線已恢復，請繼續發言。", "listen", false);
          return;
        }
        if (isWaiting || responsePurpose !== null || activeAiLine) {
          setState("等待 AI", "連線已恢復，繼續等待 AI 回覆。", "wait", true);
          startWaitTimer();
          return;
        }
        setState("準備好", "連線已恢復，輪到你。", "ready", false);
        setSubstatus("按下開始錄音，完成發言後再按下送出。");
        setTalkEnabled(true);
      }

      function openSessionWs() {
        clearGoAwayReconnectTimer();
        const openedSessionEpoch = ++sessionEpoch;
        const openedSessionIdx = currentSessionIdx;
        const token = currentToken();
        if (!token) {
          failLiveConnection("未能取得 Gemini Live 連線憑證。");
          return;
        }
        try {
          ws = new WebSocket(buildWsUrl(token));
        } catch (error) {
          failLiveConnection("瀏覽器未能建立 Gemini Live 連線：" + error.message);
          return;
        }
        startSetupWatchdog(openedSessionEpoch);
        ws.onopen = () => {
          if (openedSessionEpoch !== sessionEpoch) return;
          try {
            sendSetup();
          } catch (error) {
            failLiveConnection("未能送出 Gemini Live 設定：" + error.message);
            return;
          }
          if (!feedbackPromptShown && !finalFeedbackRequested)
            setState("連線中", "已連線，等待 Gemini Live 設定...", "wait", true);
        };
        ws.onmessage = async (event) => {
          if (openedSessionEpoch !== sessionEpoch) return;
          let data = event.data;
          if (data instanceof Blob) data = await data.text();
          if (data instanceof ArrayBuffer)
            data = new TextDecoder().decode(data);
          if (openedSessionEpoch !== sessionEpoch) return;
          let msg = null;
          try {
            msg = JSON.parse(data);
          } catch (e) {
            console.error("[Live] JSON parse error:", e, data);
            return;
          }
          if (
            pendingSessionHandoff &&
            openedSessionIdx !== currentSessionIdx
          )
            return;
          const setupComplete = Object.prototype.hasOwnProperty.call(
            msg,
            "setupComplete",
          );
          const resumptionUpdate = msg.sessionResumptionUpdate;
          if (
            resumptionUpdate &&
            resumptionUpdate.resumable &&
            resumptionUpdate.newHandle
          ) {
            sessionResumptionHandles[openedSessionIdx] =
              resumptionUpdate.newHandle;
          } else if (
            resumptionUpdate &&
            resumptionUpdate.resumable === false
          ) {
            sessionResumptionHandles[openedSessionIdx] = "";
          }
          if (msg.goAway) scheduleGoAwayReconnect(msg.goAway.timeLeft);
          if (setupComplete) {
            clearSetupWatchdog(openedSessionEpoch);
            if (pendingSessionHandoff && MOCK_MODE && micReady) {
              onSessionReconnected();
            } else if (reconnectingSession && micReady) {
              onConnectionResumed();
            } else {
              prepareMicAfterSetup(openedSessionEpoch);
            }
          }
          const sc = msg.serverContent;
          if (!sc) return;
          if (sc.inputTranscription && sc.inputTranscription.text) {
            if (!userLine)
              userLine = addLine("你", "正在轉錄...", true, "pending");
            appendLineText(userLine, sc.inputTranscription.text);
          }
          if (sc.interrupted) resetAiAudioForTurn(true);
          if (
            discardServerResponseUntilTurnSent &&
            (sc.outputTranscription ||
              sc.modelTurn ||
              sc.generationComplete ||
              sc.turnComplete)
          )
            return;
          if (sc.outputTranscription && sc.outputTranscription.text) {
            if (beginAiResponse()) {
              appendLineText(aiLine, sc.outputTranscription.text);
              if (!(responsePurpose === "feedback" && !MOCK_MODE))
                queueAzureTtsText(sc.outputTranscription.text, false);
            }
          }
          if (sc.modelTurn && sc.modelTurn.parts) {
            if (beginAiResponse()) {
              processAiModelTurnParts(sc.modelTurn.parts);
            }
          }
          if (sc.generationComplete && !isDiscardingNormalResponse()) {
            isWaiting = false;
            pauseSpeechTimer();
            clearWaitTimer();
            showRetry(false);
            setState(
              "AI 回覆中",
              responsePurpose === "feedback" && !MOCK_MODE
                ? "AI 已生成 point form 文字評價。"
                : "AI 已生成回覆，正在播放。",
              "reply",
              true,
            );
          }
          if (sc.turnComplete) {
            const completedPurpose =
              responsePurpose ||
              (finalFeedbackRequested && !feedbackPromptQueued
                ? "feedback"
                : "normal");
            const completedResponseEpoch = responseEpoch;
            const discardNormal =
              completedPurpose === "normal" &&
              (feedbackPromptShown || retryPromptQueued);
            const silentFreeFeedback =
              !MOCK_MODE && completedPurpose === "feedback";
            responsePurpose = null;
            if (!discardNormal && !silentFreeFeedback) {
              queueAzureTtsText("", true);
              if (
                azureTtsEnabled &&
                !ttsReceivedText &&
                nativeAudioParts.length
              ) {
                activateNativeTtsFallback(
                  "未收到可用嘅 AI 文字轉錄，今輪會改用 Gemini Live 原生聲音。",
                );
              }
            }
            if (MOCK_MODE) recordTranscriptTurn();
            clearWaitTimer();
            showRetry(false);
            if (feedbackPromptQueued && completedPurpose === "normal") {
              resetAiAudioForTurn(true);
              sendFinalFeedbackPrompt();
              return;
            }
            if (retryPromptQueued && completedPurpose === "normal") {
              finishRetryAfterResponse();
              return;
            }
            finishTurnAfterPlayback(
              completedPurpose === "feedback",
              openedSessionEpoch,
              completedResponseEpoch,
            );
          }
        };
        ws.onerror = (ev) => {
          if (openedSessionEpoch !== sessionEpoch) return;
          console.error("WS error:", ev);
          if (switchingSession) return;
          setState(
            "連線不穩",
            "Gemini Live 網絡暫時不穩，正在等待恢復…",
            "wait",
            true,
          );
          setSubstatus("如 Google 關閉連線，系統會用最新 handle 自動恢復。");
        };
        ws.onclose = (ev) => {
          if (openedSessionEpoch !== sessionEpoch) return;
          clearGoAwayReconnectTimer();
          clearSetupWatchdog(openedSessionEpoch);
          if (switchingSession) {
            if (handoffCloseTimer) clearTimeout(handoffCloseTimer);
            handoffCloseTimer = null;
            switchingSession = false;
            openSessionWs();
            return;
          }
          const message = formatCloseMessage(ev);
          if (closeStatusLocked) {
            closeStatusLocked = false;
            cleanupMedia(false);
            return;
          }
          if (manualStopping) {
            startBtn.disabled = false;
            stopBtn.disabled = true;
            setTalkEnabled(false);
            showRetry(false);
            setState("完成", "自由辯論已停止。", "", false);
            setSubstatus("如要繼續，請重新開始自由辯論。");
            cleanupMedia(false);
            return;
          }
          if (currentResumptionHandle()) {
            if (isRecording && !MOCK_MODE) commitUserSpeechTime();
            const retryDelay = Math.min(
              2000,
              250 * Math.pow(2, reconnectAttempts),
            );
            scheduleSessionReconnect(
              reconnectingSession
                ? "正在恢復 Gemini Live 連線…"
                : "Live 連線中斷，正在自動恢復…",
              retryDelay,
            );
            return;
          }
          failLiveConnection(message);
        };
      }

      function formatCloseMessage(ev) {
        const reason = ev.reason || "";
        const lower = reason.toLowerCase();
        if (
          lower.includes("location") ||
          lower.includes("not supported") ||
          lower.includes("unsupported")
        ) {
          return "目前網絡地區未獲 Google Gemini Live 支援。請先連接至 Google 支援地區網絡／VPN，再重新檢查及建立練習。";
        }
        if (lower.includes("token") || ev.code === 1008) {
          return "一次性 Live 憑證可能已過期或無效，請重新建立練習。";
        }
        if (ev.code === 1006) {
          return "Live 連線意外中斷，而且未能恢復。請檢查網絡後重新建立練習。";
        }
        return (
          "自由辯論已結束（code " +
          ev.code +
          (reason ? "：" + reason : "") +
          "）。"
        );
      }

      function beginTurn() {
        if (!micReady || isRecording || isWaiting) return;
        if (!MOCK_MODE && userSpeechElapsed >= SPEECH_SECONDS) {
          finishFreeDebateForBudget("你方已用完本節發言時間。");
          return;
        }
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          setState(
            "錯誤",
            "Live 連線未開啟，請重新開始自由辯論。",
            "error",
            false,
          );
          return;
        }
        if (inputCtx && inputCtx.state === "suspended") inputCtx.resume();
        if (outputCtx && outputCtx.state === "suspended") outputCtx.resume();
        resetAiAudioForTurn(true);
        ws.send(JSON.stringify({ realtimeInput: { activityStart: {} } }));
        isRecording = true;
        userLine = null;
        aiLine = null;
        recordStartedAt = Date.now();
        if (!MOCK_MODE) userSpeechStartedAt = recordStartedAt;
        talkBtn.className = "talk-btn recording";
        talkBtn.textContent = "完成並送出";
        setState("正在聽", "正在收音，完成發言後按下送出。", "listen", false);
        setSubstatus("請保持一句短發言，適合自由辯論節奏。");
        talkHintEl.textContent = "錄音中 00:00｜按下送出";
        recordTimer = setInterval(() => {
          const seconds = Math.floor((Date.now() - recordStartedAt) / 1000);
          talkHintEl.textContent =
            "錄音中 " + formatTime(seconds) + "｜按下送出";
        }, 200);
      }

      function endTurn() {
        if (!isRecording) return;
        if (!MOCK_MODE) commitUserSpeechTime();
        isRecording = false;
        recordStartedAt = null;
        if (recordTimer) clearInterval(recordTimer);
        recordTimer = null;
        meterEl.style.width = "0%";
        isWaiting = true;
        pauseSpeechTimer();
        talkBtn.disabled = true;
        talkBtn.className = "talk-btn waiting";
        talkBtn.textContent = "等待 AI...";
        talkHintEl.textContent = "已送出，等待 AI 回覆。";
        setState("等待 AI", "已送出，等待 Gemini 轉錄及回覆。", "wait", true);
        setSubstatus("收到 AI 回覆後會自動輪到你。");
        if (!userLine) userLine = addLine("你", "正在轉錄...", true, "pending");
        try {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ realtimeInput: { activityEnd: {} } }));
            discardServerResponseUntilTurnSent = false;
            responsePurpose = "normal";
            responseEpoch += 1;
          }
        } catch (e) {
          setState("錯誤", "送出音訊失敗：" + e.message, "error", false);
          isWaiting = false;
          setTalkEnabled(true);
          resumeSpeechTimer();
          return;
        }
        startWaitTimer();
      }

      function toggleTurn() {
        if (talkBtn.disabled) return;
        if (isRecording) {
          endTurn();
        } else {
          beginTurn();
        }
      }

      function sendTextTurn(text, purpose) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          throw new Error("Live 連線未開啟。");
        }
        ws.send(
          JSON.stringify({
            realtimeInput: { text },
          }),
        );
        // A newly sent text turn owns all subsequent model output. Until this
        // point a retry/resume must keep discarding the abandoned response.
        discardServerResponseUntilTurnSent = false;
        responsePurpose = purpose || "normal";
        responseEpoch += 1;
      }

      function isDiscardingNormalResponse() {
        return (
          (feedbackPromptShown || retryPromptQueued) &&
          responsePurpose === "normal"
        );
      }

      function stopActiveRecording() {
        if (!isRecording) return;
        if (!MOCK_MODE) commitUserSpeechTime();
        isRecording = false;
        recordStartedAt = null;
        if (recordTimer) clearInterval(recordTimer);
        recordTimer = null;
        meterEl.style.width = "0%";
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ realtimeInput: { activityEnd: {} } }));
          responsePurpose = "normal";
          responseEpoch += 1;
        }
      }

      function prepareFinalFeedback(reason) {
        if (finalFeedbackRequested || finalFeedbackComplete) return;
        if (feedbackPromptShown) return;
        feedbackPromptShown = true;
        retryPromptQueued = false;
        pendingAnnounceSeg = null;
        stopMockTicking();
        mockRunning = false;
        pauseSpeechTimer();
        showRetry(false);
        setTalkEnabled(false);
        showFeedbackButton(!reconnectingSession);
        if (MOCK_MODE) {
          mockPrevBtn.disabled = true;
          mockToggleBtn.disabled = true;
          mockNextBtn.disabled = true;
        }
        stopActiveRecording();
        resetAiAudioForTurn(true);
        isWaiting = false;
        isRecording = false;
        talkBtn.textContent = "等待評價";
        talkHintEl.textContent = "請按「要求 AI 評價」取得總結評語。";
        setState("等待評價", reason + " 請按「要求 AI 評價」。", "wait", false);
        setSubstatus("AI 會根據剛才攻防給予總結評語和改善建議。");
        setHint(
          "自由辯論已停止；如要完成練習，請先要求 AI 評價。再按「停止」可直接結束。",
        );
        addLine("系統", reason + " 請按「要求 AI 評價」取得總結評語。", false);
      }

      function buildFeedbackPrompt() {
        if (MOCK_MODE) {
          let p = LIVE_PROMPTS.feedback_mock || "";
          const ctx = buildTranscriptContext();
          if (ctx)
            p += (LIVE_PROMPTS.feedback_mock_context_header || "\n") + ctx;
          return p;
        }
        return LIVE_PROMPTS.feedback_free || "";
      }

      function requestFinalFeedback() {
        if (finalFeedbackRequested) return;
        finalFeedbackRequested = true;
        finalFeedbackComplete = false;
        pauseSpeechTimer();
        showRetry(false);
        showFeedbackButton(false);
        setTalkEnabled(false);
        talkBtn.textContent = "等待評價";
        talkHintEl.textContent = "自由辯論時間已到，正在等待 AI 總結評價。";
        setState("總結評價", "正在請 AI 給予評價。", "reply", true);
        setSubstatus(
          MOCK_MODE
            ? "AI 會根據剛才攻防給予總結評語和改善建議。"
            : "AI 評價會以 point form 文字顯示，不會讀出。",
        );
        setHint("正在等待 AI 總結評價。");
        addLine("系統", "正在請 AI 給予總結評價。", false);

        stopActiveRecording();
        resetAiAudioForTurn(true);
        if (responsePurpose === "normal") {
          feedbackPromptQueued = true;
          isWaiting = true;
          talkHintEl.textContent =
            "正在停止上一輪 AI 回覆，完成後會自動要求總結評價。";
          startFinalFeedbackWaitTimer();
          return;
        }
        sendFinalFeedbackPrompt();
      }

      function sendFinalFeedbackPrompt() {
        feedbackPromptQueued = false;
        try {
          isWaiting = true;
          resetAiAudioForTurn(true);
          userLine = null;
          aiLine = null;
          clearActiveAiLine();
          aiLine = addLine(
            "AI",
            "正在整理評價...",
            false,
            MOCK_MODE ? "pending" : "pending feedback-points",
          );
          sendTextTurn(buildFeedbackPrompt(), "feedback");
          startFinalFeedbackWaitTimer();
        } catch (e) {
          setState(
            "錯誤",
            "未能要求 AI 給予評價：" + e.message,
            "error",
            false,
          );
          setSubstatus("請停止後重新開始自由辯論。");
        }
      }

      function beginAiResponse() {
        if (isDiscardingNormalResponse()) return false;
        const silentFreeFeedback =
          responsePurpose === "feedback" && !MOCK_MODE;
        isWaiting = false;
        pauseSpeechTimer();
        clearWaitTimer();
        showRetry(false);
        setState(
          "AI 回覆中",
          silentFreeFeedback ? "AI 正在整理 point form 文字評價。" : "AI 正在回覆。",
          "reply",
          true,
        );
        setSubstatus(
          silentFreeFeedback
            ? "評價只會顯示文字，不會讀出。"
            : "請聽完 AI 回覆，再開始下一輪。",
        );
        talkBtn.disabled = true;
        talkBtn.className = "talk-btn waiting";
        talkBtn.textContent = "AI 回覆中...";
        talkHintEl.textContent = "AI 回覆完成後會自動解鎖。";
        if (!aiLine) aiLine = addLine("AI", "正在回覆...", false, "pending");
        setActiveAiLine(aiLine);
        return true;
      }

      async function waitForAiPlayback() {
        await waitForTtsDrain();
        const delay =
          outputCtx && playAt > outputCtx.currentTime
            ? Math.ceil((playAt - outputCtx.currentTime) * 1000) + 200
            : 200;
        return new Promise((resolve) => setTimeout(resolve, delay));
      }

      function finishTurnAfterPlayback(
        isFinalFeedbackTurn,
        expectedSessionEpoch,
        expectedResponseEpoch,
      ) {
        waitForAiPlayback()
          .then(() => {
            return new Promise((resolve) => setTimeout(resolve, 200));
          })
          .then(() => {
            if (expectedResponseEpoch !== responseEpoch) return;
            if (reconnectingSession) {
              setTimeout(
                () =>
                  finishTurnAfterPlayback(
                    isFinalFeedbackTurn,
                    expectedSessionEpoch,
                    expectedResponseEpoch,
                  ),
                250,
              );
              return;
            }
            if (!micReady || !ws || ws.readyState !== WebSocket.OPEN) return;
            // 舊normal turn可能已進入playback wait，期間使用者已要求評價。
            // 呢個舊callback不可清走新feedback turn的line/state。
            if (!isFinalFeedbackTurn && responsePurpose === "feedback") return;
            if (isFinalFeedbackTurn) {
              clearWaitTimer();
              if (!MOCK_MODE && aiLine) {
                setLineText(
                  aiLine,
                  formatFreeFeedbackPointForm(aiLine.textNode.textContent),
                );
              }
              userLine = null;
              aiLine = null;
              clearActiveAiLine();
              // 評價完成即關閉 Live 連線並釋放麥克風，唔好齋等 token 過期
              // 或伺服器時限被動斬線（嗰陣會顯示錯誤訊息，好易嚇親用戶）。
              closeStatusLocked = true;
              stopLive(false, "");
              finalFeedbackComplete = true;
              setState("評價完成", "AI 已完成總結評價。", "ready", false);
              setSubstatus("如要重新練習，請重新開始自由辯論。");
              setHint("AI 評價已完成。");
              setTalkEnabled(false);
              talkBtn.textContent = "評價完成";
              talkHintEl.textContent = "自由辯論已完成。";
              return;
            }
            isWaiting = false;
            isRecording = false;
            userLine = null;
            aiLine = null;
            clearActiveAiLine();
            if (feedbackPromptShown) return;
            if (MOCK_MODE && pendingAnnounceSeg) {
              const seg = pendingAnnounceSeg;
              pendingAnnounceSeg = null;
              announceSegmentToAi(seg, false);
              return;
            }
            setState("準備好", "輪到你。", "ready", false);
            setSubstatus("按下開始錄音，完成發言後再按下送出。");
            setTalkEnabled(true);
            resumeSpeechTimer();
          });
      }

      function finishRetryAfterResponse() {
        retryPromptQueued = false;
        responsePurpose = null;
        responseEpoch += 1;
        isWaiting = false;
        isRecording = false;
        clearWaitTimer();
        resetAiAudioForTurn(true);
        showRetry(false);
        userLine = null;
        aiLine = null;
        clearActiveAiLine();
        if (feedbackPromptShown || finalFeedbackRequested) return;
        if (MOCK_MODE) {
          mockPrevBtn.disabled = !canMockPrev(mockIndex);
          mockToggleBtn.disabled = false;
          mockNextBtn.disabled = false;
        }
        if (MOCK_MODE && pendingAnnounceSeg) {
          const seg = pendingAnnounceSeg;
          pendingAnnounceSeg = null;
          addLine("系統", "上一輪未收到 AI 回覆，重新提示目前環節。", false);
          announceSegmentToAi(seg, false);
          return;
        }
        addLine("系統", "上一輪未收到 AI 回覆，可以再次發言。", false);
        setState("準備好", "輪到你。", "ready", false);
        setSubstatus("按下開始錄音，完成發言後再按下送出。");
        setTalkEnabled(true);
        resumeSpeechTimer();
      }

      function retryCurrentResponseNow() {
        clearWaitTimer();
        showRetry(false);
        retryPromptQueued = false;
        responsePurpose = null;
        responseEpoch += 1;
        isWaiting = false;
        // Arm the stale-response guard before closing. A resumption may still
        // deliver buffered output from the abandoned model turn.
        discardServerResponseUntilTurnSent = true;
        resetAiAudioForTurn(true);
        userLine = null;
        aiLine = null;
        clearActiveAiLine();
        addLine("系統", "已中止上一輪等待，可以立即再次發言。", false);

        if (
          currentResumptionHandle() &&
          ws &&
          (ws.readyState === WebSocket.OPEN ||
            ws.readyState === WebSocket.CONNECTING)
        ) {
          reconnectingSession = true;
          setTalkEnabled(false);
          setState("重新連線", "正在中止上一輪並恢復同一節連線…", "wait", true);
          setSubstatus("逐字稿、計時、鈴聲及 Mock 章節會保留。");
          try {
            ws.close(4002, "retry current response");
            return;
          } catch (error) {}
        }

        // Google 尚未提供 resumption handle 時，以一個空 activity 明確
        // interrupt 掛起的 model turn；舊輸出會丟棄到下一輪真正送出為止。
        try {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ realtimeInput: { activityStart: {} } }));
            ws.send(JSON.stringify({ realtimeInput: { activityEnd: {} } }));
          }
        } catch (error) {}
        finishRetryAfterResponse();
      }

      function cleanupMedia(closeSocket, preserveHardDeadline) {
        const keepHardDeadline = Boolean(preserveHardDeadline);
        clearTimers(keepHardDeadline);
        if (tokenFetchController) tokenFetchController.abort();
        tokenFetchController = null;
        if (tokenFetchTimeout) clearTimeout(tokenFetchTimeout);
        tokenFetchTimeout = null;
        isRecording = false;
        isWaiting = false;
        micReady = false;
        recordStartedAt = null;
        meterEl.style.width = "0%";
        resetAiAudioForTurn(true);
        try {
          if (processor) processor.disconnect();
        } catch (e) {}
        try {
          if (sourceNode) sourceNode.disconnect();
        } catch (e) {}
        try {
          if (stream) stream.getTracks().forEach((track) => track.stop());
        } catch (e) {}
        try {
          if (inputCtx) inputCtx.close();
        } catch (e) {}
        try {
          if (outputCtx) outputCtx.close();
        } catch (e) {}
        processor = null;
        sourceNode = null;
        stream = null;
        inputCtx = null;
        outputCtx = null;
        playAt = 0;
        userSpeechElapsed = 0;
        userSpeechStartedAt = 0;
        userPcmSamplesSent = 0;
        aiSpeechElapsed = 0;
        speechEnded = false;
        if (!keepHardDeadline) {
          overallStartedAt = 0;
          hardDeadlineReached = false;
        }
        finalFeedbackRequested = false;
        finalFeedbackComplete = false;
        feedbackPromptShown = false;
        responsePurpose = null;
        feedbackPromptQueued = false;
        retryPromptQueued = false;
        discardServerResponseUntilTurnSent = false;
        responseEpoch += 1;
        sessionEpoch += 1;
        closeStatusLocked = false;
        clearActiveAiLine();
        firedBells.clear();
        currentSessionIdx = 0;
        switchingSession = false;
        reconnectingSession = false;
        pendingSessionHandoff = false;
        tokenHandoffGeneration += 1;
        tokenHandoffInFlight = false;
        pendingTokenHandoffRecovery = null;
        reconnectAttempts = 0;
        sessionResumptionHandles = {};
        pendingMockSegIdx = 0;
        pendingAnnounceSeg = null;
        sessionContextNote = "";
        transcriptLog = [];
        remainingEl.textContent = "--:--";
        aiRemainingEl.textContent = "--:--";
        deadlineRemainingEl.textContent = keepHardDeadline
          ? formatTime(
              Math.max(
                0,
                Math.ceil(FREE_SESSION_MAX_SECONDS - getOverallElapsed()),
              ),
            )
          : "--:--";
        if (hasStartedOnce)
          startBtn.textContent = MOCK_MODE
            ? "重新建立Mock"
            : "重新建立自由辯論";
        if (closeSocket && ws) {
          try {
            if (ws.readyState === WebSocket.OPEN) {
              ws.send(
                JSON.stringify({ realtimeInput: { audioStreamEnd: true } }),
              );
              ws.close();
            } else if (ws.readyState === WebSocket.CONNECTING) {
              ws.close();
            }
          } catch (e) {}
        }
      }

      function stopLive(markManual, finalText, preserveHardDeadline) {
        manualStopping = Boolean(markManual);
        cleanupMedia(true, preserveHardDeadline);
        startBtn.disabled = false;
        stopBtn.disabled = true;
        setTalkEnabled(false);
        showRetry(false);
        showFeedbackButton(false);
        if (finalText) {
          setState("完成", finalText, "", false);
          setSubstatus("如要繼續，請重新開始自由辯論。");
        }
      }

      try {
        startBtn.addEventListener("click", () => {
          if (hasStartedOnce) {
            location.assign(
              LIVE_SOURCE === "coach" ? "/ai-coach" : "/practice/ai-debate",
            );
            return;
          }
          startLive().catch((e) => {
            console.error("[Live] startLive error:", e);
            const canRetryInitialToken = !liveSessionTokens[0];
            cleanupMedia(true, canRetryInitialToken);
            setState("錯誤", "啟動失敗：" + e.message, "error", false);
            if (canRetryInitialToken) {
              hasStartedOnce = false;
              startBtn.textContent = "重試開始";
              setSubstatus("請按「重試開始」；如上次回應遺失，會沿用同一憑證。");
            }
            startBtn.disabled = false;
            stopBtn.disabled = true;
          });
        });
        stopBtn.addEventListener("click", () => {
          if (!micReady) {
            const canRetryInitialToken =
              Boolean(tokenFetchController) && !liveSessionTokens[0];
            stopLive(true, "自由辯論已停止。", canRetryInitialToken);
            if (canRetryInitialToken) {
              hasStartedOnce = false;
              startBtn.textContent = "重試開始";
              setSubstatus("已中止等待連線；可立即按「重試開始」。");
            }
            return;
          }
          // 第一下：進入「要求 AI 評價」流程；如果已經喺評價流程（等緊用戶
          // 撳評價、等緊 AI 回覆、或者評價已完成），再撳一下就真正斷線收 mic。
          if (
            feedbackPromptShown ||
            finalFeedbackRequested ||
            finalFeedbackComplete
          ) {
            stopLive(true, "自由辯論已停止。");
            return;
          }
          prepareFinalFeedback("自由辯論已停止。");
        });
        feedbackBtn.addEventListener("click", () => requestFinalFeedback());
        if (MOCK_MODE) {
          mockPrevBtn.addEventListener("click", () => mockPrev());
          mockToggleBtn.addEventListener("click", () => mockToggleTimer());
          mockNextBtn.addEventListener("click", () => mockNext());
        }
        retryBtn.addEventListener("click", () => {
          if (responsePurpose !== null) {
            retryCurrentResponseNow();
            return;
          }
          finishRetryAfterResponse();
        });
        talkBtn.addEventListener("click", (e) => {
          e.preventDefault();
          // Keyboard-synthesized clicks (detail 0) are handled by the keydown
          // listener below; only act on real pointer clicks here to avoid double toggle.
          if (e.detail === 0) return;
          toggleTurn();
        });
        talkBtn.addEventListener("contextmenu", (e) => e.preventDefault());
        document.addEventListener("keydown", (e) => {
          if (e.code !== "Space" || e.repeat || talkBtn.disabled) return;
          e.preventDefault();
          toggleTurn();
        });
      } catch (e) {
        console.error("[Live] init error:", e);
        setState("錯誤", "初始化失敗：" + e.message, "error", false);
      }
    </script>
  </body>
</html>
