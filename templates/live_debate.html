<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        box-sizing: border-box;
      }
      :root {
        --bg: #0e1117;
        --panel: #262730;
        --panel-2: #171923;
        --border: #3a3d46;
        --text: #fafafa;
        --muted: #9aa0ab;
        --green: #29b46b;
        --blue: #4c9bff;
        --red: #ff5c5c;
      }
      body {
        margin: 0 auto;
        padding: clamp(12px, 2.5vw, 30px);
        max-width: 1100px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans HK",
          "PingFang HK", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .practice-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
        margin-bottom: 18px;
      }
      .practice-nav strong {
        font-size: clamp(22px, 2.6vw, 34px);
      }
      .back-link {
        color: var(--muted);
        text-decoration: none;
        background: var(--panel-2);
        border: 2px solid var(--border);
        border-radius: 12px;
        padding: 12px 20px;
        font-size: clamp(16px, 1.7vw, 22px);
        font-weight: 800;
        white-space: nowrap;
      }
      .hidden {
        display: none !important;
      }
      .live-wrap {
        border: 1px solid var(--border);
        border-radius: 22px;
        overflow: hidden;
        background: var(--panel);
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: clamp(18px, 2.4vw, 28px);
        border-bottom: 1px solid var(--border);
        background: var(--panel-2);
      }
      .status-wrap {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }
      .badge {
        flex: 0 0 auto;
        min-width: 58px;
        text-align: center;
        border-radius: 999px;
        padding: 6px 12px;
        font-size: clamp(14px, 1.35vw, 18px);
        font-weight: 800;
        background: #3f3f46;
        color: #f4f4f5;
      }
      .badge.ready {
        background: #14532d;
        color: #dcfce7;
      }
      .badge.listen {
        background: #1d4ed8;
        color: #dbeafe;
      }
      .badge.wait {
        background: #854d0e;
        color: #fef3c7;
      }
      .badge.reply {
        background: #7c2d12;
        color: #ffedd5;
      }
      .badge.error {
        background: #7f1d1d;
        color: #fee2e2;
      }
      .status {
        font-size: clamp(17px, 1.7vw, 22px);
        color: #e5e7eb;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .substatus {
        font-size: clamp(15px, 1.4vw, 19px);
        color: var(--muted);
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .buttons {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
      }
      button {
        min-height: 56px;
        border: none;
        border-radius: 14px;
        padding: 12px 20px;
        font-size: clamp(17px, 1.65vw, 22px);
        font-weight: 800;
        cursor: pointer;
        color: white;
        background: #444;
        font-family: inherit;
      }
      button.primary {
        background: var(--green);
      }
      button.danger {
        background: var(--red);
      }
      button.secondary {
        background: #52525b;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .session-panel {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 18px;
        padding: clamp(18px, 2.4vw, 28px);
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }
      .talk-area {
        min-width: 0;
      }
      .talk-btn {
        width: 100%;
        min-height: 104px;
        border-radius: 18px;
        font-size: clamp(25px, 3vw, 38px);
        letter-spacing: 0;
        background: var(--blue);
        touch-action: none;
        user-select: none;
      }
      .talk-btn.recording {
        background: #dc2626;
      }
      .talk-btn.waiting {
        background: #854d0e;
      }
      .talk-hint {
        margin-top: 10px;
        color: var(--muted);
        font-size: clamp(15px, 1.45vw, 19px);
        min-height: 22px;
      }
      .timer-box {
        width: 250px;
        border: 1px solid var(--border);
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 10px;
        background: #111;
      }
      .timer-label {
        color: var(--muted);
        font-size: clamp(14px, 1.3vw, 17px);
      }
      .timer-value {
        margin-top: 4px;
        font-size: clamp(25px, 3vw, 38px);
        font-weight: 800;
        font-variant-numeric: tabular-nums;
      }
      .timer-secondary {
        width: 100%;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-top: 8px;
        color: var(--muted);
        font-size: clamp(14px, 1.25vw, 17px);
        font-variant-numeric: tabular-nums;
      }
      .timer-secondary strong {
        color: var(--text);
      }
      .meter {
        height: 12px;
        background: #2b2b2b;
      }
      .meter-fill {
        height: 100%;
        width: 0%;
        background: #22c55e;
        transition: width 0.08s linear;
      }
      .log {
        height: 430px;
        overflow-y: auto;
        padding: clamp(18px, 2.4vw, 28px);
        background: #101010;
        scroll-behavior: smooth;
      }
      .line {
        margin: 0 0 14px;
        line-height: 1.65;
        font-size: clamp(17px, 1.65vw, 21px);
      }
      .line.pending {
        color: #d4d4d8;
      }
      .line.ai-active {
        margin-left: -4px;
        margin-right: -4px;
        padding: 8px 10px;
        border-left: 3px solid #f59e0b;
        border-radius: 6px;
        background: #29200f;
        color: #fff7ed;
      }
      .line.feedback-points {
        white-space: pre-wrap;
      }
      .who {
        font-weight: 800;
        color: #fca5a5;
      }
      .who.user {
        color: #93c5fd;
      }
      .who.system {
        color: #c4b5fd;
      }
      .hint {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: clamp(15px, 1.4vw, 18px);
        padding: 16px 20px;
        border-top: 1px solid var(--border);
      }
      .retry {
        display: none;
        flex-shrink: 0;
      }
      .retry.show {
        display: inline-block;
      }
      .feedback {
        display: none;
        flex-shrink: 0;
      }
      .feedback.show {
        display: inline-block;
        background: #2563eb;
      }
      .busy {
        display: none;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        border: 2px solid #71717a;
        border-top-color: #facc15;
        animation: spin 0.8s linear infinite;
        flex: 0 0 auto;
      }
      .busy.show {
        display: inline-block;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .mock-bar {
        padding: clamp(18px, 2.4vw, 28px);
        border-bottom: 1px solid var(--border);
        background: #14161c;
      }
      .mock-head {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .mock-progress {
        font-size: clamp(15px, 1.4vw, 18px);
        color: #9ca3af;
      }
      .mock-stage {
        font-size: clamp(21px, 2.2vw, 28px);
        font-weight: 800;
        color: #f4f4f5;
      }
      .mock-side {
        flex: 0 0 auto;
        border-radius: 999px;
        padding: 6px 12px;
        font-size: clamp(14px, 1.3vw, 17px);
        font-weight: 800;
        background: #3f3f46;
        color: #f4f4f5;
      }
      .mock-side.pro {
        background: #1d4ed8;
        color: #dbeafe;
      }
      .mock-side.con {
        background: #7c2d12;
        color: #ffedd5;
      }
      .mock-side.prep {
        background: #854d0e;
        color: #fef3c7;
      }
      .mock-side.both {
        background: #166534;
        color: #dcfce7;
      }
      .mock-timer {
        margin: 12px 0;
        font-size: clamp(54px, 8vw, 86px);
        font-weight: 800;
        text-align: center;
        font-variant-numeric: tabular-nums;
        color: #4caf50;
      }
      .mock-timer.overtime {
        color: #f44336;
      }
      .mock-btns {
        display: flex;
        gap: 8px;
        justify-content: center;
      }
      .mock-btns button {
        flex: 1;
        max-width: 240px;
      }
      .mock-note {
        text-align: center;
        font-size: clamp(15px, 1.4vw, 18px);
        color: var(--muted);
        margin-top: 10px;
      }
      .mock-bar h4 {
        margin: 0 0 8px;
        font-size: clamp(15px, 1.4vw, 18px);
        color: #9ca3af;
      }
      .bell-item {
        font-size: clamp(14px, 1.3vw, 17px);
        padding: 3px 0;
        color: #6b7280;
      }
      .bell-item.fired {
        color: #4caf50;
        font-weight: 700;
      }
      @media (max-width: 560px) {
        body {
          padding: max(0.85rem, env(safe-area-inset-top)) 0.85rem
            calc(1rem + env(safe-area-inset-bottom));
        }
        .practice-nav {
          align-items: stretch;
          flex-direction: column;
          gap: 0.55rem;
          margin-bottom: 0.75rem;
        }
        .practice-nav strong {
          font-size: 1.4rem;
        }
        .back-link {
          min-height: 2.7rem;
          padding: 0.55rem 0.9rem;
          border-width: 1px;
          border-radius: 8px;
          text-align: center;
          font-size: 16px;
        }
        .live-wrap {
          border-radius: 12px;
        }
        .topbar {
          align-items: stretch;
          flex-direction: column;
        }
        .buttons {
          width: 100%;
        }
        .buttons button {
          flex: 1;
        }
        button {
          min-height: 2.7rem;
          padding: 0.55rem 0.8rem;
          border-radius: 8px;
          font-size: 16px;
        }
        .topbar,
        .session-panel,
        .mock-bar {
          padding: 1rem;
        }
        .session-panel {
          position: sticky;
          top: 0;
          z-index: 8;
          grid-template-columns: 1fr;
          gap: 0.65rem;
          box-shadow: 0 10px 24px rgb(0 0 0 / 0.35);
        }
        .timer-box {
          order: -1;
          width: 100%;
          min-height: 6.5rem;
          border-radius: 8px;
        }
        .timer-value {
          margin: 0;
          font-size: 28px;
        }
        .talk-btn {
          min-height: 72px;
          border-radius: 10px;
          font-size: 22px;
        }
        .talk-hint {
          margin-top: 0.45rem;
          font-size: 0.9rem;
        }
        .log {
          height: 45dvh;
          min-height: 18rem;
          max-height: 30rem;
          padding: 1rem;
        }
        .hint {
          align-items: stretch;
          flex-direction: column;
        }
        .hint button {
          width: 100%;
        }
        .mock-btns {
          flex-wrap: wrap;
        }
        .mock-btns button {
          min-width: 30%;
          max-width: none;
        }
        .mock-timer {
          font-size: 48px;
        }
        .mock-stage {
          font-size: 1.2rem;
        }
        .status {
          white-space: normal;
        }
        .substatus {
          white-space: normal;
        }
      }
    </style>
  </head>
  <body>
    <div class="practice-nav" id="practiceNav">
      <strong>🤖 AI 辯論練習</strong>
      <a class="back-link" id="liveBack" href="/practice/ai-debate"
        >◀ 返回 AI 練習</a
      >
    </div>
    <div class="live-wrap">
      <div class="topbar">
        <div class="status-wrap">
          <div class="status-row">
            <span class="badge" id="badge">未連線</span>
            <span class="status" id="status"
              >按「開始自由辯論」連線並允許麥克風權限。</span
            >
            <span class="busy" id="busy"></span>
          </div>
          <div class="substatus" id="substatus">
            開始後按下「開始錄音」，完成發言後再按下送出交給 AI。
          </div>
        </div>
        <div class="buttons">
          <button class="primary" id="startBtn">開始自由辯論</button>
          <button class="danger" id="stopBtn" disabled>停止</button>
        </div>
      </div>
      <div class="session-panel">
        <div class="talk-area">
          <button class="talk-btn" id="talkBtn" disabled>開始錄音</button>
          <div class="talk-hint" id="talkHint">自由辯論準備好後可以開始。</div>
        </div>
        <div class="timer-box">
          <div class="timer-label">你方已用／每邊上限</div>
          <div class="timer-value" id="remaining">--:--</div>
          <div class="timer-secondary">
            <span>AI 已用</span><strong id="aiRemaining">--:--</strong>
          </div>
          <div class="timer-secondary">
            <span>整節尚餘</span><strong id="deadlineRemaining">--:--</strong>
          </div>
        </div>
      </div>
      <div class="meter"><div class="meter-fill" id="meter"></div></div>
      <div class="mock-bar" id="mockBar" style="display: none">
        <div class="mock-head">
          <span class="mock-progress" id="mockProgress">第 1 / 1 段</span>
          <span class="mock-stage" id="mockStage">環節</span>
          <span class="mock-side" id="mockSide">—</span>
        </div>
        <div class="mock-timer" id="mockTimer">0:00</div>
        <div class="mock-btns">
          <button class="secondary" id="mockPrev">上一段</button>
          <button class="secondary" id="mockToggle">暫停計時</button>
          <button class="primary" id="mockNext">下一段</button>
        </div>
        <div class="mock-note" id="mockNote">
          逐段跟賽制響叮；按「下一段」進入下一環節。
        </div>
        <div
          class="bell-schedule"
          id="mockBells"
          style="
            margin-top: 10px;
            padding: 10px;
            background: #101216;
            border: 1px solid #262b33;
            border-radius: 8px;
          "
        ></div>
      </div>
      <div class="log" id="log">
        <p class="line">
          <span class="who system">系統：</span
          >開始自由辯論後，按下藍色按鈕開始錄音，完成發言後再按下送出。
        </p>
      </div>
      <div class="hint">
        <span id="hintText"
          >Gemini Live API 屬
          preview；如果連線失敗，請停止並重新建立自由辯論。</span
        >
        <button class="secondary feedback" id="feedbackBtn">
          要求 AI 評價
        </button>
        <button class="secondary retry" id="retryBtn">重試本輪</button>
      </div>
    </div>
    <script>
      const MODEL = __LIVE_MODEL__;
      const SYSTEM_PROMPT = __LIVE_PROMPT__;
      const SESSION_MINUTES = __LIVE_MINUTES__;
      const BELL_SRC = __BELL_SRC__;
      const BELL_SCHEDULE = (__BELL_SCHEDULE__ || [])
        .slice()
        .sort((a, b) => Number(a.t || 0) - Number(b.t || 0));
      const BELL_VOLUME = 5.0;
      const SPEECH_SECONDS = Math.max(
        1,
        Math.round(Number(SESSION_MINUTES || 2.5) * 60),
      );
      const USER_PCM_SAMPLE_RATE = 16000;
      const USER_PCM_SAMPLE_LIMIT = SPEECH_SECONDS * USER_PCM_SAMPLE_RATE;
      const MOCK_SEGMENTS = __MOCK_SEGMENTS__ || [];
      const MOCK_MODE = MOCK_SEGMENTS.length > 0;
      const MOCK_SESSION_LABELS = __MOCK_SESSION_LABELS__ || [];
      const LIVE_PRACTICE_ID = __LIVE_PRACTICE_ID__;
      const LIVE_TOKEN_URL = __LIVE_TOKEN_URL__;
      const CONTEXT_TRIGGER_TOKENS = Number(
        __LIVE_CONTEXT_TRIGGER_TOKENS__,
      );
      const CONTEXT_TARGET_TOKENS = Number(__LIVE_CONTEXT_TARGET_TOKENS__);
      const FREE_SESSION_MAX_SECONDS = Number(__LIVE_SESSION_MAX_SECONDS__);
      const SETUP_COMPLETE_TIMEOUT_MS = 15000;
      const TOKEN_FETCH_TIMEOUT_MS = 12000;
      const SESSION_HANDOFF_CLOSE_TIMEOUT_MS = 2000;
      const AI_STARTS = __AI_STARTS__;
      const LIVE_PROMPTS = __LIVE_PROMPTS__ || {};
      const LIVE_SOURCE =
        new URLSearchParams(location.search).get("source") || "kiosk";
      if (LIVE_SOURCE === "coach") {
        document.getElementById("liveBack").href = "/ai-coach";
        document.getElementById("liveBack").textContent = "◀ 返回 AI 辯論易";
      }
      function fillTemplate(tpl, map) {
        return String(tpl || "").replace(/\{(\w+)\}/g, (m, k) =>
          k in map ? map[k] : m,
        );
      }
      const WS_BASE =
        "wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContentConstrained";
      function buildWsUrl(token) {
        return WS_BASE + "?access_token=" + encodeURIComponent(token);
      }

      let ws = null;
      let sessionEpoch = 0;
      let responseEpoch = 0;
      let stream = null;
      let inputCtx = null;
      let outputCtx = null;
      let sourceNode = null;
      let processor = null;
      let playAt = 0;
      let micReady = false;
      let isRecording = false;
      let isWaiting = false;
      let manualStopping = false;
      let closeStatusLocked = false;
      let recordStartedAt = null;
      let recordTimer = null;
      let waitTimer = null;
      let speechTimer = null;
      let userSpeechElapsed = 0;
      let userSpeechStartedAt = 0;
      let userPcmSamplesSent = 0;
      let aiSpeechElapsed = 0;
      let speechEnded = false;
      let overallStartedAt = 0;
      let hardDeadlineReached = false;
      let hardDeadlineTimer = null;
      let hasStartedOnce = false;
      let firedBells = new Set();
      let reconnectTimer = null;
      let setupWatchdogTimer = null;
      let reconnectAttempts = 0;
      let goAwayReconnectTimer = null;
      let handoffCloseTimer = null;
      let sessionResumptionHandles = {};
      let userLine = null;
      let aiLine = null;
      let activeAiLine = null;
      let finalFeedbackRequested = false;
      let finalFeedbackComplete = false;
      let feedbackPromptShown = false;
      let responsePurpose = null;
      let feedbackPromptQueued = false;
      let retryPromptQueued = false;
      let discardServerResponseUntilTurnSent = false;
      let bellBuffer = null;
      let bellLoading = null;
      let bellCtx = null;
      let azureTtsEnabled = true;
      let azureTtsSessionDisabled = false;
      let ttsTextBuffer = "";
      let ttsQueue = [];
      let ttsPlaying = false;
      let ttsPending = 0;
      let ttsDrainResolvers = [];
      let currentTtsAudio = null;
      let currentTtsUrl = "";
      let ttsFallbackActive = false;
      let nativeAudioParts = [];
      let nativeFallbackBoundary = 0;
      let ttsWarningShown = false;
      let ttsReceivedText = false;
      let ttsGeneration = 0;
      let ttsPlayedAnyAudio = false;
      let nativePcmSources = new Set();
      let tokenFetchController = null;
      let tokenFetchTimeout = null;

      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const talkBtn = document.getElementById("talkBtn");
      const retryBtn = document.getElementById("retryBtn");
      const feedbackBtn = document.getElementById("feedbackBtn");
      const statusEl = document.getElementById("status");
      const substatusEl = document.getElementById("substatus");
      const badgeEl = document.getElementById("badge");
      const busyEl = document.getElementById("busy");
      const logEl = document.getElementById("log");
      const meterEl = document.getElementById("meter");
      const remainingEl = document.getElementById("remaining");
      const aiRemainingEl = document.getElementById("aiRemaining");
      const deadlineRemainingEl = document.getElementById(
        "deadlineRemaining",
      );
      const talkHintEl = document.getElementById("talkHint");
      const hintTextEl = document.getElementById("hintText");

      function setState(label, detail, kind, busy) {
        badgeEl.textContent = label;
        badgeEl.className = "badge" + (kind ? " " + kind : "");
        statusEl.textContent = detail;
        busyEl.className = "busy" + (busy ? " show" : "");
      }

      function setSubstatus(text) {
        substatusEl.textContent = text;
      }
      function setHint(text) {
        hintTextEl.textContent = text;
      }

      function setTalkEnabled(enabled) {
        talkBtn.disabled = !enabled;
        talkBtn.className = "talk-btn";
        talkBtn.textContent = "開始錄音";
        if (enabled) {
          talkHintEl.textContent =
            "按下開始錄音，完成發言後再按下送出。亦可按 Space。";
        } else {
          talkHintEl.textContent = "自由辯論準備好後可以開始。";
        }
      }

      function showRetry(show) {
        retryBtn.className = "secondary retry" + (show ? " show" : "");
      }

      function showFeedbackButton(show) {
        feedbackBtn.className = "secondary feedback" + (show ? " show" : "");
      }

      function scrollLogToBottom() {
        requestAnimationFrame(() => {
          const last = logEl.lastElementChild;
          if (last) last.scrollIntoView({ block: "end" });
          logEl.scrollTop = logEl.scrollHeight;
        });
      }

      function addLine(who, text, isUser, className) {
        if (!text) return null;
        const p = document.createElement("p");
        p.className = "line" + (className ? " " + className : "");
        const span = document.createElement("span");
        span.className =
          "who" + (isUser ? " user" : who === "系統" ? " system" : "");
        span.textContent = who + "：";
        const node = document.createTextNode(text);
        p.appendChild(span);
        p.appendChild(node);
        logEl.appendChild(p);
        scrollLogToBottom();
        return { el: p, textNode: node };
      }

      function setLineText(line, text) {
        if (!line) return;
        line.textNode.textContent = text;
        line.el.classList.remove("pending");
        scrollLogToBottom();
      }

      function appendLineText(line, text) {
        if (!line || !text) return;
        const current = line.textNode.textContent;
        if (
          !current ||
          current === "正在回覆..." ||
          current === "正在轉錄..." ||
          current === "正在整理評價..."
        ) {
          setLineText(line, text);
        } else {
          line.textNode.textContent = current + text;
          scrollLogToBottom();
        }
      }

      function formatFreeFeedbackPointForm(text) {
        const clean = String(text || "").trim();
        if (!clean) return clean;
        const numbered = clean.replace(
          /\s+(?=(?:\d{1,2}[.、]|[一二三四五六七八九十]+[.、])\s*)/gu,
          "\n",
        );
        let points = numbered
          .split(/\n+/u)
          .map((item) => item.trim())
          .filter(Boolean);
        if (points.length <= 1) {
          points = (clean.match(/[^。！？]+[。！？]?/gu) || [clean])
            .map((item) => item.trim())
            .filter(Boolean);
        }
        return points
          .map((item) =>
            /^(?:[•●▪‣-]|\d{1,2}[.、]|[一二三四五六七八九十]+[.、])/u.test(
              item,
            )
              ? item
              : "• " + item,
          )
          .join("\n");
      }

      function setActiveAiLine(line) {
        if (activeAiLine && activeAiLine.el)
          activeAiLine.el.classList.remove("ai-active");
        activeAiLine = line || null;
        if (activeAiLine && activeAiLine.el)
          activeAiLine.el.classList.add("ai-active");
        scrollLogToBottom();
      }

      function clearActiveAiLine() {
        if (activeAiLine && activeAiLine.el)
          activeAiLine.el.classList.remove("ai-active");
        activeAiLine = null;
      }

      function formatTime(seconds) {
        const mins = Math.max(0, Math.floor(seconds / 60));
        const secs = Math.max(0, seconds % 60);
        return (
          String(mins).padStart(2, "0") + ":" + String(secs).padStart(2, "0")
        );
      }

      function getBellCtx() {
        if (!bellCtx)
          bellCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (bellCtx.state === "suspended") bellCtx.resume();
        return bellCtx;
      }

      async function prepareBell() {
        const ctx = getBellCtx();
        if (ctx.state === "suspended") await ctx.resume();
        return ctx;
      }

      async function loadBell() {
        if (!BELL_SRC) return null;
        if (!bellLoading) {
          bellLoading = fetch(BELL_SRC)
            .then((resp) => resp.arrayBuffer())
            .then((arr) => getBellCtx().decodeAudioData(arr))
            .then((buffer) => {
              bellBuffer = buffer;
              return buffer;
            })
            .catch(() => null);
        }
        return bellLoading;
      }

      function playTone(count) {
        const ctx = getBellCtx();
        for (let i = 0; i < count; i++) {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.frequency.value = 880;
          gain.gain.setValueAtTime(0.0001, ctx.currentTime + i * 0.8);
          gain.gain.exponentialRampToValueAtTime(
            0.4,
            ctx.currentTime + i * 0.8 + 0.02,
          );
          gain.gain.exponentialRampToValueAtTime(
            0.0001,
            ctx.currentTime + i * 0.8 + 0.28,
          );
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(ctx.currentTime + i * 0.8);
          osc.stop(ctx.currentTime + i * 0.8 + 0.3);
        }
      }

      async function playBell(count) {
        const ctx = getBellCtx();
        if (ctx.state === "suspended") await ctx.resume();
        if (!bellBuffer) await loadBell();
        if (!bellBuffer) {
          playTone(count);
          return;
        }
        for (let i = 0; i < count; i++) {
          const src = ctx.createBufferSource();
          const gain = ctx.createGain();
          src.buffer = bellBuffer;
          gain.gain.value = BELL_VOLUME;
          src.connect(gain);
          gain.connect(ctx.destination);
          src.start(ctx.currentTime + i * 0.8);
        }
      }

      function getUserSpeechElapsed() {
        if (!isRecording || !userSpeechStartedAt) return userSpeechElapsed;
        return (
          userSpeechElapsed + (Date.now() - userSpeechStartedAt) / 1000
        );
      }

      function commitUserSpeechTime() {
        if (!userSpeechStartedAt) return;
        userSpeechElapsed = Math.min(
          SPEECH_SECONDS,
          userSpeechElapsed + (Date.now() - userSpeechStartedAt) / 1000,
        );
        userSpeechStartedAt = 0;
      }

      function getOverallElapsed() {
        if (!overallStartedAt) return 0;
        return Math.max(0, (Date.now() - overallStartedAt) / 1000);
      }

      function expireFreeHardDeadline() {
        hardDeadlineTimer = null;
        if (!overallStartedAt || hardDeadlineReached) return;
        hardDeadlineReached = true;
        // A timed-out initial token retry is still the same lifecycle. Force
        // the next Start click back to setup instead of granting another 30m.
        hasStartedOnce = true;
        stopLive(
          false,
          "整節已達 " +
            formatTime(FREE_SESSION_MAX_SECONDS) +
            " 上限，連線已安全關閉。",
        );
      }

      function startFreeHardDeadline() {
        if (!(FREE_SESSION_MAX_SECONDS > 0)) {
          throw new Error("整節時間上限設定無效，請聯絡管理員。");
        }
        if (!overallStartedAt) {
          overallStartedAt = Date.now();
          hardDeadlineReached = false;
        }
        if (hardDeadlineTimer || hardDeadlineReached) return;
        const remainingMs = Math.max(
          0,
          FREE_SESSION_MAX_SECONDS * 1000 -
            (Date.now() - overallStartedAt),
        );
        deadlineRemainingEl.textContent = formatTime(
          Math.ceil(remainingMs / 1000),
        );
        if (remainingMs <= 0) {
          expireFreeHardDeadline();
          return;
        }
        hardDeadlineTimer = setTimeout(expireFreeHardDeadline, remainingMs);
      }

      function fireBellOnce(key, rings) {
        if (firedBells.has(key)) return;
        firedBells.add(key);
        playBell(rings);
      }

      function updateSideBells(side, elapsed) {
        if (elapsed <= 0) return;
        if (BELL_SCHEDULE.length) {
          BELL_SCHEDULE.forEach((bell, index) => {
            if (elapsed >= Number(bell.t || 0)) {
              fireBellOnce(
                side + "-schedule-" + index,
                Number(bell.rings || 1),
              );
            }
          });
          return;
        }
        fireBellOnce(side + "-start", 1);
        if (SPEECH_SECONDS > 30 && elapsed >= SPEECH_SECONDS - 30) {
          fireBellOnce(side + "-warning", 1);
        }
        if (elapsed >= SPEECH_SECONDS) fireBellOnce(side + "-end", 2);
      }

      function finishFreeDebateForBudget(reason) {
        if (speechEnded || feedbackPromptShown || finalFeedbackRequested) return;
        speechEnded = true;
        if (isRecording) endTurn();
        prepareFinalFeedback(reason);
      }

      function updateSpeechTimer() {
        if (MOCK_MODE) return;
        const userElapsed = Math.min(getUserSpeechElapsed(), SPEECH_SECONDS);
        const aiElapsed = Math.min(aiSpeechElapsed, SPEECH_SECONDS);
        const overallRemaining = Math.max(
          0,
          FREE_SESSION_MAX_SECONDS - getOverallElapsed(),
        );
        remainingEl.textContent =
          formatTime(Math.floor(userElapsed)) +
          " / " +
          formatTime(SPEECH_SECONDS);
        aiRemainingEl.textContent =
          formatTime(Math.floor(aiElapsed)) +
          " / " +
          formatTime(SPEECH_SECONDS);
        deadlineRemainingEl.textContent = formatTime(
          Math.ceil(overallRemaining),
        );
        updateSideBells("user", userElapsed);
        updateSideBells("ai", aiElapsed);
        if (userElapsed >= SPEECH_SECONDS) {
          commitUserSpeechTime();
          finishFreeDebateForBudget("你方已用完本節發言時間。");
          return;
        }
        if (aiElapsed >= SPEECH_SECONDS) {
          finishFreeDebateForBudget("AI 已用完本節發言時間。");
          return;
        }
        if (
          FREE_SESSION_MAX_SECONDS > 0 &&
          overallRemaining <= 0 &&
          !hardDeadlineReached
        ) {
          hardDeadlineReached = true;
          stopLive(
            false,
            "整節已達 " +
              formatTime(FREE_SESSION_MAX_SECONDS) +
              " 上限，連線已安全關閉。",
          );
        }
      }

      function startSpeechTimer() {
        if (MOCK_MODE) return;
        updateSpeechTimer();
        if (speechTimer) clearInterval(speechTimer);
        speechTimer = setInterval(updateSpeechTimer, 250);
      }

      function pauseSpeechTimer() {
        if (MOCK_MODE) return;
        updateSpeechTimer();
      }

      function resumeSpeechTimer() {
        if (MOCK_MODE) return;
        if (speechEnded) return;
        updateSpeechTimer();
      }

      // ─── 完整 Mock 逐段計時 ───────────────────────────────────────
      let mockIndex = 0;
      let mockElapsed = 0;
      let mockStartTs = 0;
      let mockRunning = false;
      let mockInterval = 0;
      // 多 session 接力狀態
      let currentSessionIdx = 0;
      let switchingSession = false;
      let reconnectingSession = false;
      let pendingSessionHandoff = false;
      let tokenHandoffInFlight = false;
      let tokenHandoffGeneration = 0;
      let pendingTokenHandoffRecovery = null;
      let pendingMockSegIdx = 0;
      let pendingAnnounceSeg = null;
      let sessionContextNote = "";
      let transcriptLog = [];
      let liveSessionTokens = [];
      const mockBar = document.getElementById("mockBar");
      const mockProgressEl = document.getElementById("mockProgress");
      const mockStageEl = document.getElementById("mockStage");
      const mockSideEl = document.getElementById("mockSide");
      const mockTimerEl = document.getElementById("mockTimer");
      const mockBellsEl = document.getElementById("mockBells");
      const mockNoteEl = document.getElementById("mockNote");
      const mockPrevBtn = document.getElementById("mockPrev");
      const mockToggleBtn = document.getElementById("mockToggle");
      const mockNextBtn = document.getElementById("mockNext");

      function mockSessionCount() {
        const segmentCount = MOCK_SEGMENTS.reduce(
          (highest, segment) =>
            Math.max(highest, Number(segment.session || 0) + 1),
          0,
        );
        return Math.max(segmentCount, MOCK_SESSION_LABELS.length, 1);
      }

      async function getLiveSessionToken(sessionIdx, expectedSessionEpoch) {
        if (liveSessionTokens[sessionIdx])
          return liveSessionTokens[sessionIdx];
        if (!LIVE_TOKEN_URL || !LIVE_PRACTICE_ID) {
          throw new Error("未能取得連線憑證，請返回 AI Coach 重新開始。");
        }
        if (tokenFetchController) tokenFetchController.abort();
        const controller = new AbortController();
        tokenFetchController = controller;
        tokenFetchTimeout = setTimeout(
          () => controller.abort(),
          TOKEN_FETCH_TIMEOUT_MS,
        );
        try {
          let response;
          try {
            response = await fetch(LIVE_TOKEN_URL, {
              method: "POST",
              credentials: "same-origin",
              cache: "no-store",
              signal: controller.signal,
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                practice_id: LIVE_PRACTICE_ID,
                session_index: sessionIdx,
              }),
            });
          } catch (error) {
            if (
              expectedSessionEpoch !== sessionEpoch ||
              manualStopping ||
              tokenFetchController !== controller
            )
              return "";
            if (controller.signal.aborted)
              throw new Error(
                "準備連線逾時，請立即重試；系統會沿用同一憑證。",
              );
            throw new Error("網絡中斷，未能準備連線，請立即重試。");
          }
          if (
            expectedSessionEpoch !== sessionEpoch ||
            manualStopping ||
            controller.signal.aborted
          )
            return "";
          let payload = {};
          try {
            payload = await response.json();
          } catch (error) {
            if (controller.signal.aborted)
              throw new Error(
                "準備連線逾時，請立即重試；系統會沿用同一憑證。",
              );
          }
          if (
            expectedSessionEpoch !== sessionEpoch ||
            manualStopping ||
            controller.signal.aborted
          )
            return "";
          if (!response.ok) {
            throw new Error(
              payload.detail || "未能準備連線，請稍後重試。",
            );
          }
          const token = String(payload.token || "").trim();
          if (!token) throw new Error("伺服器未有回傳連線憑證。");
          liveSessionTokens[sessionIdx] = token;
          return token;
        } finally {
          if (tokenFetchController === controller) {
            tokenFetchController = null;
            if (tokenFetchTimeout) clearTimeout(tokenFetchTimeout);
            tokenFetchTimeout = null;
          }
        }
      }

      function mockSideClass(side) {
        if (side === "正方") return "pro";
        if (side === "反方") return "con";
        if (side === "雙方") return "both";
        return "prep";
      }

      function getMockElapsed() {
        if (!mockRunning) return mockElapsed;
        return mockElapsed + (Date.now() - mockStartTs) / 1000;
      }

      function mockSegmentDuration(seg) {
        const perSide = Math.max(0, Number((seg && seg.seconds) || 0));
        return seg && seg.side === "雙方" ? perSide * 2 : perSide;
      }

      function mockBellEvents(seg) {
        const perSide = Math.max(0, Number((seg && seg.seconds) || 0));
        return ((seg && seg.bells) || []).map((bell) => {
          const originalTime = Number(bell.t || 0);
          const time =
            seg && seg.side === "雙方" && originalTime > 0
              ? originalTime + perSide
              : originalTime;
          return { ...bell, t: time };
        });
      }

      function renderMockBells(seg) {
        const sched = mockBellEvents(seg);
        mockBellsEl.innerHTML =
          "<h4>本段鈴聲</h4>" +
          sched
            .map(
              (b, i) =>
                '<div class="bell-item" id="mb-' +
                i +
                '">' +
                (b.label ||
                  formatTime(Number(b.t || 0)) +
                    " — " +
                    Number(b.rings || 1) +
                    " 叮") +
                (seg.side === "雙方" && Number(b.t || 0) > 0
                  ? "（雙方合計 " + formatTime(Number(b.t || 0)) + "）"
                  : "") +
                "</div>",
            )
            .join("");
      }

      function updateMockToggleBtn() {
        mockToggleBtn.textContent = mockRunning ? "暫停計時" : "繼續計時";
      }

      function stopMockTicking() {
        if (mockInterval) clearInterval(mockInterval);
        mockInterval = 0;
      }

      function updateMockTimer() {
        const seg = MOCK_SEGMENTS[mockIndex];
        if (!seg) return;
        const cap = mockSegmentDuration(seg);
        const raw = getMockElapsed();
        const shown = cap > 0 ? Math.min(raw, cap) : raw;
        mockTimerEl.textContent = formatTime(Math.floor(shown));
        mockTimerEl.className =
          "mock-timer" + (cap > 0 && raw >= cap ? " overtime" : "");
        mockBellEvents(seg).forEach((b, i) => {
          if (raw >= Number(b.t || 0)) {
            fireBellOnce("mock-" + mockIndex + "-" + i, Number(b.rings || 1));
            const el = document.getElementById("mb-" + i);
            if (el) el.classList.add("fired");
          }
        });
        if (cap > 0 && raw >= cap && mockRunning) {
          mockElapsed = cap;
          mockRunning = false;
          stopMockTicking();
          updateMockToggleBtn();
          mockNoteEl.textContent = "本段時間到，可按「下一段」進入下一環節。";
        }
      }

      function mockResume() {
        const seg = MOCK_SEGMENTS[mockIndex];
        if (!seg) return;
        const cap = mockSegmentDuration(seg);
        if (cap > 0 && mockElapsed >= cap) return;
        mockStartTs = Date.now();
        mockRunning = true;
        updateMockToggleBtn();
        stopMockTicking();
        mockInterval = setInterval(updateMockTimer, 200);
        updateMockTimer();
      }

      function mockPause() {
        mockElapsed = getMockElapsed();
        mockRunning = false;
        stopMockTicking();
        updateMockToggleBtn();
        updateMockTimer();
      }

      function mockToggleTimer() {
        if (feedbackPromptShown || finalFeedbackRequested) return;
        if (mockRunning) mockPause();
        else mockResume();
      }

      function announceSegmentToAi(seg, relog) {
        if (!seg) return;
        if (relog !== false)
          addLine("系統", "而家輪到：" + (seg.label || "") + "。", false);
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        if (feedbackPromptShown || finalFeedbackRequested) return;
        if (
          isRecording ||
          isWaiting ||
          responsePurpose !== null ||
          activeAiLine
        ) {
          // AI 回合或錄音進行中未可以送提示；記住呢段，等本輪完結後補發，
          // 否則 AI 會一直用舊環節身分回應。
          pendingAnnounceSeg = seg;
          return;
        }
        pendingAnnounceSeg = null;
        try {
          isWaiting = true;
          setTalkEnabled(false);
          setState("等待 AI", "已提示 AI 進入目前環節。", "wait", true);
          setSubstatus(
            "如屬 AI 段落，請聽完 AI 發言；如屬你方段落，AI 示意後會解鎖錄音。",
          );
          startWaitTimer();
          const segSecs = Number(seg.seconds || 0);
          const wordMin = Math.round((segSecs / 60) * 250);
          const wordMax = Math.round((segSecs / 60) * 300);
          resetAiAudioForTurn(true);
          let announcePrompt = fillTemplate(LIVE_PROMPTS.segment_announce, {
            label: seg.label || "",
            side: seg.side || "",
            secs: segSecs,
            word_min: wordMin,
            word_max: wordMax,
          });
          if (sessionContextNote) {
            announcePrompt =
              "以下係上一節逐字摘要。請延續同一場辯論，不要當作新對話：\n" +
              sessionContextNote +
              "\n\n" +
              announcePrompt;
            sessionContextNote = "";
          }
          sendTextTurn(announcePrompt);
        } catch (e) {
          isWaiting = false;
          clearWaitTimer();
          setTalkEnabled(true);
        }
      }

      function canMockPrev(index) {
        if (index <= 0 || !MOCK_SEGMENTS[index]) return false;
        return (
          Number(MOCK_SEGMENTS[index - 1].session || 0) ===
          Number(MOCK_SEGMENTS[index].session || 0)
        );
      }

      function clearMockSegmentBellKeys(index) {
        const prefix = "mock-" + index + "-";
        Array.from(firedBells).forEach((key) => {
          if (String(key).startsWith(prefix)) firedBells.delete(key);
        });
      }

      function applyMockSegment(index, autostart) {
        stopMockTicking();
        const targetIndex = Math.max(
          0,
          Math.min(index, MOCK_SEGMENTS.length - 1),
        );
        // Every explicit navigation is a fresh entry. Reset only the target
        // segment's bell keys, so Prev→Next replays its schedule while the Set
        // still prevents apply/update/resume from double-ringing this entry.
        clearMockSegmentBellKeys(targetIndex);
        mockIndex = targetIndex;
        const seg = MOCK_SEGMENTS[mockIndex];
        mockElapsed = 0;
        mockRunning = false;
        mockProgressEl.textContent =
          "第 " + (mockIndex + 1) + " / " + MOCK_SEGMENTS.length + " 段";
        mockStageEl.textContent = seg.label || "";
        mockSideEl.textContent = seg.side || "—";
        mockSideEl.className = "mock-side " + mockSideClass(seg.side);
        mockPrevBtn.disabled = !canMockPrev(mockIndex);
        mockNextBtn.textContent =
          mockIndex >= MOCK_SEGMENTS.length - 1 ? "完成 Mock" : "下一段";
        mockNoteEl.textContent =
          seg.side === "雙方"
            ? "本段總計 " +
              formatTime(mockSegmentDuration(seg)) +
              "（每邊 " +
              formatTime(Number(seg.seconds || 0)) +
              "）；按「下一段」進入下一環節。"
            : "逐段跟賽制響叮；按「下一段」進入下一環節。";
        renderMockBells(seg);
        updateMockToggleBtn();
        updateMockTimer();
        if (autostart) mockResume();
      }

      function mockNext() {
        if (feedbackPromptShown || finalFeedbackRequested) return;
        if (
          isRecording ||
          isWaiting ||
          responsePurpose !== null ||
          activeAiLine
        )
          return;
        if (mockIndex >= MOCK_SEGMENTS.length - 1) {
          stopMockTicking();
          mockRunning = false;
          mockNextBtn.disabled = true;
          prepareFinalFeedback("Mock 全部環節已完成。");
          return;
        }
        const nextIdx = mockIndex + 1;
        const curSession = Number(MOCK_SEGMENTS[mockIndex].session || 0);
        const nextSession = Number(MOCK_SEGMENTS[nextIdx].session || 0);
        if (nextSession !== curSession) {
          switchToSession(nextSession, nextIdx);
        } else {
          applyMockSegment(nextIdx, true);
          announceSegmentToAi(MOCK_SEGMENTS[nextIdx]);
        }
      }

      function recordTranscriptTurn() {
        const u = userLine ? userLine.textNode.textContent : "";
        const a = aiLine ? aiLine.textNode.textContent : "";
        if (u && u !== "正在轉錄...") transcriptLog.push("【我方】" + u);
        if (a && a !== "正在回覆..." && a !== "正在整理評價...")
          transcriptLog.push("【對方/AI】" + a);
      }

      function buildTranscriptContext() {
        const recent = transcriptLog.slice(-40);
        let text = recent.join("\n");
        if (text.length > 4000) text = text.slice(text.length - 4000);
        return text;
      }

      function recoverMockAfterAbortedHandoff(
        handoffGeneration,
        resumeTimer,
      ) {
        if (
          handoffGeneration !== tokenHandoffGeneration ||
          manualStopping ||
          hardDeadlineReached ||
          !micReady ||
          pendingSessionHandoff ||
          feedbackPromptShown ||
          finalFeedbackRequested
        ) {
          if (handoffGeneration === tokenHandoffGeneration)
            pendingTokenHandoffRecovery = null;
          return;
        }
        pendingTokenHandoffRecovery = {
          generation: handoffGeneration,
          resumeTimer: Boolean(resumeTimer),
        };
        // A GoAway/network reconnect may have made the token fetch stale.  Do
        // not unlock the current section until that old session is usable
        // again; onConnectionResumed() will finish this recovery.
        if (
          reconnectingSession ||
          !ws ||
          ws.readyState !== WebSocket.OPEN
        )
          return;
        const recovery = pendingTokenHandoffRecovery;
        pendingTokenHandoffRecovery = null;
        mockPrevBtn.disabled = !canMockPrev(mockIndex);
        mockToggleBtn.disabled = false;
        mockNextBtn.disabled = false;
        if (recovery.resumeTimer) mockResume();
      }

      async function switchToSession(sessionIdx, segIdx) {
        if (
          pendingSessionHandoff ||
          reconnectingSession ||
          tokenHandoffInFlight
        )
          return;
        const handoffEpoch = sessionEpoch;
        const handoffGeneration = ++tokenHandoffGeneration;
        tokenHandoffInFlight = true;
        pendingTokenHandoffRecovery = null;
        const resumeCurrentSegmentOnFailure = mockRunning;
        if (resumeCurrentSegmentOnFailure) mockElapsed = getMockElapsed();
        mockRunning = false;
        stopMockTicking();
        setTalkEnabled(false);
        mockNextBtn.disabled = true;
        setState(
          "準備下一節",
          "正在安全準備第 " +
            (sessionIdx + 1) +
            " / " +
            mockSessionCount() +
            " 節連線…",
          "wait",
          true,
        );
        try {
          const token = await getLiveSessionToken(sessionIdx, handoffEpoch);
          if (
            !token ||
            handoffEpoch !== sessionEpoch ||
            manualStopping
          ) {
            recoverMockAfterAbortedHandoff(
              handoffGeneration,
              resumeCurrentSegmentOnFailure,
            );
            return;
          }
        } catch (error) {
          if (handoffEpoch !== sessionEpoch || manualStopping) {
            recoverMockAfterAbortedHandoff(
              handoffGeneration,
              resumeCurrentSegmentOnFailure,
            );
            return;
          }
          setState("錯誤", error.message, "error", false);
          setSubstatus("目前章節仍然保留，可按「下一段」再次嘗試。");
          addLine("系統", error.message, false);
          mockNextBtn.disabled = false;
          setTalkEnabled(true);
          if (resumeCurrentSegmentOnFailure) mockResume();
          return;
        } finally {
          // Epoch may change while fetch is settling. Clear our own flag even
          // then, but never clear a newer lifecycle/handoff owned generation.
          if (handoffGeneration === tokenHandoffGeneration)
            tokenHandoffInFlight = false;
        }
        if (handoffEpoch !== sessionEpoch || manualStopping) {
          recoverMockAfterAbortedHandoff(
            handoffGeneration,
            resumeCurrentSegmentOnFailure,
          );
          return;
        }
        pendingTokenHandoffRecovery = null;
        stopActiveRecording();
        clearWaitTimer();
        resetAiAudioForTurn(true);
        clearActiveAiLine();
        responsePurpose = null;
        responseEpoch += 1;
        isRecording = false;
        isWaiting = false;
        pendingAnnounceSeg = null;
        currentSessionIdx = sessionIdx;
        pendingMockSegIdx = segIdx;
        sessionContextNote = buildTranscriptContext();
        setState(
          "連接下一節",
          "正在連接第 " +
            (sessionIdx + 1) +
            " / " +
            mockSessionCount() +
            " 節…",
          "wait",
          true,
        );
        addLine(
          "系統",
          "接力連接第 " +
            (sessionIdx + 1) +
            " / " +
            mockSessionCount() +
            " 節：" +
            (MOCK_SESSION_LABELS[sessionIdx] || "") +
            "…",
          false,
        );
        switchingSession = true;
        reconnectingSession = true;
        pendingSessionHandoff = true;
        sessionResumptionHandles[currentSessionIdx] = "";
        if (
          ws &&
          (ws.readyState === WebSocket.OPEN ||
            ws.readyState === WebSocket.CONNECTING)
        ) {
          try {
            ws.close();
            // A browser/network stack may not promptly dispatch `close`.
            // Keep the new token's one-minute start window usable by making
            // the old callbacks stale and opening the prepared section after
            // a short bounded wait.
            if (handoffCloseTimer) clearTimeout(handoffCloseTimer);
            handoffCloseTimer = setTimeout(() => {
              handoffCloseTimer = null;
              if (
                handoffEpoch !== sessionEpoch ||
                handoffGeneration !== tokenHandoffGeneration ||
                manualStopping ||
                !switchingSession ||
                currentSessionIdx !== sessionIdx
              )
                return;
              switchingSession = false;
              openSessionWs();
            }, SESSION_HANDOFF_CLOSE_TIMEOUT_MS);
          } catch (e) {
            switchingSession = false;
            openSessionWs();
          }
        } else {
          switchingSession = false;
          openSessionWs();
        }
      }

      function onSessionReconnected() {
        clearGoAwayReconnectTimer();
        switchingSession = false;
        reconnectingSession = false;
        pendingSessionHandoff = false;
        reconnectAttempts = 0;
        if (reconnectTimer) clearTimeout(reconnectTimer);
        reconnectTimer = null;
        isRecording = false;
        isWaiting = false;
        userLine = null;
        aiLine = null;
        if (feedbackPromptShown || finalFeedbackRequested) {
          stopMockTicking();
          mockRunning = false;
          mockPrevBtn.disabled = true;
          mockToggleBtn.disabled = true;
          mockNextBtn.disabled = true;
          setTalkEnabled(false);
          showRetry(false);
          showFeedbackButton(!finalFeedbackRequested);
          setState(
            finalFeedbackRequested ? "總結評價" : "等待評價",
            finalFeedbackRequested
              ? "正在等待 AI 總結評價。"
              : "連線已恢復，請按「要求 AI 評價」。",
            "wait",
            false,
          );
          return;
        }
        mockNextBtn.disabled = false;
        setState(
          "準備好",
          "已連接第 " + (currentSessionIdx + 1) + " 節，繼續。",
          "ready",
          false,
        );
        setSubstatus("按下開始錄音，完成發言後再按下送出。");
        setTalkEnabled(true);
        applyMockSegment(pendingMockSegIdx, true);
        announceSegmentToAi(MOCK_SEGMENTS[pendingMockSegIdx]);
      }

      function mockPrev() {
        if (feedbackPromptShown || finalFeedbackRequested) return;
        if (
          isRecording ||
          isWaiting ||
          responsePurpose !== null ||
          activeAiLine
        )
          return;
        if (!canMockPrev(mockIndex)) {
          setSubstatus("上一段屬於另一節 Google session，不能跨節返回。");
          return;
        }
        const targetIndex = mockIndex - 1;
        applyMockSegment(targetIndex, false);
        announceSegmentToAi(MOCK_SEGMENTS[targetIndex]);
      }

      function startMockSequence() {
        mockToggleBtn.disabled = false;
        mockNextBtn.disabled = false;
        mockBar.style.display = "block";
        const tb = document.querySelector(".timer-box");
        if (tb) tb.style.display = "none";
        applyMockSegment(0, true);
        announceSegmentToAi(MOCK_SEGMENTS[0]);
      }

      function clearTimers(preserveHardDeadline) {
        if (recordTimer) clearInterval(recordTimer);
        if (waitTimer) clearTimeout(waitTimer);
        if (speechTimer) clearInterval(speechTimer);
        if (hardDeadlineTimer && !preserveHardDeadline)
          clearTimeout(hardDeadlineTimer);
        if (reconnectTimer) clearTimeout(reconnectTimer);
        if (setupWatchdogTimer) clearTimeout(setupWatchdogTimer);
        clearGoAwayReconnectTimer();
        if (handoffCloseTimer) clearTimeout(handoffCloseTimer);
        stopMockTicking();
        recordTimer = null;
        waitTimer = null;
        speechTimer = null;
        if (!preserveHardDeadline) hardDeadlineTimer = null;
        reconnectTimer = null;
        setupWatchdogTimer = null;
        handoffCloseTimer = null;
        mockRunning = false;
      }

      function startWaitTimer() {
        if (waitTimer) clearTimeout(waitTimer);
        waitTimer = setTimeout(() => {
          if (!isWaiting) return;
          setState(
            "等待 AI",
            "仍在等待 Gemini 回覆，可重試本輪或停止自由辯論。",
            "wait",
            true,
          );
          setSubstatus("如果長時間沒有反應，可以重試本輪。");
          setHint(
            "上一輪未收到 AI 回覆；你可以重試本輪，或停止自由辯論後重新建立。",
          );
          showRetry(true);
        }, 10000);
      }

      function clearWaitTimer() {
        if (waitTimer) clearTimeout(waitTimer);
        waitTimer = null;
      }

      function startFinalFeedbackWaitTimer() {
        if (waitTimer) clearTimeout(waitTimer);
        waitTimer = setTimeout(() => {
          if (!finalFeedbackRequested || finalFeedbackComplete) return;
          setState("等待評價", "仍在等待 AI 總結評價。", "wait", true);
          setSubstatus("如長時間沒有回應，請停止後重新開始自由辯論。");
        }, 10000);
      }

      function downsampleBuffer(buffer, inputRate, outputRate) {
        if (outputRate === inputRate) return buffer;
        const ratio = inputRate / outputRate;
        const newLength = Math.round(buffer.length / ratio);
        const result = new Float32Array(newLength);
        for (let i = 0; i < newLength; i++) {
          result[i] = buffer[Math.floor(i * ratio)] || 0;
        }
        return result;
      }

      function floatTo16BitPCM(float32) {
        const pcm = new Int16Array(float32.length);
        for (let i = 0; i < float32.length; i++) {
          const s = Math.max(-1, Math.min(1, float32[i]));
          pcm[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
        }
        return pcm;
      }

      function boundUserPcmFrame(pcm) {
        if (MOCK_MODE) return { pcm, budgetReached: false };
        // Keep an integer sample ledger as well as the wall-clock speech bank.
        // ScriptProcessor callbacks are whole frames, so the pre-callback time
        // check alone can otherwise admit one frame beyond the per-side cap.
        const sentRemaining = Math.max(
          0,
          USER_PCM_SAMPLE_LIMIT - userPcmSamplesSent,
        );
        const wallRemaining = Math.max(
          0,
          Math.floor(
            (SPEECH_SECONDS - getUserSpeechElapsed()) *
              USER_PCM_SAMPLE_RATE,
          ),
        );
        const acceptedLength = Math.min(
          pcm.length,
          sentRemaining,
          wallRemaining,
        );
        const acceptedPcm =
          acceptedLength === pcm.length
            ? pcm
            : pcm.subarray(0, acceptedLength);
        userPcmSamplesSent += acceptedLength;
        return {
          pcm: acceptedPcm,
          budgetReached:
            acceptedLength < pcm.length ||
            userPcmSamplesSent >= USER_PCM_SAMPLE_LIMIT ||
            acceptedLength >= wallRemaining,
        };
      }

      function bytesToBase64(bytes) {
        let binary = "";
        const chunk = 0x8000;
        for (let i = 0; i < bytes.length; i += chunk) {
          binary += String.fromCharCode.apply(
            null,
            bytes.subarray(i, i + chunk),
          );
        }
        return btoa(binary);
      }

      function resetAiAudioForTurn(stopCurrent) {
        ttsGeneration += 1;
        ttsTextBuffer = "";
        ttsQueue = [];
        ttsPending = 0;
        ttsPlaying = false;
        ttsFallbackActive = false;
        nativeAudioParts = [];
        nativeFallbackBoundary = 0;
        ttsReceivedText = false;
        ttsPlayedAnyAudio = false;
        resolveTtsDrain();
        if (stopCurrent) stopScheduledNativePcm();
        if (stopCurrent && currentTtsAudio) {
          try {
            currentTtsAudio.pause();
            currentTtsAudio.src = "";
          } catch (e) {}
        }
        if (currentTtsUrl) {
          try {
            URL.revokeObjectURL(currentTtsUrl);
          } catch (e) {}
        }
        currentTtsAudio = null;
        currentTtsUrl = "";
        if (stopCurrent && outputCtx) playAt = outputCtx.currentTime;
      }

      function stopScheduledNativePcm() {
        nativePcmSources.forEach((source) => {
          try {
            source.stop();
          } catch (e) {}
          try {
            source.disconnect();
          } catch (e) {}
        });
        nativePcmSources.clear();
        if (outputCtx) playAt = outputCtx.currentTime;
        else playAt = 0;
      }

      function resolveTtsDrain() {
        if (ttsQueue.length || ttsPending || ttsPlaying || currentTtsAudio)
          return;
        const resolvers = ttsDrainResolvers.slice();
        ttsDrainResolvers = [];
        resolvers.forEach((resolve) => resolve());
      }

      function waitForTtsDrain() {
        if (ttsFallbackActive || azureTtsSessionDisabled || !azureTtsEnabled)
          return Promise.resolve();
        if (!ttsQueue.length && !ttsPending && !ttsPlaying && !currentTtsAudio)
          return Promise.resolve();
        return new Promise((resolve) => ttsDrainResolvers.push(resolve));
      }

      function nextTtsBoundary(text) {
        const marks = "。！？；\n";
        for (let i = 0; i < text.length; i++) {
          if (marks.indexOf(text[i]) >= 0) return i + 1;
        }
        return -1;
      }

      function queueAzureTtsText(text, force) {
        if (!azureTtsEnabled || azureTtsSessionDisabled || ttsFallbackActive)
          return;
        if (!text && !force) return;
        if (text) {
          ttsReceivedText = true;
          ttsTextBuffer += text;
        }
        let boundary = nextTtsBoundary(ttsTextBuffer);
        while (boundary > 0) {
          const chunk = ttsTextBuffer.slice(0, boundary).trim();
          ttsTextBuffer = ttsTextBuffer.slice(boundary);
          if (chunk) enqueueTtsChunk(chunk);
          boundary = nextTtsBoundary(ttsTextBuffer);
        }
        if (force && ttsTextBuffer.trim()) {
          enqueueTtsChunk(ttsTextBuffer.trim());
          ttsTextBuffer = "";
        }
      }

      function enqueueTtsChunk(text) {
        if (!text) return;
        if (text.length > 1200) {
          for (let i = 0; i < text.length; i += 1200) {
            const part = text.slice(i, i + 1200).trim();
            if (part) ttsQueue.push(part);
          }
          processTtsQueue();
          return;
        }
        ttsQueue.push(text);
        processTtsQueue();
      }

      function playNativeAudioParts(startIndex) {
        if (!nativeAudioParts.length) return;
        const safeStart = Math.max(
          0,
          Math.min(Number(startIndex || 0), nativeAudioParts.length),
        );
        const parts = nativeAudioParts.slice(safeStart);
        nativeAudioParts = [];
        nativeFallbackBoundary = 0;
        parts.forEach((part) => playPcm(part.data, part.mimeType));
      }

      function activateNativeTtsFallback(message) {
        if (ttsFallbackActive) return;
        const partialServerTtsPlayed = ttsPlayedAnyAudio;
        const safeNativeRemainderStart = nativeFallbackBoundary;
        ttsFallbackActive = true;
        ttsQueue = [];
        ttsPending = 0;
        ttsTextBuffer = "";
        if (currentTtsAudio) {
          try {
            currentTtsAudio.pause();
            currentTtsAudio.src = "";
          } catch (e) {}
        }
        if (currentTtsUrl) {
          try {
            URL.revokeObjectURL(currentTtsUrl);
          } catch (e) {}
        }
        currentTtsAudio = null;
        currentTtsUrl = "";
        if (partialServerTtsPlayed) {
          // Azure text audio and Gemini PCM have no shared timestamps. The only
          // no-duplicate boundary we can prove is PCM received after the last
          // fully played Azure clip. Preserve/play that remainder plus all
          // future PCM; overlapping earlier PCM is not replayed, and the full
          // transcript remains visible instead of silently hiding the tradeoff.
          setHint(
            "Azure TTS 中途停止；為免重播已聽內容，只會播放可安全分辨的餘下 Gemini 聲音，完整文字仍會保留。",
          );
        } else if (!ttsWarningShown) {
          ttsWarningShown = true;
          setHint(
            message ||
              "Azure TTS 暫時未能播放，今輪會改用 Gemini Live 原生聲音。",
          );
        }
        playNativeAudioParts(
          partialServerTtsPlayed ? safeNativeRemainderStart : 0,
        );
        resolveTtsDrain();
      }

      async function processTtsQueue() {
        if (
          ttsPlaying ||
          ttsFallbackActive ||
          azureTtsSessionDisabled ||
          !azureTtsEnabled
        )
          return;
        const text = ttsQueue.shift();
        if (!text) {
          resolveTtsDrain();
          return;
        }
        const generation = ttsGeneration;
        ttsPlaying = true;
        ttsPending += 1;
        try {
          const headers = { "Content-Type": "application/json" };
          const resp = await fetch("/api/tts/azure", {
            method: "POST",
            headers,
            credentials: "same-origin",
            cache: "no-store",
            body: JSON.stringify({ text }),
          });
          if (!resp.ok) {
            if (
              resp.status === 503 ||
              resp.status === 401 ||
              resp.status === 429
            )
              azureTtsSessionDisabled = true;
            throw new Error("Azure TTS HTTP " + resp.status);
          }
          const blob = await resp.blob();
          if (generation !== ttsGeneration) return;
          await playTtsBlob(blob);
        } catch (e) {
          if (generation !== ttsGeneration) return;
          console.warn("[Live] Azure TTS fallback:", e);
          activateNativeTtsFallback(
            "Azure TTS 暫時未能播放，今輪會改用 Gemini Live 原生聲音。",
          );
        } finally {
          if (generation !== ttsGeneration) return;
          ttsPending = Math.max(0, ttsPending - 1);
          ttsPlaying = false;
          if (!ttsFallbackActive && ttsQueue.length) {
            processTtsQueue();
          } else {
            resolveTtsDrain();
          }
        }
      }

      function playTtsBlob(blob) {
        return new Promise((resolve, reject) => {
          if (!blob || !blob.size) {
            reject(new Error("Empty TTS audio"));
            return;
          }
          const url = URL.createObjectURL(blob);
          const audio = new Audio(url);
          currentTtsAudio = audio;
          currentTtsUrl = url;
          audio.onended = () => {
            // Everything received up to this point overlaps a fully spoken
            // Azure prefix; later buffered PCM is the safe native remainder.
            if (ttsPlayedAnyAudio)
              nativeFallbackBoundary = nativeAudioParts.length;
            URL.revokeObjectURL(url);
            if (currentTtsAudio === audio) currentTtsAudio = null;
            if (currentTtsUrl === url) currentTtsUrl = "";
            resolve();
          };
          audio.onerror = () => {
            if (Number(audio.currentTime || 0) > 0) {
              ttsPlayedAnyAudio = true;
              nativeFallbackBoundary = nativeAudioParts.length;
            }
            URL.revokeObjectURL(url);
            if (currentTtsAudio === audio) currentTtsAudio = null;
            if (currentTtsUrl === url) currentTtsUrl = "";
            reject(new Error("TTS audio playback failed"));
          };
          audio
            .play()
            .then(() => {
              ttsPlayedAnyAudio = true;
            })
            .catch((e) => {
              URL.revokeObjectURL(url);
              if (currentTtsAudio === audio) currentTtsAudio = null;
              if (currentTtsUrl === url) currentTtsUrl = "";
              reject(e);
            });
        });
      }

      function pcmBase64ToFloat32(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        const view = new DataView(bytes.buffer);
        const samples = new Float32Array(bytes.byteLength / 2);
        for (let i = 0; i < samples.length; i++) {
          samples[i] = view.getInt16(i * 2, true) / 32768;
        }
        return samples;
      }

      function decodedBase64ByteLength(base64) {
        const clean = String(base64 || "").replace(/\s/g, "");
        if (!clean) return 0;
        const padding = clean.endsWith("==") ? 2 : clean.endsWith("=") ? 1 : 0;
        return Math.max(0, Math.floor((clean.length * 3) / 4) - padding);
      }

      function pcmAudioDurationSeconds(base64, mimeType) {
        const mime = String(mimeType || "");
        if (!/^audio\/(?:pcm|l16)\b/i.test(mime)) return 0;
        const sampleRateMatch = mime.match(/rate=(\d+)/i);
        const channelsMatch = mime.match(/channels=(\d+)/i);
        const sampleRate = sampleRateMatch
          ? parseInt(sampleRateMatch[1], 10)
          : 24000;
        const channels = channelsMatch ? parseInt(channelsMatch[1], 10) : 1;
        if (!(sampleRate > 0) || !(channels > 0)) return 0;
        return decodedBase64ByteLength(base64) / (sampleRate * channels * 2);
      }

      function accountAiPcmAudio(base64, mimeType) {
        if (
          MOCK_MODE ||
          feedbackPromptShown ||
          finalFeedbackRequested ||
          responsePurpose === "feedback"
        )
          return true;
        const duration = pcmAudioDurationSeconds(base64, mimeType);
        if (!(duration > 0)) return false;
        const nextElapsed = aiSpeechElapsed + duration;
        if (nextElapsed >= SPEECH_SECONDS) {
          // Do not play the boundary-crossing provider frame. Live PCM arrives
          // in small chunks, so dropping at most one chunk keeps provider
          // output at or below the per-side hard budget.
          aiSpeechElapsed = SPEECH_SECONDS;
          updateSpeechTimer();
          return false;
        }
        aiSpeechElapsed = nextElapsed;
        updateSpeechTimer();
        return true;
      }

      function processAiModelTurnParts(parts) {
        if (!Array.isArray(parts)) return;
        const silentFreeFeedback =
          !MOCK_MODE &&
          typeof responsePurpose !== "undefined" &&
          responsePurpose === "feedback";
        for (const part of parts) {
          if (!part || typeof part !== "object") continue;
          if (!silentFreeFeedback && part.inlineData && part.inlineData.data) {
            if (
              !accountAiPcmAudio(
                part.inlineData.data,
                part.inlineData.mimeType,
              )
            ) {
              // accountAiPcmAudio() may synchronously enter the feedback state.
              // Stop this batch here: later parts must not see that state and
              // become newly eligible for native queuing/playback.
              break;
            }
            if (
              azureTtsEnabled &&
              !azureTtsSessionDisabled &&
              !ttsFallbackActive
            ) {
              nativeAudioParts.push({
                data: part.inlineData.data,
                mimeType: part.inlineData.mimeType,
              });
            } else {
              playPcm(part.inlineData.data, part.inlineData.mimeType);
            }
          }
          if (part.text) appendLineText(aiLine, part.text);
        }
      }

      function playPcm(base64, mimeType) {
        if (!outputCtx)
          outputCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (outputCtx.state === "suspended") outputCtx.resume();
        const sampleRateMatch = String(mimeType || "").match(/rate=(\d+)/);
        const sampleRate = sampleRateMatch
          ? parseInt(sampleRateMatch[1], 10)
          : 24000;
        const samples = pcmBase64ToFloat32(base64);
        const buffer = outputCtx.createBuffer(1, samples.length, sampleRate);
        buffer.copyToChannel(samples, 0);
        const src = outputCtx.createBufferSource();
        src.buffer = buffer;
        src.connect(outputCtx.destination);
        nativePcmSources.add(src);
        src.onended = () => {
          nativePcmSources.delete(src);
          try {
            src.disconnect();
          } catch (e) {}
        };
        // A tiny queue absorbs Live/WebSocket burst jitter without adding a
        // perceptible turn delay.  It prevents the intermittent chopped replies
        // reported on longer Free De and Mock sessions.
        playAt = Math.max(playAt, outputCtx.currentTime + 0.12);
        src.start(playAt);
        playAt += buffer.duration;
      }

      function liveRunIsStale(expectedSessionEpoch) {
        return (
          expectedSessionEpoch !== sessionEpoch ||
          manualStopping ||
          feedbackPromptShown
        );
      }

      function disposeMicSetup(nextStream, nextInputCtx, nextSource, nextProcessor) {
        try {
          if (nextProcessor) nextProcessor.disconnect();
        } catch (e) {}
        try {
          if (nextSource) nextSource.disconnect();
        } catch (e) {}
        try {
          if (nextStream)
            nextStream.getTracks().forEach((track) => track.stop());
        } catch (e) {}
        try {
          if (nextInputCtx) nextInputCtx.close();
        } catch (e) {}
      }

      async function startMic(expectedSessionEpoch) {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("此瀏覽器不支援麥克風錄音。");
        }
        const nextStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
          },
        });
        let nextInputCtx = null;
        let nextSource = null;
        let nextProcessor = null;
        try {
          if (liveRunIsStale(expectedSessionEpoch)) {
            disposeMicSetup(nextStream, null, null, null);
            return false;
          }
          nextInputCtx = new (
            window.AudioContext || window.webkitAudioContext
          )();
          await nextInputCtx.resume();
          if (liveRunIsStale(expectedSessionEpoch)) {
            disposeMicSetup(nextStream, nextInputCtx, null, null);
            return false;
          }
          nextSource = nextInputCtx.createMediaStreamSource(nextStream);
          nextProcessor = nextInputCtx.createScriptProcessor(2048, 1, 1);
          nextProcessor.onaudioprocess = (event) => {
            if (!isRecording) return;
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            if (!MOCK_MODE && getUserSpeechElapsed() >= SPEECH_SECONDS) {
              commitUserSpeechTime();
              finishFreeDebateForBudget("你方已用完本節發言時間。");
              return;
            }
            const raw = event.inputBuffer.getChannelData(0);
            let peak = 0;
            for (let i = 0; i < raw.length; i++)
              peak = Math.max(peak, Math.abs(raw[i]));
            meterEl.style.width = Math.min(100, Math.round(peak * 150)) + "%";
            const downsampled = downsampleBuffer(
              raw,
              nextInputCtx.sampleRate,
              16000,
            );
            const pcm = floatTo16BitPCM(downsampled);
            const boundedPcm = boundUserPcmFrame(pcm);
            if (boundedPcm.pcm.length) {
              ws.send(
                JSON.stringify({
                  realtimeInput: {
                    audio: {
                      data: bytesToBase64(
                        new Uint8Array(
                          boundedPcm.pcm.buffer,
                          boundedPcm.pcm.byteOffset,
                          boundedPcm.pcm.byteLength,
                        ),
                      ),
                      mimeType: "audio/pcm;rate=16000",
                    },
                  },
                }),
              );
            }
            if (boundedPcm.budgetReached) {
              userSpeechElapsed = SPEECH_SECONDS;
              userSpeechStartedAt = 0;
              updateSpeechTimer();
            }
          };
          nextSource.connect(nextProcessor);
          // Keep the processing graph alive without routing the mic to speakers.
          // Direct monitoring creates feedback and can cause mobile audio sessions
          // to be interrupted during Free De / Mock.
          const silentGain = nextInputCtx.createGain();
          silentGain.gain.value = 0;
          nextProcessor.connect(silentGain);
          silentGain.connect(nextInputCtx.destination);
          if (liveRunIsStale(expectedSessionEpoch)) {
            disposeMicSetup(
              nextStream,
              nextInputCtx,
              nextSource,
              nextProcessor,
            );
            return false;
          }
          stream = nextStream;
          inputCtx = nextInputCtx;
          sourceNode = nextSource;
          processor = nextProcessor;
          return true;
        } catch (error) {
          disposeMicSetup(
            nextStream,
            nextInputCtx,
            nextSource,
            nextProcessor,
          );
          throw error;
        }
      }

      function sendSetup() {
        if (
          !(CONTEXT_TRIGGER_TOKENS > 0) ||
          !(CONTEXT_TARGET_TOKENS > 0) ||
          CONTEXT_TARGET_TOKENS >= CONTEXT_TRIGGER_TOKENS
        ) {
          throw new Error("Live context 壓縮設定無效，請聯絡管理員。");
        }
        const resumptionHandle =
          sessionResumptionHandles[currentSessionIdx] || "";
        ws.send(
          JSON.stringify({
            setup: {
              model: "models/" + MODEL,
              generationConfig: {
                responseModalities: ["AUDIO"],
                speechConfig: {
                  voiceConfig: {
                    prebuiltVoiceConfig: { voiceName: "Kore" },
                  },
                },
              },
              systemInstruction: {
                parts: [{ text: buildSystemInstruction() }],
              },
              realtimeInputConfig: {
                automaticActivityDetection: { disabled: true },
              },
              contextWindowCompression: {
                triggerTokens: CONTEXT_TRIGGER_TOKENS,
                slidingWindow: { targetTokens: CONTEXT_TARGET_TOKENS },
              },
              sessionResumption: resumptionHandle
                ? { handle: resumptionHandle }
                : {},
              inputAudioTranscription: {},
              outputAudioTranscription: {},
            },
          }),
        );
      }

      function buildSystemInstruction() {
        // The ephemeral token is locked to this exact server-authored prompt.
        // Mock hand-off context is sent as the first text turn after setup.
        return SYSTEM_PROMPT;
      }

      async function prepareMicAfterSetup(expectedSessionEpoch) {
        if (micReady) return;
        setState("連線中", "已連線，正在啟動麥克風...", "wait", true);
        setSubstatus("請允許瀏覽器使用麥克風。");
        try {
          if (!(await startMic(expectedSessionEpoch))) return;
          if (liveRunIsStale(expectedSessionEpoch)) return;
          micReady = true;
          reconnectingSession = false;
          reconnectAttempts = 0;
          if (MOCK_MODE) {
            setState("準備好", "Mock 已準備好。", "ready", false);
            setSubstatus("按下開始錄音，完成發言後再按下送出。");
            setTalkEnabled(true);
            addLine(
              "系統",
              "Mock 已開始。按下開始錄音，完成發言後再按下送出交給 AI。",
              false,
            );
            startMockSequence();
          } else {
            startSpeechTimer();
            addLine(
              "系統",
              "自由辯論已開始。按下開始錄音，完成發言後再按下送出交給 AI。",
              false,
            );
            if (AI_STARTS) {
              try {
                isWaiting = true;
                setTalkEnabled(false);
                setState("等待 AI", "AI 先發言，請聽完再回應。", "wait", true);
                setSubstatus("AI 會先代表正方開局。");
                resetAiAudioForTurn(true);
                sendTextTurn(LIVE_PROMPTS.ai_opening_reverse);
                startWaitTimer();
              } catch (e) {
                isWaiting = false;
                clearWaitTimer();
                setState(
                  "準備好",
                  "AI 未能自動開局，輪到你先發言。",
                  "ready",
                  false,
                );
                setSubstatus("按下開始錄音，完成發言後再按下送出。");
                setTalkEnabled(true);
              }
            } else {
              setState(
                "準備好",
                "自由辯論已準備好，輪到你發言。",
                "ready",
                false,
              );
              setSubstatus("按下開始錄音，完成發言後再按下送出。");
              setTalkEnabled(true);
            }
          }
        } catch (e) {
          if (liveRunIsStale(expectedSessionEpoch)) return;
          setState("錯誤", "無法取得麥克風權限：" + e.message, "error", false);
          setSubstatus("請檢查瀏覽器權限，然後重新開始自由辯論。");
          closeStatusLocked = true;
          cleanupMedia(true);
          startBtn.disabled = false;
          stopBtn.disabled = true;
          setTalkEnabled(false);
          showRetry(false);
        }
      }

      async function startLive() {
        if (!window.WebSocket) {
          setState("錯誤", "此瀏覽器不支援 WebSocket。", "error", false);
          return;
        }
        if (!window.AudioContext && !window.webkitAudioContext) {
          setState("錯誤", "此瀏覽器不支援音訊播放。", "error", false);
          return;
        }
        // 每次按「開始」都係一個全新 lifecycle。最終評價完成後會先
        // cleanup 再展示完成狀態，所以唔可以將上一輪嘅 feedback flags
        // 帶入下一輪，否則第二次 Stop 會被誤當成已完成評價。
        finalFeedbackRequested = false;
        finalFeedbackComplete = false;
        feedbackPromptShown = false;
        responsePurpose = null;
        feedbackPromptQueued = false;
        retryPromptQueued = false;
        closeStatusLocked = false;
        manualStopping = false;
        hasStartedOnce = true;
        userSpeechElapsed = 0;
        userSpeechStartedAt = 0;
        userPcmSamplesSent = 0;
        aiSpeechElapsed = 0;
        speechEnded = false;
        firedBells.clear();
        reconnectAttempts = 0;
        sessionResumptionHandles = {};
        startFreeHardDeadline();
        // A preserved deadline may expire synchronously on a retry (for
        // example, after the timer callback was delayed in a background tab).
        // expireFreeHardDeadline() performs the cleanup and clears this start
        // timestamp; do not let the now-expired lifecycle continue to mint a
        // token or open a fresh socket.
