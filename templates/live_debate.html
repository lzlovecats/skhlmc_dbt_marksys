<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; }
body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #111; color: #eee;
}
.live-wrap { border: 1px solid #333; border-radius: 8px; overflow: hidden; background: #171717; }
.topbar {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 12px; border-bottom: 1px solid #333; background: #202020;
}
.status { font-size: 13px; color: #aaa; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.buttons { display: flex; gap: 8px; flex-shrink: 0; }
button {
    border: none; border-radius: 8px; padding: 9px 14px; font-weight: 700;
    cursor: pointer; color: white; background: #444;
}
button.primary { background: #16a34a; }
button.danger { background: #dc2626; }
button:disabled { opacity: .45; cursor: not-allowed; }
.meter { height: 6px; background: #2b2b2b; }
.meter-fill { height: 100%; width: 0%; background: #22c55e; transition: width .08s linear; }
.log { height: 480px; overflow-y: auto; padding: 12px; background: #101010; }
.line { margin: 0 0 10px; line-height: 1.45; font-size: 15px; }
.who { font-weight: 800; color: #fca5a5; }
.who.user { color: #93c5fd; }
.hint { color: #888; font-size: 13px; padding: 10px 12px; border-top: 1px solid #333; }
</style>
</head>
<body>
<div class="live-wrap">
    <div class="topbar">
        <div class="status" id="status">未連線。按「開始」後瀏覽器會要求麥克風權限。</div>
        <div class="buttons">
            <button class="primary" id="startBtn">開始</button>
            <button class="danger" id="stopBtn" disabled>停止</button>
        </div>
    </div>
    <div class="meter"><div class="meter-fill" id="meter"></div></div>
    <div class="log" id="log">
        <p class="line"><span class="who">AI：</span>準備好之後按開始，然後直接發言。</p>
    </div>
    <div class="hint">Live API 屬 preview；如果無聲或連線失敗，先停止再重新建立 session。</div>
</div>
<script>
const LIVE_TOKEN = __LIVE_TOKEN__;
const MODEL = __LIVE_MODEL__;
const SYSTEM_PROMPT = __LIVE_PROMPT__;
const WS_URL = "wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContentConstrained?access_token=" + encodeURIComponent(LIVE_TOKEN);

let ws = null;
let stream = null;
let inputCtx = null;
let outputCtx = null;
let sourceNode = null;
let processor = null;
let playAt = 0;
let micStarted = false;

const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const statusEl = document.getElementById("status");
const logEl = document.getElementById("log");
const meterEl = document.getElementById("meter");

function setStatus(text) { statusEl.textContent = text; }

function addLine(who, text, isUser) {
    if (!text) return;
    const p = document.createElement("p");
    p.className = "line";
    const span = document.createElement("span");
    span.className = "who" + (isUser ? " user" : "");
    span.textContent = who + "：";
    p.appendChild(span);
    p.appendChild(document.createTextNode(text));
    logEl.appendChild(p);
    logEl.scrollTop = logEl.scrollHeight;
}

function downsampleBuffer(buffer, inputRate, outputRate) {
    if (outputRate === inputRate) return buffer;
    const ratio = inputRate / outputRate;
    const newLength = Math.round(buffer.length / ratio);
    const result = new Float32Array(newLength);
    for (let i = 0; i < newLength; i++) {
        result[i] = buffer[Math.floor(i * ratio)] || 0;
    }
    return result;
}

function floatTo16BitPCM(float32) {
    const pcm = new Int16Array(float32.length);
    for (let i = 0; i < float32.length; i++) {
        const s = Math.max(-1, Math.min(1, float32[i]));
        pcm[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
    }
    return pcm;
}

function bytesToBase64(bytes) {
    let binary = "";
    const chunk = 0x8000;
    for (let i = 0; i < bytes.length; i += chunk) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
    }
    return btoa(binary);
}

function pcmBase64ToFloat32(base64) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const view = new DataView(bytes.buffer);
    const samples = new Float32Array(bytes.byteLength / 2);
    for (let i = 0; i < samples.length; i++) {
        samples[i] = view.getInt16(i * 2, true) / 32768;
    }
    return samples;
}

function playPcm(base64, mimeType) {
    if (!outputCtx) outputCtx = new (window.AudioContext || window.webkitAudioContext)();
    const sampleRateMatch = String(mimeType || "").match(/rate=(\d+)/);
    const sampleRate = sampleRateMatch ? parseInt(sampleRateMatch[1], 10) : 24000;
    const samples = pcmBase64ToFloat32(base64);
    const buffer = outputCtx.createBuffer(1, samples.length, sampleRate);
    buffer.copyToChannel(samples, 0);
    const src = outputCtx.createBufferSource();
    src.buffer = buffer;
    src.connect(outputCtx.destination);
    playAt = Math.max(playAt, outputCtx.currentTime);
    src.start(playAt);
    playAt += buffer.duration;
}

async function startMic() {
    stream = await navigator.mediaDevices.getUserMedia({
        audio: {
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
        }
    });
    inputCtx = new (window.AudioContext || window.webkitAudioContext)();
    await inputCtx.resume();
    sourceNode = inputCtx.createMediaStreamSource(stream);
    processor = inputCtx.createScriptProcessor(4096, 1, 1);
    processor.onaudioprocess = (event) => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const raw = event.inputBuffer.getChannelData(0);
        let peak = 0;
        for (let i = 0; i < raw.length; i++) peak = Math.max(peak, Math.abs(raw[i]));
        meterEl.style.width = Math.min(100, Math.round(peak * 150)) + "%";
        const downsampled = downsampleBuffer(raw, inputCtx.sampleRate, 16000);
        const pcm = floatTo16BitPCM(downsampled);
        ws.send(JSON.stringify({
            realtimeInput: {
                audio: {
                    data: bytesToBase64(new Uint8Array(pcm.buffer)),
                    mimeType: "audio/pcm;rate=16000"
                }
            }
        }));
    };
    sourceNode.connect(processor);
    processor.connect(inputCtx.destination);
}

function sendSetup() {
    ws.send(JSON.stringify({
        setup: {
            model: "models/" + MODEL,
            responseModalities: ["AUDIO"],
            systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
            inputAudioTranscription: {},
            outputAudioTranscription: {}
        }
    }));
}

async function startMicAfterSetup() {
    if (micStarted) return;
    micStarted = true;
    setStatus("已連線，啟動麥克風中...");
    try {
        await startMic();
        setStatus("Live 自由辯論進行中。");
    } catch (e) {
        setStatus("無法取得麥克風權限：" + e.message);
        stopLive();
    }
}

async function startLive() {
    startBtn.disabled = true;
    stopBtn.disabled = false;
    setStatus("連線中...");
    outputCtx = new (window.AudioContext || window.webkitAudioContext)();
    await outputCtx.resume();
    ws = new WebSocket(WS_URL);
    ws.onopen = async () => {
        sendSetup();
        setStatus("已連線，等待 Live setup...");
    };
    ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.setupComplete) startMicAfterSetup();
        const sc = msg.serverContent;
        if (sc) {
            if (sc.inputTranscription && sc.inputTranscription.text) addLine("你", sc.inputTranscription.text, true);
            if (sc.outputTranscription && sc.outputTranscription.text) addLine("AI", sc.outputTranscription.text, false);
            if (sc.interrupted) playAt = outputCtx ? outputCtx.currentTime : 0;
            if (sc.modelTurn && sc.modelTurn.parts) {
                sc.modelTurn.parts.forEach((part) => {
                    if (part.inlineData && part.inlineData.data) {
                        playPcm(part.inlineData.data, part.inlineData.mimeType);
                    }
                    if (part.text) addLine("AI", part.text, false);
                });
            }
        }
    };
    ws.onerror = () => setStatus("Live WebSocket 發生錯誤。");
    ws.onclose = () => {
        setStatus("Live session 已結束。");
        startBtn.disabled = false;
        stopBtn.disabled = true;
    };
}

function stopLive() {
    if (processor) processor.disconnect();
    if (sourceNode) sourceNode.disconnect();
    if (stream) stream.getTracks().forEach((track) => track.stop());
    if (inputCtx) inputCtx.close();
    micStarted = false;
    meterEl.style.width = "0%";
    try {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ realtimeInput: { audioStreamEnd: true } }));
            ws.close();
        }
    } catch (e) {}
    startBtn.disabled = false;
    stopBtn.disabled = true;
}

startBtn.addEventListener("click", startLive);
stopBtn.addEventListener("click", stopLive);
</script>
</body>
</html>
