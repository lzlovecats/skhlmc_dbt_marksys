<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>賽務練習專用機</title>
    <style>
      :root {
        --bg: #0e0f13;
        --panel: #16181f;
        --panel-2: #1e2129;
        --border: #2c313d;
        --text: #eef1f6;
        --muted: #9aa3b2;
        --green: #38c172;
        --green-d: #2fa863;
        --amber: #ff9800;
        --red: #ff4b4b;
        --blue: #3b82f6;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans HK",
          "PingFang HK", Roboto, sans-serif;
        height: 100%;
        -webkit-font-smoothing: antialiased;
      }
      body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        overflow-x: hidden;
      }
      .hidden {
        display: none !important;
      }
      .app-shell {
        display: flex;
        flex: 1;
        flex-direction: column;
        min-height: 100vh;
      }

      /* ---- dedicated kiosk login ---- */
      .login-shell {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }
      .login-card {
        width: min(620px, 100%);
        padding: clamp(28px, 5vw, 54px);
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }
      .login-card h1 {
        margin-bottom: 10px;
        font-size: clamp(30px, 5vw, 50px);
      }
      .login-card p {
        margin-bottom: 26px;
        color: var(--muted);
        font-size: clamp(17px, 2vw, 22px);
        line-height: 1.55;
      }
      .login-card label {
        display: block;
        margin: 18px 0 8px;
        color: var(--muted);
        font-size: 18px;
        font-weight: 700;
      }
      .login-card input {
        width: 100%;
        min-height: 58px;
        padding: 12px 16px;
        border: 2px solid var(--border);
        border-radius: 12px;
        color: var(--text);
        background: var(--panel-2);
        font: inherit;
        font-size: 22px;
      }
      .login-card input:focus {
        border-color: var(--blue);
        outline: 3px solid rgba(59, 130, 246, 0.25);
      }
      .login-submit {
        width: 100%;
        min-height: 60px;
        margin-top: 24px;
        border: 0;
        border-radius: 14px;
        color: #fff;
        background: var(--blue);
        font: inherit;
        font-size: 24px;
        font-weight: 800;
        cursor: pointer;
      }
      .login-message {
        min-height: 1.6em;
        margin-top: 14px;
        color: var(--red);
        font-weight: 700;
      }

      /* ---- top bar ---- */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px clamp(16px, 3vw, 40px);
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }
      .brand {
        font-size: clamp(22px, 2.6vw, 34px);
        font-weight: 800;
        letter-spacing: 0.5px;
      }
      .brand .sub {
        color: var(--muted);
        font-weight: 600;
        font-size: 0.62em;
        margin-left: 10px;
      }

      .mode-switch {
        display: flex;
        gap: 10px;
      }
      .mode-btn {
        font-size: clamp(18px, 1.9vw, 26px);
        font-weight: 700;
        color: var(--muted);
        background: var(--panel-2);
        border: 2px solid var(--border);
        border-radius: 14px;
        padding: 14px 26px;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .mode-btn.active {
        color: #fff;
        background: var(--green);
        border-color: var(--green);
      }
      .logout-btn {
        flex: 0 0 auto;
        border-color: #596071;
        color: var(--text);
      }

      /* ---- content ---- */
      .content {
        flex: 1;
        padding: clamp(16px, 2.5vw, 36px);
        display: flex;
        flex-direction: column;
        justify-content: safe center;
        overflow-y: auto;
      }
      .panel {
        display: none;
        width: 100%;
      }
      .panel.active {
        display: block;
      }

      /* ---- timer controls ---- */
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 18px 26px;
        align-items: flex-end;
        margin-bottom: 22px;
      }
      .field {
        display: flex;
        flex: 1 1 250px;
        min-width: 0;
        flex-direction: column;
        gap: 8px;
      }
      .field label {
        font-size: clamp(15px, 1.4vw, 20px);
        color: var(--muted);
        font-weight: 700;
      }
      .field select,
      .field input {
        font-size: clamp(20px, 2vw, 28px);
        font-weight: 700;
        color: var(--text);
        background: var(--panel-2);
        border: 2px solid var(--border);
        border-radius: 12px;
        padding: 12px 16px;
        min-width: 0;
        width: 100%;
      }
      .output-btn {
        font-size: clamp(18px, 1.8vw, 25px);
        font-weight: 800;
        color: #fff;
        background: var(--blue);
        border: 2px solid var(--blue);
        border-radius: 12px;
        padding: 12px 18px;
        min-height: 58px;
        width: 100%;
        cursor: pointer;
      }
      .output-btn:hover {
        background: #2f6fe0;
      }
      .output-status {
        max-width: 330px;
        color: var(--muted);
        font-size: clamp(14px, 1.2vw, 17px);
        font-weight: 650;
      }
      .output-status.ready {
        color: var(--green);
      }
      .output-status.warn {
        color: var(--amber);
      }

      /* ---- stage selector ---- */
      .stage-selector {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 22px;
      }
      .stage-btn {
        flex: 1 1 150px;
        text-align: center;
        cursor: pointer;
        font-size: clamp(18px, 1.8vw, 26px);
        font-weight: 700;
        color: var(--muted);
        background: var(--panel-2);
        border: 2px solid var(--border);
        border-radius: 14px;
        padding: 16px 8px;
        transition: all 0.15s;
      }
      .stage-btn:hover {
        background: #262a34;
        color: var(--text);
      }
      .stage-btn.active {
        color: #fff;
        background: var(--red);
        border-color: var(--red);
      }

      /* ---- big display ---- */
      .sw-label {
        text-align: center;
        font-size: clamp(20px, 2.2vw, 32px);
        color: var(--muted);
        font-weight: 700;
        margin-bottom: 6px;
      }
      .sw-display {
        font-size: clamp(76px, 14vw, 190px);
        font-weight: 800;
        text-align: center;
        padding: clamp(12px, 2.2vw, 30px) 10px;
        border-radius: 24px;
        margin: 6px 0;
        font-variant-numeric: tabular-nums;
        letter-spacing: 2px;
        transition:
          background 0.3s,
          color 0.3s;
        line-height: 1;
      }
      .sw-display.normal {
        background: #12321c;
        color: #4dd07f;
      }
      .sw-display.warning {
        background: #3a2a0a;
        color: var(--amber);
      }
      .sw-display.overtime {
        background: #3a1414;
        color: var(--red);
      }

      .btn-row {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        justify-content: center;
        margin-top: 16px;
      }
      .btn {
        font-size: clamp(20px, 2vw, 30px);
        font-weight: 800;
        cursor: pointer;
        border: none;
        border-radius: 16px;
        padding: 16px clamp(28px, 4vw, 56px);
        color: #fff;
        transition: all 0.15s;
        min-width: 150px;
      }
      .btn:active {
        transform: translateY(2px);
      }
      .btn-start {
        background: var(--green);
      }
      .btn-start:hover {
        background: var(--green-d);
      }
      .btn-pause {
        background: var(--amber);
      }
      .btn-reset {
        background: #4b5160;
      }
      .btn-reset:hover {
        background: #59607a;
      }
      .btn-test {
        background: var(--blue);
      }
      #single-start {
        font-size: clamp(24px, 2.6vw, 40px);
        padding: 20px clamp(44px, 6vw, 84px);
        box-shadow: 0 6px 18px rgba(56, 193, 114, 0.28);
      }

      /* ---- bell schedule ---- */
      .bell-schedule {
        margin-top: 16px;
        padding: 12px 18px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 2px 22px;
        align-items: baseline;
      }
      .bell-schedule h4 {
        font-size: clamp(14px, 1.3vw, 18px);
        color: var(--muted);
        margin: 0 8px 2px 0;
        flex-basis: 100%;
      }
      .bell-item {
        font-size: clamp(14px, 1.3vw, 18px);
        padding: 3px 0;
        color: #7d8493;
        font-weight: 600;
      }
      .bell-item.fired {
        color: var(--green);
      }

      /* ---- free (dual) timer ---- */
      .free-wrap {
        display: flex;
        flex-wrap: wrap;
        gap: 22px;
      }
      .free-side {
        flex: 1 1 320px;
        text-align: center;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 18px;
      }
      .free-side h3 {
        font-size: clamp(24px, 2.4vw, 36px);
        margin-bottom: 10px;
      }
      .free-side .sw-display {
        font-size: clamp(64px, 11vw, 150px);
      }

      /* ---- AI panel ---- */
      .ai-card {
        max-width: 900px;
        margin: clamp(20px, 5vh, 70px) auto;
        text-align: center;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 26px;
        padding: clamp(30px, 5vw, 70px) clamp(20px, 4vw, 56px);
      }
      .ai-card .emoji {
        font-size: clamp(56px, 9vw, 110px);
        line-height: 1;
      }
      .ai-card h2 {
        font-size: clamp(30px, 4vw, 56px);
        font-weight: 800;
        margin: 18px 0 14px;
      }
      .ai-card p {
        font-size: clamp(18px, 2vw, 27px);
        color: var(--muted);
        line-height: 1.6;
        margin-bottom: 30px;
      }
      .ai-launch {
        display: inline-block;
        font-size: clamp(24px, 3vw, 40px);
        font-weight: 800;
        color: #fff;
        background: var(--blue);
        border: none;
        border-radius: 20px;
        padding: clamp(18px, 2.5vw, 30px) clamp(40px, 6vw, 80px);
        cursor: pointer;
        text-decoration: none;
        transition: all 0.15s;
      }
      .ai-launch:hover {
        background: #2f6fe0;
      }
      .ai-note {
        margin-top: 24px;
        font-size: clamp(14px, 1.4vw, 19px);
        color: #6b7280;
      }

      /* ---- AI評判易 full-match microphone review ---- */
      .review-wrap {
        display: grid;
        width: min(1120px, 100%);
        margin: 0 auto;
        gap: 18px;
      }
      .review-card {
        padding: clamp(20px, 3vw, 34px);
        border: 1px solid var(--border);
        border-radius: 22px;
        background: var(--panel);
      }
      .review-card h2 {
        margin-bottom: 10px;
        font-size: clamp(27px, 3.5vw, 43px);
      }
      .review-card p,
      .privacy-note {
        color: var(--muted);
        font-size: clamp(16px, 1.6vw, 20px);
        line-height: 1.6;
      }
      .review-fields {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        margin-top: 20px;
      }
      .review-fields .wide {
        grid-column: 1 / -1;
      }
      .review-fields input,
      .review-fields select {
        width: 100%;
        min-height: 54px;
        padding: 10px 14px;
        border: 2px solid var(--border);
        border-radius: 12px;
        color: var(--text);
        background: var(--panel-2);
        font: inherit;
        font-size: clamp(17px, 1.6vw, 22px);
      }
      .review-consent {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        margin-top: 20px;
        padding: 16px;
        border: 1px solid #6b5b2c;
        border-radius: 14px;
        background: #29230f;
        color: #ffe7a3;
        font-size: clamp(15px, 1.4vw, 19px);
        line-height: 1.5;
      }
      .review-consent input {
        width: 24px;
        height: 24px;
        flex: 0 0 auto;
        margin-top: 2px;
      }
      .record-display {
        margin: 20px 0 6px;
        color: #ff7474;
        font-size: clamp(52px, 9vw, 100px);
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        letter-spacing: 1px;
        text-align: center;
      }
      .record-meta,
      .review-status {
        min-height: 1.5em;
        color: var(--muted);
        font-size: 17px;
        font-weight: 650;
        text-align: center;
      }
      .review-status.error {
        color: #ff9c9c;
      }
      .review-status.ok {
        color: #7ce6a7;
      }
      .review-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin-top: 18px;
      }
      .review-actions button,
      .mic-refresh,
      .hardware-test,
      .marker-button {
        min-height: 54px;
        padding: 12px 24px;
        border: 0;
        border-radius: 13px;
        color: #fff;
        background: #4b5160;
        font: inherit;
        font-size: clamp(17px, 1.7vw, 23px);
        font-weight: 800;
        cursor: pointer;
      }
      .review-actions button:disabled,
      .mic-refresh:disabled,
      .hardware-test:disabled,
      .marker-button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      #review-start {
        background: var(--red);
      }
      #review-stop {
        background: var(--amber);
      }
      #review-analyze {
        background: var(--blue);
      }
      .hardware-panel,
      .marker-panel {
        margin-top: 18px;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--panel-2);
      }
      .hardware-test {
        width: 100%;
        background: #2f6fe0;
      }
      .preflight-results {
        display: grid;
        gap: 6px;
        margin-top: 12px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.45;
      }
      .preflight-results .pass { color: #7ce6a7; }
      .preflight-results .fail { color: #ff9c9c; }
      .preflight-results .warn { color: #ffd37c; }
      .marker-panel h3 { margin: 0 0 8px; }
      .marker-help {
        margin: 0 0 12px;
        color: var(--muted);
        line-height: 1.45;
      }
      .marker-controls {
        display: grid;
        grid-template-columns: minmax(180px, 1fr) repeat(3, minmax(130px, auto));
        gap: 10px;
      }
      .marker-controls select {
        min-height: 52px;
        padding: 8px 12px;
        border: 2px solid var(--border);
        border-radius: 12px;
        color: var(--text);
        background: #171a22;
        font: inherit;
      }
      .marker-button.pro { background: #2f6fe0; }
      .marker-button.con { background: #c23b4d; }
      .marker-button.both { background: #7b4cc9; }
      .marker-button.unknown { background: #5c6474; }
      .marker-log {
        margin-top: 10px;
        color: #d8deea;
        font-size: 15px;
        line-height: 1.5;
      }
      .transcript-details {
        margin-top: 22px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
      }
      .transcript-details summary {
        cursor: pointer;
        font-size: 20px;
        font-weight: 800;
      }
      .transcript-details .review-result {
        max-height: 65vh;
        margin-top: 14px;
        padding: 14px;
        overflow: auto;
        border-radius: 12px;
        background: #151820;
        font-size: 16px;
      }
      .mic-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }
      .review-result {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        color: var(--text);
        font-size: clamp(17px, 1.7vw, 22px);
        line-height: 1.7;
      }
      .review-result:empty {
        display: none;
      }
      @media (max-width: 1400px) {
        .topbar {
          align-items: stretch;
          flex-direction: column;
        }
        .mode-switch {
          width: 100%;
        }
        .mode-btn {
          flex: 1 1 0;
        }
      }
      @media (max-width: 680px) {
        .brand .sub {
          display: block;
          margin: 4px 0 0;
        }
        .mode-switch {
          flex-direction: column;
        }
        .mode-btn {
          width: 100%;
        }
        .review-fields {
          grid-template-columns: 1fr;
        }
        .review-fields .wide {
          grid-column: auto;
        }
        .mic-row {
          grid-template-columns: 1fr;
        }
        .marker-controls {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <section class="login-shell" id="kiosk-login">
      <form class="login-card" id="kiosk-login-form">
        <h1>🖥️ Kiosk 登入</h1>
        <p>呢部專用機只接受 kiosk 帳戶。帳戶名稱已固定，請輸入 kiosk 密碼。</p>
        <label for="kiosk-account">帳戶</label>
        <input id="kiosk-account" value="kiosk" readonly aria-readonly="true" />
        <label for="kiosk-password">密碼</label>
        <input
          id="kiosk-password"
          type="password"
          maxlength="512"
          autocomplete="current-password"
          required
          autofocus
        />
        <button class="login-submit" id="kiosk-login-submit" type="submit">
          登入 Kiosk
        </button>
        <div class="login-message" id="kiosk-login-message" role="alert"></div>
      </form>
    </section>

    <div class="app-shell hidden" id="kiosk-app">
      <div class="topbar">
        <div class="brand">
          聖呂中辯恒常訓練<span class="sub">練習專用機</span>
        </div>
        <div class="mode-switch">
          <button
            class="mode-btn active"
            id="mode-timer"
            onclick="switchMode('timer')"
          >
            🔔 叮叮計時
          </button>
          <button class="mode-btn" id="mode-ai" onclick="switchMode('ai')">
            🤖 AI 辯論練習
          </button>
          <button class="mode-btn logout-btn" onclick="logoutKiosk()">
            登出
          </button>
        </div>
      </div>

      <div class="content">
      <!-- ============ 叮叮計時 ============ -->
      <div class="panel active" id="panel-timer">
        <div class="controls">
          <div class="field">
            <label>賽制</label>
            <select id="format-select" onchange="onFormatChange()"></select>
          </div>
          <div class="field" id="free-field" style="display: none">
            <label>自由辯論（每邊，分鐘）</label>
            <input
              type="number"
              id="free-minutes"
              value="5"
              min="2"
              max="10"
              step="0.5"
              onchange="reloadConfig()"
            />
          </div>
          <div class="field">
            <label>結辯準備（分鐘）</label>
            <input
              type="number"
              id="closing-prep"
              value="2"
              min="0.5"
              max="10"
              step="0.5"
              onchange="reloadConfig()"
            />
          </div>
          <div class="field">
            <label>鈴聲輸出（網頁音量固定 100%）</label>
            <button
              type="button"
              class="output-btn"
              id="speaker-button"
              onclick="selectSpeaker()"
            >
              🔊 連接 Bluetooth／喇叭
            </button>
            <div class="output-status" id="speaker-status">
              目前使用系統預設喇叭
            </div>
          </div>
        </div>

        <div class="stage-selector" id="stage-selector"></div>

        <div id="single-timer">
          <div class="sw-label" id="single-label">計時</div>
          <div class="sw-display normal" id="single-display">0:00.000</div>
          <div class="btn-row">
            <button
              class="btn btn-start"
              id="single-start"
              onclick="toggleSingle()"
            >
              開始
            </button>
            <button class="btn btn-test" onclick="testBell()">
              🔔 測試聲音
            </button>
            <button class="btn btn-reset" onclick="resetSingle()">重置</button>
          </div>
          <div class="bell-schedule" id="single-bells"></div>
        </div>

        <div id="free-timer" style="display: none">
          <div class="free-wrap">
            <div class="free-side">
              <h3>正方</h3>
              <div class="sw-display normal" id="free-pro-display">0:00.000</div>
              <div class="btn-row">
                <button
                  class="btn btn-start"
                  id="free-pro-btn"
                  onclick="toggleFree('pro')"
                >
                  開始
                </button>
                <button class="btn btn-reset" onclick="resetFree('pro')">
                  重置
                </button>
              </div>
            </div>
            <div class="free-side">
              <h3>反方</h3>
              <div class="sw-display normal" id="free-con-display">0:00.000</div>
              <div class="btn-row">
                <button
                  class="btn btn-start"
                  id="free-con-btn"
                  onclick="toggleFree('con')"
                >
                  開始
                </button>
                <button class="btn btn-reset" onclick="resetFree('con')">
                  重置
                </button>
              </div>
            </div>
          </div>
          <div class="btn-row">
            <button class="btn btn-test" onclick="testBell()">
              🔔 測試聲音
            </button>
          </div>
          <div class="bell-schedule" id="free-bells"></div>
        </div>
      </div>

      <!-- ============ AI 辯論練習 ============ -->
      <div class="panel" id="panel-ai">
        <div class="ai-card">
          <div class="emoji">🤖</div>
          <h2>AI 辯論練習</h2>
          <p>
            用 Gemini Live 同 AI 做自由辯論或全場模擬練習，AI
            會即場回應同計時。<br />撳下面掣就開始。
          </p>
          <a class="ai-launch" href="/practice/ai-debate"
            >▶ 開始 AI 辯論練習</a
          >
          <div class="ai-note">練習完成後可按 <b>Alt + F4</b> 返主選單。</div>
        </div>
      </div>

      </div>
    </div>

    <script>
      // ---------- bell audio (Web Audio; falls back to a synth tone) ----------
      const BELL_SRC = "/api/practice/bell";
      const BELL_BOOST = 12.0;
      let bellBuffer = null,
        bellLoading = null,
        audioCtx = null,
        bellMaster = null;

      function getAudioCtx() {
        if (!audioCtx)
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") audioCtx.resume();
        return audioCtx;
      }
      function getBellOutput() {
        const ctx = getAudioCtx();
        if (!bellMaster) {
          const boost = ctx.createGain(),
            limiter = ctx.createDynamicsCompressor();
          boost.gain.value = BELL_BOOST;
          limiter.threshold.value = -8;
          limiter.knee.value = 0;
          limiter.ratio.value = 20;
          limiter.attack.value = 0.003;
          limiter.release.value = 0.25;
          boost.connect(limiter);
          limiter.connect(ctx.destination);
          bellMaster = boost;
        }
        return bellMaster;
      }
      async function selectSpeaker() {
        const status = document.getElementById("speaker-status");
        const button = document.getElementById("speaker-button");
        try {
          const ctx = await prepareBell();
          if (
            !navigator.mediaDevices ||
            typeof navigator.mediaDevices.selectAudioOutput !== "function" ||
            typeof ctx.setSinkId !== "function"
          ) {
            status.textContent =
              "此瀏覽器未能直接揀輸出；請先喺系統 Bluetooth 設定連線，鈴聲會跟系統預設喇叭。";
            status.className = "output-status warn";
            return;
          }
          button.disabled = true;
          button.textContent = "正在選擇喇叭…";
          const device = await navigator.mediaDevices.selectAudioOutput();
          await ctx.setSinkId(device.deviceId);
          status.textContent =
            "已連接：" + (device.label || "所選喇叭") + "（網頁音量 100%）";
          status.className = "output-status ready";
          button.textContent = "🔊 更改 Bluetooth／喇叭";
          await playBell(1);
        } catch (error) {
          if (error && error.name === "NotAllowedError") {
            status.textContent = "未有選擇喇叭，繼續使用系統預設輸出。";
          } else {
            status.textContent =
              "未能切換喇叭：" + (error.message || "請檢查 Bluetooth 連線");
          }
          status.className = "output-status warn";
        } finally {
          button.disabled = false;
          if (button.textContent === "正在選擇喇叭…")
            button.textContent = "🔊 連接 Bluetooth／喇叭";
        }
      }
      async function prepareBell() {
        const ctx = getAudioCtx();
        if (ctx.state === "suspended") await ctx.resume();
        loadBell();
        return ctx;
      }
      async function loadBell() {
        if (!bellLoading) {
          bellLoading = fetch(BELL_SRC)
            .then((r) => r.arrayBuffer())
            .then((a) => getAudioCtx().decodeAudioData(a))
            .then((b) => {
              bellBuffer = b;
              return b;
            })
            .catch(() => null);
        }
        return bellLoading;
      }
      function playTone(count) {
        const ctx = getAudioCtx();
        for (let i = 0; i < count; i++) {
          const osc = ctx.createOscillator(),
            gain = ctx.createGain();
          osc.type = "sine";
          osc.frequency.value = 850;
          gain.gain.setValueAtTime(0.45, ctx.currentTime + i * 0.35);
          gain.gain.exponentialRampToValueAtTime(
            0.001,
            ctx.currentTime + i * 0.35 + 0.22,
          );
          osc.connect(gain);
          gain.connect(getBellOutput());
          osc.start(ctx.currentTime + i * 0.35);
          osc.stop(ctx.currentTime + i * 0.35 + 0.22);
        }
      }
      async function playBell(count) {
        const ctx = getAudioCtx();
        if (ctx.state === "suspended") await ctx.resume();
        if (!bellBuffer) await loadBell();
        if (!bellBuffer) {
          playTone(count);
          return;
        }
        for (let i = 0; i < count; i++) {
          const src = ctx.createBufferSource();
          src.buffer = bellBuffer;
          src.connect(getBellOutput());
          src.start(ctx.currentTime + i * 0.8);
        }
      }
      async function testBell() {
        await prepareBell();
        await playBell(1);
      }

      // ---------- mode switch ----------
      function switchMode(mode) {
        document
          .getElementById("panel-timer")
          .classList.toggle("active", mode === "timer");
        document
          .getElementById("panel-ai")
          .classList.toggle("active", mode === "ai");
        document
          .getElementById("mode-timer")
          .classList.toggle("active", mode === "timer");
        document
          .getElementById("mode-ai")
          .classList.toggle("active", mode === "ai");
      }

      // ---------- timer engine (config loaded from /api/practice/timer-config) ----------
      let cfg = null; // { timer_stages, bell_schedules, warning_times, overtime_times }
      let currentStage = "main";
      let sRunning = false,
        sElapsed = 0,
        sStartTs = 0,
        sFired = new Set(),
        sRaf = 0;
      let fState = {
        pro: {
          running: false,
          elapsed: 0,
          startTs: 0,
          fired: new Set(),
          raf: 0,
        },
        con: {
          running: false,
          elapsed: 0,
          startTs: 0,
          fired: new Set(),
          raf: 0,
        },
      };

      function fmtTime(sec) {
        const totalMs = Math.max(0, Math.floor(Number(sec || 0) * 1000)),
          m = Math.floor(totalMs / 60000),
          s = Math.floor((totalMs % 60000) / 1000),
          ms = totalMs % 1000;
        return (
          m +
          ":" +
          String(s).padStart(2, "0") +
          "." +
          String(ms).padStart(3, "0")
        );
      }
      function stageLabel(id) {
        const found = (cfg.timer_stages || []).find((x) => x[0] === id);
        return found ? found[1] : "";
      }
      function getDisplayClass(sec, stage) {
        const w = cfg.warning_times[stage],
          o = cfg.overtime_times[stage];
        if (o !== null && o !== undefined && sec >= o) return "overtime";
        if (w !== null && w !== undefined && sec >= w) return "warning";
        return "normal";
      }

      async function reloadConfig() {
        const fmt = document.getElementById("format-select").value;
        const free = document.getElementById("free-minutes").value;
        const prep = document.getElementById("closing-prep").value;
        const url =
          "/api/practice/timer-config?format=" +
          encodeURIComponent(fmt) +
          "&free_minutes=" +
          encodeURIComponent(free) +
          "&closing_prep_minutes=" +
          encodeURIComponent(prep);
        const res = await fetch(url);
        cfg = await res.json();
        buildStages();
      }
      function onFormatChange() {
        const fmt = document.getElementById("format-select").value;
        document.getElementById("free-field").style.display =
          fmt === "聯中" ? "flex" : "none";
        reloadConfig();
      }

      function buildStages() {
        const sel = document.getElementById("stage-selector");
        sel.innerHTML = "";
        (cfg.timer_stages || []).forEach(([id, label], idx) => {
          const b = document.createElement("div");
          b.className = "stage-btn" + (idx === 0 ? " active" : "");
          b.id = "stage-" + id;
          b.textContent = label;
          b.onclick = () => selectStage(id);
          sel.appendChild(b);
        });
        currentStage =
          cfg.timer_stages && cfg.timer_stages[0]
            ? cfg.timer_stages[0][0]
            : "main";
        applyStageView();
      }

      function selectStage(stage) {
        resetSingle();
        resetFree("pro");
        resetFree("con");
        currentStage = stage;
        document
          .querySelectorAll(".stage-btn")
          .forEach((b) => b.classList.remove("active"));
        const el = document.getElementById("stage-" + stage);
        if (el) el.classList.add("active");
        applyStageView();
      }
      function applyStageView() {
        if (currentStage === "free") {
          document.getElementById("single-timer").style.display = "none";
          document.getElementById("free-timer").style.display = "block";
          renderFreeBells();
        } else {
          document.getElementById("single-timer").style.display = "block";
          document.getElementById("free-timer").style.display = "none";
          document.getElementById("single-label").textContent =
            stageLabel(currentStage) + "計時";
          renderSingleBells();
        }
      }

      // ----- single timer -----
      function renderSingleBells() {
        const sched = cfg.bell_schedules[currentStage] || [];
        document.getElementById("single-bells").innerHTML =
          "<h4>鈴聲時間表</h4>" +
          sched
            .map(
              (b, i) =>
                '<div class="bell-item" id="sb-' +
                i +
                '">' +
                b.label +
                "</div>",
            )
            .join("");
      }
      function updateSingleDisplay() {
        const el = document.getElementById("single-display");
        el.textContent = fmtTime(sElapsed);
        el.className = "sw-display " + getDisplayClass(sElapsed, currentStage);
      }
      function singleTick() {
        if (!sRunning) return;
        sElapsed = (performance.now() - sStartTs) / 1000;
        updateSingleDisplay();
        (cfg.bell_schedules[currentStage] || []).forEach((b, i) => {
          if (!sFired.has(i) && sElapsed >= b.t) {
            sFired.add(i);
            playBell(b.rings);
            const bel = document.getElementById("sb-" + i);
            if (bel) bel.classList.add("fired");
          }
        });
        sRaf = requestAnimationFrame(singleTick);
      }
      function toggleSingle() {
        const btn = document.getElementById("single-start");
        if (sRunning) {
          sRunning = false;
          cancelAnimationFrame(sRaf);
          sElapsed = (performance.now() - sStartTs) / 1000;
          btn.textContent = "繼續";
          btn.className = "btn btn-start";
        } else {
          prepareBell();
          sRunning = true;
          sStartTs = performance.now() - sElapsed * 1000;
          btn.textContent = "暫停";
          btn.className = "btn btn-pause";
          singleTick();
        }
      }
      function resetSingle() {
        sRunning = false;
        cancelAnimationFrame(sRaf);
        sElapsed = 0;
        sFired.clear();
        updateSingleDisplay();
        const btn = document.getElementById("single-start");
        btn.textContent = "開始";
        btn.className = "btn btn-start";
        renderSingleBells();
      }

      // ----- free (dual) timer -----
      function renderFreeBells() {
        const sched = cfg.bell_schedules.free || [];
        document.getElementById("free-bells").innerHTML =
          "<h4>鈴聲時間表（每邊）</h4>" +
          sched
            .map(
              (b, i) =>
                '<div class="bell-item" id="fb-pro-' +
                i +
                '">正方 ' +
                b.label +
                "</div>" +
                '<div class="bell-item" id="fb-con-' +
                i +
                '">反方 ' +
                b.label +
                "</div>",
            )
            .join("");
      }
      function updateFreeDisplay(side) {
        const s = fState[side],
          el = document.getElementById("free-" + side + "-display");
        el.textContent = fmtTime(s.elapsed);
        el.className = "sw-display " + getDisplayClass(s.elapsed, "free");
      }
      function freeTick(side) {
        const s = fState[side];
        if (!s.running) return;
        s.elapsed = (performance.now() - s.startTs) / 1000;
        updateFreeDisplay(side);
        (cfg.bell_schedules.free || []).forEach((b, i) => {
          if (!s.fired.has(i) && s.elapsed >= b.t) {
            s.fired.add(i);
            playBell(b.rings);
            const bel = document.getElementById("fb-" + side + "-" + i);
            if (bel) bel.classList.add("fired");
          }
        });
        s.raf = requestAnimationFrame(() => freeTick(side));
      }
      function toggleFree(side) {
        const s = fState[side],
          other = side === "pro" ? "con" : "pro";
        const btn = document.getElementById("free-" + side + "-btn");
        if (s.running) {
          s.running = false;
          cancelAnimationFrame(s.raf);
          s.elapsed = (performance.now() - s.startTs) / 1000;
          btn.textContent = "繼續";
          btn.className = "btn btn-start";
        } else {
          const os = fState[other];
          if (os.running) {
            // 兩邊互斥：開一邊自動停另一邊
            os.running = false;
            cancelAnimationFrame(os.raf);
            os.elapsed = (performance.now() - os.startTs) / 1000;
            updateFreeDisplay(other);
            const obtn = document.getElementById("free-" + other + "-btn");
            obtn.textContent = "繼續";
            obtn.className = "btn btn-start";
          }
          prepareBell();
          s.running = true;
          if (matchRecorder && matchRecorder.state !== "inactive") {
            addReviewMarker(side, "自由辯論");
          }
          s.startTs = performance.now() - s.elapsed * 1000;
          btn.textContent = "暫停";
          btn.className = "btn btn-pause";
          freeTick(side);
        }
      }
      function resetFree(side) {
        const s = fState[side];
        s.running = false;
        cancelAnimationFrame(s.raf);
        s.elapsed = 0;
        s.fired.clear();
        updateFreeDisplay(side);
        const btn = document.getElementById("free-" + side + "-btn");
        btn.textContent = "開始";
        btn.className = "btn btn-start";
        (cfg.bell_schedules.free || []).forEach((b, i) => {
          const bel = document.getElementById("fb-" + side + "-" + i);
          if (bel) bel.classList.remove("fired");
        });
      }

      // ---------- full-match microphone recording ----------
      let reviewLimits = {
          max_bytes: 12 * 1024 * 1024,
          max_seconds: 90 * 60,
          min_seconds: 10,
        },
        reviewMatches = [],
        hardwarePassedAt = 0,
        hardwareDeviceId = "",
        matchMarkers = [],
        recordedMatchId = "",
        matchRecorder = null,
        matchStream = null,
        matchChunks = [],
        matchBytes = 0,
        matchBlob = null,
        matchMime = "audio/webm",
        matchStartedAt = 0,
        matchDuration = 0,
        matchRaf = 0,
        matchHardStop = 0,
        matchStopReason = "manual",
        screenWakeLock = null;

      const HARDWARE_TEST_TTL_MS = 30 * 60 * 1000;

      function setReviewStatus(message, kind) {
        const el = document.getElementById("review-status");
        el.textContent = message || "";
        el.className = "review-status" + (kind ? " " + kind : "");
      }

      function selectedReviewMatch() {
        const matchId = document.getElementById("review-match").value;
        return reviewMatches.find((item) => item.match_id === matchId) || null;
      }

      function hardwareTestIsFresh() {
        return Boolean(
          hardwarePassedAt &&
            Date.now() - hardwarePassedAt <= HARDWARE_TEST_TTL_MS &&
            hardwareDeviceId === document.getElementById("review-mic").value,
        );
      }

      function updateReviewStartAvailability() {
        const recording = matchRecorder && matchRecorder.state !== "inactive";
        const match = selectedReviewMatch();
        document.getElementById("review-start").disabled = Boolean(
          recording || !match || !match.topic || !hardwareTestIsFresh(),
        );
      }

      function invalidateHardwareTest(message) {
        hardwarePassedAt = 0;
        hardwareDeviceId = "";
        if (message) {
          document.getElementById("review-preflight-results").innerHTML =
            '<div class="warn">⚠️ ' + escapeHtml(message) + "</div>";
        }
        updateReviewStartAvailability();
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(
          /[&<>"']/g,
          (char) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[char],
        );
      }

      async function loadReviewMatches() {
        const data = await apiJson("/api/kiosk/match-review/matches", {
          method: "GET",
        });
        reviewMatches = data.matches || [];
        const select = document.getElementById("review-match");
        select.innerHTML = reviewMatches.length
          ? reviewMatches
              .map((match) => {
                const schedule = [match.match_date, match.match_time]
                  .filter(Boolean)
                  .join(" ");
                const label =
                  match.match_id +
                  " — " +
                  match.pro_team +
                  " vs " +
                  match.con_team +
                  (schedule ? "（" + schedule + "）" : "");
                return (
                  '<option value="' +
                  escapeHtml(match.match_id) +
                  '">' +
                  escapeHtml(label) +
                  "</option>"
                );
              })
              .join("")
          : '<option value="">未有正式場次</option>';
        await onReviewMatchChange(false);
      }

      async function onReviewMatchChange(clearRecording = true) {
        if (clearRecording && matchBlob) discardLocalRecording(false);
        const match = selectedReviewMatch();
        document.getElementById("review-topic").value = match?.topic || "";
        document.getElementById("review-format").value = match
          ? match.debate_format +
            (match.debate_format === "聯中" && match.free_debate_minutes
              ? "（自由辯論每邊 " + match.free_debate_minutes + " 分鐘）"
              : "")
          : "";
        document.getElementById("review-pro-team").value =
          match?.pro_team || "";
        document.getElementById("review-con-team").value =
          match?.con_team || "";
        const timerSelect = document.getElementById("format-select");
        if (
          match &&
          cfg &&
          Array.from(timerSelect.options).some(
            (option) => option.value === match.debate_format,
          )
        ) {
          timerSelect.value = match.debate_format;
          document.getElementById("free-field").style.display =
            match.debate_format === "聯中" ? "flex" : "none";
          if (match.debate_format === "聯中") {
            document.getElementById("free-minutes").value =
              Number(match.free_debate_minutes) >= 2
                ? match.free_debate_minutes
                : 5;
          }
          await reloadConfig();
        }
        updateReviewStartAvailability();
      }

      function setMarkerButtons(enabled) {
        document
          .querySelectorAll("[data-review-marker]")
          .forEach((button) => (button.disabled = !enabled));
      }

      function renderReviewMarkers() {
        const log = document.getElementById("review-marker-log");
        if (!matchMarkers.length) {
          log.textContent = "未有時間標記";
          return;
        }
        const labels = {
          pro: "正方",
          con: "反方",
          both: "雙方",
          unknown: "未確定",
        };
        const recent = matchMarkers.slice(-8).map(
          (item) =>
            fmtTime(item.offset_seconds) +
            " " +
            labels[item.side] +
            " · " +
            item.segment,
        );
        log.textContent =
          "共 " + matchMarkers.length + " 個標記｜" + recent.join("｜");
      }

      function addReviewMarker(side, segmentOverride) {
        if (!matchRecorder || matchRecorder.state === "inactive") return;
        const marker = {
          offset_seconds: Math.round(reviewElapsed() * 1000) / 1000,
          side,
          segment:
            segmentOverride || document.getElementById("review-segment").value,
        };
        const last = matchMarkers[matchMarkers.length - 1];
        if (
          last &&
          last.side === marker.side &&
          last.segment === marker.segment &&
          marker.offset_seconds - last.offset_seconds < 0.25
        )
          return;
        matchMarkers.push(marker);
        renderReviewMarkers();
      }

      function reviewAudioConstraints() {
        const selected = document.getElementById("review-mic").value;
        const audio = {
          channelCount: 1,
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: true,
        };
        if (selected) audio.deviceId = { exact: selected };
        return audio;
      }

      function createMatchRecorder(stream, mime) {
        try {
          return new MediaRecorder(stream, {
            mimeType: mime,
            audioBitsPerSecond: 16000,
          });
        } catch (_) {
          return new MediaRecorder(stream, { mimeType: mime });
        }
      }

      function humanBytes(value) {
        const bytes = Math.max(0, Number(value || 0));
        return bytes < 1024 * 1024
          ? (bytes / 1024).toFixed(0) + " KB"
          : (bytes / (1024 * 1024)).toFixed(2) + " MB";
      }

      function reviewElapsed() {
        return matchRecorder && matchRecorder.state !== "inactive"
          ? Math.max(0, (performance.now() - matchStartedAt) / 1000)
          : matchDuration;
      }

      function updateReviewClock() {
        document.getElementById("review-clock").textContent = fmtTime(
          reviewElapsed(),
        );
        document.getElementById("review-meta").textContent =
          matchRecorder && matchRecorder.state !== "inactive"
            ? "錄音中 · 已收集約 " + humanBytes(matchBytes)
            : matchBlob
              ? "錄音已停止 · " + humanBytes(matchBlob.size)
              : "未開始錄音";
        if (matchRecorder && matchRecorder.state !== "inactive") {
          matchRaf = requestAnimationFrame(updateReviewClock);
        }
      }

      async function holdScreenAwake() {
        if (!navigator.wakeLock || document.visibilityState !== "visible") return;
        try {
          screenWakeLock = await navigator.wakeLock.request("screen");
        } catch (_) {
          screenWakeLock = null;
        }
      }

      async function releaseScreenWake() {
        if (!screenWakeLock) return;
        try {
          await screenWakeLock.release();
        } catch (_) {}
        screenWakeLock = null;
      }

      function supportedRecorderMime() {
        if (!window.MediaRecorder) return "";
        const choices = [
          "audio/webm;codecs=opus",
          "audio/ogg;codecs=opus",
          "audio/mp4",
        ];
        return (
          choices.find(
            (value) =>
              !MediaRecorder.isTypeSupported ||
              MediaRecorder.isTypeSupported(value),
          ) || ""
        );
      }

      async function refreshMicrophones(requestPermission) {
        const select = document.getElementById("review-mic");
        if (requestPermission) invalidateHardwareTest("收音咪已重新偵測，請再做開始前測試。");
        if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
          select.innerHTML = '<option value="">瀏覽器不支援收音咪</option>';
          return;
        }
        let probeStream = null;
        try {
          if (requestPermission) {
            probeStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          }
          const current = select.value;
          const devices = (await navigator.mediaDevices.enumerateDevices()).filter(
            (device) => device.kind === "audioinput",
          );
          select.innerHTML = "";
          if (!devices.length) {
            const option = document.createElement("option");
            option.value = "";
            option.textContent = "系統預設收音咪";
            select.appendChild(option);
          } else {
            devices.forEach((device, index) => {
              const option = document.createElement("option");
              option.value = device.deviceId;
              option.textContent = device.label || "收音咪 " + (index + 1);
              select.appendChild(option);
            });
            if ([...select.options].some((option) => option.value === current)) {
              select.value = current;
            }
          }
          if (requestPermission) setReviewStatus("已重新偵測收音咪。", "ok");
        } catch (error) {
          setReviewStatus(
            "未能使用收音咪：" + (error.message || "請檢查瀏覽器權限"),
            "error",
          );
        } finally {
          if (probeStream) probeStream.getTracks().forEach((track) => track.stop());
        }
      }

      async function testAllReviewHardware() {
        const button = document.getElementById("review-hardware-test");
        const output = document.getElementById("review-preflight-results");
        const rows = [];
        let stream = null,
          recorder = null,
          testContext = null;
        hardwarePassedAt = 0;
        hardwareDeviceId = "";
        updateReviewStartAvailability();
        button.disabled = true;
        button.textContent = "正在測試…請對收音咪講『測試』";
        output.innerHTML = '<div class="warn">⏳ 正檢查雲端設定、收音咪、短錄音及鈴聲…</div>';

        const addRow = (kind, text) =>
          rows.push(
            '<div class="' +
              kind +
              '">' +
              (kind === "pass" ? "✅ " : kind === "warn" ? "⚠️ " : "❌ ") +
              escapeHtml(text) +
              "</div>",
          );
        try {
          const server = await apiJson("/api/kiosk/match-review/preflight", {
            method: "GET",
          });
          Object.values(server.checks || {}).forEach((check) =>
            addRow(check.ok ? "pass" : "fail", check.detail || "未知檢查"),
          );

          const browserChecks = [
            [window.isSecureContext, "HTTPS 安全連線"],
            [Boolean(navigator.mediaDevices?.getUserMedia), "瀏覽器收音權限介面"],
            [Boolean(window.MediaRecorder), "瀏覽器短錄音功能"],
            [Boolean(window.crypto?.subtle), "SHA-256 錄音完整性功能"],
            [Boolean(window.AudioContext || window.webkitAudioContext), "Web Audio 鈴聲／聲量功能"],
          ];
          browserChecks.forEach(([ok, label]) => addRow(ok ? "pass" : "fail", label));
          if (browserChecks.some(([ok]) => !ok)) {
            throw new Error("瀏覽器缺少必要錄音功能");
          }
          const mime = supportedRecorderMime();
          if (!mime) throw new Error("瀏覽器未有受支援的錄音格式");

          stream = await navigator.mediaDevices.getUserMedia({
            audio: reviewAudioConstraints(),
          });
          const track = stream.getAudioTracks()[0];
          addRow(
            track && track.readyState === "live" ? "pass" : "fail",
            "所選收音咪已連線" +
              (track?.label ? "：" + track.label : ""),
          );

          recorder = createMatchRecorder(stream, mime);
          const chunks = [];
          const stopped = new Promise((resolve, reject) => {
            recorder.ondataavailable = (event) => {
              if (event.data?.size) chunks.push(event.data);
            };
            recorder.onerror = (event) =>
              reject(event.error || new Error("短錄音失敗"));
            recorder.onstop = resolve;
          });

          const Context = window.AudioContext || window.webkitAudioContext;
          testContext = new Context();
          if (testContext.state === "suspended") await testContext.resume();
          const analyser = testContext.createAnalyser();
          analyser.fftSize = 2048;
          testContext.createMediaStreamSource(stream).connect(analyser);
          const samples = new Float32Array(analyser.fftSize);
          let peakRms = 0,
            clipping = false;
          const sampleStart = performance.now();
          recorder.start(250);
          await prepareBell();
          for (let index = 0; index < 24; index += 1) {
            if (index === 4) await playBell(1);
            analyser.getFloatTimeDomainData(samples);
            let squared = 0;
            for (const sample of samples) {
              squared += sample * sample;
              if (Math.abs(sample) >= 0.985) clipping = true;
            }
            peakRms = Math.max(peakRms, Math.sqrt(squared / samples.length));
            await new Promise((resolve) => setTimeout(resolve, 100));
          }
          recorder.stop();
          await stopped;
          const sampleSeconds = Math.max(
            0.5,
            (performance.now() - sampleStart) / 1000,
          );
          const sampleBlob = new Blob(chunks, {
            type: recorder.mimeType || mime,
          });
          const sampleOk = sampleBlob.size > 100;
          addRow(
            sampleOk ? "pass" : "fail",
            "短錄音可建立（" + humanBytes(sampleBlob.size) + "，不會上載）",
          );
          const micOk = peakRms >= 0.002;
          addRow(
            micOk ? "pass" : "fail",
            "收音咪訊號峰值 " + (peakRms * 100).toFixed(2) + "%" +
              (micOk ? "" : "；請檢查靜音、距離或輸入裝置"),
          );
          addRow(
            clipping ? "warn" : "pass",
            clipping ? "收音曾接近爆音，請降低咪增益" : "未偵測到明顯爆音",
          );

          const measuredBitrate = Math.ceil((sampleBlob.size * 8) / sampleSeconds);
          const recorderBitrate = Number(recorder.audioBitsPerSecond || 0);
          const projectedBitrate = recorderBitrate || measuredBitrate;
          const projectedBytes =
            (projectedBitrate / 8) * reviewLimits.max_seconds * 1.05;
          const sizeOk = projectedBytes <= reviewLimits.max_bytes;
          addRow(
            sizeOk ? "pass" : "fail",
            "錄音器約 " +
              Math.round(projectedBitrate / 1000) +
              " kbps；90 分鐘預計 " +
              humanBytes(projectedBytes) +
              "／上限 " +
              humanBytes(reviewLimits.max_bytes),
          );
          addRow(
            navigator.wakeLock ? "pass" : "warn",
            navigator.wakeLock
              ? "螢幕常亮功能可用"
              : "瀏覽器不支援 Wake Lock；比賽期間不可鎖屏",
          );

          const heardBell = window.confirm(
            "硬件測試已播放一聲正式鈴聲。你有清楚聽到鈴聲嗎？",
          );
          addRow(heardBell ? "pass" : "fail", "現場確認喇叭鈴聲");
          const passed = Boolean(
            server.ok && sampleOk && micOk && sizeOk && heardBell,
          );
          if (passed) {
            hardwarePassedAt = Date.now();
            hardwareDeviceId = document.getElementById("review-mic").value;
            addRow("pass", "所有必要檢查通過；30 分鐘內可開始錄音");
          } else {
            addRow("fail", "未通過全部必要檢查，暫不可開始全場錄音");
          }
        } catch (error) {
          addRow("fail", error.message || "硬件測試失敗");
        } finally {
          if (recorder && recorder.state !== "inactive") {
            try { recorder.stop(); } catch (_) {}
          }
          if (stream) stream.getTracks().forEach((track) => track.stop());
          if (testContext) {
            try { await testContext.close(); } catch (_) {}
          }
          output.innerHTML = rows.join("");
          button.disabled = false;
          button.textContent = "🧪 重新測試所有硬件";
          updateReviewStartAvailability();
        }
      }

      function finishMatchRecording() {
        cancelAnimationFrame(matchRaf);
        clearTimeout(matchHardStop);
        matchDuration = Math.max(
          0,
          Math.min(
            reviewLimits.max_seconds,
            (performance.now() - matchStartedAt) / 1000,
          ),
        );
        matchBlob = new Blob(matchChunks, { type: matchMime });
        matchChunks = [];
        matchBytes = 0;
        if (matchStream) matchStream.getTracks().forEach((track) => track.stop());
        matchStream = null;
        matchRecorder = null;
        releaseScreenWake();
        setMarkerButtons(false);
        document.getElementById("review-match").disabled = false;
        document.getElementById("review-mic").disabled = false;
        document.getElementById("review-hardware-test").disabled = false;
        document.querySelectorAll(".mic-refresh").forEach((button) => (button.disabled = false));
        document.getElementById("review-stop").disabled = true;
        const valid =
          matchDuration >= reviewLimits.min_seconds &&
          matchBlob.size >= 1000 &&
          matchBlob.size <= reviewLimits.max_bytes;
        document.getElementById("review-discard").disabled = !matchBlob.size;
        document.getElementById("review-analyze").disabled = !valid;
        updateReviewClock();
        updateReviewStartAvailability();
        if (matchBlob.size > reviewLimits.max_bytes || matchStopReason === "size") {
          setReviewStatus(
            "錄音已達 " + humanBytes(reviewLimits.max_bytes) + " 安全上限，請清除後重錄。",
            "error",
          );
        } else if (matchDuration < reviewLimits.min_seconds) {
          setReviewStatus(
            "錄音少於 " + reviewLimits.min_seconds + " 秒，只可清除後重錄。",
            "error",
          );
        } else {
          const note =
            matchStopReason === "limit"
              ? "已到最長錄音時間並自動停止。"
              : "錄音完成。";
          setReviewStatus(note + " 確認資料後可上載並分析。", "ok");
        }
      }

      async function startMatchRecording() {
        const officialMatch = selectedReviewMatch();
        if (!officialMatch || !officialMatch.topic) {
          setReviewStatus("請先選擇已設定辯題的正式場次。", "error");
          return;
        }
        if (!hardwareTestIsFresh()) {
          setReviewStatus("請先按『開始前測試所有硬件』並通過全部必要檢查。", "error");
          return;
        }
        if (!document.getElementById("review-notice").checked) {
          setReviewStatus("請先確認已通知在場人士錄音及雲端 AI 處理安排。", "error");
          return;
        }
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          setReviewStatus("此瀏覽器不支援收音咪錄音。", "error");
          return;
        }
        const mime = supportedRecorderMime();
        if (!mime) {
          setReviewStatus("此瀏覽器未有支援的低流量錄音格式。", "error");
          return;
        }
        discardLocalRecording(false);
        try {
          matchStream = await navigator.mediaDevices.getUserMedia({
            audio: reviewAudioConstraints(),
          });
          matchRecorder = createMatchRecorder(matchStream, mime);
          matchMime = matchRecorder.mimeType || mime;
          recordedMatchId = officialMatch.match_id;
          matchMarkers = [];
          renderReviewMarkers();
          matchChunks = [];
          matchBytes = 0;
          matchDuration = 0;
          matchStartedAt = performance.now();
          matchStopReason = "manual";
          matchRecorder.ondataavailable = (event) => {
            if (!event.data || !event.data.size) return;
            matchChunks.push(event.data);
            matchBytes += event.data.size;
            if (
              matchBytes > reviewLimits.max_bytes &&
              matchRecorder &&
              matchRecorder.state !== "inactive"
            ) {
              stopMatchRecording("size");
            }
          };
          matchRecorder.onerror = (event) => {
            setReviewStatus(
              "錄音器發生錯誤：" + (event.error?.message || "請重新錄製"),
              "error",
            );
          };
          matchRecorder.onstop = finishMatchRecording;
          matchRecorder.start(5000);
          addReviewMarker("unknown", "開場／其他");
          document.getElementById("review-start").disabled = true;
          document.getElementById("review-stop").disabled = false;
          document.getElementById("review-discard").disabled = true;
          document.getElementById("review-analyze").disabled = true;
          document.getElementById("review-result-card").classList.add("hidden");
          document.getElementById("review-match").disabled = true;
          document.getElementById("review-mic").disabled = true;
          document.getElementById("review-hardware-test").disabled = true;
          document.querySelectorAll(".mic-refresh").forEach((button) => (button.disabled = true));
          setMarkerButtons(true);
          setReviewStatus("AI評判易正錄製全場。完場時請按「完場並停止」。", "");
          updateReviewClock();
          holdScreenAwake();
          matchHardStop = setTimeout(
            () => stopMatchRecording("limit"),
            reviewLimits.max_seconds * 1000,
          );
          await refreshMicrophones(false);
        } catch (error) {
          if (matchStream) matchStream.getTracks().forEach((track) => track.stop());
          matchStream = null;
          matchRecorder = null;
          recordedMatchId = "";
          matchMarkers = [];
          setMarkerButtons(false);
          document.getElementById("review-match").disabled = false;
          document.getElementById("review-mic").disabled = false;
          document.getElementById("review-hardware-test").disabled = false;
          document.querySelectorAll(".mic-refresh").forEach((button) => (button.disabled = false));
          updateReviewStartAvailability();
          setReviewStatus(
            "未能開始錄音：" + (error.message || "請檢查收音咪及瀏覽器權限"),
            "error",
          );
        }
      }

      function stopMatchRecording(reason) {
        if (!matchRecorder || matchRecorder.state === "inactive") return;
        matchStopReason = typeof reason === "string" ? reason : "manual";
        document.getElementById("review-stop").disabled = true;
        setReviewStatus("正在封裝錄音…", "");
        matchRecorder.stop();
      }

      function discardLocalRecording(showMessage = true) {
        if (matchRecorder && matchRecorder.state !== "inactive") return;
        matchBlob = null;
        matchChunks = [];
        matchBytes = 0;
        matchDuration = 0;
        recordedMatchId = "";
        matchMarkers = [];
        renderReviewMarkers();
        document.getElementById("review-clock").textContent = "0:00.000";
        document.getElementById("review-meta").textContent = "未開始錄音";
        document.getElementById("review-discard").disabled = true;
        document.getElementById("review-analyze").disabled = true;
        updateReviewStartAvailability();
        if (showMessage) setReviewStatus("已清除 kiosk 記憶體內的錄音。", "ok");
      }

      function sha256Hex(buffer) {
        return [...new Uint8Array(buffer)]
          .map((value) => value.toString(16).padStart(2, "0"))
          .join("");
      }

      async function apiJson(url, options) {
        const response = await fetch(url, {
          cache: "no-store",
          ...options,
          headers: {
            "Content-Type": "application/json",
            ...((options && options.headers) || {}),
          },
        });
        let payload = {};
        try {
          payload = await response.json();
        } catch (_) {}
        if (!response.ok) {
          throw new Error(payload.detail || "伺服器暫時無法完成操作");
        }
        return payload;
      }

      async function analyzeMatchRecording() {
        if (!matchBlob) return;
        const matchId = recordedMatchId;
        const notice = document.getElementById("review-notice").checked;
        if (!matchId || !notice) {
          setReviewStatus("請確認正式場次及錄音通知。", "error");
          return;
        }
        const analyzeButton = document.getElementById("review-analyze");
        analyzeButton.disabled = true;
        document.getElementById("review-start").disabled = true;
        document.getElementById("review-discard").disabled = true;
        let uploadToken = "";
        try {
          setReviewStatus("正在計算錄音雜湊…", "");
          const digest = sha256Hex(
            await crypto.subtle.digest("SHA-256", await matchBlob.arrayBuffer()),
          );
          setReviewStatus("正在建立私人暫存上載…", "");
          const intent = await apiJson("/api/kiosk/match-review/upload-intent", {
            method: "POST",
            body: JSON.stringify({
              match_id: matchId,
              mime_type: matchBlob.type || matchMime,
              byte_size: matchBlob.size,
              sha256: digest,
              duration_seconds: matchDuration,
            }),
          });
          uploadToken = intent.upload_token;
          setReviewStatus("正在直接上載錄音到私人暫存區…", "");
          const upload = await fetch(intent.url, {
            method: "PUT",
            headers: intent.headers,
            body: matchBlob,
          });
          if (!upload.ok) throw new Error("錄音上載失敗（HTTP " + upload.status + "）");
          setReviewStatus(
            "AI評判易正先做全場逐字稿，再用原音＋逐字稿交叉評審；請勿關閉頁面…",
            "",
          );
          const result = await apiJson("/api/kiosk/match-review/analyze", {
            method: "POST",
            body: JSON.stringify({
              upload_token: uploadToken,
              match_id: matchId,
              speaker_markers: matchMarkers,
              recording_notice_confirmed: notice,
            }),
          });
          document.getElementById("review-result").textContent = result.markdown;
          document.getElementById("review-transcript").textContent =
            result.transcript || "AI 未有回傳逐字稿。";
          document.getElementById("review-result-meta").textContent =
            "場次：" +
            (result.match?.match_id || matchId) +
            " · " +
            "模型：" +
            result.model_label +
            " · 錄音：" +
            fmtTime(result.audio?.duration_seconds || matchDuration) +
            " · 發言方標記：" +
            (result.speaker_marker_count ?? matchMarkers.length) +
            (result.recording_deleted
              ? " · R2 原始錄音已在 AI 處理前刪除"
              : " · 原始錄音正等待清理程序刪除");
          document.getElementById("review-result-card").classList.remove("hidden");
          matchBlob = null;
          recordedMatchId = "";
          document.getElementById("review-discard").disabled = true;
          invalidateHardwareTest("每場完成後要重新測試硬件及刷新剩餘配額。");
          setReviewStatus("AI評判易分析完成。以下只屬 AI 輔助第二意見。", "ok");
          document.getElementById("review-result-card").scrollIntoView({
            behavior: "smooth",
            block: "start",
          });
        } catch (error) {
          if (uploadToken) {
            try {
              await apiJson("/api/kiosk/match-review/discard", {
                method: "POST",
                body: JSON.stringify({ upload_token: uploadToken }),
              });
            } catch (_) {}
          }
          setReviewStatus(error.message || "AI評判易分析失敗，請稍後再試。", "error");
        } finally {
          document.getElementById("review-discard").disabled = !matchBlob;
          analyzeButton.disabled = !matchBlob;
          updateReviewStartAvailability();
        }
      }

      // ---------- kiosk authentication + init ----------
      let appInitialized = false;

      function showKioskLogin(message) {
        document.getElementById("kiosk-app").classList.add("hidden");
        document.getElementById("kiosk-login").classList.remove("hidden");
        document.getElementById("kiosk-login-message").textContent = message || "";
        document.getElementById("kiosk-password").focus();
      }

      async function showKioskApp(sessionData) {
        document.getElementById("kiosk-login").classList.add("hidden");
        document.getElementById("kiosk-app").classList.remove("hidden");
        if (!appInitialized) {
          await initApp();
          appInitialized = true;
        }
      }

      async function bootstrapKiosk() {
        try {
          const data = await apiJson("/api/kiosk/session", { method: "GET" });
          await showKioskApp(data);
        } catch (_) {
          showKioskLogin("");
        }
      }

      async function logoutKiosk() {
        try {
          await apiJson("/api/kiosk/logout", {
            method: "POST",
            body: "{}",
          });
        } catch (_) {}
        document.getElementById("kiosk-password").value = "";
        showKioskLogin("已登出 kiosk。 ");
      }

      async function initApp() {
        const res = await fetch("/api/practice/timer-config", { cache: "no-store" });
        if (!res.ok) throw new Error("未能載入計時設定");
        cfg = await res.json();
        const timerSelect = document.getElementById("format-select");
        timerSelect.innerHTML = "";
        (cfg.formats || []).forEach((format) => {
          const timerOption = document.createElement("option");
          timerOption.value = format;
          timerOption.textContent = format;
          timerSelect.appendChild(timerOption);
        });
        timerSelect.value = cfg.format;
        document.getElementById("free-field").style.display =
          cfg.format === "聯中" ? "flex" : "none";
        buildStages();
        const requested = new URLSearchParams(location.search).get("next");
        if (requested === "ai-debate") switchMode("ai");
      }

      document.getElementById("kiosk-login-form").addEventListener(
        "submit",
        async (event) => {
          event.preventDefault();
          const button = document.getElementById("kiosk-login-submit");
          const password = document.getElementById("kiosk-password").value;
          button.disabled = true;
          document.getElementById("kiosk-login-message").textContent = "正在登入…";
          try {
            await apiJson("/api/kiosk/login", {
              method: "POST",
              body: JSON.stringify({ password }),
            });
            const data = await apiJson("/api/kiosk/session", { method: "GET" });
            await showKioskApp(data);
          } catch (error) {
            showKioskLogin(error.message || "登入失敗");
          } finally {
            button.disabled = false;
          }
        },
      );

      document.addEventListener("visibilitychange", () => {
        if (
          document.visibilityState === "visible" &&
          matchRecorder &&
          matchRecorder.state !== "inactive"
        ) {
          holdScreenAwake();
        }
      });
      window.addEventListener("beforeunload", (event) => {
        if (!matchRecorder || matchRecorder.state === "inactive") return;
        event.preventDefault();
        event.returnValue = "";
      });
      bootstrapKiosk();
    </script>
