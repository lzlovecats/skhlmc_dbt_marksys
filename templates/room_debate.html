<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>聯機辯論練習</title>
    <style>
      :root { color-scheme: dark; --bg:#0e1117; --panel:#20232c; --line:#3a3d46; --muted:#a6acb8; --blue:#3182f6; --green:#24a865; --red:#c53c3c; }
      * { box-sizing:border-box; }
      body { margin:0 auto; max-width:1100px; padding:clamp(12px,3vw,28px); background:var(--bg); color:#fafafa; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang HK","Noto Sans CJK HK",sans-serif; }
      .practice-nav,.row { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
      .practice-nav { justify-content:space-between; margin-bottom:16px; }
      .practice-nav strong { font-size:clamp(23px,3vw,34px); }
      a,button { border:1px solid var(--line); border-radius:12px; background:#151821; color:#fafafa; padding:11px 16px; font:inherit; font-weight:750; text-decoration:none; cursor:pointer; }
      button { min-height:50px; }
      button:disabled { opacity:.42; cursor:not-allowed; }
      button.primary { background:var(--green); border-color:var(--green); }
      button.warn { background:#3d1f1f; border-color:#753838; }
      button.pick.active { background:var(--blue); border-color:var(--blue); }
      .card { background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:clamp(16px,2.5vw,25px); margin-bottom:16px; }
      .grow { flex:1 1 300px; }
      h2,h3,p { margin-top:0; }
      .muted { color:var(--muted); line-height:1.55; }
      .notice { border-left:4px solid #d5a02e; background:#29251d; padding:12px 15px; border-radius:8px; line-height:1.55; }
      .code { color:#69a7ff; font:800 clamp(30px,5vw,48px) ui-monospace,monospace; letter-spacing:5px; }
      .badge { display:inline-block; margin-left:7px; padding:3px 8px; border-radius:999px; background:#39404f; font-size:.84em; }
      ul { margin:10px 0; padding-left:20px; }
      .dot { display:inline-block; width:10px; height:10px; margin-right:8px; border-radius:50%; background:#36c979; }
      .dot.off { background:#697181; }
      .seg { text-align:center; font-size:clamp(22px,3vw,34px); font-weight:800; }
      .timer { text-align:center; font-size:clamp(54px,9vw,92px); font-weight:850; font-variant-numeric:tabular-nums; margin:10px; }
      .talk { width:100%; min-height:90px; margin-top:12px; background:var(--blue); border-color:var(--blue); font-size:clamp(22px,3vw,34px); }
      .talk.live { background:var(--red); }
      .side-timers { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
      .side-timers > div { padding:12px; border-radius:12px; background:#11141b; text-align:center; }
      .side-timers span { display:block; font-size:28px; font-weight:800; }
      #networkTestResult,#log,#transcript,#judgement { white-space:pre-wrap; overflow-wrap:anywhere; line-height:1.55; }
      #log { max-height:180px; overflow:auto; font-family:ui-monospace,monospace; font-size:13px; }
      .hidden { display:none !important; }
      @media (max-width:600px) { .side-timers { grid-template-columns:1fr; } button { width:100%; } }
    </style>
  </head>
  <body>
    <nav class="practice-nav" id="practiceNav">
      <strong>聯機辯論練習</strong>
      <a href="/ai-coach">返回 AI Coach</a>
    </nav>

    <section class="card">
      <div class="row">
        <div class="grow">
          <div id="topicLine">載入房間資料中…</div>
        </div>
        <div><span class="muted">房間碼</span><div id="codeText" class="code"></div></div>
      </div>
      <p id="connStatus" class="muted">建立控制連線中…</p>
      <p class="notice">
        建議所有用戶使用電腦版 Chrome。
      </p>
    </section>

    <section class="card" id="networkTest">
      <h2>開始前測試</h2>
      <p class="muted">兩位通過測試後才可以開始聯機。</p>
      <button id="deviceTestBtn" class="primary">開始連線測試</button>
      <p id="networkTestResult" class="muted">尚未測試。</p>
    </section>

    <section class="card">
      <div class="row">
        <div class="grow">
          <h2>參加者</h2>
          <ul id="roster"></ul>
        </div>
        <div id="rolePick">
          <div id="rolePickLabel" class="muted">選擇辯方</div>
          <div id="rolePickButtons" class="row"></div>
        </div>
      </div>
    </section>

    <section class="card" id="stage">
      <div id="segLabel" class="seg">等待開始…</div>
      <div id="timer" class="timer">00:00</div>
      <div id="sideTimers" class="side-timers hidden">
        <div id="proTimerBox"><b>正方</b><span id="proTimer">00:00</span></div>
        <div id="conTimerBox"><b>反方</b><span id="conTimer">00:00</span></div>
      </div>
      <div id="segSub" class="muted" style="text-align:center"></div>
      <div id="meter" class="hidden"></div>
      <button id="talkBtn" class="talk" disabled>按一下開始發言</button>
    </section>

    <section class="card hidden" id="hostControls">
      <h2>主持控制</h2>
      <div class="row">
        <button id="startBtn" class="primary">開始練習</button>
        <button id="prevBtn">上一節</button>
        <button id="nextBtn">下一節</button>
        <button id="judgeBtn">要求 AI 評價</button>
        <button id="endBtn" class="warn">結束</button>
      </div>
    </section>

    <section class="card"><h3>逐字稿</h3><div id="transcript" class="muted">暫未有已 commit 逐字稿。</div></section>
    <section class="card"><h3>AI 評判</h3><div id="judgement" class="muted">要求 AI 評價前，正反雙方都需要有逐字稿。</div></section>
    <section class="card"><h3>狀態紀錄</h3><div id="log" class="muted"></div></section>

    <script>
      window.ROOM_P2P_BOOTSTRAP = { code: __ROOM_CODE__, wsBase: __ROOM_WS_BASE__, bellSrc: __BELL_SRC__ };
    </script>
    <script src="/shared/room-debate-p2p.js"></script>
  </body>
</html>
