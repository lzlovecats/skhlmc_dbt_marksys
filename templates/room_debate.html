<!doctype html>
<html lang="zh-HK">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
      "PingFang HK", "Noto Sans CJK HK", "Microsoft JhengHei", sans-serif;
    background: #0e1117; color: #e6e6e6; padding: 12px;
  }
  .card { background:#161b22; border:1px solid #262d38; border-radius:12px;
    padding:14px 16px; margin-bottom:12px; }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .grow { flex:1 1 auto; }
  h2 { margin:0 0 4px; font-size:18px; }
  .muted { color:#8b949e; font-size:13px; }
  .code {
    font-size:30px; font-weight:700; letter-spacing:5px; color:#58a6ff;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  button {
    font-size:15px; padding:9px 16px; border-radius:9px; border:1px solid #30363d;
    background:#21262d; color:#e6e6e6; cursor:pointer; transition:.12s;
  }
  button:hover:not(:disabled) { background:#30363d; }
  button:disabled { opacity:.4; cursor:not-allowed; }
  button.primary { background:#238636; border-color:#2ea043; }
  button.primary:hover:not(:disabled) { background:#2ea043; }
  button.warn { background:#3d1f1f; border-color:#6e2b2b; }
  button.pick.active { background:#1f6feb; border-color:#388bfd; }
  .talk {
    width:100%; font-size:20px; font-weight:700; padding:22px; margin-top:8px;
    background:#1f6feb; border-color:#388bfd;
  }
  .talk.live { background:#da3633; border-color:#f85149; animation:pulse 1s infinite; }
  @keyframes pulse { 50% { opacity:.7; } }
  .timer { font-size:46px; font-weight:800; font-variant-numeric:tabular-nums;
    text-align:center; margin:6px 0; }
  .side-timers { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:8px 0; }
  .side-timer { background:#0d1117; border:1px solid #262d38; border-radius:8px; padding:8px; text-align:center; }
  .side-timer strong { display:block; font-size:13px; margin-bottom:4px; }
  .side-timer span { font-size:24px; font-weight:800; font-variant-numeric:tabular-nums; }
  .side-timer.over span { color:#f85149; }
  .seg { text-align:center; font-size:17px; font-weight:600; }
  .sidechip { display:inline-block; padding:2px 10px; border-radius:20px;
    font-size:13px; margin-left:6px; }
  .side-正方 { background:#132e1c; color:#3fb950; }
  .side-反方 { background:#2e1616; color:#f85149; }
  .side-雙方, .side-準備 { background:#22272e; color:#8b949e; }
  ul.roster { list-style:none; margin:6px 0 0; padding:0; }
  ul.roster li { padding:6px 8px; border-radius:8px; background:#0d1117;
    margin-bottom:5px; display:flex; gap:8px; align-items:center; }
  .dot { width:9px; height:9px; border-radius:50%; background:#3fb950; }
  .dot.off { background:#6e7681; }
  .badge { font-size:11px; padding:1px 7px; border-radius:6px; background:#30363d; }
  .meterwrap { height:8px; background:#0d1117; border-radius:5px; overflow:hidden;
    margin-top:8px; }
  .meter { height:100%; width:0%; background:#3fb950; transition:width .08s; }
  #log { font-size:12px; color:#8b949e; max-height:120px; overflow:auto;
    white-space:pre-wrap; line-height:1.5; }
  #transcript, #judgement { font-size:13px; color:#c9d1d9; max-height:180px; overflow:auto;
    white-space:pre-wrap; line-height:1.55; }
  #judgement { color:#f0f6fc; }
  .test-result { margin-top:8px; font-size:13px; color:#c9d1d9; white-space:pre-wrap; line-height:1.5; }
  .hidden { display:none !important; }
  .status { font-size:13px; color:#d29922; }
  @media (max-width: 560px) {
    body { padding: 8px; }
    .card { border-radius:10px; padding:10px 12px; margin-bottom:8px; }
    .row { gap:8px; }
    .top-row { align-items:flex-start; }
    .code { font-size:24px; letter-spacing:3px; }
    button { width:100%; min-height:44px; padding:10px 12px; }
    #rolePick button { flex:1 1 0; }
    #hostControls .row button, #networkTest .row button { flex:1 1 45%; }
    .talk { min-height:76px; font-size:19px; padding:18px; }
    .timer { font-size:38px; margin:2px 0; }
    .side-timer span { font-size:19px; }
    #log { max-height:90px; }
    #transcript, #judgement { max-height:140px; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="row top-row">
      <div class="grow">
        <h2>🎧 連線練習室 <span id="modeLabel" class="muted"></span></h2>
        <div class="muted" id="topicLine"></div>
      </div>
      <div style="text-align:right">
        <div class="muted">房間代碼</div>
        <div class="code" id="codeText">-----</div>
      </div>
    </div>
    <div class="status" id="connStatus">連線中…</div>
  </div>

  <div class="card" id="networkTest">
    <div class="muted" style="margin-bottom:6px">開始前測試</div>
    <div class="row">
      <button id="permissionCheckBtn">檢查權限</button>
      <button id="networkTestBtn">測試網絡穩定度</button>
      <button id="localSoundBtn">本機測試聲</button>
    </div>
    <div class="test-result" id="networkTestResult">開始前請先檢查權限及網絡；手機可能需要按一次測試聲才會允許播放音訊。</div>
  </div>

  <div class="card">
    <div class="muted">成員</div>
    <ul class="roster" id="roster"></ul>
    <div class="row" id="rolePick" style="margin-top:8px">
      <span class="muted">選擇立場：</span>
      <button class="pick" data-side="正方">正方</button>
      <button class="pick" data-side="反方">反方</button>
    </div>
  </div>

  <div class="card" id="stage">
    <div class="seg" id="segLabel">等待開始…</div>
    <div class="timer" id="timer">00:00</div>
    <div class="side-timers hidden" id="sideTimers">
      <div class="side-timer" id="proTimerBox"><strong>正方已用</strong><span id="proTimer">00:00</span></div>
      <div class="side-timer" id="conTimerBox"><strong>反方已用</strong><span id="conTimer">00:00</span></div>
    </div>
    <div class="muted" id="segSub" style="text-align:center"></div>
    <div class="meterwrap"><div class="meter" id="meter"></div></div>
    <button class="talk" id="talkBtn" disabled>按一下開始發言</button>
    <div class="status" id="turnHint" style="text-align:center;margin-top:6px"></div>
  </div>

  <div class="card" id="hostControls">
    <div class="muted" style="margin-bottom:6px">主持控制</div>
    <div class="row">
      <button class="primary" id="startBtn">開始</button>
      <button id="prevBtn">上一段</button>
      <button id="nextBtn">下一段 ▶</button>
      <button id="judgeBtn">AI 評判</button>
      <button class="warn" id="endBtn">結束</button>
    </div>
  </div>

  <div class="card">
    <div class="muted">狀態記錄</div>
    <div id="log"></div>
  </div>

  <div class="card">
    <div class="muted">逐字稿</div>
    <div id="transcript">支援語音轉文字的瀏覽器會自動記錄發言，方便 AI 評判。</div>
  </div>

  <div class="card">
    <div class="muted">AI 評判</div>
    <div id="judgement">練習後由主持按「AI 評判」，系統會根據逐字稿判定勝方並提供建議。</div>
  </div>

<script>
  // ── injected by _render_room_debate_component ──
  const ROOM_CODE = __ROOM_CODE__;
  const ROOM_WS_BASE = __ROOM_WS_BASE__;
  const MODE = __MODE__;                 // "A" | "B"
  const BELL_SRC = __BELL_SRC__;
  const BELL_VOLUME = 0.9;

  // ── state ──
  let ws = null, myUid = null, isHost = false, myRole = null;
  let phase = "lobby", segIndex = 0, segTotal = 0, segLabel = "", segSide = "";
  let segSeconds = 0, segBells = [], segStartedMs = null, activeSpeaker = null;
  let sideElapsedMs = { "正方": 0, "反方": 0 };
  let activeTurnUser = null, activeTurnSide = null, activeTurnStartedMs = null;
  let serverOffset = 0;                  // serverNow = Date.now() + serverOffset
  let firedBells = new Set();
  let isRecording = false, micReady = false;
  let recognition = null, recogText = "";
  let networkTestStartedAt = 0, networkTestTimer = 0;
  let stream = null, inputCtx = null, sourceNode = null, processor = null;
  let outputCtx = null, playAt = 0;
  let bellCtx = null, bellBuffer = null, bellLoading = null;

  const $ = (id) => document.getElementById(id);
  function log(msg) {
    const el = $("log");
    el.textContent += (el.textContent ? "\n" : "") + msg;
    el.scrollTop = el.scrollHeight;
  }
  function setConn(txt) { $("connStatus").textContent = txt; }
  function appendTranscript(item) {
    const el = $("transcript");
    if (!item || !item.text) return;
    if (el.textContent.startsWith("支援語音轉文字")) el.textContent = "";
    const speaker = (item.side || item.speaker || "成員") + (item.speaker ? "（" + item.speaker + "）" : "");
    el.textContent += (el.textContent ? "\n" : "") + speaker + "：" + item.text;
    el.scrollTop = el.scrollHeight;
  }
  function renderTranscript(list) {
    const el = $("transcript");
    if (!list || !list.length) return;
    el.textContent = "";
    list.forEach(appendTranscript);
  }

  // ── committee token from parent app (same as live_debate authToken) ──
  function authToken() {
    try {
      const t = window.parent && window.parent.localStorage
        ? window.parent.localStorage.getItem("committee_user") : "";
      if (t) return t;
    } catch (e) {}
    try { return window.localStorage.getItem("committee_user") || ""; }
    catch (e) { return ""; }
  }
  function wsBase() {
    if (ROOM_WS_BASE) return ROOM_WS_BASE;
    try {
      const loc = window.parent.location;
      return (loc.protocol === "https:" ? "wss:" : "ws:") + "//" + loc.host + "/room";
    } catch (e) {}
    return (location.protocol === "https:" ? "wss:" : "ws:") + "//" + location.host + "/room";
  }

  // ── audio helpers (copied from live_debate.html) ──
  function downsampleBuffer(buffer, inputRate, outputRate) {
    if (outputRate === inputRate) return buffer;
    const ratio = inputRate / outputRate;
    const newLength = Math.round(buffer.length / ratio);
    const result = new Float32Array(newLength);
    for (let i = 0; i < newLength; i++) result[i] = buffer[Math.floor(i * ratio)] || 0;
    return result;
  }
  function floatTo16BitPCM(float32) {
    const pcm = new Int16Array(float32.length);
    for (let i = 0; i < float32.length; i++) {
      const s = Math.max(-1, Math.min(1, float32[i]));
      pcm[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
    }
    return pcm;
  }
  function bytesToBase64(bytes) {
    let binary = "";
    const chunk = 0x8000;
    for (let i = 0; i < bytes.length; i += chunk)
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
    return btoa(binary);
  }
  function pcmBase64ToFloat32(base64) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const view = new DataView(bytes.buffer);
    const samples = new Float32Array(bytes.byteLength / 2);
    for (let i = 0; i < samples.length; i++) samples[i] = view.getInt16(i * 2, true) / 32768;
    return samples;
  }
  function playPcm(base64, mimeType) {
    if (!outputCtx) outputCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (outputCtx.state === "suspended") outputCtx.resume();
    const m = String(mimeType || "").match(/rate=(\d+)/);
    const sampleRate = m ? parseInt(m[1], 10) : 24000;
    const samples = pcmBase64ToFloat32(base64);
    if (!samples.length) return;
    const buffer = outputCtx.createBuffer(1, samples.length, sampleRate);
    buffer.copyToChannel(samples, 0);
    const src = outputCtx.createBufferSource();
    src.buffer = buffer;
    src.connect(outputCtx.destination);
    playAt = Math.max(playAt, outputCtx.currentTime);
    src.start(playAt);
    playAt += buffer.duration;
  }
  function setNetworkTest(text) {
    $("networkTestResult").textContent = text;
  }
  function makeTestToneBase64() {
    const sampleRate = 16000;
    const seconds = 0.7;
    const count = Math.floor(sampleRate * seconds);
    const pcm = new Int16Array(count);
    for (let i = 0; i < count; i++) {
      const t = i / sampleRate;
      const wave = Math.sin(2 * Math.PI * 880 * t);
      const fade = Math.min(1, i / 800, (count - i) / 800);
      pcm[i] = Math.round(wave * fade * 0x3fff);
    }
    return bytesToBase64(new Uint8Array(pcm.buffer));
  }
  async function playLocalTestTone() {
    if (!outputCtx) outputCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (outputCtx.state === "suspended") await outputCtx.resume();
    playPcm(makeTestToneBase64(), "audio/pcm;rate=16000");
  }
  function latencyLabel(ms) {
    if (ms < 150) return "穩定";
    if (ms < 400) return "一般";
    return "偏慢";
  }
  async function checkPermissions() {
    const lines = [];
    try {
      await playLocalTestTone();
      lines.push("音訊播放：正常");
    } catch (e) {
      lines.push("音訊播放：未能播放");
    }
    try {
      await startMic();
      lines.push("麥克風權限：已允許");
    } catch (e) {
      lines.push("麥克風權限：未允許（" + e.message + "）");
    }
    lines.push("房間連線：" + ((ws && ws.readyState === WebSocket.OPEN) ? "已連線" : "未連線"));
    setNetworkTest(lines.join("\n"));
  }
  async function runNetworkTest() {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      setNetworkTest("未連線，無法進行測試。");
      return;
    }
    try { await playLocalTestTone(); } catch (e) {}
    networkTestStartedAt = Date.now();
    setNetworkTest("測試中：已播放本機測試聲，並向房內其他人發送測試聲…");
    if (networkTestTimer) clearTimeout(networkTestTimer);
    networkTestTimer = setTimeout(() => {
      setNetworkTest("測試超時：WebSocket 回應偏慢或已斷線。");
    }, 4000);
    const tone = makeTestToneBase64();
    ws.send(JSON.stringify({ type: "test_ping", client_ts: networkTestStartedAt }));
    ws.send(JSON.stringify({ type: "test_audio", data: tone, mimeType: "audio/pcm;rate=16000" }));
  }
  async function startMic() {
    if (micReady) return;
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia)
      throw new Error("此瀏覽器不支援麥克風錄音。");
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true, autoGainControl: true }
    });
    inputCtx = new (window.AudioContext || window.webkitAudioContext)();
    await inputCtx.resume();
    sourceNode = inputCtx.createMediaStreamSource(stream);
    processor = inputCtx.createScriptProcessor(4096, 1, 1);
    processor.onaudioprocess = (event) => {
      if (!isRecording || !ws || ws.readyState !== WebSocket.OPEN) return;
      const raw = event.inputBuffer.getChannelData(0);
      let peak = 0;
      for (let i = 0; i < raw.length; i++) peak = Math.max(peak, Math.abs(raw[i]));
      $("meter").style.width = Math.min(100, Math.round(peak * 150)) + "%";
      const down = downsampleBuffer(raw, inputCtx.sampleRate, 16000);
      const pcm = floatTo16BitPCM(down);
      ws.send(JSON.stringify({
        type: "audio",
        data: bytesToBase64(new Uint8Array(pcm.buffer)),
        mimeType: "audio/pcm;rate=16000"
      }));
    };
    sourceNode.connect(processor);
    processor.connect(inputCtx.destination);
    micReady = true;
  }

  // ── bells (copied/adapted from live_debate.html) ──
  function getBellCtx() {
    if (!bellCtx) bellCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (bellCtx.state === "suspended") bellCtx.resume();
    return bellCtx;
  }
  function loadBell() {
    if (!BELL_SRC) return Promise.resolve(null);
    if (!bellLoading) {
      bellLoading = fetch(BELL_SRC).then(r => r.arrayBuffer())
        .then(a => getBellCtx().decodeAudioData(a))
        .then(b => { bellBuffer = b; return b; }).catch(() => null);
    }
    return bellLoading;
  }
  function playTone(count) {
    const ctx = getBellCtx();
    for (let i = 0; i < count; i++) {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.0001, ctx.currentTime + i * 0.8);
      gain.gain.exponentialRampToValueAtTime(0.4, ctx.currentTime + i * 0.8 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + i * 0.8 + 0.28);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.8); osc.stop(ctx.currentTime + i * 0.8 + 0.3);
    }
  }
  async function playBell(count) {
    const ctx = getBellCtx();
    if (ctx.state === "suspended") await ctx.resume();
    if (!bellBuffer) await loadBell();
    if (!bellBuffer) { playTone(count); return; }
    for (let i = 0; i < count; i++) {
      const src = ctx.createBufferSource(), gain = ctx.createGain();
      src.buffer = bellBuffer; gain.gain.value = BELL_VOLUME;
      src.connect(gain); gain.connect(ctx.destination);
      src.start(ctx.currentTime + i * 0.8);
    }
  }
  function fireBellOnce(key, rings) {
    if (firedBells.has(key)) return;
    firedBells.add(key);
    playBell(rings);
  }
  function formatTime(sec) {
    const m = Math.max(0, Math.floor(sec / 60)), s = Math.max(0, Math.floor(sec % 60));
    return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
  }

  // ── server-authoritative timer follower ──
  function serverNow() { return Date.now() + serverOffset; }
  function segElapsed() {
    if (phase !== "active" || segStartedMs == null) return 0;
    return (serverNow() - segStartedMs) / 1000;
  }
  function sideUsedSeconds(side) {
    let ms = Number(sideElapsedMs[side] || 0);
    if (activeTurnSide === side && activeTurnStartedMs != null) {
      ms += Math.max(0, serverNow() - activeTurnStartedMs);
    }
    return ms / 1000;
  }
  function updateSideTimers() {
    const isFree = phase === "active" && segSide === "雙方" && segTotal === 1;
    $("sideTimers").classList.toggle("hidden", !isFree);
    if (!isFree) return;
    const pro = sideUsedSeconds("正方");
    const con = sideUsedSeconds("反方");
    $("proTimer").textContent = formatTime(pro) + " / " + formatTime(segSeconds);
    $("conTimer").textContent = formatTime(con) + " / " + formatTime(segSeconds);
    $("proTimerBox").classList.toggle("over", segSeconds && pro >= segSeconds);
    $("conTimerBox").classList.toggle("over", segSeconds && con >= segSeconds);
  }
  function tick() {
    updateSideTimers();
    if (phase !== "active" || segStartedMs == null) return;
    const elapsed = segElapsed();
    if (segSide === "雙方" && segTotal === 1 && myRole) {
      $("timer").textContent = formatTime(sideUsedSeconds(myRole));
    } else {
      $("timer").textContent = formatTime(elapsed);
    }
    if (segSide === "雙方" && segTotal === 1) {
      if (activeTurnSide) {
        const used = sideUsedSeconds(activeTurnSide);
        segBells.forEach((b, i) => {
          if (used >= Number(b.t || 0)) fireBellOnce("b" + activeTurnSide + "-" + i, Number(b.rings || 1));
        });
      }
    } else {
      segBells.forEach((b, i) => {
        if (elapsed >= Number(b.t || 0)) fireBellOnce("b" + segIndex + "-" + i, Number(b.rings || 1));
      });
    }
    const over = segSeconds && (
      (segSide === "雙方" && segTotal === 1 && myRole) ? sideUsedSeconds(myRole) >= segSeconds : elapsed >= segSeconds
    );
    $("timer").style.color = over ? "#f85149" : "#e6e6e6";
    if (isRecording && !canSpeak()) stopTalk();
    else refreshTalk();
  }
  setInterval(tick, 250);

  // ── UI derivation ──
  function canSpeak() {
    if (phase !== "active" || segSide === "準備") return false;
    if (activeTurnUser && activeTurnUser !== myUid) return false;
    if (segSide === "雙方" && segSeconds && myRole && sideUsedSeconds(myRole) >= segSeconds) return false;
    if (activeSpeaker == null) return segSide === "雙方";   // free debate: both open
    return activeSpeaker === myUid;
  }
  function refreshTalk() {
    const btn = $("talkBtn");
    const ok = canSpeak();
    btn.disabled = !ok;
    if (!ok && isRecording) stopTalk();
    if (phase !== "active") { $("turnHint").textContent = ""; return; }
    if (ok) $("turnHint").textContent = isRecording ? "錄音中 — 再按一下停止" : "輪到你 — 按一下開始，發言完畢後再按一下停止";
    else if (segSide === "準備") $("turnHint").textContent = "準備時間";
    else if (segSide === "雙方" && segSeconds && myRole && sideUsedSeconds(myRole) >= segSeconds) $("turnHint").textContent = "你方時間已用完";
    else if (activeTurnUser && activeTurnUser !== myUid) $("turnHint").textContent = "等待對方發言完畢…";
    else $("turnHint").textContent = "等待對方發言…";
  }
  function updateHostButtons() {
    if (!isHost) return;
    $("startBtn").disabled = phase !== "lobby";
    $("prevBtn").disabled = phase !== "active" || segIndex <= 0;
    $("nextBtn").disabled = phase !== "active" || segTotal <= 1 || segIndex >= segTotal - 1;
    $("judgeBtn").disabled = phase === "lobby";
  }
  function renderRoster(list) {
    const ul = $("roster"); ul.innerHTML = "";
    (list || []).forEach(m => {
      const li = document.createElement("li");
      const nm = m.user_id === myUid ? (m.user_id + "（你）") : m.user_id;
      li.innerHTML = '<span class="dot' + (m.connected ? "" : " off") + '"></span>' +
        '<span class="grow">' + nm + '</span>' +
        (m.role ? '<span class="sidechip side-' + m.role + '">' + m.role + '</span>' : "") +
        (m.is_host ? '<span class="badge">主持</span>' : "");
      ul.appendChild(li);
      if (m.user_id === myUid && m.role) myRole = m.role;
    });
    document.querySelectorAll("#rolePick .pick").forEach(b =>
      b.classList.toggle("active", b.dataset.side === myRole));
  }
  function applyState(s) {
    phase = s.phase; segIndex = s.seg_index; segTotal = s.seg_total;
    segLabel = s.seg_label || ""; segSide = s.side || "";
    segSeconds = s.seconds || 0; segBells = s.bells || [];
    activeSpeaker = s.active_speaker;
    sideElapsedMs = s.side_elapsed_ms || { "正方": 0, "反方": 0 };
    activeTurnUser = s.active_turn_user || null;
    activeTurnSide = s.active_turn_side || null;
    activeTurnStartedMs = s.active_turn_started_ms || null;
    if (s.server_now_ms) serverOffset = s.server_now_ms - Date.now();
    if (s.seg_started_ms != null && s.seg_started_ms !== segStartedMs) firedBells = new Set();
    segStartedMs = s.seg_started_ms;
    const chip = segSide ? ' <span class="sidechip side-' + segSide + '">' + segSide + '</span>' : "";
    $("segLabel").innerHTML = (phase === "lobby" ? "等待主持開始…" :
      (phase === "ended" ? "已結束" : segLabel + chip));
    $("segSub").textContent = (phase === "active" && segTotal > 1)
      ? ("第 " + (segIndex + 1) + " / " + segTotal + " 段") : "";
    if (phase !== "active") { $("timer").textContent = "00:00"; }
    $("rolePick").classList.toggle("hidden", MODE !== "A" || phase !== "lobby");
    $("networkTest").classList.toggle("hidden", phase !== "lobby");
    updateSideTimers();
    updateHostButtons();
    refreshTalk();
  }

  // ── speech recognition for AI judge transcript ──
  function makeRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;
    const r = new SR();
    r.lang = "zh-HK";
    r.continuous = true;
    r.interimResults = true;
    r.onresult = (event) => {
      let text = "";
      for (let i = 0; i < event.results.length; i++) {
        text += event.results[i][0].transcript || "";
      }
      recogText = text.trim();
    };
    r.onerror = () => {};
    return r;
  }
  function startRecognition() {
    recogText = "";
    recognition = makeRecognition();
    if (!recognition) return;
    try { recognition.start(); } catch (e) {}
  }
  function stopRecognitionAndSend() {
    const text = recogText.trim();
    if (recognition) {
      try { recognition.stop(); } catch (e) {}
    }
    recognition = null;
    recogText = "";
    if (text && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "transcript", text }));
    }
  }

  // ── talk (toggle recording) ──
  async function startTalk() {
    if (!canSpeak() || isRecording) return;
    try { await startMic(); } catch (e) { log("麥克風錯誤：" + e.message); return; }
    isRecording = true;
    $("talkBtn").classList.add("live");
    $("talkBtn").textContent = "按一下停止";
    startRecognition();
    refreshTalk();
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "turn_begin" }));
  }
  function stopTalk() {
    if (!isRecording) return;
    isRecording = false;
    $("meter").style.width = "0%";
    $("talkBtn").classList.remove("live");
    $("talkBtn").textContent = "按一下開始發言";
    stopRecognitionAndSend();
    refreshTalk();
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: "turn_end" }));
  }
  function toggleTalk() {
    if (isRecording) stopTalk();
    else startTalk();
  }

  // ── websocket ──
  function connect() {
    const token = authToken();
    if (!token) { setConn("未登入，無法連接房間。"); return; }
    if (!ROOM_CODE) { setConn("未有房間代碼。"); return; }
    const url = wsBase() + "/" + ROOM_CODE + "?u=" + encodeURIComponent(token);
    ws = new WebSocket(url);
    ws.onopen = () => { setConn("已連線 ✅"); };
    ws.onclose = (ev) => {
      setConn("連線中斷（" + ev.code + "）。" + (ev.code === 1008 ? "房間不存在或尚未登入。" : "5 秒後重試…"));
      if (ev.code !== 1008 && ev.code !== 1013) setTimeout(connect, 5000);
    };
    ws.onerror = () => { setConn("連線錯誤。"); };
    ws.onmessage = (ev) => {
      let msg; try { msg = JSON.parse(ev.data); } catch (e) { return; }
      handle(msg);
    };
  }
  function handle(msg) {
    switch (msg.type) {
      case "roster":
        if (msg.you) myUid = msg.you;
        if (typeof msg.is_host === "boolean") {
          isHost = msg.is_host;
          $("hostControls").classList.toggle("hidden", !isHost);
          updateHostButtons();
        }
        if (msg.topic != null) $("topicLine").textContent = msg.topic ? ("辯題：" + msg.topic) : "";
        if (msg.transcript) renderTranscript(msg.transcript);
        if (msg.judgement) $("judgement").textContent = msg.judgement;
        renderRoster(msg.roster);
        break;
      case "state": applyState(msg); break;
      case "peer_audio": if (msg.from !== myUid) playPcm(msg.data, msg.mimeType); break;
      case "test_pong": {
        const sent = Number(msg.client_ts || networkTestStartedAt || 0);
        const rtt = sent ? Date.now() - sent : 0;
        if (networkTestTimer) clearTimeout(networkTestTimer);
        setNetworkTest("WebSocket 延遲：" + rtt + "ms（" + latencyLabel(rtt) + "）。已向房內其他人發測試聲。");
        break;
      }
      case "test_audio":
        if (msg.from !== myUid) {
          playPcm(msg.data, msg.mimeType);
          log((msg.from || "對方") + " 發出測試聲");
          if (ws && ws.readyState === WebSocket.OPEN)
            ws.send(JSON.stringify({ type: "test_received", source: msg.from }));
        }
        break;
      case "test_received":
        if (msg.source === myUid) {
          const current = $("networkTestResult").textContent;
          setNetworkTest(current + "\n" + (msg.from || "有成員") + " 已收到你的測試聲。");
        }
        break;
      case "serverContent": break;   // mode B (phase 2) handles Gemini audio
      case "speaking":
        log((msg.user_id === myUid ? "你" : (msg.user_id || "對方")) + (msg.speaking ? " 開始發言" : " 發言完畢"));
        break;
      case "transcript": appendTranscript(msg.item); break;
      case "judgement_pending": $("judgement").textContent = "AI 評判正在整理結果…"; break;
      case "judgement": $("judgement").textContent = msg.text || "AI 評判沒有回傳內容。"; break;
      case "peer_left": log((msg.user_id || "有人") + " 已離開"); break;
      case "ended": setConn("練習已結束。"); phase = "ended"; applyState({ phase: "ended", seg_index: 0, seg_total: 0 }); break;
      case "error": log("⚠️ " + (msg.message || "錯誤")); setConn(msg.message || "錯誤"); break;
      case "chat": log("💬 " + (msg.from || "") + "：" + (msg.text || "")); break;
    }
  }

  // ── wire up ──
  $("codeText").textContent = ROOM_CODE || "-----";
  $("modeLabel").textContent = MODE === "B" ? "· 多人對 AI" : "· 真人對真人";
  const talkBtn = $("talkBtn");
  talkBtn.addEventListener("click", toggleTalk);
  document.querySelectorAll("#rolePick .pick").forEach(b =>
    b.addEventListener("click", () => {
      if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: "claim_role", side: b.dataset.side }));
    }));
  $("startBtn").addEventListener("click", () => sendHost("start"));
  $("nextBtn").addEventListener("click", () => sendHost("next_segment"));
  $("prevBtn").addEventListener("click", () => ws && ws.send(JSON.stringify({ type: "set_segment", index: Math.max(0, segIndex - 1) })));
  $("judgeBtn").addEventListener("click", () => sendHost("request_judgement"));
  $("permissionCheckBtn").addEventListener("click", () => checkPermissions());
  $("networkTestBtn").addEventListener("click", () => runNetworkTest());
  $("localSoundBtn").addEventListener("click", () => {
    playLocalTestTone().then(() => setNetworkTest("本機測試聲已播放。")).catch(() => setNetworkTest("本機測試聲無法播放。"));
  });
  $("endBtn").addEventListener("click", () => { if (confirm("結束呢節練習？")) sendHost("end"); });
  function sendHost(type) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type })); }

  loadBell();
  connect();
</script>
</body>
</html>
