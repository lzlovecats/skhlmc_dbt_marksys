<!doctype html>
<!-- Kiosk appliance engine: open the same display route with ?kiosk=1. -->
<html lang="zh-HK">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1220" />
    <title>賽務投影</title>
    <style>
      :root {
        --bg: #0b1220;
        --panel: #131c31;
        --muted: #8d9ab7;
        --text: #f4f7ff;
        --pro: #2e7d32;
        --con: #b3261e;
        --accent: #f9a825;
        --ok: #70df91;
        --error: #ff8a80;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family:
          "Noto Sans CJK HK", "PingFang HK", "Microsoft JhengHei", sans-serif;
        overflow: hidden;
      }
      .hidden {
        display: none !important;
      }
      .screen {
        position: fixed;
        inset: 0;
      }

      /* Holding screen. */
      #holding {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 2vh;
        text-align: center;
        padding: 5vh 5vw;
      }
      #holding .school {
        font-size: clamp(2.4rem, 4vw, 5rem);
        font-weight: 800;
        letter-spacing: 0.1em;
      }
      #holding .sub {
        font-size: clamp(1.2rem, 1.8vw, 2.4rem);
        color: var(--muted);
      }

      /* Normal competition board. */
      #board {
        display: none;
        flex-direction: column;
        padding: 4vh 4vw;
      }
      .motion-label {
        font-size: clamp(1rem, 1.6vw, 2rem);
        color: var(--muted);
        letter-spacing: 0.2em;
      }
      .motion {
        font-size: clamp(2.2rem, 4.2vw, 5.2rem);
        font-weight: 800;
        line-height: 1.2;
        margin-top: 1vh;
        max-height: 26vh;
        overflow: hidden;
      }
      .teams {
        display: flex;
        gap: 2vw;
        margin-top: 4vh;
        flex: 1;
      }
      .team {
        flex: 1;
        border-radius: 1.4vw;
        background: var(--panel);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 3vh 2vw;
        border: 0.5vh solid transparent;
        transition: all 0.25s ease;
      }
      .team .side {
        font-size: clamp(1.1rem, 2vw, 2.5rem);
        font-weight: 700;
        opacity: 0.9;
      }
      .team.pro .side {
        color: #7ee787;
      }
      .team.con .side {
        color: #ff8a80;
      }
      .team .name {
        font-size: clamp(1.8rem, 3.4vw, 4.2rem);
        font-weight: 800;
        margin-top: 1.5vh;
        text-align: center;
      }
      .team.active {
        border-color: var(--accent);
        transform: scale(1.02);
      }
      .team.active.pro {
        background: linear-gradient(
          180deg,
          rgba(46, 125, 50, 0.35),
          var(--panel)
        );
      }
      .team.active.con {
        background: linear-gradient(
          180deg,
          rgba(179, 38, 30, 0.35),
          var(--panel)
        );
      }
      .now {
        margin-top: 4vh;
        text-align: center;
        background: var(--panel);
        border-radius: 1.4vw;
        padding: 3vh 2vw;
      }
      .now .label {
        font-size: clamp(1rem, 1.6vw, 2rem);
        color: var(--muted);
        letter-spacing: 0.2em;
      }
      .now .role {
        font-size: clamp(2rem, 3.6vw, 4.5rem);
        font-weight: 800;
        margin-top: 1vh;
      }
      .now .speaker {
        font-size: clamp(1.3rem, 2.4vw, 3rem);
        color: var(--accent);
        margin-top: 0.6vh;
      }
      .now.pro .role {
        color: #7ee787;
      }
      .now.con .role {
        color: #ff8a80;
      }

      /* Published AI result. Only the public, bounded projector summary enters here. */
      #aiBoard {
        display: none;
        flex-direction: column;
        padding: 4vh 5vw 3vh;
        background:
          radial-gradient(circle at top right, rgba(95, 130, 255, 0.2), transparent 38%),
          var(--bg);
      }
      .ai-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 2vw;
        border-bottom: 0.3vh solid rgba(249, 168, 37, 0.55);
        padding-bottom: 1.8vh;
      }
      .ai-title {
        font-size: clamp(2.2rem, 4vw, 5rem);
        font-weight: 900;
      }
      .ai-match {
        color: var(--muted);
        text-align: right;
        font-size: clamp(1rem, 1.45vw, 1.8rem);
      }
      #aiSummary {
        flex: 1;
        min-height: 0;
        overflow: hidden;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font-size: clamp(1.35rem, 2.15vw, 2.75rem);
        line-height: 1.55;
        padding: 2.4vh 1vw 1.5vh;
      }
      #aiAdvisory {
        flex: none;
        border: 0.25vh solid var(--accent);
        border-radius: 1vw;
        color: #ffdc87;
        background: rgba(249, 168, 37, 0.12);
        text-align: center;
        font-size: clamp(1rem, 1.45vw, 1.8rem);
        font-weight: 800;
        padding: 1.4vh 1.5vw;
      }

      /* Private kiosk engine status; never shown on ordinary public displays. */
      #kioskBadge {
        position: fixed;
        z-index: 30;
        left: 1.2vw;
        bottom: 1.2vh;
        max-width: 72vw;
        border: 1px solid #344463;
        border-radius: 999px;
        background: rgba(8, 15, 29, 0.9);
        color: #cad4e9;
        font-size: clamp(0.75rem, 1vw, 1.15rem);
        padding: 0.65vh 1vw;
      }
      #kioskBadge.ok {
        border-color: rgba(112, 223, 145, 0.7);
        color: var(--ok);
      }
      #kioskBadge.error {
        border-color: rgba(255, 138, 128, 0.8);
        color: var(--error);
      }
      #kioskPrimeButton,
      #kioskBackupButton {
        position: fixed;
        z-index: 80;
        bottom: 4.5vh;
        border: 2px solid var(--accent);
        border-radius: 12px;
        background: #17233d;
        color: var(--text);
        font-size: 1.1rem;
        font-weight: 800;
        padding: 0.8rem 1.2rem;
        cursor: pointer;
      }
      #kioskPrimeButton {
        left: 50%;
        transform: translateX(-50%);
      }
      #kioskBackupButton {
        right: 1.4vw;
        border-color: var(--error);
      }
      #kioskBackupDialog {
        width: min(760px, 92vw);
        max-height: 82vh;
        border: 1px solid #44577e;
        border-radius: 18px;
        background: var(--panel);
        color: var(--text);
        padding: 1.4rem;
      }
      #kioskBackupDialog::backdrop {
        background: rgba(3, 8, 18, 0.82);
      }
      .backup-dialog-head,
      .backup-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.8rem;
      }
      .backup-dialog-head button,
      .backup-actions button {
        border: 1px solid #50658e;
        border-radius: 9px;
        background: #17233d;
        color: var(--text);
        font: inherit;
        font-weight: 750;
        padding: 0.55rem 0.8rem;
        cursor: pointer;
      }
      .backup-actions .delete {
        border-color: var(--error);
        color: #ffc1bb;
      }
      #kioskBackupList {
        display: grid;
        gap: 0.8rem;
        margin-top: 1rem;
        overflow-y: auto;
      }
      .backup-item {
        border: 1px solid #334362;
        border-radius: 12px;
        background: #111b30;
        padding: 0.9rem;
      }
      .backup-item strong,
      .backup-item span {
        display: block;
        overflow-wrap: anywhere;
      }
      .backup-item span {
        margin: 0.35rem 0 0.7rem;
        color: var(--muted);
        line-height: 1.45;
      }
      #conn {
        position: fixed;
        z-index: 31;
        bottom: 1.2vh;
        right: 1.4vw;
        font-size: clamp(0.7rem, 1vw, 1.1rem);
        color: var(--muted);
        opacity: 0.85;
      }

      /* Kiosk-only login. Public /projector never creates or exposes it. */
      #loginOverlay {
        z-index: 100;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(5, 10, 20, 0.97);
        padding: 5vh 5vw;
      }
      .login-card {
        width: min(42rem, 92vw);
        border: 1px solid #354362;
        border-radius: 18px;
        background: var(--panel);
        padding: 2rem;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }
      .login-card h1 {
        font-size: clamp(2rem, 4vw, 3.5rem);
        margin-bottom: 0.7rem;
      }
      .login-card p {
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.55;
        margin-bottom: 1rem;
      }
      .login-card label {
        display: block;
        color: #d8e0f1;
        margin-bottom: 0.5rem;
      }
      .login-card input,
      .login-card button {
        width: 100%;
        border-radius: 10px;
        border: 1px solid #40506f;
        background: #0e172a;
        color: var(--text);
        font-size: 1.2rem;
        padding: 0.9rem 1rem;
      }
      .login-card button {
        margin-top: 0.9rem;
        cursor: pointer;
        background: #3276dc;
        border-color: #4288ee;
        font-weight: 800;
      }
      .login-card button:disabled {
        cursor: wait;
        opacity: 0.6;
      }
      #loginError {
        min-height: 1.5rem;
        color: var(--error);
        margin-top: 0.8rem;
      }

      /* Kiosk-only full-screen hardware flash. */
      #hardwareFlash {
        z-index: 90;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 2vh;
        text-align: center;
        background: #f4f7ff;
        color: #091222;
        transition: background 0.16s ease, color 0.16s ease;
      }
      #hardwareFlash.dark {
        background: #091222;
        color: #f4f7ff;
      }
      #hardwareFlash h2 {
        font-size: clamp(3rem, 7vw, 8rem);
      }
      #hardwareFlash p {
        font-size: clamp(1.3rem, 2.2vw, 2.7rem);
      }

      @media (max-aspect-ratio: 4 / 3) {
        .teams {
          margin-top: 2vh;
        }
        .now {
          margin-top: 2vh;
        }
        #aiSummary {
          font-size: clamp(1.2rem, 2vw, 2.2rem);
        }
      }
    </style>
  </head>
  <body>
    <div id="holding" class="screen">
      <div class="school">校園隨想辯論比賽</div>
      <div class="sub">準備中…</div>
    </div>

    <div id="board" class="screen">
      <div>
        <div class="motion-label">辯題</div>
        <div class="motion" id="motion">—</div>
      </div>
      <div class="teams">
        <div class="team pro" id="teamPro">
          <div class="side">正方</div>
          <div class="name" id="proTeam">—</div>
        </div>
        <div class="team con" id="teamCon">
          <div class="side">反方</div>
          <div class="name" id="conTeam">—</div>
        </div>
      </div>
      <div class="now" id="now">
        <div class="label">現在發言</div>
        <div class="role" id="role">—</div>
        <div class="speaker" id="speaker"></div>
      </div>
    </div>

    <section id="aiBoard" class="screen" aria-live="polite">
      <div class="ai-title-row">
        <div class="ai-title">🎙️ AI評判易</div>
        <div class="ai-match" id="aiMatch"></div>
      </div>
      <div id="aiSummary"></div>
      <div id="aiAdvisory">
        以下「AI評判易」結果只屬 AI 輔助評語，正式賽果以評判團為準。
      </div>
    </section>

    <div id="hardwareFlash" class="screen" aria-live="assertive">
      <h2>硬件測試</h2>
      <p>正在測試大屏、收音咪及喇叭…</p>
    </div>

    <div id="loginOverlay" class="screen">
      <form class="login-card" id="kioskLoginForm">
        <h1>比賽日 Kiosk 登入</h1>
        <p>
          此介面只接受固定 kiosk account。登入後先可以接收 Projector Control
          指令、錄製正式比賽及播放 AI評判易粵語評語。
        </p>
        <label for="kioskPassword">kiosk 密碼</label>
        <input
          id="kioskPassword"
          type="password"
          autocomplete="current-password"
          maxlength="512"
          required
        />
        <button id="kioskLoginButton" type="submit">登入 kiosk</button>
        <div id="loginError" role="alert"></div>
      </form>
    </div>

    <div id="kioskBadge" class="hidden"></div>
    <button id="kioskPrimeButton" type="button" style="display: none">
      啟用收音咪及聲音
    </button>
    <button id="kioskBackupButton" type="button" style="display: none">
      管理本機錄音備份
    </button>
    <dialog id="kioskBackupDialog">
      <div class="backup-dialog-head">
        <div>
          <h2>本機錄音備份</h2>
          <p id="kioskBackupRetention"></p>
        </div>
        <button id="kioskBackupClose" type="button">關閉</button>
      </div>
      <div id="kioskBackupList"></div>
    </dialog>
    <div id="conn"></div>

    <script>
      (() => {
        "use strict";

        const params = new URLSearchParams(location.search);
        const DISPLAY = params.get("display") || "main";
        const KIOSK_MODE = params.get("kiosk") === "1";
        const PUBLIC_POLL_MS = 2000;
        const COMMAND_POLL_MS = 850;
        const HEARTBEAT_MS = 5000;
        const HARDWARE_TTL_MS = 30 * 60 * 1000;
        const RECORDING_DB_NAME = "marksys-kiosk-recordings-v1";
        const RECORDING_DB_VERSION = 1;
        const DEFAULT_ADVISORY =
          "以下「AI評判易」結果只屬 AI 輔助評語，正式賽果以評判團為準。";
        const $ = (id) => document.getElementById(id);
        const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
        const finite = (value, fallback = 0) => {
          const number = Number(value);
          return Number.isFinite(number) ? number : fallback;
        };

        let projectorState = null;
        let publicAiState = null;
        let publicFailures = 0;
        let kioskAuthenticated = false;
        let kioskLimits = {
          max_bytes: 12 * 1024 * 1024,
          max_seconds: 90 * 60,
          min_seconds: 10,
          tts_max_chars: 1200,
          local_recording_retention_days: 0,
        };
        let clientId = "";
        let leaseRole = "standby";
        let leaseToken = "";
        let leaseGeneration = 0;
        let leaseExpiresAt = "";
        let leaseDeviceLabel = "";
        let leaseRevoked = false;
        let leaseLossBusy = false;
        let commandTimer = 0;
        let heartbeatTimer = 0;
        let commandPollBusy = false;
        let heartbeatFailures = 0;
        let lastRevision = -1;
        let privateStateInitialized = false;
        let lastEnvelope = null;
        let commandChain = Promise.resolve();
        let ackCache = new Map();
        let lastAckReplayAt = 0;
        let enginePhase = "idle";
        let engineDetail = "等待 Projector Control 指令";
        let lastError = "";
        let hardware = {
          passed: false,
          tested_at: 0,
          session_id: "",
          microphone_id: "",
          details: {},
        };
        let recording = null;
        let processing = null;
        let latestResult = null;
        let speech = null;
        let bellContext = null;
        let bellBuffer = null;
        let bellLoading = null;
        let wakeLock = null;
        let mediaPrimed = false;
        let recordingDbPromise = null;
        let recoverySessionId = "";
        let recordingBackupManifests = [];

        function newClientId() {
          try {
            return crypto.randomUUID();
          } catch (_) {
            return (
              "display-" +
              Date.now().toString(36) +
              "-" +
              Math.random().toString(36).slice(2, 12)
            );
          }
        }

        function stableTabClientId() {
          const key = "projector-kiosk-client:" + DISPLAY;
          try {
            const saved = String(sessionStorage.getItem(key) || "");
            if (/^[A-Za-z0-9_-]{20,100}$/.test(saved)) return saved;
            const created = newClientId();
            sessionStorage.setItem(key, created);
            return created;
          } catch (_) {
            return newClientId();
          }
        }

        function recordingTransactionDone(transaction) {
          return new Promise((resolve, reject) => {
            transaction.oncomplete = () => resolve();
            transaction.onerror = () =>
              reject(transaction.error || new Error("本機錄音資料庫寫入失敗"));
            transaction.onabort = () =>
              reject(transaction.error || new Error("本機錄音資料庫操作已取消"));
          });
        }

        function recordingRequestValue(request) {
          return new Promise((resolve, reject) => {
            request.onsuccess = () => resolve(request.result);
            request.onerror = () =>
              reject(request.error || new Error("本機錄音資料庫讀取失敗"));
          });
        }

        function openRecordingDb() {
          if (!window.indexedDB) {
            return Promise.reject(new Error("瀏覽器不支援本機持久錄音備份"));
          }
          if (recordingDbPromise) return recordingDbPromise;
          recordingDbPromise = new Promise((resolve, reject) => {
            const request = indexedDB.open(RECORDING_DB_NAME, RECORDING_DB_VERSION);
            request.onupgradeneeded = () => {
              const db = request.result;
              if (!db.objectStoreNames.contains("sessions")) {
                db.createObjectStore("sessions", { keyPath: "session_id" });
              }
              if (!db.objectStoreNames.contains("chunks")) {
                const chunks = db.createObjectStore("chunks", { keyPath: "id" });
                chunks.createIndex("session_id", "session_id", { unique: false });
              }
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => {
              recordingDbPromise = null;
              reject(request.error || new Error("未能開啟本機錄音資料庫"));
            };
            request.onblocked = () => {
              recordingDbPromise = null;
              reject(new Error("本機錄音資料庫正被另一個 Kiosk 分頁佔用"));
            };
          });
          return recordingDbPromise;
        }

        function recordingManifest(state, status = "recording") {
          return {
            session_id: state.session_id,
            match_id: state.match_id,
            topic: String(state.match?.topic || "").slice(0, 500),
            mime_type: state.mime_type,
            started_at: state.started_at_iso || new Date().toISOString(),
            updated_at: new Date().toISOString(),
            status,
            bytes: Math.max(0, state.bytes || 0),
            chunk_count: Math.max(0, state.chunk_sequence || 0),
            persistence_error: String(state.persistence_error || "").slice(0, 500),
          };
        }

        async function saveRecordingManifest(state, status = "recording") {
          const db = await openRecordingDb();
          const transaction = db.transaction("sessions", "readwrite");
          const done = recordingTransactionDone(transaction);
          transaction.objectStore("sessions").put(recordingManifest(state, status));
          await done;
        }

        async function persistRecordingChunk(state, chunk) {
          const db = await openRecordingDb();
          const sequence = state.chunk_sequence;
          state.chunk_sequence += 1;
          const transaction = db.transaction(["sessions", "chunks"], "readwrite");
          const done = recordingTransactionDone(transaction);
          transaction.objectStore("chunks").put({
            id: state.session_id + ":" + String(sequence).padStart(8, "0"),
            session_id: state.session_id,
            sequence,
            blob: chunk,
            byte_size: chunk.size,
            created_at: new Date().toISOString(),
          });
          transaction.objectStore("sessions").put(recordingManifest(state));
          await done;
        }

        async function loadPersistedRecording(sessionId) {
          const db = await openRecordingDb();
          const transaction = db.transaction(["sessions", "chunks"], "readonly");
          const done = recordingTransactionDone(transaction);
          const manifestRequest = transaction.objectStore("sessions").get(sessionId);
          const chunksRequest = transaction
            .objectStore("chunks")
            .index("session_id")
            .getAll(IDBKeyRange.only(sessionId));
          const [manifest, chunks] = await Promise.all([
            recordingRequestValue(manifestRequest),
            recordingRequestValue(chunksRequest),
          ]);
          await done;
          return {
            manifest: manifest || null,
            chunks: (chunks || [])
              .sort((a, b) => finite(a.sequence) - finite(b.sequence))
              .map((item) => item.blob)
              .filter((blob) => blob?.size),
          };
        }

        async function clearPersistedRecording(sessionId) {
          if (!sessionId) return;
          const db = await openRecordingDb();
          const keyTransaction = db.transaction("chunks", "readonly");
          const keysDone = recordingTransactionDone(keyTransaction);
          const keys = await recordingRequestValue(
            keyTransaction
              .objectStore("chunks")
              .index("session_id")
              .getAllKeys(IDBKeyRange.only(sessionId)),
          );
          await keysDone;
          const transaction = db.transaction(["sessions", "chunks"], "readwrite");
          const done = recordingTransactionDone(transaction);
          transaction.objectStore("sessions").delete(sessionId);
          const chunkStore = transaction.objectStore("chunks");
          for (const key of keys || []) chunkStore.delete(key);
          await done;
          recordingBackupManifests = recordingBackupManifests.filter(
            (item) => String(item.session_id || "") !== sessionId,
          );
          if (recoverySessionId === sessionId) recoverySessionId = "";
          renderRecordingBackups();
        }

        function recordingRetentionMs() {
          const days = finite(kioskLimits.local_recording_retention_days, 0);
          return days > 0
            ? days * 24 * 60 * 60 * 1000
            : Number.POSITIVE_INFINITY;
        }

        async function storedRecordingManifests() {
          const db = await openRecordingDb();
          const transaction = db.transaction("sessions", "readonly");
          const done = recordingTransactionDone(transaction);
          const sessions = await recordingRequestValue(
            transaction.objectStore("sessions").getAll(),
          );
          await done;
          return sessions || [];
        }

        async function cleanupExpiredPersistedRecordings() {
          const cutoff = Date.now() - recordingRetentionMs();
          const sessions = await storedRecordingManifests();
          const expired = sessions.filter((item) => {
            const updatedAt = Date.parse(String(item.updated_at || ""));
            return Number.isFinite(updatedAt) && updatedAt <= cutoff;
          });
          for (const item of expired) {
            await clearPersistedRecording(String(item.session_id || ""));
          }
          return expired.length;
        }

        function backupStatusLabel(value) {
          return {
            recording: "錄音中斷後保留",

            cancelled: "開始取消後保留",

            : "管理本機錄音備份";

        async function refreshRecordingRecovery() {
          if (!KIOSK_MODE) return;
          try {
            await cleanupExpiredPersistedRecordings();
            recordingBackupManifests = (await storedRecordingManifests())
              .filter((item) => finite(item.bytes) > 0)
              .sort((a, b) =>
                String(b.updated_at).localeCompare(String(a.updated_at)),
              );
            renderRecordingBackups();
          } catch (_) {
            recoverySessionId = "";
            recordingBackupManifests = [];
            show($("kioskBackupButton"), false);
          }
        }

        async function downloadPersistedRecording(sessionId) {
          const recovered = await loadPersistedRecording(sessionId);
          if (!recovered.chunks.length) throw new Error("本機備份沒有可下載錄音片段");
          const mime = String(recovered.manifest?.mime_type || "audio/webm");
          const blob = new Blob(recovered.chunks, { type: mime });
          const extension = mime.includes("ogg") ? "ogg" : mime.includes("mp4") ? "m4a" : "webm";
          const safeMatch = String(recovered.manifest?.match_id || "match")
            .replace(/[^a-zA-Z0-9_-]+/g, "-")
            .slice(0, 60);
          const link = document.createElement("a");
          const url = URL.createObjectURL(blob);
          link.href = url;
          link.download = safeMatch + "-kiosk-local-backup-" + sessionId.slice(0, 12) + "." + extension;
          document.body.appendChild(link);
          link.click();
          link.remove();
          setTimeout(() => URL.revokeObjectURL(url), 60000);
          return blob.size;
        }

        async function ensureRecordingStorage() {
          const db = await openRecordingDb();
          const testId = "__hardware_test__";
          const transaction = db.transaction("sessions", "readwrite");
          const done = recordingTransactionDone(transaction);
          transaction.objectStore("sessions").put({
            session_id: testId,
            bytes: 0,
            updated_at: new Date().toISOString(),
          });
          transaction.objectStore("sessions").delete(testId);
          await done;
          let persistent = false;
          if (navigator.storage?.persist) {
            try {
              persistent = await navigator.storage.persist();
            } catch (_) {}
          }
          return { available: true, persistent };
        }

        async function uploadBlobWithRetry(url, headers, blob, label = "錄音") {
          let lastError = null;
          for (let attempt = 1; attempt <= 4; attempt += 1) {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 120000);
            try {
              const response = await fetch(url, {
                method: "PUT",
                headers,
                body: blob,
                signal: controller.signal,
              });
              if (response.ok) return response;
              lastError = new Error(label + "上載失敗（HTTP " + response.status + "）");
              if (response.status >= 400 && response.status < 500) throw lastError;
            } catch (error) {
              lastError = error;
              if (error?.message?.includes("HTTP 4")) throw error;
            } finally {
              clearTimeout(timeout);
            }
            if (attempt < 4) {
              setEngine("processing", label + "上載中斷，正在重試（" + attempt + "／4）");
              await sleep(1000 * Math.min(8, 2 ** (attempt - 1)));
            }
          }
          throw lastError || new Error(label + "上載失敗");
        }

        async function runBrowserR2UploadProbe() {
          const bytes = crypto.getRandomValues(new Uint8Array(1024));
          const blob = new Blob([bytes], { type: "application/octet-stream" });
          const digest = await sha256Hex(blob);
          const intent = await fetchJson("/api/kiosk/match-review/upload-probe-intent", {
            method: "POST",
            lease: true,
            body: { byte_size: blob.size, sha256: digest },
          });
          await uploadBlobWithRetry(intent.url, intent.headers, blob, "瀏覽器至 R2 測試檔");
          const completed = await fetchJson(
            "/api/kiosk/match-review/upload-probe-complete",
            { method: "POST", body: { upload_token: intent.upload_token } },
          );
          if (!completed.ok || !completed.probe_deleted) {
            throw new Error("瀏覽器至 R2 測試檔未能驗證及刪除");
          }
          return { bytes: blob.size, verified: true, deleted: true };
        }

        function expiryIsPast(value) {
          if (!value) return false;
          let timestamp;
          if (typeof value === "number") {
            timestamp = value > 10_000_000_000 ? value : value * 1000;
          } else {
            timestamp = Date.parse(String(value));
          }
          return Number.isFinite(timestamp) && timestamp <= Date.now();
        }

        function publicAiPayload(payload) {
          if (!payload || typeof payload !== "object") return null;
          const value = payload.ai || payload.result || payload;
          const summary = value.projector_summary ?? value.summary ?? "";
          const explicit = value.published ?? value.visible ?? value.active;
          const published = explicit == null ? Boolean(summary) : Boolean(explicit);
          if (!published || !summary) return null;
          const expiry =
            value.expires_at ?? value.expiry ?? value.result_expires_at ?? null;
          if (expiryIsPast(expiry)) return null;
          return {
            summary,
            advisory: String(value.advisory || DEFAULT_ADVISORY),
            match: value.match || {},
            match_id: String(value.match_id || value.match?.match_id || ""),
            revision: finite(value.revision ?? value.publish_revision, 0),
            expiry,
          };
        }

        function summaryText(value) {
          if (typeof value === "string") return value.trim();
          if (!value || typeof value !== "object") return "";
          const labels = {
            winner: "建議勝方",
            confidence: "信心",
            summary: "評語摘要",
            reasons: "主要理由",
            pro: "正方評語",
            con: "反方評語",
            limitations: "錄音及證據限制",
          };
          const lines = [];
          for (const [key, item] of Object.entries(value)) {
            if (item == null || item === "") continue;
            const label = labels[key] || key;
            if (Array.isArray(item)) {
              lines.push(label + "：\n" + item.map((x) => "• " + String(x)).join("\n"));
            } else if (typeof item === "object") {
              lines.push(label + "：" + JSON.stringify(item));
            } else {
              lines.push(label + "：" + String(item));
            }
          }
          return lines.join("\n\n");
        }

        async function fetchJson(url, options = {}) {
          const leaseRequired = options.lease === true;
          const request = {
            credentials: "same-origin",
            cache: "no-store",
            ...options,
          };
          delete request.lease;
          if (leaseRequired) {
            if (leaseRole !== "active" || !leaseToken || leaseGeneration < 1) {
              const error = new Error("此 Kiosk 並非目前 Active 裝置");
              error.status = 423;
              throw error;
            }
            request.headers = {
              ...leaseHeaders(),
              ...(request.headers || {}),
            };
          }
          if (request.body && typeof request.body !== "string") {
            request.headers = {
              "Content-Type": "application/json",
              ...(request.headers || {}),
            };
            request.body = JSON.stringify(request.body);
          }
          const response = await fetch(url, request);
          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            const error = new Error(data.detail || data.error || "HTTP " + response.status);
            error.status = response.status;
            error.payload = data;
            throw error;
          }
          return data;
        }

        function leaseHeaders() {
          return {
            "X-Kiosk-Lease-Token": leaseToken,
            "X-Kiosk-Client-Id": clientId,
            "X-Kiosk-Lease-Generation": String(leaseGeneration),
            "X-Kiosk-Display": DISPLAY,
          };
        }

        async function pollPublic() {
          const results = await Promise.allSettled([
            fetchJson("/api/projector/state?display=" + encodeURIComponent(DISPLAY)),
            fetchJson("/api/projector/ai/public?display=" + encodeURIComponent(DISPLAY)),
          ]);
          if (results[0].status === "fulfilled") projectorState = results[0].value;
          if (results[1].status === "fulfilled") publicAiState = results[1].value;
          if (results.some((item) => item.status === "fulfilled")) {
            publicFailures = 0;
            $("conn").textContent = "";
          } else {
            publicFailures += 1;
            if (publicFailures > 2) $("conn").textContent = "連線中斷，重試中…";
          }
          renderScreens();
        }

        function showLogin(message = "") {
          if (!KIOSK_MODE) return;
          kioskAuthenticated = false;
          $("loginError").textContent = message;
          show($("loginOverlay"), true);
          setTimeout(() => $("kioskPassword").focus(), 0);
        }

        function hideLogin() {
          show($("loginOverlay"), false);
          $("loginError").textContent = "";
          $("kioskPassword").value = "";
        }

        function mergeLimits(value) {
          if (!value || typeof value !== "object") return;
          const source = value.match_review_limits || value.limits || value;
          const maxBytes = finite(source.max_bytes, kioskLimits.max_bytes);
          const maxSeconds = finite(source.max_seconds, kioskLimits.max_seconds);
          const minSeconds = finite(source.min_seconds, kioskLimits.min_seconds);
          const ttsMaxChars = finite(source.tts_max_chars, kioskLimits.tts_max_chars);
          const retentionDays = finite(
            source.local_recording_retention_days,
            kioskLimits.local_recording_retention_days,
          );
          if (maxBytes > 0) kioskLimits.max_bytes = maxBytes;
          if (maxSeconds > 0) kioskLimits.max_seconds = maxSeconds;
          if (minSeconds >= 0) kioskLimits.min_seconds = minSeconds;
          if (ttsMaxChars > 0) kioskLimits.tts_max_chars = ttsMaxChars;
          if (retentionDays > 0) kioskLimits.local_recording_retention_days = retentionDays;
        }

        async function claimLease() {
          if (!kioskAuthenticated || leaseRevoked) return false;
          const renewing = leaseRole === "active" && Boolean(leaseToken);
          const payload = await fetchJson("/api/kiosk/projector-ai/lease/claim", {
            method: "POST",
            lease: renewing,
            body: {
              display: DISPLAY,
              client_id: clientId,
              lease_generation: renewing ? leaseGeneration : 0,
              capabilities: heartbeatPayload().capabilities,
            },
          });
          mergeLimits(payload);
          leaseDeviceLabel = String(payload.device?.label || leaseDeviceLabel || "Kiosk");
          if (payload.role !== "active") {
            leaseRole = "standby";
            leaseToken = "";
            leaseGeneration = 0;
            leaseExpiresAt = "";
            hardware.passed = false;
            show($("kioskPrimeButton"), false);
            const owner = String(payload.owner?.label || "另一部 Kiosk");
            setEngine(
              "standby",
              payload.reason === "active_session_pinned"
                ? owner + " 正處理場次；本機不會接收指令或啟用收音咪"
                : owner + " 目前為 Active；本機正候命",
            );
            return false;
          }
          const changed =
            leaseRole !== "active" ||
            leaseGeneration !== finite(payload.lease_generation, 0);
          leaseRole = "active";
          leaseToken = String(payload.lease_token || "");
          leaseGeneration = finite(payload.lease_generation, 0);
          leaseExpiresAt = String(payload.expires_at || "");
          leaseRevoked = false;
          if (changed) {
            hardware.passed = false;
            privateStateInitialized = false;
            lastRevision = -1;
            ackCache.clear();
          }
          show($("kioskPrimeButton"), !mediaPrimed, "block");
          setEngine(
            "idle",
            leaseDeviceLabel + " 已成為 Active；等待 Projector Control 指令",
          );
          return true;
        }

        async function handleLeaseLoss(detail = "Kiosk lease 已被撤銷") {
          if (leaseLossBusy || (leaseRole !== "active" && leaseRevoked)) return;
          leaseLossBusy = true;
          leaseRole = "standby";
          leaseToken = "";
          leaseGeneration = 0;
          leaseExpiresAt = "";
          leaseRevoked = true;
          hardware.passed = false;
          show($("kioskPrimeButton"), false);
          stopSpeech();
          const state = recording;
          try {
            if (state) {
              clearTimeout(state.hard_stop);
              try {
                const blob = await stopRecorder(state);
                state.bytes = Math.max(state.bytes || 0, blob.size || 0);
                state.duration_seconds = recordingElapsed();
              } catch (_) {}
              try {
                state.stream.getTracks().forEach((track) => track.stop());
              } catch (_) {}
              try {
                await saveRecordingManifest(state, "lease_lost");
              } catch (_) {}
              recoverySessionId = state.session_id;
            }
            recording = null;
            processing = null;
            await releaseWakeLock();
            await refreshRecordingRecovery();
          } finally {
            setEngine(
              "standby",
              "lease 已失效；錄音已停止並只保留本機備份，不會上載或呼叫 AI",
              String(detail || "Kiosk lease 已失效"),
            );
            leaseLossBusy = false;
          }
        }

        async function primeKioskMedia() {
          if (!KIOSK_MODE) return false;
          if (leaseRole !== "active") {
            throw new Error("只有 Active Kiosk 可以啟用收音咪及聲音");
          }
          const audioReady = getBellContext();
          const microphoneReady = navigator.mediaDevices?.getUserMedia
            ? navigator.mediaDevices.getUserMedia(audioConstraints())
            : Promise.reject(new Error("瀏覽器不支援收音咪"));
          const [context, stream] = await Promise.all([audioReady, microphoneReady]);
          stream.getTracks().forEach((track) => track.stop());
          mediaPrimed = Boolean(context);
          show($("kioskPrimeButton"), leaseRole === "active" && !mediaPrimed, "block");
          if (kioskAuthenticated) sendHeartbeat();
          return mediaPrimed;
