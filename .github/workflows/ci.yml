name: ci

# Repo policy (README「發布前驗證」): no automated test suite is kept; the
# release gates are syntax checks plus the offline migration-catalog lint.
# Ledger-side drift checks (unknown versions, gaps, checksum drift) need the
# target database — operators run `manage_db_migrations.py status` for those.
on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Python syntax gate
        run: git ls-files '*.py' | xargs python -m compileall -q
      - name: JavaScript syntax gate
        run: |
          set -e
          for f in $(git ls-files 'frontend/**/*.js'); do node --check "$f"; done
      - name: Migration hygiene gate (offline)
        run: |
          pip install --quiet SQLAlchemy
          python tools/manage_db_migrations.py lint
